<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 시안 보기</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            padding: 20px;
        }

        /* 탭 영역 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            cursor: pointer;
            border-radius: 6px;
        }

        .tab-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* 이미지 */
        .tab-content img {
            display: none;
            max-width: 100%;
            height: auto;
        }

        .tab-content img.active {
            display: block;
        }
    </style>
</head>

<body>

    <!-- 탭 버튼 -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="1">1번</button>
        <button class="tab-btn" data-tab="2">2번</button>
    </div>

    <!-- 이미지 영역 -->
    <div class="tab-content">
        <img src="./main_01.png" alt="메인 시안 01" class="active" data-content="1">
        <img src="./main_02.png" alt="메인 시안 02" data-content="2">
    </div>

    <script>
        const buttons = document.querySelectorAll('.tab-btn');
        const images = document.querySelectorAll('.tab-content img');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;

                // 버튼 active 처리
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 이미지 변경
                images.forEach(img => {
                    img.classList.remove('active');
                    if (img.dataset.content === target) {
                        img.classList.add('active');
                    }
                });
            });
        });
    </script>

</body>

</html>
