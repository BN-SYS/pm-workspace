<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>총회 등록 — 전자투표시스템</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <div class="nav-inner">
    <a href="assemblies.html" class="nav-logo"><span style="color: #003B5C;">멘사코리아</span> 전자투표 관리</a>
    <div class="nav-links">
      <a href="assemblies.html">총회 목록</a>
      <a href="index.html" class="nav-logout">로그아웃</a>
    </div>
  </div>
</nav>

<main class="main-content">

  <!-- [PHP] $edit_id = $_GET['id'] ?? null;
    수정 모드: SELECT * FROM assemblies WHERE id=? → $assembly
    신규 모드: $assembly = ['title'=>'', 'scheduled_at'=>'']
    수정은 preparing 상태에서만 가능. 다른 상태면 assemblies.php 로 리다이렉트.
  -->

  <div class="page-header">
    <h1 id="form-title">총회 등록</h1><!-- [PHP] $edit_id ? '총회 수정' : '총회 등록' -->
    <p><a href="assemblies.html">&larr; 총회 목록으로 돌아가기</a></p>
  </div>

  <div class="card" style="max-width:560px;">
    <!-- [PHP] 신규: action="process/assembly_create.php" / 수정: action="process/assembly_update.php" -->
    <form method="POST" action="../process/assembly_create.php"
          id="assembly-form"
          data-proto-redirect="assembly-detail.html?id=3"><!-- [PHP] 신규: 생성된 id / 수정: 기존 id -->
      <!-- [PHP] 수정 모드일 때: <input type="hidden" name="id" value="<?= $assembly['id'] ?>"> -->

      <div class="form-group">
        <label>총회명 <span class="req">*</span></label>
        <!-- [PHP] value="<?= h($assembly['title']) ?>" -->
        <input type="text" name="title" id="field-title" class="form-control"
          placeholder="예: 2026년 정기총회"
          value=""
          data-edit-value="2026년 임시총회"
          required>
      </div>

      <div class="form-group">
        <label>총회 일시 <span class="req">*</span></label>
        <!-- [PHP] value="<?= h($assembly['scheduled_at']) ?>" -->
        <input type="datetime-local" name="scheduled_at" id="field-date" class="form-control"
          value=""
          data-edit-value="2026-06-15T10:00"
          required>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
        <a href="assemblies.html" class="btn btn-outline">취소</a>
        <!-- [PHP] $edit_id ? '수정' : '등록' -->
        <button type="submit" class="btn btn-primary" id="submit-btn">등록</button>
      </div>
    </form>
  </div>

</main>

<footer class="site-footer"><p>&copy; 2026 전자투표시스템</p></footer>


<script src="../assets/js/ui.js"></script>
<script>
  /* 프로토타입 전용 — 수정 모드 데이터 채우기 (?id 있을 때)
     PHP 구현 후 이 블록 전체 제거. PHP가 value="" 직접 렌더링. */
  (function () {
    if (!new URLSearchParams(window.location.search).get('id')) return;
    document.querySelectorAll('[data-edit-value]').forEach(function (el) {
      el.value = el.dataset.editValue;
    });
    document.getElementById('form-title').textContent = '총회 수정';
    document.getElementById('submit-btn').textContent = '수정';
    document.getElementById('assembly-form').action = '../process/assembly_update.php';
  })();
</script>
</body>
</html>
