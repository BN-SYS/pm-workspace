<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — 전자투표시스템</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <h1>관리자 로그인</h1>
    <p class="subtitle">전자투표시스템 관리자 페이지</p>

    <div id="error-msg" class="alert alert-danger" style="display:none;"></div>

    <form id="login-form">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="login-id" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-pw" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;padding:12px;">로그인</button>
    </form>

    <p style="margin-top:20px;font-size:12px;color:var(--gray-400);">프로토타입: admin / 1234</p>
  </div>
</div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
  // → PHP 전환 시: form action을 서버로, 서버에서 세션 처리
  if (isAdminLoggedIn()) { window.location.href = 'assemblies.html'; }

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('login-id').value;
    const pw = document.getElementById('login-pw').value;
    if (id === SAMPLE_DATA.admin.id && pw === SAMPLE_DATA.admin.pw) {
      adminLogin();
      window.location.href = 'assemblies.html';
    } else {
      const el = document.getElementById('error-msg');
      el.textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
      el.style.display = 'block';
    }
  });
</script>
</body>
</html>
