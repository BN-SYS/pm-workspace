<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — 전자투표시스템</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <div class="nav-inner">
    <span class="nav-logo"><span style="color: #003B5C;">멘사코리아</span> 전자투표 관리</span>
  </div>
</nav>

<main class="main-content">
  <div class="login-wrap">
    <div class="login-card">
      <h1>관리자 로그인</h1>
      <p class="subtitle">의장 계정으로 로그인하세요</p>

      <!-- [PHP] 로그인 실패 시 ?error=1 로 리다이렉트 → 아래 알림 표시 -->
      <!-- <div class="alert alert-danger">아이디 또는 비밀번호가 일치하지 않습니다.</div> -->

      <!-- [PHP] action="process/admin_login.php" -->
      <form method="POST" action="../process/admin_login.php"
            data-proto-redirect="assemblies.html">
        <div class="form-group">
          <label>아이디 <span class="req">*</span></label>
          <input type="text" name="login_id" class="form-control"
            placeholder="관리자 ID" required autofocus>
        </div>
        <div class="form-group">
          <label>비밀번호 <span class="req">*</span></label>
          <input type="password" name="password" class="form-control"
            placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block"
          style="padding:12px;margin-top:8px;">로그인</button>
      </form>

      <p style="margin-top:20px;font-size:12px;color:var(--gray-400);">
        프로토타입 — 아무 값이나 입력 후 로그인 클릭
      </p>
    </div>
  </div>
</main>

<footer class="site-footer"><p>&copy; 2026 전자투표시스템</p></footer>

<script src="../assets/js/ui.js"></script>
</body>
</html>
