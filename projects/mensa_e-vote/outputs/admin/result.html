<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투표 결과 — 전자투표시스템</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="admin-nav">
  <div class="nav-inner">
    <a href="assemblies.html" class="nav-logo">전자투표 관리</a>
    <div class="nav-links">
      <a href="assemblies.html">총회 목록</a>
      <a href="index.html" class="nav-logout" onclick="adminLogout()">로그아웃</a>
    </div>
  </div>
</nav>

<main class="main-content" id="app"></main>

<footer class="site-footer"><p>&copy; 2026 전자투표시스템 — 프로토타입</p></footer>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
  if (!requireAdmin()) {}

  const params = new URLSearchParams(location.search);
  const agendaId = Number(params.get('agenda_id')) || 1;
  const agenda = getAgenda(agendaId);
  const assembly = getAssembly(agenda.assembly_id);
  const votes = getVotesByAgenda(agendaId);
  const totalVotes = votes.length;
  const totalEligible = SAMPLE_DATA.tickets.length;
  const voteRate = totalEligible > 0 ? ((totalVotes / totalEligible) * 100).toFixed(1) : 0;

  // 옵션별 카운트
  const optionCounts = {};
  agenda.options.forEach(o => { optionCounts[o.id] = 0; });
  votes.forEach(v => { optionCounts[v.option_id] = (optionCounts[v.option_id] || 0) + 1; });

  // 결과 바
  let barsHTML = '';
  agenda.options.forEach(o => {
    const count = optionCounts[o.id] || 0;
    const pct = totalVotes > 0 ? ((count / totalVotes) * 100).toFixed(1) : 0;
    const width = totalVotes > 0 ? ((count / totalVotes) * 100) : 0;
    barsHTML += `
      <div class="result-bar-wrap">
        <div class="result-bar-label">
          <span class="label-text">${h(o.label)}</span>
          <span class="label-value">${pct}% (${count}명)</span>
        </div>
        <div class="result-bar">
          <div class="result-bar-fill" style="width:${width}%">
            ${width > 15 ? `<span>${pct}%</span>` : ''}
          </div>
        </div>
      </div>
    `;
  });

  // 참여자 명단 — 티켓구매자 기준
  let tableRows = '';
  SAMPLE_DATA.tickets.forEach(t => {
    const vote = votes.find(v => v.ticket_id === t.id);
    const delegation = SAMPLE_DATA.delegations.find(d => d.delegator_id === t.id && d.status === 'active');
    const isVoted = !!vote;
    const isDelegated = !!delegation;
    let delegateName = '-';
    let delegatePhone = '-';
    if (isDelegated) {
      const delegateTicket = getTicket(delegation.delegate_id);
      delegateName = delegateTicket ? delegateTicket.name : '-';
      delegatePhone = delegateTicket ? delegateTicket.phone : '-';
    }
    tableRows += `
      <tr>
        <td>${h(t.name)}</td>
        <td>${h(t.phone)}</td>
        <td>${h(t.order_number)}</td>
        <td><span style="color:${isVoted ? 'var(--success)' : 'var(--gray-400)'}; font-weight:600;">${isVoted ? '투표함' : '미투표'}</span></td>
        <td>${isVoted ? vote.submitted_at : '-'}</td>
        <td>${isDelegated ? '<span class="badge badge-delegation">위임</span>' : '본인'}</td>
        <td>${h(delegateName)}</td>
        <td>${h(delegatePhone)}</td>
      </tr>
    `;
  });

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <h1>제${agenda.number}호 안건 결과</h1>
      <p><a href="assembly-detail.html?id=${assembly.id}">&larr; ${h(assembly.name)} 으로 돌아가기</a></p>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>${h(agenda.title)}</h2>
        <span class="badge ${statusClass(agenda.status)}">${statusLabel(agenda.status)}</span>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${totalVotes}</div><div class="stat-label">총 투표</div></div>
        <div class="stat-card"><div class="stat-value">${totalEligible}</div><div class="stat-label">투표 가능</div></div>
        <div class="stat-card"><div class="stat-value">${voteRate}%</div><div class="stat-label">투표율</div></div>
      </div>

      ${barsHTML}
    </div>

    <div class="card">
      <div class="card-header"><h2>참여자 명단</h2></div>
      <div class="alert alert-info" style="font-size:13px;">익명 투표 원칙: "어떤 보기를 선택했는지"는 표시되지 않습니다.</div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>티켓구매자</th><th>전화번호</th><th>주문번호</th>
              <th>투표여부</th><th>투표시각</th><th>위임여부</th>
              <th>위임자</th><th>위임자 연락처</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;
</script>
</body>
</html>
