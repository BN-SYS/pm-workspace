<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>총회 목록 — 전자투표시스템</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<!-- Admin Nav -->
<nav class="admin-nav">
  <div class="nav-inner">
    <a href="assemblies.html" class="nav-logo">전자투표 관리</a>
    <div class="nav-links">
      <a href="assemblies.html">총회 목록</a>
      <a href="attendance.html">출석 현황</a>
      <a href="delegation.html">위임 관리</a>
      <a href="index.html" class="nav-logout" onclick="adminLogout()">로그아웃</a>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1>총회 목록</h1>
    <p>등록된 총회를 관리합니다.</p>
  </div>

  <div style="margin-bottom:16px;">
    <a href="assembly-form.html" class="btn btn-primary">+ 총회 등록</a>
  </div>

  <div id="assembly-list"></div>
</main>

<footer class="site-footer"><p>&copy; 2026 전자투표시스템 — 프로토타입</p></footer>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
  if (!requireAdmin()) {}

  // → PHP 전환 시: 서버에서 $assemblies를 루프 돌려 HTML 생성
  const list = document.getElementById('assembly-list');
  SAMPLE_DATA.assemblies.forEach(a => {
    list.innerHTML += `
      <div class="assembly-item">
        <div class="info">
          <h3>${h(a.name)}</h3>
          <p>${h(a.datetime)} · ${h(a.description)}</p>
          <p style="margin-top:2px;">의장: ${h(a.chairman_name)} (${h(a.chairman_phone)})</p>
        </div>
        <div class="actions">
          <span class="badge ${statusClass(a.status)}">${statusLabel(a.status)}</span>
          <a href="assembly-detail.html?id=${a.id}" class="btn btn-outline btn-sm">관리</a>
          <a href="assembly-form.html?id=${a.id}" class="btn btn-outline btn-sm">수정</a>
        </div>
      </div>
    `;
  });
</script>
</body>
</html>
