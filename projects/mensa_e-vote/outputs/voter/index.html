<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>본인 인증 — 전자투표</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="voter-nav">
  <div class="nav-inner">
    <span class="nav-logo"><span style="color: #003B5C;">멘사코리아</span> 전자투표</span>
  </div>
</nav>

<main class="main-content voter-main">
  <div class="auth-card">
    <h1>본인 인증</h1>
    <p class="subtitle">투표 참여를 위해 정보를 입력해주세요</p>

    <!-- [PHP] 인증 실패 시 process/voter_auth.php → ?error=1 로 리다이렉트 -->
    <!-- [PHP] if (isset($_GET['error'])): -->
    <div class="alert alert-danger" id="error-msg">
      일치하는 정보가 없습니다.
    </div>
    <!-- [PHP] else: -->
    <!-- <div id="error-msg" style="display:none;"></div> -->
    <!-- [PHP] endif -->

    <!-- [PHP] 인증 성공 시 process/voter_auth.php:
      - 쇼핑몰 DB에서 name + phone + order_number 뒤 5자리 매칭
      - 매칭 실패: ?error=1
      - 매칭 성공: $_SESSION['voter_member_id'] = $member_id → vote.php 로 리다이렉트
      - 이미 세션 있으면 vote.php 로 바로 리다이렉트 (페이지 상단 세션 체크)
    -->
    <form method="POST" action="../process/voter_auth.php"
          data-proto-redirect="vote.html">

      <div class="form-group">
        <label>이름 <span class="req">*</span></label>
        <input type="text" name="name" class="form-control"
          placeholder="티켓 구매 시 입력한 이름"
          required autocomplete="name">
      </div>

      <div class="form-group">
        <label>전화번호 <span class="req">*</span></label>
        <input type="tel" name="phone" class="form-control"
          placeholder="010-0000-0000"
          required autocomplete="tel">
      </div>

      <div class="form-group">
        <label>주문번호 뒤 5자리 <span class="req">*</span></label>
        <input type="text" name="order_last5" class="form-control"
          maxlength="5" pattern="[0-9]{5}"
          placeholder="예: 60001"
          required inputmode="numeric">
        <p class="form-hint">카카오 알림톡으로 전달받은 주문번호의 뒤 5자리</p>
      </div>

      <button type="submit" class="btn btn-accent btn-block" style="padding:14px;margin-top:8px;">
        인증 후 투표하기
      </button>
    </form>
  </div>

  <!-- 총회 종료 안내 (총회 status === 'closed' 일 때 표시) -->
  <!-- [PHP] if ($assembly_status === 'closed'): -->
  <!--
  <div class="alert alert-info" style="margin-top:16px;text-align:center;">
    총회가 종료되었습니다. 투표에 참여해주셔서 감사합니다.
  </div>
  -->
  <!-- [PHP] endif -->

  <!-- 총회 준비중 안내 -->
  <!-- [PHP] if ($assembly_status === 'preparing'): -->
  <!--
  <div class="alert alert-warning" style="margin-top:16px;text-align:center;">
    현재 투표 준비 중입니다. 잠시 후 다시 시도해주세요.
  </div>
  -->
  <!-- [PHP] endif -->

</main>

<footer class="site-footer"><p>&copy; 2026 전자투표시스템</p></footer>


<script src="../assets/js/ui.js"></script>
</body>
</html>
