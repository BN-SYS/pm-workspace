<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국숲해설가협회 — SB v1.0</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-dark: #1b3a24;
      --green-main: #2d6a3f;
      --green-light: #4a9e5c;
      --green-pale: #eef5f0;
      --admin-dark: #1a2a4a;
      --admin-main: #2b4275;
      --admin-light: #4a6fa5;
      --admin-pale: #eef1f8;
      --doc-dark: #8b6914;
      --doc-main: #c0975c;
      --doc-light: #d4b27a;
      --doc-pale: #fdf6e3;
      --gray-dark: #1e2329;
      --gray-mid: #4a5568;
      --gray-light: #e2e8f0;
      --gray-bg: #f7f8fa;
      --white: #ffffff;
      --text: #2d3748;
      --text-sm: #718096;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0, 0, 0, .08);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, .16);
      --sidebar-w: 200px;
      --sidebar-min-w: 60px;
      --sidebar-max-w: 200px;
      --panel-w: 380px;
      --panel-min-w: 250px;
      --panel-max-w: 700px;
      --header-h: 56px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── App Shell ──────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      min-width: var(--sidebar-min-w);
      max-width: var(--sidebar-max-w);
      background: var(--gray-dark);
      color: #c8d0db;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 100;
      position: relative;
    }

    .sb-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .sb-header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
      word-wrap: break-word;
      word-break: keep-all;
    }

    .sb-header p {
      font-size: 12px;
      color: #8899aa;
      margin-top: 3px;
    }

    .sb-section-title {
      padding: 12px 14px 5px;
      font-size: 12px;
      font-weight: 700;
      color: #5a6a7a;
      letter-spacing: .08em;
      text-transform: uppercase;
      word-wrap: break-word;
      word-break: keep-all;
    }

    .sb-group {
      margin-bottom: 2px;
    }

    .sb-group-label {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #8899aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: color .15s;
      gap: 4px;
      word-wrap: break-word;
      word-break: keep-all;
    }

    .sb-group-label:hover {
      color: #c0ccd8;
    }

    .sb-group-label .arrow {
      font-size: 11px;
      transition: transform .2s;
      flex-shrink: 0;
    }

    .sb-group-label.open .arrow {
      transform: rotate(90deg);
    }

    .sb-group-items {
      display: none;
    }

    .sb-group-items.visible {
      display: block;
    }

    .sb-item {
      padding: 5px 14px 5px 26px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 5px;
      transition: background .1s, color .1s;
      word-wrap: break-word;
      word-break: keep-all;
    }

    .sb-item:hover {
      background: rgba(255, 255, 255, .06);
      color: #fff;
    }

    .sb-item.active {
      background: rgba(77, 160, 100, .18);
      color: #6dcf8e;
    }

    .sb-item[data-type="doc"].active {
      background: rgba(192, 151, 92, .18);
      color: #e0c68a;
    }

    .sb-item.active .num {
      color: #4a9e5c;
    }

    .sb-item span:last-child {
      word-wrap: break-word;
      word-break: keep-all;
      line-height: 1.4;
    }

    .sb-stats {
      padding: 10px 14px;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, .06);
      font-size: 12px;
      color: #5a6a7a;
      word-wrap: break-word;
    }

    .sb-stats span {
      color: #8899aa;
    }

    /* ── Resize Handle (공통) ───────────────────────────── */
    .resize-handle {
      position: absolute;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 200;
      background: transparent;
      transition: background .15s;
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: rgba(74, 158, 92, 0.4);
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 32px;
      border-radius: 2px;
      background: rgba(255, 255, 255, .2);
      transition: background .15s;
    }

    .resize-handle:hover::after,
    .resize-handle.active::after {
      background: rgba(255, 255, 255, .5);
    }

    #sidebar-resize {
      right: -3px;
    }

    #panel-resize {
      left: -3px;
    }

    #panel-resize:hover,
    #panel-resize.active {
      background: rgba(43, 66, 117, 0.4);
    }

    #panel-resize::after {
      background: rgba(0, 0, 0, .12);
    }

    #panel-resize:hover::after,
    #panel-resize.active::after {
      background: rgba(0, 0, 0, .3);
    }

    body.resizing {
      user-select: none;
      -webkit-user-select: none;
      cursor: col-resize !important;
    }

    body.resizing * {
      cursor: col-resize !important;
    }

    body.resizing iframe {
      pointer-events: none;
    }

    /* ── Main ───────────────────────────────────────────── */
    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    #topbar {
      height: var(--header-h);
      flex-shrink: 0;
      background: var(--white);
      border-bottom: 1px solid var(--gray-light);
      padding: 0 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    #tb-list {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #tb-detail {
      flex: 1;
      display: none;
      align-items: center;
      gap: 10px;
    }

    body.mode-detail #tb-list {
      display: none;
    }

    body.mode-detail #tb-detail {
      display: flex;
    }

    .tb-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--green-pale);
      color: var(--green-main);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tb-badge.admin {
      background: var(--admin-pale);
      color: var(--admin-main);
    }

    .tb-badge.doc {
      background: var(--doc-pale);
      color: var(--doc-main);
    }

    #topbarTitle {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    #topbarSub {
      font-size: 13px;
      color: var(--text-sm);
      white-space: nowrap;
    }

    .tb-spacer {
      flex: 1;
    }

    .tb-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .tb-search {
      position: relative;
      flex-shrink: 0;
    }

    .tb-search .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #a0aec0;
      pointer-events: none;
    }

    .tb-search input {
      width: 180px;
      padding: 5px 10px 5px 28px;
      border-radius: 6px;
      border: 1px solid var(--gray-light);
      background: var(--gray-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s, width .2s;
    }

    .tb-search input::placeholder {
      color: #a0aec0;
    }

    .tb-search input:focus {
      border-color: var(--green-light);
      background: var(--white);
      width: 240px;
    }

    .btn-filter {
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid var(--gray-light);
      background: var(--white);
      font-size: 13px;
      color: var(--text-sm);
      cursor: pointer;
      transition: all .15s;
    }

    .btn-filter:hover,
    .btn-filter.active {
      background: var(--green-pale);
      color: var(--green-main);
      border-color: var(--green-light);
    }

    .btn-filter.admin.active {
      background: var(--admin-pale);
      color: var(--admin-main);
      border-color: var(--admin-light);
    }

    .btn-filter.doc.active {
      background: var(--doc-pale);
      color: var(--doc-main);
      border-color: var(--doc-light);
    }

    #viewToggle {
      display: flex;
      border: 1px solid var(--gray-light);
      border-radius: 6px;
      overflow: hidden;
    }

    #viewToggle button {
      padding: 4px 9px;
      border: none;
      background: var(--white);
      cursor: pointer;
      font-size: 15px;
      color: var(--text-sm);
    }

    #viewToggle button.active {
      background: var(--green-pale);
      color: var(--green-main);
    }

    .btn-back {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--gray-light);
      background: var(--white);
      font-size: 14px;
      color: var(--text-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-back:hover {
      background: var(--gray-bg);
      color: var(--text);
      border-color: var(--gray-mid);
    }

    #detailNum {
      font-size: 13px;
      color: var(--text-sm);
      font-family: monospace;
    }

    #detailTitle {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-nav {
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid var(--gray-light);
      background: var(--white);
      font-size: 14px;
      color: var(--text-sm);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn-nav:hover:not(:disabled) {
      background: var(--green-pale);
      color: var(--green-main);
      border-color: var(--green-light);
    }

    .btn-nav:disabled {
      opacity: .35;
      cursor: default;
    }

    /* ── Content Area ───────────────────────────────────── */
    #content-area {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── List View ──────────────────────────────────────── */
    #list-view {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    body.mode-detail #list-view {
      display: none;
    }

    .group-section {
      margin-bottom: 36px;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gray-light);
    }

    .group-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .group-count {
      font-size: 13px;
      color: var(--text-sm);
      background: var(--gray-light);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .group-section.admin-group .group-header {
      border-bottom-color: var(--admin-light);
    }

    .group-section.admin-group .group-name {
      color: var(--admin-dark);
    }

    .group-section.doc-group .group-header {
      border-bottom-color: var(--doc-light);
    }

    .group-section.doc-group .group-name {
      color: var(--doc-dark);
    }

    .group-section.doc-group .card-num {
      color: var(--doc-main);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card-grid.list-view {
      grid-template-columns: 1fr;
    }

    .page-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-light);
      cursor: pointer;
      transition: box-shadow .2s, transform .15s;
      display: flex;
      flex-direction: column;
    }

    .page-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card-grid.list-view .page-card {
      flex-direction: row;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #e8edf2;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .card-grid.list-view .card-thumb {
      width: 180px;
      aspect-ratio: unset;
      height: 110px;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .card-thumb .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      color: #a0aec0;
      font-size: 13px;
    }

    .card-thumb .no-img .icon {
      font-size: 24px;
    }

    .card-body {
      padding: 11px 13px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--green-main);
      font-family: monospace;
    }

    .admin-group .card-num {
      color: var(--admin-main);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-path {
      font-size: 12px;
      color: var(--text-sm);
      font-family: monospace;
      background: var(--gray-bg);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-sm);
      line-height: 1.5;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
    }

    .tag {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .tag.auth {
      background: #fff3e0;
      color: #e65100;
    }

    .tag.admin-only {
      background: #e8eaf6;
      color: #3949ab;
    }

    .tag.member-only {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .tag.write {
      background: #fce4ec;
      color: #c62828;
    }

    .tag.modal {
      background: #f3e5f5;
      color: #6a1b9a;
    }

    .tag.list {
      background: #e3f2fd;
      color: #1565c0;
    }

    .tag.form {
      background: #fff8e1;
      color: #f57f17;
    }

    .tag.detail {
      background: #e0f7fa;
      color: #006064;
    }

    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sm);
    }

    /* ── Detail Image View ──────────────────────────────── */
    #detail-view {
      flex: 1;
      min-width: 0;
      display: none;
      overflow-y: auto;
      background: #111315;
      align-items: flex-start;
      justify-content: center;
    }

    body.mode-detail #detail-view {
      display: flex;
    }

    #detail-img-wrap {
      width: 100%;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #detail-img {
      width: 98%;
      max-width: 98%;
      display: block;
      border-radius: 6px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, .6);
      cursor: zoom-in;
      height: auto;
    }

    .detail-no-img {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 12px;
      color: #555;
    }

    .detail-no-img .icon {
      font-size: 50px;
    }

    .detail-no-img p {
      font-size: 16px;
    }

    .detail-no-img .sub {
      font-size: 14px;
      color: #444;
      font-family: monospace;
    }

    /* ── Description Panel ──────────────────────────────── */
    #desc-panel {
      width: var(--panel-w);
      flex-shrink: 0;
      min-width: var(--panel-min-w);
      max-width: var(--panel-max-w);
      background: var(--white);
      border-left: 1px solid var(--gray-light);
      display: none;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    body.mode-detail #desc-panel {
      display: flex;
    }

    .dp-sec {
      padding: 10px 12px;
      border-bottom: 1px solid var(--gray-light);
    }

    .dp-sec:last-child {
      border-bottom: none;
    }

    .dp-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-sm);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .dp-id {
      font-size: 22px;
      font-weight: 900;
      font-family: monospace;
      color: var(--green-main);
    }

    .dp-id.admin {
      color: var(--admin-main);
    }

    .dp-id.doc {
      color: var(--doc-main);
    }

    .dp-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .dp-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dp-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 14px;
    }

    .dp-key {
      color: var(--text-sm);
      min-width: 40px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .dp-val {
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      word-break: break-all;
    }

    .dp-val.t {
      font-family: inherit;
      font-size: 14px;
    }

    .dp-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .dp-tags-empty {
      font-size: 13px;
      color: #a0aec0;
    }

    .dp-desc {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }

    .btn-dp-primary {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--green-main);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .15s;
    }

    .btn-dp-primary:hover {
      background: var(--green-dark);
    }

    .btn-dp-primary.admin {
      background: var(--admin-main);
    }

    .btn-dp-primary.admin:hover {
      background: var(--admin-dark);
    }

    .btn-dp-primary.doc {
      background: var(--doc-main);
    }

    .btn-dp-primary.doc:hover {
      background: var(--doc-dark);
    }

    .btn-dp-sec {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--gray-bg);
      color: var(--text);
      border: 1px solid var(--gray-light);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all .15s;
    }

    .btn-dp-sec:hover {
      background: var(--gray-light);
    }

    .dp-nav-row {
      display: flex;
      gap: 6px;
    }

    .dp-nav-row .btn-dp-sec {
      flex: 1;
      font-size: 13px;
      padding: 7px 4px;
    }

    .dp-nav-row .btn-dp-sec:disabled {
      opacity: .35;
      cursor: default;
      background: var(--gray-bg);
    }

    .dp-pos {
      font-size: 13px;
      color: var(--text-sm);
      text-align: center;
      padding: 4px 0 0;
    }

    /* ── Spec Content ───────────────────────────────────── */
    .spec-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--admin-pale);
      color: var(--admin-main);
      vertical-align: middle;
      margin-left: 4px;
      text-transform: none;
      letter-spacing: 0;
    }

    .spec-content {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
    }

    .spec-content h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
      background: var(--gray-dark);
      padding: 5px 10px;
      border-radius: 4px;
      margin: 16px 0 8px;
    }

    .spec-content h3:first-child {
      margin-top: 0;
    }

    @media print {

      /* 앱 영역 완전 제거 */
      body>#app {
        display: none !important;
      }

      /* html, body 스크롤 제한 해제 */
      html,
      body {
        height: auto !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* overlay를 일반 문서 흐름으로 */
      #print-overlay {
        display: block !important;
        position: static !important;
        overflow: visible !important;
        height: auto !important;
        inset: auto !important;
        z-index: auto !important;
      }

      /* 컨트롤 바 숨김 */
      #print-overlay .print-close-bar {
        display: none !important;
      }

      /* 페이지 나누기 보장 */
      .print-page {
        page-break-after: always !important;
        break-after: page !important;
        overflow: visible !important;
        padding: 12px 8px !important;
      }

      .print-page:last-child {
        page-break-after: avoid !important;
        break-after: avoid !important;
      }

      /* 디스크립션 전체 노출 */
      .print-content-row {
        display: flex !important;
      }

      .print-content-right {
        width: 280px !important;
        max-height: none !important;
        overflow: visible !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .print-page-img {
        max-height: 80vh;
        object-fit: contain;
        object-position: top;
      }

      /* 목차 다단 인쇄 지원 */
      .print-page [style*="columns"] {
        columns: 3 !important;
        column-gap: 20px !important;
      }

      /* 목차 페이지 분리 방지 */
      .print-page:has(.print-section-title:first-child:last-of-type) {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }

      /* 목차 한 페이지 강제 */
      .print-toc-page {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: always !important;
        break-after: page !important;
      }

      .print-toc-page .print-section-title {
        font-size: 18px !important;
        margin-bottom: 8px !important;
      }

      .print-divider-page {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
        height: 100vh !important;
        page-break-after: always !important;
        break-after: page !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }

      .print-divider-title {
        font-size: 36px !important;
      }


      /* 페이지 헤더 + 설명 + 콘텐츠가 분리되지 않도록 */
      .print-page-header,
      .print-page-desc {
        page-break-after: avoid !important;
        break-after: avoid !important;
      }

      .print-content-row {
        display: flex !important;
        page-break-before: avoid !important;
        break-before: avoid !important;
        page-break-inside: auto !important;
        break-inside: auto !important;
      }

      /* 우측 디스크립션이 길 경우 자연스럽게 다음 페이지로 이어짐 */
      .print-content-right {
        width: 240px !important;
        max-height: none !important;
        overflow: visible !important;
        break-inside: auto !important;
        page-break-inside: auto !important;
      }

      /* 각 print-page 자체는 내부 분할 허용 (긴 콘텐츠 수용) */
      .print-page {
        page-break-after: always !important;
        break-after: page !important;
        page-break-inside: auto !important;
        break-inside: auto !important;
        overflow: visible !important;
        padding: 12px 8px !important;
      }


      @page {
        size: A4 landscape;
        margin: 10mm;
      }
    }
  </style>
</head>

  <script>
    // ── 스펙 파일 자동 로드 ───────────────────────────────────
    // PAGES 배열의 ID에서 하이픈 제거 → data/specs/{ID}.js 로드
    // 예: DOC-05 → DOC05.js, A01 → A01.js
    (function autoLoadSpecs() {
      const pages = window.PAGES || [];
      const loaded = new Set();
      pages.forEach(p => {
        const fileName = p.id.replace(/-/g, '');
        if (loaded.has(fileName)) return;
        loaded.add(fileName);
        document.write('<script src="data/specs/' + fileName + '.js"><\/script>');
      });
    })();
  </script>

  <script>
    // ── 외부 데이터 ───────────────────────────────────────────
    const PAGES = window.PAGES || [];
    const TAG_LABELS = window.TAG_LABELS || {};
    const SPECS = window.SPECS || {};

    // ── 상태 ──────────────────────────────────────────────────
    let currentFilter = 'all';
    let currentView = 'grid';
    let searchKw = '';
    let currentDetailId = null;
    let lastDetailId = null;

    // ── 섹션 헬퍼 ────────────────────────────────────────────
    function getSectionType(p) { return p.section; }
    function getSectionLabel(sec) {
      return { doc: '프로젝트 문서', user: '사용자', admin: '관리자' }[sec] || sec;
    }
    function getSectionBadgeClass(sec) {
      if (sec === 'admin') return ' admin';
      if (sec === 'doc') return ' doc';
      return '';
    }
    function getSectionIdClass(sec) {
      if (sec === 'admin') return 'admin';
      if (sec === 'doc') return 'doc';
      return '';
    }
    function getSectionGroupClass(sec) {
      if (sec === 'admin') return ' admin-group';
      if (sec === 'doc') return ' doc-group';
      return '';
    }

    // ── 필터링 ────────────────────────────────────────────────
    function getFilteredPages() {
      return PAGES.filter(p => {
        if (currentFilter !== 'all' && p.section !== currentFilter) return false;
        if (searchKw) {
          const kw = searchKw.toLowerCase();
          return p.name.toLowerCase().includes(kw) || p.id.toLowerCase().includes(kw) ||
            p.group.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw) ||
            (p.path || '').toLowerCase().includes(kw);
        }
        return true;
      });
    }

    // ── 상세 모드 네비게이션용 리스트 ─────────────────────────
    function getDetailNavList() {
      if (!currentDetailId) return getFilteredPages();
      const currentPage = PAGES.find(p => p.id === currentDetailId);
      if (!currentPage) return getFilteredPages();
      const currentSection = currentPage.section;
      if (currentFilter === 'all') {
        return PAGES.filter(p => {
          if (p.section !== currentSection) return false;
          if (searchKw) {
            const kw = searchKw.toLowerCase();
            return p.name.toLowerCase().includes(kw) || p.id.toLowerCase().includes(kw) ||
              p.group.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw) ||
              (p.path || '').toLowerCase().includes(kw);
          }
          return true;
        });
      }
      return getFilteredPages();
    }
    // ══════════════════════════════════════════════════════════
    // 전체 PDF 다운로드 (인쇄 방식)
    // ══════════════════════════════════════════════════════════
    function exportAllPDF() {
      const overlay = document.getElementById('print-overlay');
      const sectionOrder = ['doc', 'user', 'admin'];
      const sectionLabels = { doc: '프로젝트 문서', user: '사용자 페이지', admin: '관리자 페이지' };

      let html = '';

      // ── 상단 컨트롤 바 ──
      html += `
    <div class="print-close-bar">
      <button class="btn-print" onclick="doPrint()">🖨 인쇄 / PDF 저장</button>
      <button class="btn-cancel" onclick="closePrintOverlay()">✕ 닫기</button>
      <span class="print-info">총 ${PAGES.length}개 화면 &nbsp;|&nbsp; 인쇄 시 A4 가로 권장 &nbsp;|&nbsp; "PDF로 저장" 선택</span>
    </div>`;

      // ── 표지 ──
      html += `
    <div class="print-page print-divider-page">
      <div class="print-divider-inner">
        <div style="font-size:36px; font-weight:900; color:var(--green-dark); margin-bottom:8px;">한국숲해설가협회</div>
        <div style="font-size:24px; font-weight:700; color:var(--text); margin-bottom:24px;">스토리보드 v1.0</div>
        <div style="font-size:14px; color:var(--text-sm);">
          전체 ${PAGES.length}개 화면 &nbsp;|&nbsp;
          문서 ${PAGES.filter(p => p.section === 'doc').length} /
          사용자 ${PAGES.filter(p => p.section === 'user').length} /
          관리자 ${PAGES.filter(p => p.section === 'admin').length}
        </div>
        <div style="font-size:13px; color:var(--text-sm); margin-top:8px;">
          생성일: ${new Date().toLocaleDateString('ko-KR')}
        </div>
      </div>
    </div>`;

      // ── 목차 (한 페이지 · 섹션 이어지기) ──
      const totalPages = PAGES.length;
      let tocCols = 3, tocFontSize = 11, tocLineHeight = 1.7;
      if (totalPages > 80) { tocCols = 4; tocFontSize = 9; tocLineHeight = 1.5; }
      else if (totalPages > 60) { tocCols = 3; tocFontSize = 10; tocLineHeight = 1.55; }
      else if (totalPages > 40) { tocCols = 3; tocFontSize = 11; tocLineHeight = 1.6; }

      html += `<div class="print-page print-toc-page">`;
      html += `<div class="print-section-title" style="margin-bottom:10px; padding-bottom:6px;">목차</div>`;
      html += `<div style="columns:${tocCols}; column-gap:16px; font-size:${tocFontSize}px; line-height:${tocLineHeight}; column-fill:balance;">`;

      sectionOrder.forEach(sec => {
        const secPages = PAGES.filter(p => p.section === sec);
        if (!secPages.length) return;
        const borderColor = sec === 'admin' ? 'var(--admin-light)' : sec === 'doc' ? 'var(--doc-light)' : 'var(--green-light)';

        html += `<div style="font-size:${tocFontSize + 2}px; font-weight:700; color:var(--text); margin:8px 0 3px; padding-bottom:2px; border-bottom:2px solid ${borderColor};">${sectionLabels[sec]} (${secPages.length})</div>`;

        const groups = [...new Set(secPages.map(p => p.group))];
        groups.forEach(g => {
          const items = secPages.filter(p => p.group === g);
          html += `<div style="break-inside:avoid-column; margin-bottom:4px;">`;
          html += `<div style="font-size:${tocFontSize}px; font-weight:700; color:var(--text-sm); margin:2px 0 1px;">${g}</div>`;
          items.forEach(p => {
            html += `<div style="padding-left:6px; font-size:${tocFontSize - 1}px; color:var(--gray-mid); line-height:${tocLineHeight};">${p.id} ${p.name}</div>`;
          });
          html += `</div>`;
        });
      });

      html += `</div></div>`;

      // ── 각 화면 페이지 (이미지 + 디스크립션 2컬럼) ──
      let lastSec = '';
      PAGES.forEach(p => {
        const sec = p.section;
        const secClass = getSectionIdClass(sec);

        // 섹션 구분 페이지 — 정중앙 배치
        if (sec !== lastSec) {
          html += `
        <div class="print-page print-divider-page">
          <div class="print-divider-inner">
            <div class="print-divider-title ${secClass}">${sectionLabels[sec]}</div>
          </div>
        </div>`;
          lastSec = sec;
        }

        // 스펙/설명 콘텐츠 구성
        const spec = SPECS[p.id] || '';
        const tagsHtml = (p.tags || [])
          .map(t => `<span class="tag ${t}" style="font-size:11px; padding:1px 5px;">${TAG_LABELS[t] || t}</span>`)
          .join('');

        // 우측 디스크립션 패널 내용
        let rightHtml = '';

        // 기본 정보
        rightHtml += `
        <div class="print-desc-info">
          <div><strong>ID</strong><span>${p.id}</span></div>
          <div><strong>섹션</strong><span>${getSectionLabel(sec)} — ${p.group}</span></div>
          ${p.path && p.path !== '#' ? `<div><strong>경로</strong><span style="word-break:break-all; font-family:monospace; font-size:10px;">${p.path.replace('../outputs/', '')}</span></div>` : ''}
        </div>`;

        // 태그
        if (tagsHtml) {
          rightHtml += `
          <div style="margin-top:8px;">
            <div class="print-desc-label">태그</div>
            <div class="print-desc-tags">${tagsHtml}</div>
          </div>`;
        }

        // 스펙이 있으면 스펙, 없으면 설명
        if (spec) {
          rightHtml += `
          <div style="margin-top:10px;">
            <div class="print-desc-label">화면 스펙</div>
            <div class="print-desc-body spec-content">${spec}</div>
          </div>`;
        } else {
          rightHtml += `
          <div style="margin-top:10px;">
            <div class="print-desc-label">${sec === 'doc' ? '문서 설명' : '화면 설명'}</div>
            <div class="print-desc-body">${p.desc}</div>
          </div>`;
        }

        // 이미지 오류 대체 텍스트
        const noImgMsg = sec === 'doc' ? '📄 문서 이미지 미등록' : '🖼 스크린샷 미캡처';

        html += `
      <div class="print-page">
        <div class="print-page-header">
          <span class="print-page-id ${secClass}">${p.id}</span>
          <span class="print-page-name">${p.name}</span>
        </div>
        <div class="print-page-desc">${p.desc}</div>
        <div class="print-content-row">
          <div class="print-content-left">
            <img class="print-page-img" src="images/${p.img}" alt="${p.name}"
              onerror="this.outerHTML='<div class=\\'print-page-noimg\\'>${noImgMsg}</div>'">
          </div>
          <div class="print-content-right">
            ${rightHtml}
          </div>
        </div>
      </div>`;
      });

      overlay.innerHTML = html;
      overlay.classList.add('active');
      overlay.scrollTop = 0;
    }


    function doPrint() {
      const overlay = document.getElementById('print-overlay');
      const app = document.getElementById('app');
      const modal = document.getElementById('imgModal');

      // 1) 앱 숨기기
      app.style.display = 'none';
      if (modal) modal.style.display = 'none';

      // 2) overlay를 fixed → static 일반 flow로 전환
      overlay.style.position = 'static';
      overlay.style.overflow = 'visible';
      overlay.style.height = 'auto';
      overlay.style.inset = 'auto';
      overlay.style.zIndex = 'auto';

      // 3) body 스크롤 허용
      document.body.style.overflow = 'visible';
      document.body.style.height = 'auto';
      document.documentElement.style.overflow = 'visible';
      document.documentElement.style.height = 'auto';

      // 4) 인쇄 실행 (약간의 딜레이로 렌더링 보장)
      setTimeout(() => {
        window.print();

        // 5) 인쇄 후 원래 상태 복원
        app.style.display = '';
        if (modal) modal.style.display = '';
        overlay.style.position = '';
        overlay.style.overflow = '';
        overlay.style.height = '';
        overlay.style.inset = '';
        overlay.style.zIndex = '';
        document.body.style.overflow = '';
        document.body.style.height = '';
        document.documentElement.style.overflow = '';
        document.documentElement.style.height = '';
      }, 100);
    }


    function closePrintOverlay() {
      const overlay = document.getElementById('print-overlay');
      overlay.classList.remove('active');
      overlay.innerHTML = '';
    }

    // ── 사이드바 빌드 ─────────────────────────────────────────
    function buildSidebar() {
      const nav = document.getElementById('sbNav');
      const sectionOrder = ['doc', 'user', 'admin'];
      const sectionLabels = { doc: '프로젝트 문서', user: '사용자 페이지', admin: '관리자 페이지' };
      const sectionColors = { doc: '#c0975c', user: '#4a9e5c', admin: '#4a6fa5' };

      sectionOrder.forEach((sec, secIdx) => {
        const secPages = PAGES.filter(p => p.section === sec);
        if (!secPages.length) return;

        if (secIdx > 0 && sectionOrder[secIdx - 1] === 'doc') {
          const divider = document.createElement('div');
          divider.style.cssText = 'height:1px; background:rgba(255,255,255,.08); margin:8px 14px;';
          nav.appendChild(divider);
        }

        const groups = [...new Set(secPages.map(p => p.group))];

        const title = document.createElement('div');
        title.className = 'sb-section-title';
        title.style.color = sectionColors[sec];
        title.textContent = sectionLabels[sec];
        nav.appendChild(title);

        groups.forEach(g => {
          const items = secPages.filter(p => p.group === g);
          const group = document.createElement('div');
          group.className = 'sb-group';

          const isDocSec = sec === 'doc';
          const label = document.createElement('div');
          label.className = 'sb-group-label' + (isDocSec ? ' open' : '');
          label.innerHTML = `<span>${g} <small style="color:#5a6a7a">(${items.length})</small></span><span class="arrow">▶</span>`;

          const itemsEl = document.createElement('div');
          itemsEl.className = 'sb-group-items' + (isDocSec ? ' visible' : '');

          label.onclick = () => {
            label.classList.toggle('open');
            itemsEl.classList.toggle('visible');
          };

          items.forEach(p => {
            const item = document.createElement('div');
            item.className = 'sb-item';
            item.dataset.id = p.id;
            if (isDocSec) item.dataset.type = 'doc';
            item.innerHTML = `<span>${p.name}</span>`;
            item.onclick = () => showDetail(p.id);
            itemsEl.appendChild(item);
          });

          group.appendChild(label);
          group.appendChild(itemsEl);
          nav.appendChild(group);
        });
      });

      updateStats();
    }

    function updateStats() {
      const total = PAGES.length;
      const doc = PAGES.filter(p => p.section === 'doc').length;
      const user = PAGES.filter(p => p.section === 'user').length;
      const admin = PAGES.filter(p => p.section === 'admin').length;
      document.getElementById('sbStats').innerHTML =
        `전체 <strong><span>${total}</span>개</strong><br>문서 <span>${doc}</span> / 사용자 <span>${user}</span> / 관리자 <span>${admin}</span>`;
    }

    // ── 목록 렌더 ─────────────────────────────────────────────
    function render() {
      const listView = document.getElementById('list-view');
      listView.innerHTML = '';

      const filtered = getFilteredPages();

      const badge = document.getElementById('sectionBadge');
      const title = document.getElementById('topbarTitle');
      const sub = document.getElementById('topbarSub');
      const labels = { all: '전체', doc: '프로젝트 문서', user: '사용자', admin: '관리자' };
      badge.textContent = labels[currentFilter];
      badge.className = 'tb-badge' + getSectionBadgeClass(currentFilter);
      title.textContent = labels[currentFilter] + ' 화면 목록';
      sub.textContent = `${filtered.length}개 화면`;

      if (!filtered.length) {
        listView.innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
        return;
      }

      ['doc', 'user', 'admin'].forEach(sec => {
        const secPages = filtered.filter(p => p.section === sec);
        if (!secPages.length) return;

        const groups = [...new Set(secPages.map(p => p.group))];
        groups.forEach(g => {
          const groupPages = secPages.filter(p => p.group === g);
          const section = document.createElement('div');
          section.className = 'group-section' + getSectionGroupClass(sec);

          const header = document.createElement('div');
          header.className = 'group-header';
          header.innerHTML = `
        <span class="group-name">${getSectionLabel(sec)} — ${g}</span>
        <span class="group-count">${groupPages.length}개 화면</span>`;
          section.appendChild(header);

          const grid = document.createElement('div');
          grid.className = 'card-grid' + (currentView === 'list' ? ' list-view' : '');
          groupPages.forEach(p => grid.appendChild(createCard(p)));
          section.appendChild(grid);
          listView.appendChild(section);
        });
      });
    }

    function createCard(p) {
      const card = document.createElement('div');
      card.className = 'page-card';
      card.dataset.id = p.id;
      card.onclick = () => showDetail(p.id);

      const noImgIcon = p.section === 'doc' ? '📄' : '🖼';
      const noImgText = p.section === 'doc' ? '미등록' : '미캡처';

      const thumbHtml = `
    <div class="card-thumb">
      <img src="images/${p.img}" alt="${p.name}"
        onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'><span class=\\'icon\\'>${noImgIcon}</span><span>${noImgText}</span></div>'">
    </div>`;
      const tagsHtml = (p.tags || []).map(t => `<span class="tag ${t}">${TAG_LABELS[t] || t}</span>`).join('');

      card.innerHTML = `
    ${thumbHtml}
    <div class="card-body">
      <div class="card-num">${p.id}</div>
      <div class="card-title">${p.name}</div>
      ${p.path && p.path !== '#' ? `<div class="card-path">${p.path.replace('../outputs/', '')}</div>` : ''}
      <div class="card-desc">${p.desc}</div>
      ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    </div>`;
      return card;
    }

    // ── 상세 모드 ─────────────────────────────────────────────
    function showDetail(id) {
      const p = PAGES.find(pg => pg.id === id);
      if (!p) return;

      lastDetailId = currentDetailId || id;
      currentDetailId = id;

      document.body.classList.add('mode-detail');
      document.body.classList.remove('mode-list');

      const sec = p.section;
      const badge = document.getElementById('detailBadge');
      badge.textContent = getSectionLabel(sec);
      badge.className = 'tb-badge' + getSectionBadgeClass(sec);
      document.getElementById('detailNum').textContent = p.id;
      document.getElementById('detailTitle').textContent = p.name;
      updateNavButtons();

      const imgWrap = document.getElementById('detail-img-wrap');
      imgWrap.innerHTML = '<img id="detail-img" src="" alt="" onclick="openModalCurrent()">';
      const newImg = document.getElementById('detail-img');
      newImg.style.cursor = 'zoom-in';
      newImg.style.width = '98%';
      newImg.style.maxWidth = '98%';
      newImg.style.height = 'auto';
      newImg.alt = p.name;

      const noImgIcon = sec === 'doc' ? '📄' : '🖼';
      const noImgText = sec === 'doc' ? '문서 이미지 미등록' : '스크린샷 미캡처';
      newImg.onerror = function () {
        imgWrap.innerHTML = `
      <div class="detail-no-img">
        <div class="icon">${noImgIcon}</div>
        <p>${noImgText}</p>
        <p class="sub">${p.img}</p>
      </div>`;
      };
      newImg.src = `images/${p.img}`;

      document.getElementById('detail-view').scrollTop = 0;
      buildDescPanel(p);
      highlightSidebar(id);
    }

    function buildDescPanel(p) {
      const panel = document.getElementById('desc-panel');
      const sec = p.section;
      const list = getDetailNavList();
      const idx = list.findIndex(pg => pg.id === p.id);

      const tagsHtml = (p.tags || []).length
        ? p.tags.map(t => `<span class="tag ${t}">${TAG_LABELS[t] || t}</span>`).join('')
        : '<span class="dp-tags-empty">태그 없음</span>';

      const spec = SPECS[p.id] || null;
      const descSection = spec
        ? `<div class="dp-label">화면 스펙 <span class="spec-badge">전체 스펙</span></div><div class="spec-content">${spec}</div>`
        : `<div class="dp-label">${sec === 'doc' ? '문서 설명' : '화면 설명'}</div><div class="dp-desc">${p.desc}</div>`;

      const pathRow = p.path && p.path !== '#'
        ? `<div class="dp-row"><span class="dp-key">경로</span><span class="dp-val">${p.path.replace('../outputs/', '')}</span></div>` : '';

      const protoBtn = p.path && p.path !== '#'
        ? `<a href="${p.path}" target="_blank" class="btn-dp-primary ${getSectionIdClass(sec)}">프로토타입 열기 →</a>` : '';

      const sectionLabel = getSectionLabel(sec);
      const navPosText = idx >= 0 ? `${sectionLabel} ${idx + 1} / ${list.length}` : '';

      panel.innerHTML = `
    <div class="resize-handle" id="panel-resize"></div>

    <div class="dp-sec">
      <div class="dp-id ${getSectionIdClass(sec)}">${p.id}</div>
      <div class="dp-title">${p.name}</div>
    </div>

    <div class="dp-sec">
      <div class="dp-label">페이지 정보</div>
      <div class="dp-rows">
        <div class="dp-row">
          <span class="dp-key">섹션</span>
          <span class="dp-val t">${getSectionLabel(sec)} — ${p.group}</span>
        </div>
        ${pathRow}
        <div class="dp-row">
          <span class="dp-key">순서</span>
          <span class="dp-val t">${idx >= 0 ? idx + 1 + ' / ' + list.length : '—'}</span>
        </div>
      </div>
    </div>

    <div class="dp-sec">
      <div class="dp-label">태그</div>
      <div class="dp-tags">${tagsHtml}</div>
    </div>

    <div class="dp-sec">
      ${descSection}
    </div>

    ${protoBtn ? `<div class="dp-sec">${protoBtn}</div>` : ''}

    <div class="dp-sec">
      <div class="dp-label">이동</div>
      <div class="dp-nav-row">
        <button class="btn-dp-sec" onclick="navigateDetail(-1)" ${idx <= 0 ? 'disabled' : ''}>◀ 이전</button>
        <button class="btn-dp-sec" onclick="navigateDetail(1)"  ${idx >= list.length - 1 ? 'disabled' : ''}>다음 ▶</button>
      </div>
      <div class="dp-pos">${navPosText}</div>
    </div>`;

      initPanelResize();
    }

    function updateNavButtons() {
      const list = getDetailNavList();
      const idx = list.findIndex(p => p.id === currentDetailId);
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      if (btnPrev) btnPrev.disabled = idx <= 0;
      if (btnNext) btnNext.disabled = idx >= list.length - 1;
    }

    function navigateDetail(dir) {
      const list = getDetailNavList();
      const idx = list.findIndex(p => p.id === currentDetailId);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= list.length) return;
      showDetail(list[newIdx].id);
    }

    function backToList() {
      currentDetailId = null;
      document.body.classList.remove('mode-detail');
      document.body.classList.add('mode-list');
      document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
      render();
      if (lastDetailId) {
        setTimeout(() => {
          const card = document.querySelector(`.page-card[data-id="${lastDetailId}"]`);
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 60);
      }
    }

    function highlightSidebar(id) {
      document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
      const item = document.querySelector(`.sb-item[data-id="${id}"]`);
      if (!item) return;
      item.classList.add('active');
      const groupItems = item.closest('.sb-group-items');
      if (groupItems && !groupItems.classList.contains('visible')) {
        groupItems.classList.add('visible');
        const label = groupItems.previousElementSibling;
        if (label) label.classList.add('open');
      }
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── 필터·뷰 ───────────────────────────────────────────────
    function setFilter(f) {
      currentFilter = f;
      document.getElementById('btnAll').classList.toggle('active', f === 'all');
      document.getElementById('btnDoc').classList.toggle('active', f === 'doc');
      document.getElementById('btnUser').classList.toggle('active', f === 'user');
      document.getElementById('btnAdmin').classList.toggle('active', f === 'admin');
      if (document.body.classList.contains('mode-detail')) {
        updateNavButtons();
        const p = PAGES.find(pg => pg.id === currentDetailId);
        if (p) buildDescPanel(p);
      } else {
        render();
      }
    }

    function setView(v) {
      currentView = v;
      document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
      document.getElementById('btnList').classList.toggle('active', v === 'list');
      if (!document.body.classList.contains('mode-detail')) render();
    }

    function filterSearch(kw) {
      searchKw = kw.trim();
      if (document.body.classList.contains('mode-detail')) {
        updateNavButtons();
      } else {
        render();
      }
    }

    // ── 이미지 모달 ───────────────────────────────────────────
    function openModalCurrent() {
      if (!currentDetailId) return;
      const p = PAGES.find(pg => pg.id === currentDetailId);
      if (!p) return;
      const modal = document.getElementById('imgModal');
      document.getElementById('modalImg').src = `images/${p.img}`;
      document.getElementById('modalInfo').textContent = `${p.id} — ${p.name}${p.path && p.path !== '#' ? '  |  ' + p.path.replace('../outputs/', '') : ''}`;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
      document.getElementById('imgModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('imgModal').classList.contains('open')) { closeModal(); return; }
        if (document.body.classList.contains('mode-detail')) backToList();
      }
      if (document.body.classList.contains('mode-detail') && !document.getElementById('imgModal').classList.contains('open')) {
        if (e.key === 'ArrowLeft') navigateDetail(-1);
        if (e.key === 'ArrowRight') navigateDetail(1);
      }
    });

    // ── 사이드바 리사이즈 ─────────────────────────────────────
    (function initSidebarResize() {
      const sidebar = document.getElementById('sidebar');
      const handle = document.getElementById('sidebar-resize');
      if (!handle) return;
      let isResizing = false, startX = 0, startW = 0;
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault(); isResizing = true; startX = e.clientX; startW = sidebar.offsetWidth;
        handle.classList.add('active'); document.body.classList.add('resizing');
      });
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const delta = e.clientX - startX;
        const minW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-min-w')) || 60;
        const maxW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-max-w')) || 320;
        sidebar.style.width = Math.min(maxW, Math.max(minW, startW + delta)) + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!isResizing) return; isResizing = false;
        handle.classList.remove('active'); document.body.classList.remove('resizing');
      });
    })();

    // ── 패널 리사이즈 ─────────────────────────────────────────
    function initPanelResize() {
      const panel = document.getElementById('desc-panel');
      const handle = document.getElementById('panel-resize');
      if (!handle || !panel) return;
      let isResizing = false, startX = 0, startW = 0;
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault(); isResizing = true; startX = e.clientX; startW = panel.offsetWidth;
        handle.classList.add('active'); document.body.classList.add('resizing');
      });
      const onMove = (e) => {
        if (!isResizing) return;
        const delta = startX - e.clientX;
        const minW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-min-w')) || 250;
        const maxW = Math.min(
          parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-max-w')) || 700,
          window.innerWidth * 0.5
        );
        panel.style.width = Math.min(maxW, Math.max(minW, startW + delta)) + 'px';
      };
      const onUp = () => {
        if (!isResizing) return; isResizing = false;
        handle.classList.remove('active'); document.body.classList.remove('resizing');
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
    initPanelResize();

    // ── 초기화 ────────────────────────────────────────────────
    buildSidebar();
    render();
  </script>

</body>
