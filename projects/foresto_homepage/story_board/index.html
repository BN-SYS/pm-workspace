<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국숲해설가협회 — SB v1.0</title>
<style>
/* ── Reset & Base ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark:  #1b3a24;
  --green-main:  #2d6a3f;
  --green-light: #4a9e5c;
  --green-pale:  #eef5f0;
  --admin-dark:  #1a2a4a;
  --admin-main:  #2b4275;
  --admin-light: #4a6fa5;
  --admin-pale:  #eef1f8;
  --gray-dark:   #1e2329;
  --gray-mid:    #4a5568;
  --gray-light:  #e2e8f0;
  --gray-bg:     #f7f8fa;
  --white:       #ffffff;
  --text:        #2d3748;
  --text-sm:     #718096;
  --radius:      8px;
  --shadow:      0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:   0 8px 32px rgba(0,0,0,.16);
  --sidebar-w:   200px;
  --header-h:    60px;
}
body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background: var(--gray-bg); color: var(--text); line-height: 1.6; }

/* ── Layout ─────────────────────────────────────────── */
#app { display: flex; min-height: 100vh; }

/* sidebar */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--gray-dark); color: #c8d0db;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100;
}
.sb-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sb-header h1 { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.4; }
.sb-header p { font-size: 11px; color: #8899aa; margin-top: 4px; }

.sb-search { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
.sb-search input {
  width: 100%; padding: 7px 10px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06);
  color: #e0e6ed; font-size: 12px; outline: none;
}
.sb-search input::placeholder { color: #5a6a7a; }
.sb-search input:focus { border-color: var(--green-light); background: rgba(255,255,255,.1); }

.sb-section-title {
  padding: 14px 16px 6px; font-size: 10px; font-weight: 700;
  color: #5a6a7a; letter-spacing: .08em; text-transform: uppercase;
}
.sb-group { margin-bottom: 4px; }
.sb-group-label {
  padding: 6px 16px; font-size: 11px; font-weight: 600; color: #8899aa;
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  transition: color .15s;
}
.sb-group-label:hover { color: #c0ccd8; }
.sb-group-label .arrow { font-size: 9px; transition: transform .2s; }
.sb-group-label.open .arrow { transform: rotate(90deg); }
.sb-group-items { display: none; }
.sb-group-items.visible { display: block; }
.sb-item {
  padding: 5px 16px 5px 28px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: background .1s, color .1s;
  border-radius: 0;
}
.sb-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.sb-item.active { background: rgba(77,160,100,.15); color: #6dcf8e; }
.sb-item .num { font-size: 10px; color: #5a6a7a; min-width: 24px; }
.sb-item.active .num { color: #4a9e5c; }

.sb-stats { padding: 16px; margin-top: auto; border-top: 1px solid rgba(255,255,255,.06); font-size: 11px; color: #5a6a7a; }
.sb-stats span { color: #8899aa; }

/* main content */
#main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* top bar */
#topbar {
  height: var(--header-h); background: var(--white);
  border-bottom: 1px solid var(--gray-light); padding: 0 28px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
#sectionBadge {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  background: var(--green-pale); color: var(--green-main);
}
#sectionBadge.admin { background: var(--admin-pale); color: var(--admin-main); }
#topbarTitle { font-size: 15px; font-weight: 700; color: var(--text); }
#topbarSub { font-size: 12px; color: var(--text-sm); }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-filter {
  padding: 5px 14px; border-radius: 6px; border: 1px solid var(--gray-light);
  background: var(--white); font-size: 12px; color: var(--text-sm); cursor: pointer; transition: all .15s;
}
.btn-filter:hover, .btn-filter.active { background: var(--green-pale); color: var(--green-main); border-color: var(--green-light); }
.btn-filter.admin.active { background: var(--admin-pale); color: var(--admin-main); border-color: var(--admin-light); }
#viewToggle { display: flex; border: 1px solid var(--gray-light); border-radius: 6px; overflow: hidden; }
#viewToggle button { padding: 5px 10px; border: none; background: var(--white); cursor: pointer; font-size: 13px; color: var(--text-sm); }
#viewToggle button.active { background: var(--green-pale); color: var(--green-main); }

/* content area */
#content { padding: 24px 28px; flex: 1; }

/* group section */
.group-section { margin-bottom: 40px; }
.group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--gray-light); }
.group-name { font-size: 16px; font-weight: 700; color: var(--text); }
.group-count { font-size: 12px; color: var(--text-sm); background: var(--gray-light); padding: 2px 8px; border-radius: 10px; }
.group-section.admin-group .group-header { border-bottom-color: var(--admin-light); }
.group-section.admin-group .group-name { color: var(--admin-dark); }

/* card grid */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card-grid.list-view { grid-template-columns: 1fr; }

/* page card */
.page-card {
  background: var(--white); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--gray-light);
  cursor: pointer; transition: box-shadow .2s, transform .15s;
  display: flex; flex-direction: column;
}
.page-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.card-grid.list-view .page-card { flex-direction: row; }

.card-thumb {
  width: 100%; aspect-ratio: 16/9; background: #e8edf2; overflow: hidden;
  position: relative; flex-shrink: 0;
}
.card-grid.list-view .card-thumb { width: 200px; aspect-ratio: unset; height: 120px; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
.card-thumb .no-img {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px; color: #a0aec0; font-size: 12px;
}
.card-thumb .no-img .icon { font-size: 28px; }

.card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.card-num { font-size: 10px; font-weight: 700; color: var(--green-main); font-family: monospace; }
.admin-group .card-num { color: var(--admin-main); }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-path { font-size: 11px; color: var(--text-sm); font-family: monospace; background: var(--gray-bg); padding: 3px 7px; border-radius: 4px; }
.card-desc { font-size: 12px; color: var(--text-sm); line-height: 1.5; margin-top: 4px; flex: 1; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600;
}
.tag.auth { background: #fff3e0; color: #e65100; }
.tag.admin-only { background: #e8eaf6; color: #3949ab; }
.tag.member-only { background: #e8f5e9; color: #2e7d32; }
.tag.write { background: #fce4ec; color: #c62828; }
.tag.modal { background: #f3e5f5; color: #6a1b9a; }
.tag.list { background: #e3f2fd; color: #1565c0; }
.tag.form { background: #fff8e1; color: #f57f17; }
.tag.detail { background: #e0f7fa; color: #006064; }

/* modal */
#imgModal {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.85); align-items: center; justify-content: center;
  padding: 24px;
}
#imgModal.open { display: flex; }
#imgModal .modal-inner { max-width: 1400px; width: 100%; position: relative; }
#imgModal img { width: 100%; max-height: 90vh; object-fit: contain; object-position: top; border-radius: 6px; }
#imgModal .modal-close {
  position: absolute; top: -16px; right: -16px; width: 36px; height: 36px;
  background: var(--white); border-radius: 50%; border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
#imgModal .modal-info { color: #e0e6ed; font-size: 13px; margin-top: 12px; text-align: center; }

/* empty */
.empty-msg { text-align: center; padding: 60px 20px; color: var(--text-sm); }

/* print */
@media print {
  #sidebar, #topbar .topbar-actions { display: none; }
  #main { margin-left: 0; }
  .page-card { break-inside: avoid; }
}
</style>
</head>

  </div>
  <div class="sb-search">

        <button id="btnList" onclick="setView('list')" title="리스트">≡</button>

  </header>
  <div id="content"></div>
</div>

    tags:['admin-only', 'form'], desc:'팝업 등록·수정. 노출기간/크기/PC위치/이미지/SE2에디터/링크. 모바일은 항상 center 고정. API: POST/PUT /admin/api/popups' }

// ── 태그 레이블 ────────────────────────────────────────────
const TAG_LABELS = {
  'auth':        '로그인 필요',
  'member-only': '회원 전용',
  'admin-only':  '관리자 전용',
  'write':       '글쓰기',
  'modal':       '모달',
  'list':        '목록',
  'form':        '폼',
  'detail':      '상세'
};

// ── 상태 ──────────────────────────────────────────────────
let currentFilter = 'all';
let currentView   = 'grid';
let searchKw      = '';

// ── 사이드바 빌드 ─────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('sbNav');
  const sections = ['user', 'admin'];
  const sectionLabels = { user: '사용자 페이지', admin: '관리자 페이지' };
  const sectionColors = { user: '#4a9e5c', admin: '#4a6fa5' };

  sections.forEach(sec => {
    const groups = [...new Set(PAGES.filter(p => p.section === sec).map(p => p.group))];
    const title = document.createElement('div');
    title.className = 'sb-section-title';
    title.style.color = sectionColors[sec];
    title.textContent = sectionLabels[sec];
    nav.appendChild(title);

    groups.forEach(g => {
      const items = PAGES.filter(p => p.section === sec && p.group === g);
      const group = document.createElement('div');
      group.className = 'sb-group';
      const label = document.createElement('div');
      label.className = 'sb-group-label';
      label.innerHTML = `<span>${g} <small style="color:#5a6a7a">(${items.length})</small></span><span class="arrow">▶</span>`;
      label.onclick = () => {
        label.classList.toggle('open');
        itemsEl.classList.toggle('visible');
      };
      const itemsEl = document.createElement('div');
      itemsEl.className = 'sb-group-items';
      items.forEach(p => {
        const item = document.createElement('div');
        item.className = 'sb-item';
        item.dataset.id = p.id;
        item.innerHTML = `<span class="num">${p.id}</span><span>${p.name}</span>`;
        item.onclick = () => scrollToCard(p.id);
        itemsEl.appendChild(item);
      });
      group.appendChild(label);
      group.appendChild(itemsEl);
      nav.appendChild(group);
    });
  });

  updateStats();
}

function updateStats() {
  const total = PAGES.length;
  const user  = PAGES.filter(p => p.section === 'user').length;
  const admin = PAGES.filter(p => p.section === 'admin').length;
  document.getElementById('sbStats').innerHTML =
    `전체 <span>${total}</span>페이지 &nbsp;|&nbsp; 사용자 <span>${user}</span> / 관리자 <span>${admin}</span>`;
}

// ── 메인 렌더 ─────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  let filtered = PAGES.filter(p => {
    if (currentFilter !== 'all' && p.section !== currentFilter) return false;
    if (searchKw) {
      const kw = searchKw.toLowerCase();
      return p.name.toLowerCase().includes(kw) || p.id.toLowerCase().includes(kw) ||
             p.group.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw) ||
             p.path.toLowerCase().includes(kw);
    }
    return true;
  });

  if (!filtered.length) {
    content.innerHTML = '<div class="empty-msg">검색 결과가 없습니다.</div>';
    return;
  }

  // 그룹별로 묶기
  const sections = ['user', 'admin'];
  const sectionNames = { user: '사용자', admin: '관리자' };

  sections.forEach(sec => {
    const secPages = filtered.filter(p => p.section === sec);
    if (!secPages.length) return;

    const groups = [...new Set(secPages.map(p => p.group))];
    groups.forEach(g => {
      const groupPages = secPages.filter(p => p.group === g);
      const section = document.createElement('div');
      section.className = 'group-section' + (sec === 'admin' ? ' admin-group' : '');

      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <span class="group-name">${sectionNames[sec]} — ${g}</span>
        <span class="group-count">${groupPages.length}개 화면</span>
      `;
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'card-grid' + (currentView === 'list' ? ' list-view' : '');
      groupPages.forEach(p => grid.appendChild(createCard(p)));
      section.appendChild(grid);
      content.appendChild(section);
    });
  });

  // 상단바 업데이트
  const badge = document.getElementById('sectionBadge');
  const title = document.getElementById('topbarTitle');
  const sub   = document.getElementById('topbarSub');
  if (currentFilter === 'all') {
    badge.className = 'sectionBadge'; badge.textContent = '전체';
    title.textContent = '전체 화면 목록';
  } else if (currentFilter === 'user') {
    badge.className = 'sectionBadge'; badge.textContent = '사용자';
    title.textContent = '사용자 화면 목록';
  } else {
    badge.className = 'sectionBadge admin'; badge.textContent = '관리자';
    title.textContent = '관리자 화면 목록';
  }
  sub.textContent = `${filtered.length}개 화면`;
}

function createCard(p) {
  const card = document.createElement('div');
  card.className = 'page-card';
  card.dataset.id = p.id;

  const imgSrc = `images/${p.img}`;
  const thumbHtml = `
    <div class="card-thumb">
      <img src="${imgSrc}" alt="${p.name}" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'><span class=\\'icon\\'>🖼</span><span>미캡처</span></div>'">
    </div>`;

  const tagsHtml = p.tags.map(t => `<span class="tag ${t}">${TAG_LABELS[t]||t}</span>`).join('');

  card.innerHTML = `
    ${thumbHtml}
    <div class="card-body">
      <div class="card-num">${p.id}</div>
      <div class="card-title">${p.name}</div>
      <div class="card-path">${p.path.replace('../outputs/', '')}</div>
      <div class="card-desc">${p.desc}</div>
      ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    </div>`;

  card.querySelector('.card-thumb')?.addEventListener('click', () => openModal(p));
  return card;
}

// ── 필터 ──────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.getElementById('btnAll').classList.toggle('active', f === 'all');
  document.getElementById('btnUser').classList.toggle('active', f === 'user');
  document.getElementById('btnAdmin').classList.toggle('active', f === 'admin');
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function filterSearch(kw) {
  searchKw = kw.trim();
  render();
}

// ── 사이드바 → 카드 스크롤 ────────────────────────────────
function scrollToCard(id) {
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const sbItem = document.querySelector(`.sb-item[data-id="${id}"]`);
  if (sbItem) sbItem.classList.add('active');

  // filter 해제 후 해당 카드로 스크롤
  currentFilter = 'all'; searchKw = '';
  document.getElementById('sbSearch').value = '';
  document.getElementById('btnAll').classList.add('active');
  document.getElementById('btnUser').classList.remove('active');
  document.getElementById('btnAdmin').classList.remove('active');
  render();

  setTimeout(() => {
    const card = document.querySelector(`.page-card[data-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

// ── 모달 ──────────────────────────────────────────────────
function openModal(p) {
  const modal = document.getElementById('imgModal');
  const img   = document.getElementById('modalImg');
  const info  = document.getElementById('modalInfo');
  img.src = `images/${p.img}`;
  info.textContent = `${p.id} — ${p.name}  |  ${p.path.replace('../outputs/','')}`;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
  document.getElementById('imgModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── 초기화 ────────────────────────────────────────────────
buildSidebar();
render();
</script>
