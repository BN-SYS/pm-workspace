<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국숲해설가협회 — 화면 목록</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: #f4f5f7;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 사이드바 */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #1a2718;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 13px;
      font-weight: 700;
      color: #8fc76a;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sidebar-sub {
      font-size: 11px;
      color: rgba(255,255,255,.4);
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
    }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    .nav-group-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 14px 18px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      cursor: pointer;
      transition: background .12s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); }
    .nav-item.active {
      background: rgba(143,199,106,.12);
      border-left-color: #8fc76a;
    }
    .nav-num {
      font-size: 10px;
      color: rgba(255,255,255,.3);
      flex-shrink: 0;
      min-width: 22px;
    }
    .nav-item.active .nav-num { color: #8fc76a; }
    .nav-label {
      font-size: 12.5px;
      color: rgba(255,255,255,.7);
      line-height: 1.4;
      flex: 1;
    }
    .nav-item.active .nav-label { color: #fff; font-weight: 500; }
    .nav-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }
    .tag-list   { background: rgba(102,200,180,.15); color: #6dcfbf; }
    .tag-detail { background: rgba(150,130,220,.15); color: #b09de0; }
    .tag-none   { background: rgba(255,255,255,.08);  color: rgba(255,255,255,.3); }

    /* ── 메인 영역 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e0e4e8;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a2718;
    }
    .topbar-path {
      font-size: 12px;
      color: #8a9e84;
      margin-top: 2px;
    }
    .topbar-design {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #aaa;
    }
    .topbar-design-label {
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .topbar-design-label.list   { background: rgba(102,200,180,.12); color: #4db8a8; }
    .topbar-design-label.detail { background: rgba(150,130,220,.12); color: #9b88d4; }
    .topbar-design-pages { color: #bbb; }
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-arrow {
      width: 32px; height: 32px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: #4a5545;
      transition: all .12s;
    }
    .nav-arrow:hover:not(:disabled) { border-color: #508829; color: #508829; }
    .nav-arrow:disabled { opacity: .3; cursor: default; }
    .nav-counter {
      font-size: 12px;
      color: #8a9e84;
      min-width: 60px;
      text-align: center;
    }

    .viewer {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #e8eceb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }
    .viewer img {
      display: block;
      width: 80%;
      height: auto;
      background: #fff;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    .viewer-empty {
      width: 80%;
      margin: 40px 0;
      background: #fff;
      border-radius: 8px;
      border: 1.5px dashed #ccc;
      padding: 80px 24px;
      text-align: center;
      color: #bbb;
    }
    .viewer-empty-icon { font-size: 36px; margin-bottom: 16px; }
    .viewer-empty-title { font-size: 15px; font-weight: 600; color: #999; margin-bottom: 8px; }
    .viewer-empty-desc  { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Foresto Homepage</div>
      <div class="sidebar-sub" id="sidebarSub">화면 목록</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-name" id="topbarName">-</div>
        <div class="topbar-path" id="topbarPath">-</div>
        <div class="topbar-design" id="topbarDesign"></div>
      </div>
      <div class="topbar-nav">
        <button class="nav-arrow" id="btnPrev" onclick="move(-1)">&#8592;</button>
        <span class="nav-counter" id="counter">1 / 52</span>
        <button class="nav-arrow" id="btnNext" onclick="move(1)">&#8594;</button>
      </div>
    </div>
    <div class="viewer" id="viewer">
      <img id="viewerImg" src="" alt="" style="display:none">
      <div class="viewer-empty" id="viewerEmpty" style="display:none">
        <div class="viewer-empty-icon">📷</div>
        <div class="viewer-empty-title">스크린샷 미캡처</div>
        <div class="viewer-empty-desc">해당 화면은 아직 캡처되지 않았습니다.<br>별도 작업 후 추가될 예정입니다.</div>
      </div>
    </div>
  </div>

  <script>
    /* ── design 값 의미
       'list'   : 목록형 게시판 (검색바 + 테이블/카드 리스트)
       'detail' : 상세형 게시판 (제목 + 본문 + 이전/다음)
       없음     : 고유 디자인
    */
    const PAGES = [
      { num:'01', group:'홈',       label:'메인',              file:'01_홈_메인.png' },
      { num:'02', group:'소개',     label:'인사말',            file:'02_소개_인사말.png' },
      { num:'03', group:'소개',     label:'미션 & 비전',       file:'03_소개_미션비전.png' },
      { num:'04', group:'소개',     label:'주요사업',          file:'04_소개_주요사업.png' },
      { num:'05', group:'소개',     label:'연혁',              file:'05_소개_연혁.png' },
      { num:'06', group:'소개',     label:'오시는 길',         file:'06_소개_오시는길.png' },
      { num:'07', group:'소개',     label:'조직도·임원진',     file:'07_소개_조직도임원진.png' },
      { num:'08', group:'소개',     label:'전국지역협회',      file:'08_소개_전국지역협회.png' },
      { num:'09', group:'소개',     label:'지역협회 상세',     file:'09_소개_지역협회상세.png',   design:'detail' },
      { num:'10', group:'소개',     label:'회원 규정',         file:'10_소개_회원규정.png' },
      { num:'11', group:'소개',     label:'정회원 가입안내',   file:'11_소개_정회원가입안내.png' },
      { num:'12', group:'소개',     label:'정회원 신청',       file:'12_소개_정회원신청.png' },
      { num:'13', group:'소개',     label:'후원 안내',         file:'13_소개_후원안내.png' },
      { num:'14', group:'소개',     label:'후원하기',          file:'14_소개_후원하기.png' },
      { num:'15', group:'교육',     label:'숲해설가란',        file:'15_교육_숲해설가란.png' },
      { num:'16', group:'교육',     label:'FAQ',               file:'16_교육_FAQ.png' },
      { num:'17', group:'교육',     label:'자격취득과정',      file:'19_교육_자격취득과정.png' },
      { num:'18', group:'교육',     label:'과정 신청목록',     file:'20_교육_과정신청목록.png',   design:'list' },
      { num:'19', group:'교육',     label:'과정 상세',         file:'21_교육_과정상세.png',        design:'detail' },
      { num:'20', group:'교육',     label:'과정 신청 모달',    file:'' },
      { num:'21', group:'교육',     label:'수료생 후기',       file:'22_교육_수료생후기.png',      design:'list' },
      { num:'22', group:'교육',     label:'수료생 후기 상세',  file:'23_교육_수료생후기상세.png',  design:'detail' },
      { num:'23', group:'회원',     label:'사공단 소개',       file:'' },
      { num:'24', group:'회원',     label:'사공단 소개 상세',  file:'' },
      { num:'25', group:'회원',     label:'사공단 소식',       file:'33_회원_사공단소식.png',      design:'list' },
      { num:'26', group:'회원',     label:'사공단 일지',       file:'34_회원_사공단일지.png',      design:'list' },
      { num:'27', group:'회원',     label:'강사 신청',         file:'36_회원_강사신청.png' },
      { num:'28', group:'커뮤니티', label:'공지사항',          file:'37_커뮤_공지사항.png',        design:'list' },
      { num:'29', group:'커뮤니티', label:'공지 상세',         file:'38_커뮤_공지상세.png',        design:'detail' },
      { num:'30', group:'커뮤니티', label:'협회 캘린더',       file:'39_커뮤_협회캘린더.png' },
      { num:'31', group:'커뮤니티', label:'협회지 목록',       file:'40_커뮤_협회지목록.png',      design:'list' },
      { num:'32', group:'커뮤니티', label:'협회지 상세',       file:'41_커뮤_협회지상세.png',      design:'detail' },
      { num:'33', group:'커뮤니티', label:'갤러리',            file:'44_커뮤_갤러리.png' },
      { num:'34', group:'커뮤니티', label:'갤러리 상세',       file:'45_커뮤_갤러리상세.png',      design:'detail' },
      { num:'35', group:'커뮤니티', label:'자료실',            file:'46_커뮤_자료실.png',          design:'list' },
      { num:'36', group:'커뮤니티', label:'자료실 상세',       file:'47_커뮤_자료실상세.png',      design:'detail' },
      { num:'37', group:'기타',     label:'숲해설 신청',       file:'48_숲해설신청.png' },
      { num:'38', group:'기타',     label:'사이트맵',          file:'49_사이트맵.png' },
      { num:'39', group:'기타',     label:'이용약관',          file:'50_이용약관.png' },
    ];

    /* ── design 그룹 메타 */
    const DESIGN_META = {
      list:   { cls:'list',   label:'목록형 공통' },
      detail: { cls:'detail', label:'상세형 공통' },
    };

    let current = 0;

    /* ── 같은 design 그룹 페이지 번호 목록 */
    function sameDesignNums(design) {
      if (!design) return [];
      return PAGES.filter(p => p.design === design).map(p => p.num + '. ' + p.label);
    }

    /* ── 사이드바 렌더 */
    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      let lastGroup = '';
      nav.innerHTML = PAGES.map((p, i) => {
        let html = '';
        if (p.group !== lastGroup) {
          html += `<div class="nav-group-label">${p.group}</div>`;
          lastGroup = p.group;
        }
        const meta = p.design ? DESIGN_META[p.design] : null;
        const tag = !p.file
          ? `<span class="nav-tag tag-none">미캡처</span>`
          : meta ? `<span class="nav-tag tag-${meta.cls}">${meta.label}</span>` : '';
        html += `<div class="nav-item${i === 0 ? ' active' : ''}" id="nav-${i}" onclick="select(${i})">
          <span class="nav-num">${p.num}</span>
          <span class="nav-label">${p.label}</span>
          ${tag}
        </div>`;
        return html;
      }).join('');

      document.getElementById('sidebarSub').textContent =
        `화면 목록 · ${PAGES.length}페이지`;
    }

    /* ── 화면 전환 */
    function select(idx) {
      const prev = document.getElementById(`nav-${current}`);
      if (prev) prev.classList.remove('active');
      current = idx;
      const next = document.getElementById(`nav-${current}`);
      if (next) {
        next.classList.add('active');
        next.scrollIntoView({ block: 'nearest' });
      }

      const p = PAGES[idx];
      const img = document.getElementById('viewerImg');
      const empty = document.getElementById('viewerEmpty');

      document.getElementById('topbarName').textContent = `${p.num}. ${p.label}`;
      document.getElementById('counter').textContent = `${idx + 1} / ${PAGES.length}`;
      document.getElementById('btnPrev').disabled = idx === 0;
      document.getElementById('btnNext').disabled = idx === PAGES.length - 1;

      if (p.file) {
        img.src = p.file;
        img.style.display = '';
        empty.style.display = 'none';
        document.getElementById('topbarPath').textContent = p.file;
      } else {
        img.src = '';
        img.style.display = 'none';
        empty.style.display = '';
        document.getElementById('topbarPath').textContent = '스크린샷 없음';
      }

      /* design 태그 */
      const designEl = document.getElementById('topbarDesign');
      if (p.design) {
        const meta = DESIGN_META[p.design];
        const others = sameDesignNums(p.design).filter(s => !s.startsWith(p.num + '.'));
        designEl.innerHTML = `
          <span class="topbar-design-label ${meta.cls}">${meta.label}</span>
          <span class="topbar-design-pages">동일 디자인: ${others.join(' / ')}</span>`;
      } else {
        designEl.innerHTML = '';
      }

      document.querySelector('.viewer').scrollTop = 0;
    }

    function move(dir) { select(Math.max(0, Math.min(PAGES.length - 1, current + dir))); }

    /* ── 키보드 */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   move(-1);
    });

    buildSidebar();
    select(0);
  </script>
</body>
</html>
