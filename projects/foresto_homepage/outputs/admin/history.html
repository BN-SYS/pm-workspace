<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연혁관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">연혁관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../../../../common_assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="location.href='history-edit.html'">+ 연도 추가</button>
        </div>
      </div>

      <div class="alert alert-info" style="margin-bottom:20px;font-size:13px">
        연혁은 연도 단위로 관리합니다. 행을 클릭하면 해당 연도의 항목을 수정할 수 있습니다.
      </div>

      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:50px" class="center">NO</th>
              <th style="width:150px" class="center">등록일시</th>
              <th style="width:80px" class="center">년도</th>
              <th style="width:80px" class="center">썸네일<br>(대표이미지)</th>
              <th>내용 (첫 항목)</th>
              <th style="width:110px" class="center">관리</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('history');
    /* ── 연혁 데이터 (about.js의 HISTORY_DATA와 동기화 예정) */
    const HISTORY_ADMIN_DATA = [
      { year:2026, img:null, registeredAt:'2026-03-09 14:22', items:[
        { month:'03', text:'제55기 숲해설가 전문가과정 모집 시작', img:null },
        { month:'01', text:'2026년도 정기 이사회 개최, 사업계획 확정', img:null },
      ]},
      { year:2025, img:null, registeredAt:'2026-02-15 09:10', items:[
        { month:'11', text:'제54기 전문가과정 수료식, 수료생 42명 배출', img:null },
        { month:'09', text:'전국 지역 숲해설가 연합 워크숍 개최 (전주)', img:null },
        { month:'07', text:'산림복지진흥원 업무협약(MOU) 갱신', img:null },
        { month:'04', text:'제53기 전문가과정 수료, 온라인 교육 병행 첫 시행', img:null },
        { month:'03', text:'협회 홈페이지 전면 개편 오픈', img:null },
      ]},
      { year:2023, img:null, registeredAt:'2026-01-20 16:05', items:[
        { month:'10', text:'창립 25주년 기념행사 및 심포지엄 개최', img:null },
        { month:'06', text:'사회공헌단 확대 개편, 전국 12개 권역 운영 체계 구축', img:null },
        { month:'03', text:'숲 동아리단 공식 출범, 전국 15개 동아리 등록', img:null },
      ]},
      { year:2021, img:null, registeredAt:'2025-12-01 11:30', items:[
        { month:'09', text:'디지털 전환 추진 — 온라인 강좌 시스템 구축', img:null },
        { month:'05', text:'장애인복지관·노인복지관 숲 체험 사회공헌 프로그램 전국 확대', img:null },
      ]},
      { year:2008, img:null, registeredAt:'2025-11-10 10:00', items:[
        { month:'05', text:'숲해설가 자격증 제도 도입, 인증 체계 구축', img:null },
        { month:'03', text:'산림청 지정 산림교육 전문기관 선정', img:null },
      ]},
      { year:2000, img:null, registeredAt:'2025-11-10 09:55', items:[
        { month:'06', text:'(사)한국숲해설가협회로 명칭 변경, 산림청 사단법인 등록', img:null },
        { month:'03', text:'협회 공식 출범, 초대 이사진 구성', img:null },
      ]},
      { year:1998, img:null, registeredAt:'2025-11-10 09:50', items:[
        { month:'10', text:'자연환경 안내자 협회 창립, 제1회 숲해설가 양성과정 개설', img:null },
      ]},
    ];

    const HistoryAdmin = {
      render() {
        const tbody = document.getElementById('historyTableBody');
        const total = HISTORY_ADMIN_DATA.length;
        tbody.innerHTML = HISTORY_ADMIN_DATA.map((g, i) => {
          const firstText = g.items[0]
            ? `${g.items[0].month}월 · ${g.items[0].text.length > 35 ? g.items[0].text.slice(0,35)+'…' : g.items[0].text}` + (g.items.length > 1 ? ` 외 ${g.items.length-1}건` : '')
            : `<span style="color:var(--gray-mid)">항목 없음</span>`;
          const thumbHtml = g.img
            ? `<img src="${g.img}" style="width:52px;height:36px;object-fit:cover;border-radius:4px">`
            : `<span style="color:var(--gray-mid);font-size:12px">-</span>`;
          return `
            <tr style="cursor:pointer" onclick="location.href='history-edit.html?year=${g.year}'"
                title="${g.year}년 수정">
              <td class="center">${total - i}</td>
              <td class="center cell-mono">${g.registeredAt || '-'}</td>
              <td class="center" style="font-weight:700">${g.year}</td>
              <td class="center">${thumbHtml}</td>
              <td>${firstText}</td>
              <td class="center" onclick="event.stopPropagation()">
                <div style="display:flex;gap:4px;justify-content:center">
                  <button class="btn btn-outline btn-xs"
                    onclick="event.stopPropagation();location.href='history-edit.html?year=${g.year}'">수정</button>
                  <button class="btn btn-danger btn-xs"
                    onclick="event.stopPropagation();HistoryAdmin.deleteYear(${g.year})">삭제</button>
                </div>
              </td>
            </tr>`;
        }).join('');
      },

      deleteYear(year) {
        if (!confirm(`${year}년 연혁을 삭제하시겠습니까? 해당 연도의 모든 항목이 삭제됩니다.`)) return;
        const idx = HISTORY_ADMIN_DATA.findIndex(g => g.year === year);
        if (idx > -1) HISTORY_ADMIN_DATA.splice(idx, 1);
        this.render();
        App.toast(`${year}년 연혁이 삭제되었습니다.`, 'error');
      },
    };

    HistoryAdmin.render();
  </script>
</body>
</html>
