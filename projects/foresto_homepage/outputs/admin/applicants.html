<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청자 통합 관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* ════════════════════════════════════════
       필터 — members.html 기준 표준
       ════════════════════════════════════════ */
    .filter-card {
      background: #fff;
      border: 1px solid #e3eadd;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .filter-body { display: flex; flex-direction: column; }

    .filter-row {
      display: flex;
      align-items: stretch;
      min-height: 46px;
      border-bottom: 1px solid #f0f4ee;
    }
    .filter-row:last-child { border-bottom: none; }

    /* 84px 라벨 컬럼 — 표준 */
    .filter-label {
      width: 84px;
      min-width: 84px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #7a8e74;
      letter-spacing: 0.04em;
      text-align: center;
      white-space: nowrap;
      background: #f8faf6;
      border-right: 1px solid #e8efe3;
    }

    .filter-content {
      flex: 1;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* 50/50 분할 — 각 half가 label(84px) + content 구조를 품음 */
    .filter-half {
      flex: 1;
      display: flex;
      align-items: stretch;
      min-width: 0;
    }
    .filter-half + .filter-half { border-left: 1px solid #f0f4ee; }

    /* 날짜 */
    .date-pair { display: flex; align-items: center; gap: 6px; }
    .date-pair input[type="date"] {
      width: 140px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      cursor: pointer;
    }
    .date-pair input[type="date"]:focus {
      border-color: #508829;
      box-shadow: 0 0 0 3px rgba(80,136,41,.08);
    }
    .date-sep { color: #aabba4; font-size: 13px; padding: 0 2px; }

    /* 칩 */
    .chip-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip { cursor: pointer; }
    .chip input[type="radio"] { display: none; }
    .chip span {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      border: 1px solid #d5e0ce;
      background: #fafcf9;
      color: #6a7e64;
      transition: all .15s;
      white-space: nowrap;
      cursor: pointer;
    }
    .chip input[type="radio"]:checked + span {
      background: #1a2718; color: #fff; border-color: #1a2718; font-weight: 600;
    }
    .chip:hover span { border-color: #508829; color: #508829; }
    .chip input[type="radio"]:checked + span:hover { color: #fff; }

    /* 아카데미 하위 행 — 들여쓰기 강조 */
    #academySubRow .filter-label {
      background: #f0f4ee;
      color: #aabba4;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    #academySubRow {
      border-left: 3px solid #c8e0c8;
      background: #fafcf9;
    }
    #academySubRow .chip span {
      font-size: 12px;
      padding: 4px 12px;
      border-color: #c8d9be;
      background: #f4f9f4;
    }
    #academySubRow .chip input[type="radio"]:checked + span {
      background: #4a7c59; border-color: #4a7c59; color: #fff;
    }

    /* 검색어 */
    .kw-wrap { display: flex; align-items: center; gap: 6px; width: 100%; }
    .kw-input-wrap { position: relative; flex: 1; }
    .kw-input-wrap input {
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      box-sizing: border-box;
    }
    .kw-input-wrap input:focus {
      border-color: #508829;
      box-shadow: 0 0 0 3px rgba(80,136,41,.08);
    }
    .kw-input-wrap input::placeholder { color: #aabba4; }
    .kw-select {
      height: 34px;
      padding: 0 28px 0 8px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      background-image: url('../../../../common_assets/icons/chevron-down.png');
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 11px 11px;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      cursor: pointer;
    }

    /* 필터 하단 */
    .filter-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px;
      background: #f8faf6;
      border-top: 1px solid #e8efe3;
    }

    /* ════════════════════════════════════════
       테이블 — admin.css 전역 기준 적용
       ════════════════════════════════════════ */

    /* 과정유형 뱃지 */
    .badge-type {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-type.basic   { background: #e8f5e9; color: #2e7d32; }
    .badge-type.qualify { background: #e3f2fd; color: #1565c0; }
    .badge-type.enhance { background: #fff3e0; color: #e65100; }
    .badge-type.academy { background: #f3e5f5; color: #6a1b9a; }

    /* 행 hover */
    .applicant-row:hover td { background: #f2f7f0; cursor: pointer; }



    /* 일괄처리 바 */
    .table-bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .bulk-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">신청자 통합 관리</h1>
      </div>

      <!-- ① 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 신청일 -->
          <div class="filter-row">
            <span class="filter-label">신청일</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
            </div>
          </div>

          <!-- 행 2: 과정유형 -->
          <div class="filter-row">
            <span class="filter-label">과정유형</span>
            <div class="filter-content">
              <div class="chip-group" id="courseTypeChips">
                <label class="chip"><input type="radio" name="filterType" value=""><span>전체</span></label>
                <label class="chip"><input type="radio" name="filterType" value="basic"><span>기초과정</span></label>
                <label class="chip"><input type="radio" name="filterType" value="qualify"><span>자격취득과정</span></label>
                <label class="chip"><input type="radio" name="filterType" value="enhance"><span>역량강화</span></label>
                <label class="chip"><input type="radio" name="filterType" value="academy"><span>회원아카데미</span></label>
              </div>
            </div>
          </div>

          <!-- 행 2-1: 아카데미 구분 (회원아카데미 선택 시에만 표시) -->
          <div class="filter-row" id="academySubRow" style="display:none">
            <span class="filter-label">아카데미<br>구분</span>
            <div class="filter-content">
              <div class="chip-group">
                <label class="chip"><input type="radio" name="filterAcademyTab" value=""><span>전체</span></label>
                <label class="chip"><input type="radio" name="filterAcademyTab" value="lecture"><span>특강</span></label>
                <label class="chip"><input type="radio" name="filterAcademyTab" value="course"><span>강좌</span></label>
                <label class="chip"><input type="radio" name="filterAcademyTab" value="mentor"><span>멘토링숲학교</span></label>
              </div>
            </div>
          </div>

          <!-- 행 3: 신청상태 | 수료상태 (50/50) -->
          <div class="filter-row">
            <div class="filter-half">
              <span class="filter-label">신청상태</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterApply" value=""><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterApply" value="신청완료"><span>신청완료</span></label>
                  <label class="chip"><input type="radio" name="filterApply" value="취소"><span>취소</span></label>
                </div>
              </div>
            </div>
            <div class="filter-half">
              <span class="filter-label">수료상태</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterCompletion" value=""><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterCompletion" value="수료"><span>수료</span></label>
                  <label class="chip"><input type="radio" name="filterCompletion" value="미수료"><span>미수료</span></label>
                </div>
              </div>
            </div>
          </div>

          <!-- 행 4: 검색어 -->
          <div class="filter-row">
            <span class="filter-label">검색</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select class="kw-select" id="filterSearchType">
                  <option value="all">과정명+신청자</option>
                  <option value="course">과정명</option>
                  <option value="name">신청자명</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                    onkeydown="if(event.key==='Enter') ApplicantAdmin.search()">
                </div>
              </div>
            </div>
          </div>

        </div>
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="ApplicantAdmin.exportExcel()">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm" onclick="ApplicantAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="ApplicantAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="applicantCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          onchange="ApplicantAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table" style="table-layout:fixed;width:100%;">
          <colgroup>
            <col style="width:34px">    <!-- checkbox -->
            <col style="width:38px">    <!-- No -->
            <col style="width:7%">      <!-- 과정유형 -->
            <col>                       <!-- 과정명 (auto) -->
            <col style="width:10%">     <!-- 신청자(ID) -->
            <col style="width:3%">      <!-- 성별 -->
            <col style="width:7%">      <!-- 생년월일 -->
            <col style="width:10%">     <!-- 핸드폰 -->
            <col style="width:12%">     <!-- 신청일시 -->
            <col style="width:12%">     <!-- 취소일시 -->
            <col style="width:6%">      <!-- 신청상태 -->
            <col style="width:6%">      <!-- 수료상태 -->
          </colgroup>
          <thead>
            <tr>
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="ApplicantAdmin.toggleAll(this.checked)">
              </th>
              <th>No</th>
              <th>과정유형</th>
              <th style="text-align:center">과정명</th>
              <th>신청자</th>
              <th>성별</th>
              <th>생년월일</th>
              <th>핸드폰</th>
              <th>신청일시</th>
              <th>취소일시</th>
              <th>신청상태</th>
              <th>수료상태</th>
            </tr>
          </thead>
          <tbody id="applicantTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="applicantPagination"></div>

      <!-- ⑤ 하단 버튼 -->
      <div class="table-bottom-bar">
        <div class="bulk-btn-group">
          <button class="btn btn-danger btn-danger-filled btn-sm" id="btnBulkDelete"
            onclick="ApplicantAdmin.bulkDelete()" disabled>선택 삭제</button>
        </div>
        <div class="bulk-btn-group">
          <button class="btn btn-danger btn-sm" id="btnBulkCancel"
            onclick="ApplicantAdmin.bulkChangeApply('취소')" disabled>선택 취소처리</button>
          <button class="btn btn-outline btn-sm" id="btnBulkComplete"
            onclick="ApplicantAdmin.bulkChangeCompletion('수료')" disabled>선택 수료처리</button>
          <button class="btn btn-gray btn-sm" id="btnBulkIncomplete"
            onclick="ApplicantAdmin.bulkChangeCompletion('미수료')" disabled>선택 미수료처리</button>
        </div>
      </div>

    </main>
  </div>



  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';

  AdminSidebar.mount('course-applicants');

  /* ── 라디오 초기값 */
  document.querySelector('input[name="filterType"][value=""]').checked       = true;
  document.querySelector('input[name="filterApply"][value=""]').checked      = true;
  document.querySelector('input[name="filterCompletion"][value=""]').checked = true;
  document.querySelector('input[name="filterAcademyTab"][value=""]').checked = true;

  /* ── 과정유형 칩 변경 → 아카데미 하위 행 토글 */
  document.querySelectorAll('input[name="filterType"]').forEach(radio => {
    radio.addEventListener('change', function () {
      const subRow = document.getElementById('academySubRow');
      if (this.value === 'academy') {
        subRow.style.display = '';
      } else {
        subRow.style.display = 'none';
        document.querySelector('input[name="filterAcademyTab"][value=""]').checked = true;
      }
    });
  });

  /* ── 상태 정의 */
  const APPLY_STATUS = {
    '신청완료': { cls: 'badge-green',  label: '신청완료' },
    '취소':     { cls: 'badge-orange', label: '취소' },
  };

  const COMPLETION_STATUS = {
    '수료':   { cls: 'badge-green',  label: '수료' },
    '미수료': { cls: 'badge-orange', label: '미수료' },
  };

  const COURSE_TYPE_META = {
    basic:   { label: '기초과정',     cls: 'basic' },
    qualify: { label: '자격취득과정', cls: 'qualify' },
    enhance: { label: '역량강화',     cls: 'enhance' },
    academy: { label: '아카데미', cls: 'academy' },
  };

  const ACADEMY_TAB_LABEL = {
    lecture: '특강',
    course:  '강좌',
    mentor:  '멘토링',
  };

  /* ── 더미 데이터 */
  const COURSE_NAMES_POOL = [
    { type: 'basic',   academyTab: null,      name: '봄 숲 이야기 — 시민아카데미' },
    { type: 'basic',   academyTab: null,      name: '학교 숲 생태교육 기초과정' },
    { type: 'basic',   academyTab: null,      name: '도심 속 숲 치유 프로그램' },
    { type: 'qualify', academyTab: null,      name: '제55기 숲해설가 전문가과정' },
    { type: 'qualify', academyTab: null,      name: '제10기 준전문가 양성과정' },
    { type: 'qualify', academyTab: null,      name: '제54기 숲해설가 전문가과정' },
    { type: 'enhance', academyTab: null,      name: '숲해설 심화 — 생태 스토리텔링' },
    { type: 'enhance', academyTab: null,      name: '탄소중립 숲 교육 심화과정' },
    { type: 'enhance', academyTab: null,      name: '숲 치유 프로그램 개발 직무교육' },
    { type: 'academy', academyTab: 'lecture', name: '식물 생태 특강 — 봄 야생화' },
    { type: 'academy', academyTab: 'lecture', name: '기후위기와 숲 생태 특강' },
    { type: 'academy', academyTab: 'course',  name: '숲 생태 강좌 — 수목 감별' },
    { type: 'academy', academyTab: 'course',  name: '야생화 이야기 강좌' },
    { type: 'academy', academyTab: 'mentor',  name: '멘토링숲학교 — 봄학기' },
    { type: 'academy', academyTab: 'mentor',  name: '멘토링숲학교 — 여름학기' },
  ];

  const NAMES = [
    '김민준', '이서연', '박지훈', '최수아', '정도윤',
    '강하은', '윤시우', '임나연', '오준혁', '한소율',
    '신지아', '권태양', '문서진', '배하린', '홍유찬',
    '유채원', '구민서', '안재원', '남지현', '조은결',
  ];

  const GENDERS   = ['남', '여'];
  const PHONES    = ['010-1234-5678', '010-2345-6789', '010-3456-7890', '010-4567-8901', '010-5678-9012', '010-6789-0123', '010-7890-1234'];
  const BIRTHDATES= ['1985-03-15', '1990-07-22', '1978-11-08', '1995-04-30', '1982-09-17', '1988-12-03', '1972-06-25'];

  const APPLY_POOL      = ['신청완료', '신청완료', '신청완료', '신청완료', '취소'];
  const COMPLETION_POOL = ['미수료', '수료', '미수료'];

  /* 과정 설정: fileRequired / certIssue 는 과정마다 다름 (인덱스 기준 순환) */
  const COURSE_SETTINGS = [
    { fileRequired: true,  certIssue: true  },
    { fileRequired: false, certIssue: true  },
    { fileRequired: true,  certIssue: false },
    { fileRequired: false, certIssue: false },
    { fileRequired: true,  certIssue: true  },
  ];
  const DUMMY_FILE_NAMES = [
    '개인정보_동의서_서명본.pdf',
    '신청서_제출용.hwp',
    '재직증명서.pdf',
    '경력기술서.docx',
    '학력증명서.pdf',
  ];

  const ALL_APPLICANTS = Array.from({ length: 52 }, (_, i) => {
    const course   = COURSE_NAMES_POOL[i % COURSE_NAMES_POOL.length];
    const setting  = COURSE_SETTINGS[i % COURSE_SETTINGS.length];
    const mm       = String((i % 11) + 1).padStart(2, '0');
    const dd       = String((i % 28) + 1).padStart(2, '0');
    const hh       = String((i % 10) + 9).padStart(2, '0');
    const min      = String((i * 7) % 60).padStart(2, '0');
    const applyStatus = APPLY_POOL[i % APPLY_POOL.length];
    const completionStatus = COMPLETION_POOL[i % COMPLETION_POOL.length];

    /* 취소일시: 신청일 + 며칠 뒤 */
    const cancelDd  = String(Math.min(parseInt(dd) + 3, 28)).padStart(2, '0');
    const cancelHh  = String((i % 8) + 10).padStart(2, '0');

    return {
      id:               2000 + i,
      memberId:         `M${String(2000 + i).padStart(5, '0')}`,
      courseType:       course.type,
      academyTab:       course.academyTab,
      courseName:       course.name,
      name:             NAMES[i % NAMES.length],
      gender:           GENDERS[i % GENDERS.length],
      phone:            PHONES[i % PHONES.length],
      birthdate:        BIRTHDATES[i % BIRTHDATES.length],
      applyDate:        `2026-${mm}-${dd} ${hh}:${min}`,
      applyStatus,
      completionStatus,
      cancelDate:       applyStatus === '취소' ? `2026-${mm}-${cancelDd} ${cancelHh}:${min}` : null,
      fileRequired:     setting.fileRequired,
      certIssue:        setting.certIssue,
      /* 파일첨부 있는 경우 더미 파일 */
      submittedFile:    setting.fileRequired ? { name: DUMMY_FILE_NAMES[i % DUMMY_FILE_NAMES.length], size: `${(i % 5 + 1) * 120}KB` } : null,
    };
  });

  /* ══════════════════════════════════════
     ApplicantAdmin
     ══════════════════════════════════════ */
  const ApplicantAdmin = {
    filtered:    [...ALL_APPLICANTS],
    currentPage: 1,
    pageSize:    10,

    _dateInRange(dateStr, from, to) {
      if (!from && !to) return true;
      const d = new Date(dateStr);
      if (from && !to) return d >= new Date(from);
      if (!from && to) return d <= new Date(to);
      return d >= new Date(from) && d <= new Date(to);
    },

    search() {
      const from       = document.getElementById('filterDateFrom').value;
      const to         = document.getElementById('filterDateTo').value;
      const type       = document.querySelector('input[name="filterType"]:checked')?.value       || '';
      const academyTab = document.querySelector('input[name="filterAcademyTab"]:checked')?.value || '';
      const applyS     = document.querySelector('input[name="filterApply"]:checked')?.value      || '';
      const completion = document.querySelector('input[name="filterCompletion"]:checked')?.value || '';
      const kw         = document.getElementById('filterKeyword').value.trim().toLowerCase();
      const kwType     = document.getElementById('filterSearchType').value;

      this.filtered = ALL_APPLICANTS.filter(a => {
        if (!this._dateInRange(a.applyDate, from, to)) return false;
        if (type && a.courseType !== type) return false;
        /* 아카데미 하위 탭 — type=academy 이면서 탭 선택된 경우만 적용 */
        if (type === 'academy' && academyTab && a.academyTab !== academyTab) return false;
        if (applyS && a.applyStatus !== applyS) return false;
        if (completion && a.completionStatus !== completion) return false;
        if (kw) {
          const inCourse = a.courseName.toLowerCase().includes(kw);
          const inName   = a.name.toLowerCase().includes(kw);
          if (kwType === 'course' && !inCourse) return false;
          if (kwType === 'name'   && !inName)   return false;
          if (kwType === 'all'    && !inCourse && !inName) return false;
        }
        return true;
      });
      this.currentPage = 1;
      this.render();
    },

    resetFilter() {
      document.getElementById('filterDateFrom').value  = '';
      document.getElementById('filterDateTo').value    = '';
      document.querySelector('input[name="filterType"][value=""]').checked       = true;
      document.querySelector('input[name="filterApply"][value=""]').checked      = true;
      document.querySelector('input[name="filterCompletion"][value=""]').checked = true;
      document.querySelector('input[name="filterAcademyTab"][value=""]').checked = true;
      document.getElementById('academySubRow').style.display = 'none';
      document.getElementById('filterKeyword').value    = '';
      document.getElementById('filterSearchType').value = 'all';
      this.filtered    = [...ALL_APPLICANTS];
      this.currentPage = 1;
      this.render();
    },

    changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

    toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      this._syncBulkBtns();
    },

    _syncBulkBtns() {
      const count = document.querySelectorAll('.row-chk:checked').length;
      const any   = count > 0;
      document.getElementById('btnBulkDelete').disabled     = !any;
      document.getElementById('btnBulkCancel').disabled     = !any;
      document.getElementById('btnBulkComplete').disabled   = !any;
      document.getElementById('btnBulkIncomplete').disabled = !any;
    },

    _selectedIds() {
      return [...document.querySelectorAll('.row-chk:checked')].map(cb => Number(cb.dataset.id));
    },

    bulkDelete() {
      const ids = this._selectedIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}명의 신청 데이터를 삭제하시겠습니까?\n삭제 후 복구가 불가능합니다.`)) return;
      ids.forEach(id => {
        const idx = ALL_APPLICANTS.findIndex(a => a.id === id);
        if (idx > -1) ALL_APPLICANTS.splice(idx, 1);
      });
      this.search();
      App.toast(`${ids.length}명의 신청 데이터가 삭제되었습니다.`, 'error');
    },

    bulkChangeApply(status) {
      const ids = this._selectedIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}명을 [${status}] 처리하시겠습니까?`)) return;
      ids.forEach(id => {
        const a = ALL_APPLICANTS.find(a => a.id === id);
        if (a) a.applyStatus = status;
      });
      this.search();
      App.toast(`${ids.length}명이 [${status}] 처리되었습니다.`, 'success');
    },

    bulkChangeCompletion(status) {
      const ids = this._selectedIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}명을 [${status}] 처리하시겠습니까?`)) return;
      ids.forEach(id => {
        const a = ALL_APPLICANTS.find(a => a.id === id);
        if (a) a.completionStatus = status;
      });
      this.search();
      App.toast(`${ids.length}명이 [${status}] 처리되었습니다.`, 'success');
    },

    goDetail(e, id) {
      /* 상태 버튼 클릭은 이미 stopPropagation 처리됨 */
      location.href = `applicant-detail.html?id=${id}`;
    },

    exportExcel() {
      App.toast('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.', 'info');
    },

    render() {
      const total = this.filtered.length;
      const start = (this.currentPage - 1) * this.pageSize;
      const slice = this.filtered.slice(start, start + this.pageSize);

      document.getElementById('applicantCount').textContent = total.toLocaleString();
      document.getElementById('chkAll').checked = false;
      ['btnBulkDelete','btnBulkCancel','btnBulkComplete','btnBulkIncomplete'].forEach(id => {
        document.getElementById(id).disabled = true;
      });

      document.getElementById('applicantTableBody').innerHTML = slice.length
        ? slice.map((a, i) => {
            const typeMeta = COURSE_TYPE_META[a.courseType] || { label: a.courseType, cls: 'basic' };
            const as = APPLY_STATUS[a.applyStatus]           || { cls: 'badge-gray', label: a.applyStatus };
            const cs = COMPLETION_STATUS[a.completionStatus] || { cls: 'badge-gray', label: a.completionStatus };
            const tabSuffix = (a.courseType === 'academy' && a.academyTab)
              ? ` · ${ACADEMY_TAB_LABEL[a.academyTab] || ''}`
              : '';

            /* 날짜시간 단일 라인 — "2026-01-15 09:07" */
            const fmtDt = dtStr => {
              if (!dtStr) return '—';
              const parts = dtStr.split(' ');
              return parts[0] + (parts[1] ? ' ' + parts[1].slice(0, 5) : '');
            };

            return `
            <tr class="applicant-row" onclick="ApplicantAdmin.goDetail(event,${a.id})">
              <td class="col-chk" onclick="event.stopPropagation()">
                <input type="checkbox" class="row-chk" data-id="${a.id}"
                  onchange="ApplicantAdmin._syncBulkBtns()">
              </td>
              <td>${start + i + 1}</td>
              <td><span class="badge-type ${typeMeta.cls}">${typeMeta.label}${tabSuffix}</span></td>
              <td style="font-weight:500;text-align:center">${a.courseName}</td>
              <td><span style="font-weight:600">${a.name}</span> <span style="font-weight:400;color:#888;font-size:12px">(${a.memberId})</span></td>
              <td>${a.gender}</td>
              <td class="cell-mono">${a.birthdate}</td>
              <td class="cell-mono">${a.phone}</td>
              <td class="cell-mono">${fmtDt(a.applyDate)}</td>
              <td class="cell-mono">${fmtDt(a.cancelDate)}</td>
              <td><span class="badge ${as.cls}">${as.label}</span></td>
              <td>${a.applyStatus === '취소'
                ? `<span style="color:#bbb;font-size:13px">—</span>`
                : `<span class="badge ${cs.cls}">${cs.label}</span>`
              }</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="13" style="padding:40px;text-align:center;color:#5a6e54">검색 결과가 없습니다.</td></tr>`;

      App.renderPagination('applicantPagination', this.currentPage,
        Math.ceil(total / this.pageSize) || 1,
        p => { this.currentPage = p; this.render(); });
    },
  };

  /* 초기 렌더 */
  ApplicantAdmin.render();
  </script>
</body>
</html>
