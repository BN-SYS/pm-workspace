<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강좌 등록/수정 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">강좌 수정</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="CourseEdit.save()">저장</button>
        </div>
      </div>

      <div id="editWrap">
        <div style="text-align:center;padding:60px;color:var(--gray-mid)">강좌 정보를 불러오는 중입니다...</div>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/education.js"></script>
  <script>
    AdminSidebar.mount('courses');
    const TYPE_OPTIONS   = ['전문과정','시민아카데미','직무교육','역량강화'];
    const STATUS_OPTIONS = [
      { val:'ready',  label:'접수예정' },
      { val:'open',   label:'접수중'   },
      { val:'closed', label:'접수마감' },
      { val:'done',   label:'수강완료' },
    ];

    const CourseEdit = {
      _id: null,
      _isNew: false,

      init() {
        const idParam = App.getParam('id');
        this._isNew = !idParam;

        /* 신규 등록 모드 */
        if (this._isNew) {
          document.getElementById('pageTitle').textContent = '강좌 신규 등록';
          this._renderForm({
            type:'', status:'ready', title:'', from:'', to:'', hours:'',
            applyFrom:'', applyTo:'', capacity:'', fee:'', location:'', guide:''
          });
          return;
        }

        /* 수정 모드 */
        this._id = Number(idParam);
        const c = (typeof ALL_COURSES_RAW !== 'undefined' ? ALL_COURSES_RAW : []).find(x => x.id === this._id);
        if (!c) {
          document.getElementById('editWrap').innerHTML =
            `<div style="text-align:center;padding:60px;color:var(--gray-mid)">강좌를 찾을 수 없습니다.</div>`;
          return;
        }
        document.getElementById('pageTitle').textContent = `강좌 수정 — ${c.title}`;
        this._renderForm(c);
      },

      _renderForm(c) {
        document.getElementById('editWrap').innerHTML = `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${this._isNew ? '강좌 신규 등록' : '강좌 기본 정보'}</span>
            </div>
            <div style="padding:24px;display:flex;flex-direction:column;gap:18px">

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group" style="margin:0">
                  <label class="form-label">구분 <span class="req">*</span></label>
                  <select class="form-control" id="eType">
                    <option value="">선택</option>
                    ${TYPE_OPTIONS.map(t => `<option${t===c.type?' selected':''}>${t}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group" style="margin:0">
                  <label class="form-label">상태 <span class="req">*</span></label>
                  <select class="form-control" id="eStatus">
                    ${STATUS_OPTIONS.map(s => `<option value="${s.val}"${s.val===c.status?' selected':''}>${s.label}</option>`).join('')}
                  </select>
                </div>
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">강좌명 <span class="req">*</span></label>
                <input type="text" class="form-control" id="eTitle" value="${c.title || ''}" placeholder="강좌명을 입력하세요">
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
                <div class="form-group" style="margin:0">
                  <label class="form-label">교육 시작일 <span class="req">*</span></label>
                  <input type="date" class="form-control" id="eFrom" value="${c.from || c.date || ''}">
                </div>
                <div class="form-group" style="margin:0">
                  <label class="form-label">교육 종료일 <span class="req">*</span></label>
                  <input type="date" class="form-control" id="eTo" value="${c.to || ''}">
                </div>
                <div class="form-group" style="margin:0">
                  <label class="form-label">총 교육시간</label>
                  <input type="number" class="form-control" id="eHours" value="${c.hours || ''}" placeholder="시간" min="1">
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group" style="margin:0">
                  <label class="form-label">접수 시작일</label>
                  <input type="date" class="form-control" id="eApplyFrom" value="${c.applyFrom || ''}">
                </div>
                <div class="form-group" style="margin:0">
                  <label class="form-label">접수 마감일</label>
                  <input type="date" class="form-control" id="eApplyTo" value="${c.applyTo || ''}">
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group" style="margin:0">
                  <label class="form-label">정원</label>
                  <input type="number" class="form-control" id="eCapacity" value="${c.capacity || ''}" placeholder="명" min="1">
                </div>
                <div class="form-group" style="margin:0">
                  <label class="form-label">수강료</label>
                  <input type="text" class="form-control" id="eFee" value="${c.fee || ''}" placeholder="무료 또는 금액">
                </div>
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">교육 장소</label>
                <input type="text" class="form-control" id="eLocation" value="${c.location || ''}" placeholder="교육 장소 입력">
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">강좌 안내 (신청자에게 표시)</label>
                <textarea class="form-control" id="eGuide" rows="5"
                  placeholder="수강생에게 표시될 안내 내용을 입력하세요.">${c.guide || ''}</textarea>
              </div>

            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
            <button class="btn btn-gray" onclick="history.back()">취소</button>
            <button class="btn btn-primary" onclick="CourseEdit.save()">${this._isNew ? '등록' : '저장'}</button>
          </div>`;
      },

      save() {
        const get   = id => document.getElementById(id)?.value.trim() || '';
        const type  = get('eType');
        const title = get('eTitle');
        const from  = get('eFrom');
        const to    = get('eTo');
        if (!type)  { App.toast('구분을 선택해주세요.', 'warning');     return; }
        if (!title) { App.toast('강좌명을 입력해주세요.', 'warning');   return; }
        if (!from)  { App.toast('교육 시작일을 입력해주세요.', 'warning'); return; }
        if (!to)    { App.toast('교육 종료일을 입력해주세요.', 'warning'); return; }
        App.toast(this._isNew ? '강좌가 등록되었습니다.' : '강좌 정보가 저장되었습니다.');
        setTimeout(() => location.href = 'courses.html', 900);
      },
    };

    CourseEdit.init();
  </script>
</body>
</html>
