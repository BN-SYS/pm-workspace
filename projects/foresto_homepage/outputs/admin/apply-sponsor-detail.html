<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>후원신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .form-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .form-card-head { padding:14px 20px; border-bottom:1px solid #e3eadd; background:#f8faf6; font-size:13px; font-weight:700; color:#2e5c2e; letter-spacing:.03em; }
    .form-row { display:flex; align-items:stretch; min-height:52px; border-bottom:1px solid #f0f4ee; }
    .form-row:last-child { border-bottom:none; }
    .form-label { width:140px; min-width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; padding:0 12px; text-align:center; }
    .form-content { flex:1; display:flex; align-items:center; padding:12px 16px; gap:10px; flex-wrap:wrap; }
    .form-half { flex:1; display:flex; align-items:center; padding:12px 16px; gap:8px; }
    .form-half + .form-half { border-left:1px solid #f0f4ee; }
    .detail-val { font-size:14px; color:#111; line-height:1.6; }
    .detail-val.mono { font-variant-numeric:tabular-nums; }
    .detail-val.long { line-height:1.8; }
    .detail-val.muted { color:#7a8e74; font-size:13px; }
    .badge-regular { display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9; }
    .badge-once    { display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;background:#e8f0fd;color:#1a5ea8;border:1px solid #c2d4f5; }
    .amount-highlight { font-size:20px; font-weight:700; color:#20281A; font-variant-numeric:tabular-nums; }
    .detail-bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:4px 0 8px; }
    .btn-group-right { display:flex; gap:8px; }
    .memo-textarea { width:100%; min-height:120px; padding:12px 14px; border:1px solid #d5e0ce; border-radius:8px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; resize:vertical; box-sizing:border-box; line-height:1.7; }
    .memo-textarea:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .memo-textarea::placeholder { color:#aabba4; }
    .memo-footer { display:flex; justify-content:flex-end; padding:12px 16px 14px; border-top:1px solid #f0f4ee; gap:8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">후원신청 상세</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록</button>
        </div>
      </div>

      <div class="admin-content" id="detailContent"></div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('apply-sponsor');

  const NAMES_S   = ['홍길동','김영희','이철수','박미영','정도현','최수진','윤현우','임나래','강민서','조태양',
                     '신지수','한가람','문유리','류승훈','백채원','안지호','송하늘','권보름','오세진','황나비'];
  const AMOUNTS_S = [10000, 30000, 50000, 100000, 30000, 50000, 10000, 100000, 50000, 30000];
  const TYPES_S   = ['정기','일시','정기','정기','일시','정기','일시','정기','일시','일시'];
  const PURPOSES_S= ['교육 프로그램','사회공헌','교육자료','자유사용','교육 프로그램','사회공헌','자유사용','교육자료','사회공헌','교육 프로그램'];
  const RECEIPTS_S= ['발급 요청','발급 불필요','발급 요청','발급 불필요'];
  const MSGS_S    = [
    '숲 교육이 더 많은 아이들에게 닿기를 바랍니다.',
    '작은 정성이지만 오래 이어가겠습니다.',
    '협회 활동을 항상 응원합니다.',
    '',
    '자연을 사랑하는 마음으로 후원합니다.',
  ];

  const ALL_DATA_S = Array.from({ length: 22 }, (_, i) => {
    const mm  = String(((i % 3) + 1)).padStart(2, '0');
    const dd  = String(((i % 25) + 1)).padStart(2, '0');
    const hh  = String(((i * 3) % 11) + 9).padStart(2, '0');
    const min = String((i * 9) % 60).padStart(2, '0');
    const ss  = String((i * 17) % 60).padStart(2, '0');
    const bMm = String(((i % 11) + 1)).padStart(2, '0');
    const bDd = String(((i % 20) + 1)).padStart(2, '0');
    return {
      id:         6000 + i,
      applyNo:    `DON-2026-${String(i + 1).padStart(5, '0')}`,
      name:       NAMES_S[i % NAMES_S.length],
      phone:      `010-${String(4000 + i).padStart(4, '0')}-${String(8000 + i).padStart(4, '0')}`,
      email:      `donor${6000 + i}@example.com`,
      birth:      `${1970 + (i % 30)}-${bMm}-${bDd}`,
      donateType: TYPES_S[i % TYPES_S.length],
      amount:     AMOUNTS_S[i % AMOUNTS_S.length],
      purpose:    PURPOSES_S[i % PURPOSES_S.length],
      receipt:    RECEIPTS_S[i % RECEIPTS_S.length],
      publicList: i % 3 !== 0 ? '공개' : '비공개',
      message:    MSGS_S[i % MSGS_S.length],
      applyDatetime: `2026-${mm}-${dd} ${hh}:${min}:${ss}`,
    };
  });

  function renderDetail(d) {
    const typeBadge = d.donateType === '정기'
      ? `<span class="badge-regular">정기 후원</span>`
      : `<span class="badge-once">일시 후원</span>`;

    document.getElementById('detailContent').innerHTML = `

      <!-- 카드1: 후원자 정보 -->
      <div class="form-card">
        <div class="form-card-head">후원자 정보</div>
        <div class="form-row">
          <div class="form-label">접수번호</div>
          <div class="form-content">
            <span class="detail-val mono" style="font-weight:700;color:#2e5c2e">${d.applyNo}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">성명</div>
          <div class="form-half">
            <span class="detail-val" style="font-weight:600">${d.name}</span>
          </div>
          <div class="form-label">생년월일</div>
          <div class="form-half">
            <span class="detail-val mono">${d.birth}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">연락처</div>
          <div class="form-half">
            <span class="detail-val mono">${d.phone}</span>
          </div>
          <div class="form-label">이메일</div>
          <div class="form-half">
            <span class="detail-val">${d.email}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">신청일시</div>
          <div class="form-content">
            <span class="detail-val mono">${d.applyDatetime}</span>
          </div>
        </div>
      </div>

      <!-- 카드2: 후원 정보 -->
      <div class="form-card">
        <div class="form-card-head">후원 정보</div>
        <div class="form-row">
          <div class="form-label">후원 유형</div>
          <div class="form-half">
            ${typeBadge}
          </div>
          <div class="form-label">후원 금액</div>
          <div class="form-half">
            <span class="amount-highlight">${d.amount.toLocaleString()}원</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">후원 목적</div>
          <div class="form-half">
            <span class="detail-val">${d.purpose}</span>
          </div>
          <div class="form-label">영수증 발급</div>
          <div class="form-half">
            <span class="detail-val">${d.receipt}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">명단 공개</div>
          <div class="form-half">
            <span class="detail-val">${d.publicList}</span>
          </div>
          <div class="form-label">개인정보 동의</div>
          <div class="form-half">
            <span class="detail-val">동의함</span>
          </div>
        </div>
        <div class="form-row" style="align-items:flex-start">
          <div class="form-label" style="padding-top:16px">후원 메시지</div>
          <div class="form-content" style="align-items:flex-start;padding-top:16px;padding-bottom:16px">
            ${d.message
              ? `<span class="detail-val long">${d.message}</span>`
              : `<span class="detail-val muted">없음</span>`}
          </div>
        </div>
      </div>

      <!-- 카드3: 관리자 메모 -->
      <div class="form-card">
        <div class="form-card-head">관리자 메모</div>
        <div style="padding:16px">
          <textarea class="memo-textarea" id="adminMemo" placeholder="관리자 메모를 입력하세요. (후원자에게 표시되지 않습니다)"></textarea>
        </div>
        <div class="memo-footer">
          <button class="btn btn-gray btn-sm" onclick="clearMemo()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="saveMemo(${d.id})">메모 저장</button>
        </div>
      </div>

      <div class="detail-bottom-bar">
        <div></div>
        <div class="btn-group-right">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
        </div>
      </div>`;
  }

  function saveMemo(id) { App.toast('관리자 메모가 저장되었습니다.', 'success'); }
  function clearMemo()  { const el = document.getElementById('adminMemo'); if (el) el.value = ''; }

  (function init() {
    const id = Number(new URLSearchParams(location.search).get('id'));
    const d  = ALL_DATA_S.find(x => x.id === id);
    if (!d) {
      document.getElementById('detailContent').innerHTML =
        `<div style="padding:60px;text-align:center;color:#aabba4">신청 정보를 찾을 수 없습니다. (id: ${id || '미지정'})</div>`;
      return;
    }
    renderDetail(d);
  })();
  </script>
</body>
</html>
