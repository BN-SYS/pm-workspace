<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탈퇴회원 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* ════════════════════════════════════════
       필터 카드 — members.html 기준 표준 적용
       ════════════════════════════════════════ */
    .filter-card {
      background: #fff;
      border: 1px solid #e3eadd;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .filter-body {
      display: flex;
      flex-direction: column;
    }

    .filter-row {
      display: flex;
      align-items: center;
      min-height: 46px;
      border-bottom: 1px solid #f0f4ee;
    }

    .filter-row:last-child { border-bottom: none; }

    .filter-label {
      width: 84px;
      min-width: 84px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #7a8e74;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      background: #f8faf6;
      border-right: 1px solid #e8efe3;
    }

    .filter-content {
      flex: 1;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    /* 날짜 인풋 */
    .date-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .date-pair input[type="date"] {
      width: 140px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      cursor: pointer;
    }

    .date-pair input[type="date"]:focus {
      border-color: #508829;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(80,136,41,0.08);
    }

    .date-sep {
      color: #aabba4;
      font-size: 13px;
      font-weight: 500;
      padding: 0 2px;
    }

    /* 검색어 행 */
    .kw-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    .kw-wrap select {
      flex-shrink: 0;
      width: 116px;
      height: 34px;
      padding: 0 8px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      cursor: pointer;
    }

    .kw-wrap select:focus {
      border-color: #508829;
      box-shadow: 0 0 0 3px rgba(80,136,41,0.08);
    }

    .kw-input-wrap {
      position: relative;
      flex: 1;
    }

    .kw-input-wrap input {
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      box-sizing: border-box;
    }

    .kw-input-wrap input:focus {
      border-color: #508829;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(80,136,41,0.08);
    }

    .kw-input-wrap input::placeholder { color: #aabba4; }

    /* 필터 하단 액션바 */
    .filter-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px;
      background: #f8faf6;
      border-top: 1px solid #e8efe3;
    }

    /* 탈퇴사유 — td는 overflow:visible, 말줄임은 내부 span으로 분리 */
    .cell-reason {
      position: relative;
      overflow: visible !important; /* 전역 overflow:hidden 덮어쓰기 — 툴팁 노출용 */
      padding: 0 !important;
      color: #4a5545;
      cursor: default;
    }

    /* 실제 텍스트 영역 — 말줄임 처리 */
    .cell-reason-text {
      display: block;
      padding: 13px 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 툴팁 말풍선 */
    .cell-reason::after {
      content: attr(data-tooltip);
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      width: 300px;
      padding: 8px 12px;
      background: #1a2718;
      color: #fff;
      font-size: 12px;
      line-height: 1.6;
      white-space: normal;
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      z-index: 300;
      pointer-events: none;
      text-align: left;
    }

    /* 꼬리 삼각형 */
    .cell-reason::before {
      content: '';
      display: none;
      position: absolute;
      bottom: calc(100% + 2px);
      right: 16px;
      border: 5px solid transparent;
      border-top-color: #1a2718;
      z-index: 300;
      pointer-events: none;
    }

    .cell-reason:hover::after,
    .cell-reason:hover::before {
      display: block;
    }

    /* ════════════════════════════════════════
       안내 배너 (탈퇴회원 전용)
       ════════════════════════════════════════ */
    .withdrawn-notice {
      background: #fff8f0;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #92400e;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ════════════════════════════════════════
       테이블 — admin.css 전역 기준 적용
       ════════════════════════════════════════ */
    .admin-table .cell-date {
      font-variant-numeric: tabular-nums;
      color: #c0392b;
      font-weight: 500;
    }

    /* ════════════════════════════════════════
       목록 하단 바
       ════════════════════════════════════════ */
    .table-bottom-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 12px;
    }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">탈퇴회원</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../../../../common_assets/icons/refresh.png" alt="새로고침"></button>
        </div>
      </div>

      <!-- 안내 배너 -->
      <div class="withdrawn-notice">
        ※ 탈퇴 회원 정보는 조회 전용입니다. 복구 기능은 제공되지 않습니다.
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 탈퇴일 -->
          <div class="filter-row">
            <span class="filter-label">탈퇴일</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn" onclick="WithdrawnAdmin.setDatePreset('today')">오늘</button>
                <button class="date-preset-btn" onclick="WithdrawnAdmin.setDatePreset(7)">7일</button>
                <button class="date-preset-btn" onclick="WithdrawnAdmin.setDatePreset(30)">30일</button>
                <button class="date-preset-btn" onclick="WithdrawnAdmin.setDatePreset(90)">3개월</button>
                <button class="date-preset-btn" onclick="WithdrawnAdmin.setDatePreset(180)">6개월</button>
              </div>
            </div>
          </div>

          <!-- 행 2: 검색어 -->
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select id="filterKeywordType">
                  <option value="">전체 필드</option>
                  <option value="userId">아이디</option>
                  <option value="name">이름</option>
                  <option value="email">이메일</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                    onkeydown="if(event.key==='Enter') WithdrawnAdmin.search()">
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- 액션 푸터 -->
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="WithdrawnAdmin.exportExcel()">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm" onclick="WithdrawnAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="WithdrawnAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="memberCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          onchange="WithdrawnAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
          <option value="100">100개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:4%">번호</th>
              <th style="width:10%">탈퇴일</th>
              <th style="width:11%">아이디</th>
              <th>이름</th>
              <th style="width:7%">구분</th>
              <th style="width:14%">이메일</th>
              <th style="width:11%">연락처</th>
              <th style="width:20%">탈퇴 사유</th>
              <th style="width:9%">탈퇴 처리자</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="memberPagination"></div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('withdrawn');

    /* ── 탈퇴회원 샘플 데이터 */
    const NAMES  = ['고산바람','서자연','남숲길','홍나무','구들꽃','노계곡','오생태','배이슬','연풍경','유숲새'];
    const GRADES = [
      { key:'fullMember', label:'정회원' },
      { key:'member',     label:'일반회원' },
      { key:'member',     label:'일반회원' },
    ];
    const PROCESSORS = ['admin','관리자A','관리자B','시스템'];

    const WITHDRAW_REASONS = [
      '개인 정보 보호를 위해 탈퇴 요청',
      '더 이상 서비스 이용 의향 없음',
      '타 단체로 활동 전환',
      '활동 지역 이전으로 인한 탈퇴',
      '건강 사유로 인한 활동 중단',
      '중복 가입으로 인한 계정 정리',
      '장기 미활동으로 자진 탈퇴',
      '내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우, 내용이 긴 경우',
      '본인 요청에 의한 탈퇴 처리',
      '이메일 수신 불가로 인한 계정 삭제 요청',
    ];

    const ALL_WITHDRAWN = Array.from({ length: 23 }, (_, i) => {
      const g   = GRADES[i % 3];
      const mm  = String((i % 9) + 1).padStart(2,'0');
      const dd  = String((i % 20) + 1).padStart(2,'0');
      const wMm = String(((i + 2) % 9) + 1).padStart(2,'0');
      const wDd = String(((i * 3 + 7) % 20) + 1).padStart(2,'0');
      const wHH = String((i % 10) + 9).padStart(2,'0');
      const wMI = String((i * 7) % 60).padStart(2,'0');
      const wSS = String((i * 13) % 60).padStart(2,'0');
      return {
        id:             100 + i,
        userId:         `olduser${String(i + 1).padStart(3,'0')}`,
        name:           NAMES[i % 10],
        grade:          g.key,
        gradeLabel:     g.label,
        email:          `withdrawn${i + 1}@example.com`,
        phone:          `010-${String(2000 + i).padStart(4,'0')}-${String(6000 + i).padStart(4,'0')}`,
        deletedAt:      `2026-${wMm}-${wDd} ${wHH}:${wMI}:${wSS}`,
        processor:      PROCESSORS[i % 4],
        withdrawReason: WITHDRAW_REASONS[i % WITHDRAW_REASONS.length],
      };
    });

    const GRADE_BADGE = { fullMember:'badge-green', member:'badge-blue', admin:'badge-red' };
    const GRADE_LABEL = { fullMember:'정회원', member:'일반회원', admin:'관리자' };

    const WithdrawnAdmin = {
      filtered:    [...ALL_WITHDRAWN],
      currentPage: 1,
      pageSize:    10,

      _dateInRange(dateStr, from, to) {
        if (!from && !to) return true;
        const d = new Date(dateStr);
        if (from && !to) return d >= new Date(from);
        if (!from && to) return d <= new Date(to);
        return d >= new Date(from) && d <= new Date(to);
      },

      search() {
        const from   = document.getElementById('filterDateFrom').value;
        const to     = document.getElementById('filterDateTo').value;
        const kwType = document.getElementById('filterKeywordType').value;
        const kw     = document.getElementById('filterKeyword').value.trim().toLowerCase();

        this.filtered = ALL_WITHDRAWN.filter(m => {
          if (!this._dateInRange(m.deletedAt, from, to)) return false;
          if (kw) {
            if (!kwType) {
              const haystack = (m.userId + m.name + m.email).toLowerCase();
              if (!haystack.includes(kw)) return false;
            } else {
              if (!String(m[kwType] || '').toLowerCase().includes(kw)) return false;
            }
          }
          return true;
        });
        this.currentPage = 1;
        this.render();
      },

      setDatePreset(range) {
        const to = new Date(), from = new Date();
        if (range !== 'today') from.setDate(from.getDate() - range);
        const fmt = d => d.toISOString().split('T')[0];
        document.getElementById('filterDateFrom').value = fmt(from);
        document.getElementById('filterDateTo').value = fmt(to);
        this.search();
      },

      resetFilter() {
        document.getElementById('filterDateFrom').value    = '';
        document.getElementById('filterDateTo').value      = '';
        document.getElementById('filterKeywordType').value = '';
        document.getElementById('filterKeyword').value     = '';
        this.filtered    = [...ALL_WITHDRAWN];
        this.currentPage = 1;
        this.render();
      },

      changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

      exportExcel() {
        App.toast('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.', 'info');
      },

      render() {
        const total = this.filtered.length;
        const start = (this.currentPage - 1) * this.pageSize;
        const slice = this.filtered.slice(start, start + this.pageSize);

        document.getElementById('memberCount').textContent = total.toLocaleString();

        document.getElementById('memberTableBody').innerHTML = slice.map((m, i) => `
          <tr>
            <td class="center td-muted">${total - start - i}</td>
            <td class="center cell-date">${m.deletedAt}</td>
            <td class="td-muted">${m.userId}</td>
            <td><strong>${m.name}</strong></td>
            <td class="center">
              <span class="badge ${GRADE_BADGE[m.grade] || 'badge-gray'}">
                ${GRADE_LABEL[m.grade] || m.grade}
              </span>
            </td>
            <td class="td-muted">${m.email}</td>
            <td class="center td-muted">${m.phone}</td>
            <td class="cell-reason" data-tooltip="${m.withdrawReason}"><span class="cell-reason-text">${m.withdrawReason || '-'}</span></td>
            <td class="center td-muted">${m.processor}</td>
          </tr>`).join('');

        App.renderPagination('memberPagination', this.currentPage,
          Math.ceil(total / this.pageSize) || 1,
          p => { this.currentPage = p; this.render(); });
      },
    };

    WithdrawnAdmin.render();
  </script>
</body>
</html>
