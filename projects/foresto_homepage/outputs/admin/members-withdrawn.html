<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탈퇴회원 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .filter-card {
      background: #fff;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 32px;
      align-items: flex-end;
    }
    .filter-row + .filter-row {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--gray-light);
    }
    .filter-item { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .filter-item.date-range { flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--gray-dark); white-space: nowrap; }
    .filter-item.date-range .filter-label { align-self: center; }
    .keyword-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--gray-light);
    }
    .admin-table tbody tr { cursor: default; }
    .admin-table tbody tr:hover { background: #fafafa; }
    /* 탈퇴 안내 배너 */
    .withdrawn-notice {
      background: #fff8f0;
      border: 1px solid #fed7aa;
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      color: #92400e;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">탈퇴회원</h1>
        <button class="btn btn-outline btn-sm" onclick="WithdrawnAdmin.exportExcel()">엑셀 다운로드</button>
      </div>

      <!-- 안내 배너 -->
      <div class="withdrawn-notice">
        🔒 탈퇴 회원 정보는 조회 전용입니다. 복구 기능은 제공되지 않습니다.
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">

        <!-- 탈퇴일 범위 -->
        <div class="filter-row">
          <div class="filter-item date-range">
            <span class="filter-label">탈퇴일</span>
            <input type="date" class="form-control" id="filterDateFrom" style="width:150px;height:36px;font-size:13px">
            <span style="color:var(--gray-mid);font-size:13px">~</span>
            <input type="date" class="form-control" id="filterDateTo"   style="width:150px;height:36px;font-size:13px">
          </div>
        </div>

        <!-- 키워드 검색 -->
        <div class="filter-row">
          <div class="filter-item">
            <span class="filter-label">키워드 검색</span>
            <div class="keyword-wrap">
              <select class="form-control" id="filterKeywordType" style="width:110px;height:36px;font-size:13px">
                <option value="">전체</option>
                <option value="userId">아이디</option>
                <option value="name">이름</option>
                <option value="email">이메일</option>
              </select>
              <input type="text" class="form-control" id="filterKeyword"
                placeholder="검색어를 입력하세요"
                style="width:260px;height:36px;font-size:13px"
                onkeydown="if(event.key==='Enter') WithdrawnAdmin.search()">
            </div>
          </div>
        </div>

        <div class="filter-actions">
          <button class="btn btn-gray btn-sm" onclick="WithdrawnAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="WithdrawnAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="memberCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          onchange="WithdrawnAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
          <option value="100">100개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:52px" class="center">번호</th>
              <th style="width:110px" class="center">탈퇴일</th>
              <th style="width:130px">아이디</th>
              <th style="width:72px">이름</th>
              <th style="width:72px" class="center">구분</th>
              <th>이메일</th>
              <th style="width:130px" class="center">연락처</th>
              <th style="width:100px" class="center">탈퇴 처리자</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="memberPagination"></div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('withdrawn');
    /* ── 탈퇴회원 샘플 데이터 (deleted_at 필드 보유) */
    const NAMES  = ['고산바람','서자연','남숲길','홍나무','구들꽃','노계곡','오생태','배이슬','연풍경','유숲새'];
    const GRADES = [
      { key:'fullMember', label:'정회원' },
      { key:'member',     label:'일반회원' },
      { key:'member',     label:'일반회원' },
    ];
    const PROCESSORS = ['admin','관리자A','관리자B','시스템'];

    const ALL_WITHDRAWN = Array.from({ length: 23 }, (_, i) => {
      const g   = GRADES[i % 3];
      const mm  = String((i % 9) + 1).padStart(2,'0');
      const dd  = String((i % 20) + 1).padStart(2,'0');
      const wMm = String(((i + 2) % 9) + 1).padStart(2,'0');
      const wDd = String(((i * 3 + 7) % 20) + 1).padStart(2,'0');
      return {
        id:           100 + i,
        userId:       `olduser${String(i + 1).padStart(3,'0')}`,
        name:         NAMES[i % 10],
        grade:        g.key,
        gradeLabel:   g.label,
        email:        `withdrawn${i + 1}@example.com`,
        phone:        `010-${String(2000 + i).padStart(4,'0')}-${String(6000 + i).padStart(4,'0')}`,
        deletedAt:    `2026-${wMm}-${wDd}`,
        processor:    PROCESSORS[i % 4],
      };
    });

    const GRADE_BADGE = { fullMember:'badge-green', member:'badge-blue', admin:'badge-red' };
    const GRADE_LABEL = { fullMember:'정회원', member:'일반회원', admin:'관리자' };

    const WithdrawnAdmin = {
      filtered:    [...ALL_WITHDRAWN],
      currentPage: 1,
      pageSize:    10,

      _dateInRange(dateStr, from, to) {
        if (!from && !to) return true;
        const d = new Date(dateStr);
        if (from && !to) return d >= new Date(from);
        if (!from && to) return d <= new Date(to);
        return d >= new Date(from) && d <= new Date(to);
      },

      search() {
        const from   = document.getElementById('filterDateFrom').value;
        const to     = document.getElementById('filterDateTo').value;
        const kwType = document.getElementById('filterKeywordType').value;
        const kw     = document.getElementById('filterKeyword').value.trim().toLowerCase();

        this.filtered = ALL_WITHDRAWN.filter(m => {
          if (!this._dateInRange(m.deletedAt, from, to)) return false;
          if (kw) {
            if (!kwType) {
              const haystack = (m.userId + m.name + m.email).toLowerCase();
              if (!haystack.includes(kw)) return false;
            } else {
              if (!String(m[kwType] || '').toLowerCase().includes(kw)) return false;
            }
          }
          return true;
        });
        this.currentPage = 1;
        this.render();
      },

      resetFilter() {
        document.getElementById('filterDateFrom').value   = '';
        document.getElementById('filterDateTo').value     = '';
        document.getElementById('filterKeywordType').value = '';
        document.getElementById('filterKeyword').value    = '';
        this.filtered    = [...ALL_WITHDRAWN];
        this.currentPage = 1;
        this.render();
      },

      changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

      exportExcel() {
        App.toast('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.', 'info');
      },

      render() {
        const total = this.filtered.length;
        const start = (this.currentPage - 1) * this.pageSize;
        const slice = this.filtered.slice(start, start + this.pageSize);

        document.getElementById('memberCount').textContent = total.toLocaleString();

        document.getElementById('memberTableBody').innerHTML = slice.map((m, i) => `
          <tr>
            <td class="center" style="color:var(--gray-mid);font-size:13px">${start + i + 1}</td>
            <td class="center" style="font-size:12px;color:var(--danger);font-weight:500">${m.deletedAt}</td>
            <td style="font-size:13px;color:var(--gray-mid)">${m.userId}</td>
            <td><strong style="font-size:13px">${m.name}</strong></td>
            <td class="center">
              <span class="badge ${GRADE_BADGE[m.grade] || 'badge-gray'}" style="font-size:11px">
                ${GRADE_LABEL[m.grade] || m.grade}
              </span>
            </td>
            <td style="font-size:12px;color:var(--gray-mid)">${m.email}</td>
            <td class="center" style="font-size:12px;color:var(--gray-mid)">${m.phone}</td>
            <td class="center" style="font-size:12px;color:var(--gray-mid)">${m.processor}</td>
          </tr>`).join('');

        App.renderPagination('memberPagination', this.currentPage,
          Math.ceil(total / this.pageSize) || 1,
          p => { this.currentPage = p; this.render(); });
      },
    };

    WithdrawnAdmin.render();
  </script>
</body>
</html>
