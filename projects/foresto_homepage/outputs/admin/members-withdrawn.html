<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="">
  <title>탈퇴회원 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .cell-reason { position:relative; overflow:visible !important; padding:0 !important; color:#4a5545; cursor:default; }
    .cell-reason-text { display:block; padding:13px 14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cell-reason::after { content:attr(data-tooltip); display:none; position:absolute; bottom:calc(100% + 8px); right:0; width:300px; padding:8px 12px; background:#1a2718; color:#fff; font-size:12px; line-height:1.6; white-space:normal; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,.2); z-index:300; pointer-events:none; text-align:left; }
    .cell-reason::before { content:''; display:none; position:absolute; bottom:calc(100% + 2px); right:16px; border:5px solid transparent; border-top-color:#1a2718; z-index:300; pointer-events:none; }
    .cell-reason:hover::after, .cell-reason:hover::before { display:block; }
    .withdrawn-notice { background:#fff8f0; border:1px solid #fed7aa; border-radius:8px; padding:10px 16px; font-size:13px; color:#92400e; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .admin-table .cell-date { font-variant-numeric:tabular-nums; color:#c0392b; font-weight:500; }
  </style>
</head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-head">
      <span class="adm-sb-title">MENU</span>
      <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
    </div>
    <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">탈퇴회원</h1>
      <div class="admin-topbar-actions">
        <button class="btn-refresh" onclick="WithdrawnList.load()" title="새로고침">
          <img src="../assets/icons/refresh.png" alt="새로고침">
        </button>
      </div>
    </div>

    <div class="withdrawn-notice">
      ※ 탈퇴 회원 정보는 조회 전용입니다. 복구 기능은 제공되지 않습니다.
    </div>

    <!-- 검색 필터 -->
    <div class="filter-card">
      <div class="filter-body">
        <div class="filter-row">
          <span class="filter-label">탈퇴일</span>
          <div class="filter-content">
            <div class="date-pair">
              <input type="date" id="filterDateFrom">
              <span class="date-sep">—</span>
              <input type="date" id="filterDateTo">
            </div>
            <div class="date-preset-group">
              <button class="date-preset-btn" onclick="setDatePreset('today')">오늘</button>
              <button class="date-preset-btn" onclick="setDatePreset(7)">7일</button>
              <button class="date-preset-btn" onclick="setDatePreset(30)">30일</button>
              <button class="date-preset-btn" onclick="setDatePreset(90)">3개월</button>
              <button class="date-preset-btn" onclick="setDatePreset(180)">6개월</button>
            </div>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-label">검색어</span>
          <div class="filter-content">
            <div class="kw-wrap">
              <select id="filterKwType">
                <option value="">전체 필드</option>
                <option value="userId">아이디</option>
                <option value="name">이름</option>
              </select>
              <div class="kw-input-wrap">
                <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                  onkeydown="if(event.key==='Enter') WithdrawnList.search()">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="filter-footer">
        <button class="btn btn-outline btn-sm"
          onclick="AdminHttp.downloadExcel(ADMIN_API.memberExcel, WithdrawnList.getParams())">
          엑셀 다운로드
        </button>
        <button class="btn btn-gray btn-sm" onclick="WithdrawnList.reset()">초기화</button>
        <button class="btn btn-primary btn-sm" onclick="WithdrawnList.search()">검색</button>
      </div>
    </div>

    <!-- 목록 상단 -->
    <div class="list-top">
      <div class="list-count" id="listCount">총 <strong>0</strong>건</div>
      <select class="form-control" style="width:130px;height:36px;font-size:13px"
        onchange="WithdrawnList.changePageSize(this.value)">
        <option value="10">10개씩 보기</option>
        <option value="30">30개씩 보기</option>
        <option value="50">50개씩 보기</option>
        <option value="100">100개씩 보기</option>
      </select>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th style="width:4%">번호</th>
            <th style="width:10%">탈퇴일</th>
            <th style="width:11%">아이디</th>
            <th>이름</th>
            <th style="width:7%">구분</th>
            <th style="width:14%">이메일</th>
            <th style="width:11%">연락처</th>
            <th style="width:20%">탈퇴 사유</th>
            <th style="width:9%">탈퇴 처리자</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/components/header.js"></script>
<script src="../assets/js/pages/admin.js"></script>
<script>
'use strict';

/* ──────────────────────────────────────────
   샘플 데이터
   [개발자] AdminHttp.get(ADMIN_API.memberWithdrawn) 응답으로 교체
────────────────────────────────────────── */
const SAMPLE_DATA = {
  total: 8,
  items: [
    { no: 8, withdrawDate: '2025-05-10 09:00:00', userId: 'ex_forest101', name: '김퇴회',   gradeLabel: '정회원',   gradeBadge: 'badge-green', email: 'ex101@example.com', phone: '010-2101-6001', reason: '해외 이주로 활동 불가',                  handler: '관리자A' },
    { no: 7, withdrawDate: '2025-08-22 11:30:00', userId: 'ex_forest102', name: '이탈퇴',   gradeLabel: '일반회원', gradeBadge: 'badge-blue',  email: 'ex102@example.com', phone: '010-2102-6002', reason: '건강상의 이유로 탈퇴 요청',              handler: '시스템' },
    { no: 6, withdrawDate: '2025-11-03 14:20:00', userId: 'ex_forest103', name: '박떠남',   gradeLabel: '일반회원', gradeBadge: 'badge-blue',  email: 'ex103@example.com', phone: '010-2103-6003', reason: '활동 시간 부족',                         handler: '관리자B' },
    { no: 5, withdrawDate: '2026-01-10 10:23:05', userId: 'forest_old001', name: '고산바람', gradeLabel: '정회원',   gradeBadge: 'badge-green', email: 'withdrawn1@example.com', phone: '010-2001-6001', reason: '개인 정보 보호를 위해 탈퇴 요청', handler: '관리자A' },
    { no: 4, withdrawDate: '2026-01-25 16:45:00', userId: 'ex_forest104', name: '최은퇴',   gradeLabel: '정회원',   gradeBadge: 'badge-green', email: 'ex104@example.com', phone: '010-2104-6004', reason: '정년퇴직 후 활동 중단',                 handler: '관리자A' },
    { no: 3, withdrawDate: '2026-02-18 14:51:30', userId: 'forest_old002', name: '서자연',   gradeLabel: '일반회원', gradeBadge: 'badge-blue',  email: 'withdrawn2@example.com', phone: '010-2002-6002', reason: '더 이상 서비스 이용 의향 없음',  handler: '시스템' },
    { no: 2, withdrawDate: '2026-03-05 09:10:44', userId: 'forest_old003', name: '남숲길',   gradeLabel: '일반회원', gradeBadge: 'badge-blue',  email: 'withdrawn3@example.com', phone: '010-2003-6003', reason: '타 단체로 활동 전환',             handler: '관리자B' },
    { no: 1, withdrawDate: '2026-04-02 10:00:00', userId: 'ex_forest105', name: '한그루',   gradeLabel: '일반회원', gradeBadge: 'badge-blue',  email: 'ex105@example.com', phone: '010-2105-6005', reason: '개인 사유로 탈퇴',                      handler: '시스템' },
  ],
};

const WithdrawnList = {
  currentPage: 1,
  pageSize: 10,

  getParams() {
    return {
      date_from: document.getElementById('filterDateFrom').value,
      date_to:   document.getElementById('filterDateTo').value,
      kw_type:   document.getElementById('filterKwType').value,
      kw:        document.getElementById('filterKeyword').value.trim(),
      page:      this.currentPage,
      size:      this.pageSize,
    };
  },

  search() { this.currentPage = 1; this.load(); },

  async load() {
    AdminUI.showLoading('tableBody', 9);
    try {
      /*
       * [개발자 연동]
       * const data = await AdminHttp.get(ADMIN_API.memberWithdrawn, this.getParams());
       * this.render(data.items, data.total);
       */
      await new Promise(r => setTimeout(r, 200));
      const p = this.getParams();
      let items = SAMPLE_DATA.items.filter(d => {
        if (p.date_from && d.withdrawDate < p.date_from) return false;
        if (p.date_to   && d.withdrawDate > p.date_to + ' 23:59:59') return false;
        if (p.kw) {
          const kw = p.kw.toLowerCase();
          if (p.kw_type === 'userId') return d.userId.toLowerCase().includes(kw);
          if (p.kw_type === 'name')   return d.name.includes(kw);
          return (d.userId + d.name).toLowerCase().includes(kw);
        }
        return true;
      });
      const total = items.length;
      const start = (this.currentPage - 1) * this.pageSize;
      this.render(items.slice(start, start + this.pageSize), total);
    } catch (e) {
      AdminUI.showError('tableBody', e.message, 9);
    }
  },

  render(items, total) {
    AdminUI.updateCount('listCount', total);
    const totalPages = Math.ceil(total / this.pageSize) || 1;
    AdminUI.renderPagination('pagination', this.currentPage, totalPages, p => {
      this.currentPage = p; this.load();
    });

    const tbody = document.getElementById('tableBody');
    if (!items.length) {
      AdminUI.showEmpty('tableBody', '탈퇴 회원이 없습니다.', 9); return;
    }
    tbody.innerHTML = items.map(d => `
      <tr>
        <td class="center td-muted">${d.no}</td>
        <td class="center cell-date">${d.withdrawDate}</td>
        <td class="td-muted">${d.userId}</td>
        <td><strong>${d.name}</strong></td>
        <td class="center"><span class="badge ${d.gradeBadge}">${d.gradeLabel}</span></td>
        <td class="td-muted">${d.email}</td>
        <td class="center td-muted">${d.phone}</td>
        <td class="cell-reason" data-tooltip="${d.reason}">
          <span class="cell-reason-text">${d.reason}</span>
        </td>
        <td class="center td-muted">${d.handler}</td>
      </tr>`).join('');
  },

  changePageSize(size) { this.pageSize = parseInt(size); this.currentPage = 1; this.load(); },

  reset() {
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value   = '';
    document.getElementById('filterKwType').value   = '';
    document.getElementById('filterKeyword').value  = '';
    this.currentPage = 1;
    this.load();
  },
};

AdminSidebar.mount('withdrawn');
WithdrawnList.load();
</script>
</body>
</html>
