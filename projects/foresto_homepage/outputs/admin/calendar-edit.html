<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 수정 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .edit-card {
      background: #fff; border: 1px solid #e3eadd;
      border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }
    .edit-card-head {
      padding: 14px 20px; border-bottom: 1px solid #e3eadd;
      background: #f8faf6; font-size: 13px; font-weight: 700;
      color: #2e5c2e; letter-spacing: 0.03em;
    }
    .edit-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .edit-row { display: flex; gap: 16px; }
    .edit-row .form-group { flex: 1; margin: 0; }
    .form-hint { font-size: 12px; color: #aabba4; margin-top: 4px; }
    .detail-bottom-bar {
      display: flex; align-items: center; justify-content: space-between; padding: 4px 0 8px;
    }
    .btn-group-right { display: flex; gap: 8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">일정 수정</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="CalEdit.save()">저장</button>
        </div>
      </div>

      <div class="admin-content">
        <div class="edit-card">
          <div class="edit-card-head">일정 정보</div>
          <div class="edit-body">

            <div class="edit-row">
              <!-- 카테고리 -->
              <div class="form-group">
                <label class="form-label">카테고리 <span class="req">*</span></label>
                <select class="form-control" id="evtCat">
                  <option value="">선택해주세요</option>
                  <option value="edu" selected>교육/강좌</option>
                  <option value="event">협회행사</option>
                  <option value="club">동아리</option>
                  <option value="public">사공단</option>
                  <option value="etc">기타</option>
                </select>
              </div>
              <!-- 일정일 -->
              <div class="form-group">
                <label class="form-label">일정일 <span class="req">*</span></label>
                <input type="date" class="form-control" id="evtDate" value="2026-04-15">
              </div>
            </div>

            <!-- 일정명 -->
            <div class="form-group" style="margin:0">
              <label class="form-label">일정명 <span class="req">*</span></label>
              <input type="text" class="form-control" id="evtTitle" value="2026 숲해설가 기초과정 개강">
            </div>

            <!-- 관련 링크 -->
            <div class="form-group" style="margin:0">
              <label class="form-label">관련 링크
                <span style="color:var(--gray-mid);font-size:12px;font-weight:400">(선택)</span>
              </label>
              <input type="url" class="form-control" id="evtLink"
                value="https://foresto.kr/education/basic"
                placeholder="https://...">
              <div class="form-hint">관련 게시물 또는 외부 페이지 URL</div>
            </div>

          </div>
        </div>

        <!-- 하단 버튼 -->
        <div class="detail-bottom-bar">
          <div></div>
          <div class="btn-group-right">
            <button class="btn btn-gray" onclick="history.back()">취소</button>
            <button class="btn btn-primary" onclick="CalEdit.save()">저장</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('calendar');

  const CalEdit = {
    save() {
      const cat   = document.getElementById('evtCat')?.value;
      const title = document.getElementById('evtTitle')?.value.trim();
      const date  = document.getElementById('evtDate')?.value;
      if (!cat)   { App.toast('카테고리를 선택해주세요.', 'warning'); return; }
      if (!title) { App.toast('일정명을 입력해주세요.', 'warning');   return; }
      if (!date)  { App.toast('일정일을 선택해주세요.', 'warning');   return; }
      /* TODO: fetch(ADMIN_API.calendarSave, { method:'POST', body:JSON.stringify({cat,title,date,link}) }) */
      App.toast('일정이 저장되었습니다. (실제 구현 시 서버 API와 연동됩니다.)');
      setTimeout(() => history.back(), 900);
    },
  };
  </script>
</body>
</html>
