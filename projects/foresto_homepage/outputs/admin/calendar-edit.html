<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 수정 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">일정 수정</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="CalEdit.save()">저장</button>
        </div>
      </div>

      <div id="editWrap">
        <div style="text-align:center;padding:60px;color:var(--gray-mid)">일정 정보를 불러오는 중입니다...</div>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/admin-calendar.js"></script>
  <script>
    AdminSidebar.mount('calendar');
    const CAT_OPTIONS = [
      { val:'edu',      label:'교육/강좌'    },
      { val:'activity', label:'사회공헌 활동' },
      { val:'meeting',  label:'협회 회의'    },
      { val:'club',     label:'동아리 모임'  },
      { val:'event',    label:'행사'         },
    ];

    const CalEdit = {
      _id: null,

      init() {
        this._id    = Number(App.getParam('id'));
        const e     = CalAdmin._events?.find(x => x.id === this._id);

        if (!e) {
          document.getElementById('editWrap').innerHTML =
            `<div style="text-align:center;padding:60px;color:var(--gray-mid)">일정을 찾을 수 없습니다.</div>`;
          return;
        }

        document.getElementById('editWrap').innerHTML = `
          <div class="card" style="max-width:560px">
            <div class="card-header"><span class="card-title">일정 수정</span></div>
            <div style="padding:24px;display:flex;flex-direction:column;gap:18px">

              <div class="form-group" style="margin:0">
                <label class="form-label">날짜 <span class="req">*</span></label>
                <input type="date" class="form-control" id="eDate" value="${e.date}">
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">카테고리 <span class="req">*</span></label>
                <select class="form-control" id="eCat">
                  <option value="">선택해주세요</option>
                  ${CAT_OPTIONS.map(o =>
                    `<option value="${o.val}"${o.val===e.cat?' selected':''}>${o.label}</option>`
                  ).join('')}
                </select>
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">제목 <span class="req">*</span></label>
                <input type="text" class="form-control" id="eTitle" value="${e.title}">
              </div>

              <div class="form-group" style="margin:0">
                <label class="form-label">관련 링크 <span style="color:var(--gray-mid);font-size:12px">(선택)</span></label>
                <input type="url" class="form-control" id="eLink" value="${e.link || ''}" placeholder="https://...">
                <div style="font-size:12px;color:var(--gray-mid);margin-top:4px">
                  관련 게시물 또는 외부 페이지 URL을 입력하면 캘린더 클릭 시 이동합니다.
                </div>
              </div>

            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
            <button class="btn btn-gray" onclick="history.back()">취소</button>
            <button class="btn btn-primary" onclick="CalEdit.save()">저장</button>
          </div>`;
      },

      save() {
        const date  = document.getElementById('eDate')?.value.trim()  || '';
        const cat   = document.getElementById('eCat')?.value           || '';
        const title = document.getElementById('eTitle')?.value.trim()  || '';
        const link  = document.getElementById('eLink')?.value.trim()   || '';

        if (!date)  { App.toast('날짜를 선택해주세요.', 'warning');    return; }
        if (!cat)   { App.toast('카테고리를 선택해주세요.', 'warning'); return; }
        if (!title) { App.toast('제목을 입력해주세요.', 'warning');    return; }

        if (CalAdmin._events) {
          const idx = CalAdmin._events.findIndex(x => x.id === this._id);
          if (idx > -1) CalAdmin._events[idx] = { ...CalAdmin._events[idx], date, cat, title, link: link || null };
        }

        App.toast('일정이 저장되었습니다.');
        setTimeout(() => history.back(), 900);
      },
    };

    CalAdmin.init();
    CalEdit.init();
  </script>
</body>
</html>
