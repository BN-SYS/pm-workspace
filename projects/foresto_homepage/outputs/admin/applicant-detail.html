<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* ══════════════════════════════════════
       폼 카드 — course-detail 기준 동일
       ══════════════════════════════════════ */
    .form-card {
      background: #fff;
      border: 1px solid #e3eadd;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .form-card-head {
      padding: 14px 20px;
      border-bottom: 1px solid #e3eadd;
      background: #f8faf6;
      font-size: 13px;
      font-weight: 700;
      color: #2e5c2e;
      letter-spacing: 0.03em;
    }
    .form-row {
      display: flex;
      align-items: stretch;
      min-height: 52px;
      border-bottom: 1px solid #f0f4ee;
    }
    .form-row:last-child { border-bottom: none; }

    .form-label {
      width: 140px;
      min-width: 140px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #7a8e74;
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: #f8faf6;
      border-right: 1px solid #e8efe3;
      padding: 0 12px;
      text-align: center;
    }
    .form-content {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* 같은 행 2분할 */
    .form-half {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 8px;
    }
    .form-half + .form-half { border-left: 1px solid #f0f4ee; }

    .detail-val {
      font-size: 14px;
      color: #111111;
      line-height: 1.6;
    }
    .detail-val.mono {
      font-variant-numeric: tabular-nums;
      color: #111111;
    }
    .detail-val.muted { color: #7a8e74; font-size: 13px; }

    /* 상태 뱃지 (badge는 components.css 재사용) */
    .badge-on {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
      background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9;
    }
    .badge-off {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
      background: #f5f5f5; color: #9e9e9e; border: 1px solid #e0e0e0;
    }

    /* 취소일시 — 강조색 */
    .cancel-date-val {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 13px;
      color: #c0392b;
    }

    /* ── 파일 아이템 */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      padding: 16px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid #e3eadd;
      border-radius: 8px;
      background: #fafcf9;
    }
    .file-item-icon {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
    .file-item-icon.pdf  { background: #fde8e8; color: #c0392b; }
    .file-item-icon.hwp  { background: #e8f4fd; color: #2980b9; }
    .file-item-icon.xlsx { background: #e8fdf0; color: #27ae60; }
    .file-item-icon.docx { background: #eef0fd; color: #2c3e8c; }
    .file-item-icon.etc  { background: #f5f5f5; color: #888; }
    .file-item-name {
      flex: 1;
      font-size: 13px; color: #111111;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-item-size { font-size: 12px; color: #aaa; white-space: nowrap; }

    .btn-download {
      height: 30px; padding: 0 12px;
      border: 1px solid #d0dbc8; border-radius: 6px;
      background: #fff; color: #4a7c59;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap; transition: background .15s;
    }
    .btn-download:hover { background: #f0f8f0; border-color: #4a7c59; }

    /* 수료증 다운로드 — 강조 */
    .btn-cert-download {
      display: inline-flex; align-items: center; gap: 8px;
      height: 38px; padding: 0 20px;
      border: 1.5px solid #2e7d32; border-radius: 8px;
      background: #fff; color: #2e7d32;
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      transition: background .15s;
    }
    .btn-cert-download:hover { background: #f0faf0; }

    .cert-unavail {
      font-size: 13px; color: #9e9e9e;
      padding: 12px 0;
    }

    /* 미제출 뱃지 */
    .badge-unsubmit {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 600;
      background: #fff3e0; color: #e65100;
      border: 1px solid #ffe0b2;
    }

    /* 하단 바 */
    .detail-bottom-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 4px 0 8px;
    }
    .btn-group-right { display: flex; gap: 8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <!-- ── 사이드바 -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <!-- ── 메인 -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">신청 상세</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록</button>
        </div>
      </div>

      <div class="admin-content">

        <!-- ════ 신청자 정보 ════ -->
        <div class="form-card">
          <div class="form-card-head">신청자 정보</div>
          <div class="form-row">
            <div class="form-label">접수번호</div>
            <div style="flex:3;padding:10px 16px;">
              <span class="detail-val mono" style="font-weight:700;color:#2e5c2e">APP-2026-02001</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">이름</div>
            <div class="form-half">
              <span class="detail-val" style="font-weight:600">김민준</span>
            </div>
            <div class="form-label">회원 ID</div>
            <div class="form-half">
              <span class="detail-val mono">M02001</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">성별</div>
            <div class="form-half">
              <span class="detail-val">남</span>
            </div>
            <div class="form-label">생년월일</div>
            <div class="form-half">
              <span class="detail-val mono">1985-03-15</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">핸드폰</div>
            <div class="form-half">
              <span class="detail-val mono">010-1234-5678</span>
            </div>
            <div class="form-label">이메일</div>
            <div class="form-half">
              <span class="detail-val">kim@example.com</span>
            </div>
          </div>
        </div>

        <!-- ════ 신청 과정 ════ -->
        <div class="form-card">
          <div class="form-card-head">신청 과정</div>
          <div class="form-row">
            <div class="form-label">과정유형</div>
            <div class="form-content">
              <span class="detail-val">기초과정</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">기수</div>
            <div class="form-content">
              <span class="detail-val">—</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">과정명</div>
            <div class="form-content">
              <span class="detail-val" style="font-weight:600">봄 숲 이야기 — 시민아카데미</span>
            </div>
          </div>
        </div>

        <!-- ════ 신청 현황 ════ -->
        <div class="form-card">
          <div class="form-card-head">신청 현황</div>
          <div class="form-row">
            <div class="form-label">신청일시</div>
            <div class="form-half">
              <span class="detail-val mono">2026-03-01 09:07:22</span>
            </div>
            <div class="form-label">신청상태</div>
            <div class="form-half">
              <span class="badge badge-green">신청완료</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">수료상태</div>
            <div class="form-content">
              <span class="badge badge-orange">미수료</span>
            </div>
          </div>
        </div>

        <!-- ════ 제출 파일 ════ -->
        <div class="form-card">
          <div class="form-card-head">제출 파일</div>
          <div class="file-list">
            <div class="file-item">
              <div class="file-item-icon hwp">HWP</div>
              <span class="file-item-name">신청서_제출용.hwp</span>
              <span class="file-item-size">120KB</span>
              <button class="btn-download" onclick="downloadFile('신청서_제출용.hwp')">다운로드</button>
            </div>
          </div>
        </div>

        <!-- ════ 수료증 ════ -->
        <div class="form-card">
          <div class="form-card-head">수료증</div>
          <div class="form-row">
            <div class="form-label">수료증 발급</div>
            <div class="form-content">
              <p class="cert-unavail">수료 처리 후 수료증을 발급·다운로드할 수 있습니다. (현재 상태: <strong>미수료</strong>)</p>
            </div>
          </div>
        </div>

        <!-- ════ 하단 버튼 ════ -->
        <div class="detail-bottom-bar">
          <div></div>
          <div class="btn-group-right">
            <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';

  AdminSidebar.mount('course-applicants');

  function downloadFile(name) {
    App.toast(`${name} 다운로드 — 실제 구현 시 서버 파일 경로와 연동됩니다.`, 'info');
  }
  </script>
</body>
</html>
