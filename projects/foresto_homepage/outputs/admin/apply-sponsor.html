<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>후원신청 관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .filter-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:16px; overflow:hidden; }
    .filter-body { display:flex; flex-direction:column; }
    .filter-row { display:flex; align-items:stretch; min-height:46px; border-bottom:1px solid #f0f4ee; }
    .filter-row:last-child { border-bottom:none; }
    .filter-label { width:84px; min-width:84px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; text-align:center; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; }
    .filter-content { flex:1; padding:10px 18px; display:flex; align-items:center; min-width:0; gap:6px; flex-wrap:wrap; }
    .filter-half { flex:1; display:flex; align-items:stretch; min-width:0; }
    .filter-half + .filter-half { border-left:1px solid #f0f4ee; }
    .date-pair { display:flex; align-items:center; gap:6px; }
    .date-pair input[type="date"] { width:140px; height:34px; padding:0 10px; border:1px solid #d5e0ce; border-radius:6px; font-size:13px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; cursor:pointer; }
    .date-pair input[type="date"]:focus { border-color:#508829; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .date-sep { color:#aabba4; font-size:13px; padding:0 2px; }
    .date-preset-group { display:flex; gap:4px; flex-wrap:wrap; }
    .date-preset-btn { height:28px; padding:0 10px; border:1px solid #d5e0ce; border-radius:99px; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:#6a7e64; background:#fafcf9; cursor:pointer; white-space:nowrap; transition:all .15s; }
    .date-preset-btn:hover { background:#e8f0e2; border-color:#508829; color:#508829; }
    .chip-group { display:flex; gap:5px; flex-wrap:wrap; }
    .chip { cursor:pointer; }
    .chip input[type="radio"] { display:none; }
    .chip span { display:inline-flex; align-items:center; padding:5px 14px; border-radius:99px; font-size:13px; font-weight:500; font-family:'Noto Sans KR',sans-serif; border:1px solid #d5e0ce; background:#fafcf9; color:#6a7e64; transition:all .15s; white-space:nowrap; cursor:pointer; }
    .chip input[type="radio"]:checked + span { background:#1a2718; color:#fff; border-color:#1a2718; font-weight:600; }
    .chip:hover span { border-color:#508829; color:#508829; }
    .chip input[type="radio"]:checked + span:hover { color:#fff; }
    .kw-wrap { display:flex; align-items:center; gap:6px; width:100%; }
    .kw-wrap select { flex-shrink:0; width:116px; height:34px; padding:0 8px; border:1px solid #d5e0ce; border-radius:6px; font-size:13px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; cursor:pointer; }
    .kw-wrap select:focus { border-color:#508829; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .kw-input-wrap { position:relative; flex:1; }
    .kw-input-wrap input { width:100%; height:34px; padding:0 38px 0 12px; border:1px solid #d5e0ce; border-radius:6px; font-size:13px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; box-sizing:border-box; }
    .kw-input-wrap input:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .kw-input-wrap input::placeholder { color:#aabba4; }
    .filter-footer { display:flex; align-items:center; justify-content:flex-end; gap:8px; padding:12px 18px; background:#f8faf6; border-top:1px solid #e8efe3; }
    .table-bottom-bar { display:flex; justify-content:flex-end; align-items:center; margin-top:12px; }
    .admin-table tbody tr { cursor:pointer; }
    .admin-table .cell-datetime { font-variant-numeric:tabular-nums; color:#111; }
    .badge-regular { display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9; }
    .badge-once    { display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;background:#e8f0fd;color:#1a5ea8;border:1px solid #c2d4f5; }
    .amount-val    { font-weight:700;font-variant-numeric:tabular-nums;color:#111; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">후원신청 관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../../../../common_assets/icons/refresh.png" alt="새로고침"></button>
        </div>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행1: 신청기간 -->
          <div class="filter-row">
            <span class="filter-label">신청기간</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn" onclick="SponsorApply.setDatePreset('today')">오늘</button>
                <button class="date-preset-btn" onclick="SponsorApply.setDatePreset(7)">7일</button>
                <button class="date-preset-btn" onclick="SponsorApply.setDatePreset(30)">30일</button>
                <button class="date-preset-btn" onclick="SponsorApply.setDatePreset(90)">3개월</button>
                <button class="date-preset-btn" onclick="SponsorApply.setDatePreset(180)">6개월</button>
              </div>
            </div>
          </div>

          <!-- 행2: 후원유형 / 후원목적 -->
          <div class="filter-row">
            <div class="filter-half">
              <span class="filter-label">후원유형</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterType" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterType" value="정기"><span>정기 후원</span></label>
                  <label class="chip"><input type="radio" name="filterType" value="일시"><span>일시 후원</span></label>
                </div>
              </div>
            </div>
            <div class="filter-half">
              <span class="filter-label">후원목적</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterPurpose" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterPurpose" value="교육 프로그램"><span>교육</span></label>
                  <label class="chip"><input type="radio" name="filterPurpose" value="사회공헌"><span>사회공헌</span></label>
                  <label class="chip"><input type="radio" name="filterPurpose" value="교육자료"><span>교육자료</span></label>
                  <label class="chip"><input type="radio" name="filterPurpose" value="자유사용"><span>자유사용</span></label>
                </div>
              </div>
            </div>
          </div>

          <!-- 행3: 검색어 -->
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select id="filterSearchType">
                  <option value="all">전체</option>
                  <option value="name">성명</option>
                  <option value="phone">연락처</option>
                  <option value="email">이메일</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                    onkeydown="if(event.key==='Enter') SponsorApply.search()">
                </div>
              </div>
            </div>
          </div>

        </div>
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="SponsorApply.exportExcel()">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm" onclick="SponsorApply.reset()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="SponsorApply.search()">검색</button>
        </div>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="applyCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect" onchange="SponsorApply.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
          <option value="100">100개씩 보기</option>
        </select>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:4%">No</th>
              <th style="width:12%">접수번호</th>
              <th style="width:7%">성명</th>
              <th style="width:7%">후원유형</th>
              <th style="width:9%">후원금액</th>
              <th style="width:9%">후원목적</th>
              <th style="width:11%">연락처</th>
              <th style="width:12%">신청일</th>
              <th style="width:11%">관리자 메모</th>
            </tr>
          </thead>
          <tbody id="applyTableBody"></tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="pagination" id="applyPagination"></div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('apply-sponsor');

  const NAMES_S   = ['홍길동','김영희','이철수','박미영','정도현','최수진','윤현우','임나래','강민서','조태양',
                     '신지수','한가람','문유리','류승훈','백채원','안지호','송하늘','권보름','오세진','황나비'];
  const AMOUNTS_S = [10000, 30000, 50000, 100000, 30000, 50000, 10000, 100000, 50000, 30000];
  const TYPES_S   = ['정기','일시','정기','정기','일시','정기','일시','정기','일시','일시'];
  const PURPOSES_S= ['교육 프로그램','사회공헌','교육자료','자유사용','교육 프로그램','사회공헌','자유사용','교육자료','사회공헌','교육 프로그램'];
  const RECEIPTS_S= ['발급 요청','발급 불필요','발급 요청','발급 불필요'];
  const MSGS_S    = [
    '숲 교육이 더 많은 아이들에게 닿기를 바랍니다.',
    '작은 정성이지만 오래 이어가겠습니다.',
    '협회 활동을 항상 응원합니다.',
    '',
    '자연을 사랑하는 마음으로 후원합니다.',
  ];

  const ALL_DATA_S = Array.from({ length: 22 }, (_, i) => {
    const mm  = String(((i % 3) + 1)).padStart(2, '0');
    const dd  = String(((i % 25) + 1)).padStart(2, '0');
    const hh  = String(((i * 3) % 11) + 9).padStart(2, '0');
    const min = String((i * 9) % 60).padStart(2, '0');
    const ss  = String((i * 17) % 60).padStart(2, '0');
    const birthMm = String(((i % 11) + 1)).padStart(2, '0');
    const birthDd = String(((i % 20) + 1)).padStart(2, '0');
    return {
      id:         6000 + i,
      applyNo:    `DON-2026-${String(i + 1).padStart(5, '0')}`,
      name:       NAMES_S[i % NAMES_S.length],
      phone:      `010-${String(4000 + i).padStart(4, '0')}-${String(8000 + i).padStart(4, '0')}`,
      email:      `donor${6000 + i}@example.com`,
      birth:      `${1970 + (i % 30)}-${birthMm}-${birthDd}`,
      donateType: TYPES_S[i % TYPES_S.length],
      amount:     AMOUNTS_S[i % AMOUNTS_S.length],
      purpose:    PURPOSES_S[i % PURPOSES_S.length],
      receipt:    RECEIPTS_S[i % RECEIPTS_S.length],
      publicList: i % 3 !== 0 ? '공개' : '비공개',
      message:    MSGS_S[i % MSGS_S.length],
      applyDate:  `2026-${mm}-${dd}`,
      applyDatetime: `2026-${mm}-${dd} ${hh}:${min}:${ss}`,
      adminMemo:  ['','영수증 발급 처리','','','감사 문자 발송','','','정기 결제 안내 예정','','','입금 확인 완료',''][i % 12],
    };
  });

  const SponsorApply = {
    _data:     ALL_DATA_S,
    _filtered: [...ALL_DATA_S],
    _page:     1,
    _pageSize: 10,

    search() {
      const dateFrom = document.getElementById('filterDateFrom')?.value  || '';
      const dateTo   = document.getElementById('filterDateTo')?.value    || '';
      const type     = document.querySelector('input[name="filterType"]:checked')?.value    || '';
      const purpose  = document.querySelector('input[name="filterPurpose"]:checked')?.value || '';
      const kwType   = document.getElementById('filterSearchType')?.value || 'all';
      const keyword  = (document.getElementById('filterKeyword')?.value  || '').trim().toLowerCase();

      this._filtered = this._data.filter(d => {
        if (dateFrom  && d.applyDate   < dateFrom)   return false;
        if (dateTo    && d.applyDate   > dateTo)     return false;
        if (type      && d.donateType !== type)      return false;
        if (purpose   && d.purpose    !== purpose)   return false;
        if (keyword) {
          const m = { name: d.name, phone: d.phone, email: d.email };
          if (kwType !== 'all') return m[kwType]?.toLowerCase().includes(keyword);
          return Object.values(m).some(v => v.toLowerCase().includes(keyword));
        }
        return true;
      });
      this._page = 1;
      this.render();
    },

    setDatePreset(range) {
      const to = new Date(), from = new Date();
      if (range !== 'today') from.setDate(from.getDate() - range);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('filterDateFrom').value = fmt(from);
      document.getElementById('filterDateTo').value   = fmt(to);
      this.search();
    },

    reset() {
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value   = '';
      document.getElementById('filterKeyword').value  = '';
      document.getElementById('filterSearchType').value = 'all';
      document.querySelector('input[name="filterType"][value=""]').checked    = true;
      document.querySelector('input[name="filterPurpose"][value=""]').checked = true;
      this._filtered = [...this._data];
      this._page = 1;
      this.render();
    },

    changePageSize(size) { this._pageSize = size; this._page = 1; this.render(); },

    render() {
      const total = this._filtered.length;
      const start = (this._page - 1) * this._pageSize;
      const slice = this._filtered.slice(start, start + this._pageSize);

      const countEl = document.getElementById('applyCount');
      if (countEl) countEl.textContent = total.toLocaleString();

      const tbody = document.getElementById('applyTableBody');
      if (!tbody) return;

      if (!slice.length) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:#8a9e84">검색 결과가 없습니다.</td></tr>`;
        App.renderPagination('applyPagination', 1, 1, () => {});
        return;
      }

      tbody.innerHTML = slice.map((d, i) => {
        const seq    = total - start - i;
        const typeBadge = d.donateType === '정기'
          ? `<span class="badge-regular">정기</span>`
          : `<span class="badge-once">일시</span>`;
        const memo = d.adminMemo || '';
        const memoCell = memo
          ? `<span style="font-size:12px;color:#5a7a5a">${memo.length > 10 ? memo.slice(0, 10) + '…' : memo}</span>`
          : `<span style="color:#ccc;font-size:12px">—</span>`;
        return `<tr onclick="location.href='apply-sponsor-detail.html?id=${d.id}'">
          <td style="text-align:center">${seq}</td>
          <td style="text-align:center;font-size:12px;font-weight:600;color:#2e5c2e">${d.applyNo}</td>
          <td style="font-weight:600">${d.name}</td>
          <td style="text-align:center">${typeBadge}</td>
          <td style="text-align:center" class="amount-val">${d.amount.toLocaleString()}원</td>
          <td style="text-align:center;font-size:13px">${d.purpose}</td>
          <td style="text-align:center;font-size:13px" class="cell-datetime">${d.phone}</td>
          <td style="text-align:center;font-size:13px" class="cell-datetime">${d.applyDatetime}</td>
          <td style="text-align:center">${memoCell}</td>
        </tr>`;
      }).join('');

      App.renderPagination(
        'applyPagination', this._page,
        Math.ceil(total / this._pageSize) || 1,
        p => { this._page = p; this.render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
      );
    },

    exportExcel() { App.toast('후원신청 목록 엑셀 다운로드를 시작합니다.', 'info'); },
  };

  SponsorApply.render();
  </script>
</body>
</html>
