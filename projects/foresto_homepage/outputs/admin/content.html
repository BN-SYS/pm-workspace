<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘텐츠관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">콘텐츠관리</h1>
      </div>

      <!-- 탭 -->
      <div class="tabs" style="margin-bottom:20px">
        <button class="tab-btn active" onclick="ContentAdmin.switchTab('notice',this)">공지사항</button>
        <button class="tab-btn" onclick="ContentAdmin.switchTab('popup',this)">팝업 공지</button>
        <button class="tab-btn" onclick="ContentAdmin.switchTab('banner',this)">히어로 배너</button>
      </div>

      <!-- 공지사항 탭 -->
      <div id="tab-notice">
        <div class="list-top">
          <div class="list-count">총 <strong id="noticeCount">0</strong>건</div>
          <button class="btn btn-primary btn-sm" onclick="ContentAdmin.openNoticeModal()">+ 공지 등록</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width:50px" class="center">번호</th>
                <th style="width:70px" class="center">고정</th>
                <th>제목</th>
                <th style="width:100px" class="center">작성자</th>
                <th style="width:100px" class="center">작성일</th>
                <th style="width:70px" class="center">조회</th>
                <th style="width:110px" class="center">관리</th>
              </tr>
            </thead>
            <tbody id="noticeTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="noticePagination"></div>
      </div>

      <!-- 팝업 공지 탭 -->
      <div id="tab-popup" style="display:none">
        <div class="alert alert-info">홈페이지 접속 시 표시되는 팝업 공지를 관리합니다.</div>
        <div class="card" style="max-width:640px">
          <div class="card-header"><span class="card-title">팝업 공지 설정</span></div>
          <div class="form-group">
            <label class="form-label">팝업 표시 여부</label>
            <div style="display:flex;gap:16px">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
                <input type="radio" name="popupActive" value="1" checked> 표시
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
                <input type="radio" name="popupActive" value="0"> 숨김
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">제목</label>
            <input type="text" class="form-control" id="popupTitle" value="2026년 55기 전문가과정 모집">
          </div>
          <div class="form-group">
            <label class="form-label">내용</label>
            <textarea class="form-control" id="popupContent" rows="4">접수: 2026.03.01 ~ 03.20
교육: 2026.04.01 ~ 06.30</textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group">
              <label class="form-label">표시 시작일</label>
              <input type="date" class="form-control" id="popupFrom" value="2026-03-01">
            </div>
            <div class="form-group">
              <label class="form-label">표시 종료일</label>
              <input type="date" class="form-control" id="popupTo" value="2026-03-20">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">링크 URL</label>
            <input type="text" class="form-control" id="popupLink" value="education/course-list.html">
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
            <button class="btn btn-gray" onclick="App.toast('변경사항이 초기화되었습니다.')">초기화</button>
            <button class="btn btn-primary" onclick="ContentAdmin.savePopup()">저장</button>
          </div>
        </div>
      </div>

      <!-- 히어로 배너 탭 -->
      <div id="tab-banner" style="display:none">
        <div class="alert alert-info">메인 페이지 상단 히어로 영역의 문구와 버튼을 관리합니다.</div>
        <div class="card" style="max-width:640px">
          <div class="card-header"><span class="card-title">히어로 배너 설정</span></div>
          <div class="form-group">
            <label class="form-label">메인 제목</label>
            <input type="text" class="form-control" id="heroTitle" value="숲이 주는 이야기를 함께 나누는 사람들">
          </div>
          <div class="form-group">
            <label class="form-label">서브 설명</label>
            <textarea class="form-control" id="heroDesc" rows="3">한국숲해설가협회는 숲과 사람을 잇는 전문 해설가를 양성하고 자연과 함께하는 다양한 활동을 이어갑니다.</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">버튼 1 텍스트</label>
            <input type="text" class="form-control" id="heroBtn1Text" value="전문가과정 신청">
          </div>
          <div class="form-group">
            <label class="form-label">버튼 1 링크</label>
            <input type="text" class="form-control" id="heroBtn1Link" value="education/course-list.html">
          </div>
          <div class="form-group">
            <label class="form-label">버튼 2 텍스트</label>
            <input type="text" class="form-control" id="heroBtn2Text" value="협회 소개">
          </div>
          <div class="form-group">
            <label class="form-label">버튼 2 링크</label>
            <input type="text" class="form-control" id="heroBtn2Link" value="about/index.html">
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
            <button class="btn btn-gray" onclick="App.toast('변경사항이 초기화되었습니다.')">초기화</button>
            <button class="btn btn-primary" onclick="ContentAdmin.saveBanner()">저장</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 공지 등록/수정 모달 -->
  <div class="modal-overlay" id="noticeModal">
    <div class="modal" style="max-width:640px">
      <div class="modal-header">
        <h3 id="noticeModalTitle">공지 등록</h3>
        <button class="modal-close" onclick="App.closeModal('noticeModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">상단 고정 여부</label>
          <div style="display:flex;gap:16px">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="noticePinned" value="1"> 고정
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="noticePinned" value="0" checked> 일반
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">제목 <span class="req">*</span></label>
          <input type="text" class="form-control" id="noticeTitle" placeholder="공지 제목을 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">내용 <span class="req">*</span></label>
          <textarea class="form-control" id="noticeContent" rows="8" placeholder="공지 내용을 입력하세요."></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <label class="form-label" style="margin:0">첨부파일</label>
            <span style="font-size:12px;color:var(--gray-mid)">최대 5개 / 각 10MB 이하 / PDF·HWP·DOCX</span>
          </div>
          <div id="noticeFileList"></div>
          <button type="button" class="btn btn-outline btn-sm" id="addFileBtn"
            onclick="ContentAdmin.addFileInput()" style="margin-top:6px">
            + 파일 추가
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="App.closeModal('noticeModal')">취소</button>
        <button class="btn btn-primary" onclick="ContentAdmin.saveNotice()">저장</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/admin-content.js"></script>
  <script>
    AdminSidebar.mount('history');
    ContentAdmin.init();
  </script>
</body>
</html>
