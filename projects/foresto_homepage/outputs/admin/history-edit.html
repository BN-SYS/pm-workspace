<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연혁 수정 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .item-row {
      background: var(--gray-light);
      border-radius: 8px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 10px;
      align-items: start;
    }
    .item-row + .item-row { margin-top: 8px; }
    .item-img-preview {
      width: 80px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      margin-top: 6px;
      display: none;
    }
    .img-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--green-dark);
      cursor: pointer;
      border: 1px dashed var(--green-light);
      border-radius: 4px;
      padding: 5px 10px;
      margin-top: 6px;
    }
    .img-upload-label:hover { background: var(--green-pale); }
    .img-upload-label input[type=file] { display:none; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">연혁 등록</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="HistEdit.save()">저장</button>
        </div>
      </div>

      <!-- 연도 기본 정보 -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><span class="card-title">연도 기본 정보</span></div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:16px">

          <div style="display:grid;grid-template-columns:160px 200px;gap:16px">
            <div class="form-group" style="margin:0">
              <label class="form-label">연도 <span class="req">*</span></label>
              <input type="number" class="form-control" id="eYear" placeholder="예: 2026" min="1990" max="2100">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">배지 <span style="color:var(--gray-mid);font-size:12px">(선택)</span></label>
              <select class="form-control" id="eBadge">
                <option value="">없음</option>
                <option value="현재">현재</option>
                <option value="주요연도">주요연도</option>
                <option value="창립">창립</option>
                <option value="설립">설립</option>
              </select>
            </div>
          </div>

          <!-- 연도 대표 이미지 -->
          <div class="form-group" style="margin:0">
            <label class="form-label">연도 대표 이미지 <span style="color:var(--gray-mid);font-size:12px">(선택, 1장)</span></label>
            <label class="img-upload-label">
              <input type="file" accept="image/*" onchange="HistEdit.previewYearImg(this)">
              이미지 선택
            </label>
            <img id="yearImgPreview" class="item-img-preview" alt="연도 이미지 미리보기" style="width:160px;height:100px">
            <div style="font-size:12px;color:var(--gray-mid);margin-top:4px">
              권장 크기: 800×400px 이상 / JPG·PNG
            </div>
          </div>

        </div>
      </div>

      <!-- 상세 항목 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">상세 항목</span>
          <button class="btn btn-outline btn-sm" onclick="HistEdit.addItem()">+ 항목 추가</button>
        </div>
        <div style="padding:20px">
          <div id="itemList"></div>
          <div id="itemEmpty" style="text-align:center;padding:32px;color:var(--gray-mid);font-size:14px">
            항목이 없습니다. 위의 [+ 항목 추가] 버튼을 눌러 추가하세요.
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-gray" onclick="history.back()">취소</button>
        <button class="btn btn-primary" onclick="HistEdit.save()">저장</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('history');
    /* ── 샘플 데이터 (실제 구현 시 API 교체) */
    const HISTORY_ADMIN_DATA = [
      { year:2026, badge:'현재', img:null, items:[
        { month:'03', text:'제55기 숲해설가 전문가과정 모집 시작', img:null },
        { month:'01', text:'2026년도 정기 이사회 개최, 사업계획 확정', img:null },
      ]},
      { year:2025, badge:'주요연도', img:null, items:[
        { month:'11', text:'제54기 전문가과정 수료식, 수료생 42명 배출', img:null },
        { month:'09', text:'전국 지역 숲해설가 연합 워크숍 개최 (전주)', img:null },
        { month:'04', text:'제53기 전문가과정 수료, 온라인 교육 병행 첫 시행', img:null },
      ]},
      { year:2000, badge:'창립', img:null, items:[
        { month:'06', text:'(사)한국숲해설가협회로 명칭 변경, 산림청 사단법인 등록', img:null },
      ]},
      { year:1998, badge:'설립', img:null, items:[
        { month:'10', text:'자연환경 안내자 협회 창립, 제1회 숲해설가 양성과정 개설', img:null },
      ]},
    ];

    let _itemCounter = 0;

    const HistEdit = {
      _yearData: null,

      init() {
        const yearParam = App.getParam('year');
        if (yearParam) {
          /* 수정 모드 */
          const g = HISTORY_ADMIN_DATA.find(x => String(x.year) === String(yearParam));
          if (g) {
            this._yearData = g;
            document.getElementById('pageTitle').textContent = `연혁 수정 — ${g.year}년`;
            document.getElementById('eYear').value  = g.year;
            document.getElementById('eBadge').value = g.badge || '';
            g.items.forEach(item => this._renderItem(item));
          }
        } else {
          /* 신규 등록 모드 */
          document.getElementById('pageTitle').textContent = '연혁 신규 등록';
        }
        this._updateEmpty();
      },

      addItem(data) {
        this._renderItem(data || { month: '', text: '', img: null });
        this._updateEmpty();
      },

      _renderItem(data) {
        const key  = ++_itemCounter;
        const list = document.getElementById('itemList');
        const div  = document.createElement('div');
        div.className = 'item-row';
        div.id        = `item-${key}`;
        div.innerHTML = `
          <div>
            <label class="form-label" style="font-size:12px">월 <span class="req">*</span></label>
            <select class="form-control" id="iMonth-${key}" style="padding:0 8px">
              <option value="">선택</option>
              ${Array.from({length:12},(_,i)=>`<option value="${String(i+1).padStart(2,'0')}"${data.month===String(i+1).padStart(2,'0')?' selected':''}>${i+1}월</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="form-label" style="font-size:12px">내용 <span class="req">*</span></label>
            <input type="text" class="form-control" id="iText-${key}"
              value="${data.text || ''}" placeholder="항목 내용을 입력하세요" style="margin-bottom:6px">
            <label class="img-upload-label">
              <input type="file" accept="image/*" onchange="HistEdit.previewItemImg(this, ${key})">
              항목 썸네일 이미지 첨부 (선택, 1장)
            </label>
            ${data.img ? `<img id="iImgPreview-${key}" class="item-img-preview" src="${data.img}" style="display:block">` : `<img id="iImgPreview-${key}" class="item-img-preview">`}
          </div>
          <button class="btn btn-danger btn-xs" style="margin-top:20px;flex-shrink:0"
            onclick="HistEdit.removeItem(${key})">삭제</button>`;
        list.appendChild(div);
        this._updateEmpty();
      },

      removeItem(key) {
        const el = document.getElementById(`item-${key}`);
        if (el) el.remove();
        this._updateEmpty();
      },

      _updateEmpty() {
        const empty = document.getElementById('itemEmpty');
        const hasItems = document.getElementById('itemList').children.length > 0;
        if (empty) empty.style.display = hasItems ? 'none' : '';
      },

      previewYearImg(input) {
        const preview = document.getElementById('yearImgPreview');
        if (!preview || !input.files?.[0]) return;
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(input.files[0]);
      },

      previewItemImg(input, key) {
        const preview = document.getElementById(`iImgPreview-${key}`);
        if (!preview || !input.files?.[0]) return;
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(input.files[0]);
      },

      save() {
        const year  = Number(document.getElementById('eYear')?.value);
        const badge = document.getElementById('eBadge')?.value || null;

        if (!year || year < 1990 || year > 2100) {
          App.toast('연도를 올바르게 입력해주세요. (1990~2100)', 'warning');
          return;
        }

        /* 항목 수집 */
        const rows = document.querySelectorAll('#itemList .item-row');
        const items = [];
        let hasError = false;
        rows.forEach(row => {
          const key   = row.id.replace('item-', '');
          const month = document.getElementById(`iMonth-${key}`)?.value || '';
          const text  = document.getElementById(`iText-${key}`)?.value.trim() || '';
          if (!month || !text) { hasError = true; return; }
          items.push({ month, text, img: null });
        });

        if (hasError) { App.toast('모든 항목의 월과 내용을 입력해주세요.', 'warning'); return; }
        if (!items.length) { App.toast('항목을 1개 이상 추가해주세요.', 'warning'); return; }

        App.toast(`${year}년 연혁이 저장되었습니다.`);
        setTimeout(() => location.href = 'history.html', 900);
      },
    };

    HistEdit.init();
  </script>
</body>
</html>
