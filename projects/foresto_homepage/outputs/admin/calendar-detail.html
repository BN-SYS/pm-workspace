<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">일정 상세</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
          <button class="btn btn-danger btn-sm" id="deleteBtn">삭제</button>
          <button class="btn btn-primary btn-sm" id="editBtn">수정하기</button>
        </div>
      </div>

      <div id="detailWrap">
        <div style="text-align:center;padding:60px;color:var(--gray-mid)">일정 정보를 불러오는 중입니다...</div>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/admin-calendar.js"></script>
  <script>
    AdminSidebar.mount('calendar');
    const CalDetail = {
      init() {
        const id = Number(App.getParam('id'));
        const e  = CalAdmin._events?.find(x => x.id === id);

        if (!e) {
          document.getElementById('detailWrap').innerHTML =
            `<div style="text-align:center;padding:60px;color:var(--gray-mid)">일정을 찾을 수 없습니다.<br>
             <a href="calendar.html" style="color:var(--green-dark)">일정 목록으로</a></div>`;
          return;
        }

        const catLabel = CalAdmin.CAT_LABEL?.[e.cat] || e.cat;
        document.getElementById('pageTitle').textContent = `일정 상세`;
        document.getElementById('editBtn').onclick   = () => location.href = `calendar-edit.html?id=${id}`;
        document.getElementById('deleteBtn').onclick = () => {
          if (!confirm('이 일정을 삭제하시겠습니까?')) return;
          CalAdmin._events = CalAdmin._events.filter(x => x.id !== id);
          App.toast('일정이 삭제되었습니다.', 'error');
          setTimeout(() => location.href = 'calendar.html', 900);
        };

        document.getElementById('detailWrap').innerHTML = `
          <div class="card" style="max-width:600px">
            <div class="card-header">
              <span class="card-title">${e.title}</span>
              <span class="badge badge-green">${catLabel}</span>
            </div>
            <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
              <div style="display:grid;grid-template-columns:100px 1fr;gap:12px;align-items:start;font-size:14px">
                <span style="color:var(--gray-mid);font-weight:600">날짜</span>
                <span>${e.date}</span>
                <span style="color:var(--gray-mid);font-weight:600">카테고리</span>
                <span><span class="badge badge-green">${catLabel}</span></span>
                <span style="color:var(--gray-mid);font-weight:600">제목</span>
                <span style="font-weight:700">${e.title}</span>
                <span style="color:var(--gray-mid);font-weight:600">관련 링크</span>
                <span>${e.link
                  ? `<a href="${e.link}" target="_blank" rel="noopener noreferrer"
                       style="color:var(--green-dark);word-break:break-all">${e.link}</a>`
                  : '<span style="color:var(--gray-mid)">없음</span>'}</span>
              </div>
            </div>
          </div>`;
      },
    };

    CalAdmin.init();
    CalDetail.init();
  </script>
</body>
</html>
