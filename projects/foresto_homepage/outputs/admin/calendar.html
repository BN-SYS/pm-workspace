<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* 날짜 범위 힌트 텍스트 */
    .date-hint { font-size: 11px; color: #aabba4; margin-left: 10px; }

    /* 카테고리 배지 */
    .cat-badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 99px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .cat-edu    { background: #e8f5e9; color: #2e7d32; }
    .cat-event  { background: #e3f2fd; color: #1565c0; }
    .cat-club   { background: #fff3e0; color: #e65100; }
    .cat-public { background: #f3e5f5; color: #6a1b9a; }
    .cat-etc    { background: #f5f5f5; color: #616161; }

    /* 일정 링크 셀 */
    .link-cell a {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 12px; color: #1565c0; text-decoration: none;
      padding: 2px 8px; border: 1px solid #90caf9;
      border-radius: 4px; background: #e3f2fd; white-space: nowrap;
    }
    .link-cell a:hover { background: #bbdefb; }

    /* 등록 폼 힌트 */
    .form-hint { font-size: 12px; color: #aabba4; margin-top: 4px; }

    .admin-table tbody tr { cursor: pointer; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">일정관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="CalAdmin.openModal()">+ 일정 등록</button>
        </div>
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 기간 -->
          <div class="filter-row">
            <span class="filter-label">기간</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn" onclick="CalAdmin.setDatePreset('today')">오늘</button>
                <button class="date-preset-btn" onclick="CalAdmin.setDatePreset(7)">7일</button>
                <button class="date-preset-btn" onclick="CalAdmin.setDatePreset(30)">30일</button>
                <button class="date-preset-btn" onclick="CalAdmin.setDatePreset(90)">3개월</button>
                <button class="date-preset-btn" onclick="CalAdmin.setDatePreset(180)">6개월</button>
              </div>
            </div>
          </div>

          <!-- 행 2: 카테고리 -->
          <div class="filter-row">
            <span class="filter-label">카테고리</span>
            <div class="filter-content">
              <div class="chip-group">
                <label class="chip"><input type="radio" name="filterCat" value="" checked><span>전체</span></label>
                <label class="chip"><input type="radio" name="filterCat" value="edu"><span>교육/강좌</span></label>
                <label class="chip"><input type="radio" name="filterCat" value="event"><span>협회행사</span></label>
                <label class="chip"><input type="radio" name="filterCat" value="club"><span>동아리</span></label>
                <label class="chip"><input type="radio" name="filterCat" value="public"><span>사공단</span></label>
                <label class="chip"><input type="radio" name="filterCat" value="etc"><span>기타</span></label>
              </div>
            </div>
          </div>

          <!-- 행 3: 키워드 -->
          <div class="filter-row">
            <span class="filter-label">키워드</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="일정명을 입력하세요"
                    onkeydown="if(event.key==='Enter') CalAdmin.search()">
                </div>
              </div>
            </div>
          </div>

        </div>
        <div class="filter-footer">
          <button class="btn btn-gray btn-sm" onclick="CalAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="CalAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="calCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          onchange="CalAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table" style="table-layout:fixed;width:100%">
          <colgroup>
            <col style="width:34px">   <!-- checkbox -->
            <col style="width:38px">   <!-- No -->
            <col style="width:8%">     <!-- 카테고리 -->
            <col>                      <!-- 일정명 (auto) -->
            <col style="width:8%">     <!-- 일정일 -->
            <col style="width:7%">     <!-- 링크 -->
            <col style="width:8%">     <!-- 작성자 -->
            <col style="width:13%">    <!-- 등록일시 -->
          </colgroup>
          <thead>
            <tr>
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="CalAdmin.toggleAll(this.checked)">
              </th>
              <th>No</th>
              <th>카테고리</th>
              <th style="text-align:center">일정명</th>
              <th>일정일</th>
              <th>링크</th>
              <th>작성자</th>
              <th>등록일시</th>
            </tr>
          </thead>
          <tbody id="calTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="calPagination"></div>

      <!-- ⑤ 하단 버튼 -->
      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDeleteSelected"
          onclick="CalAdmin.deleteSelected()" disabled>선택 삭제</button>
      </div>

    </main>
  </div>

  <!-- 등록/수정 모달 -->
  <div class="modal-overlay" id="calModal">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h3 id="calModalTitle">일정 등록</h3>
        <button class="modal-close" onclick="App.closeModal('calModal')">×</button>
      </div>
      <div class="modal-body">

        <div class="form-group">
          <label class="form-label">카테고리 <span class="req">*</span></label>
          <select class="form-control" id="evtCat">
            <option value="">선택해주세요</option>
            <option value="edu">교육/강좌</option>
            <option value="event">협회행사</option>
            <option value="club">동아리</option>
            <option value="public">사공단</option>
            <option value="etc">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">일정명 <span class="req">*</span></label>
          <input type="text" class="form-control" id="evtTitle" placeholder="일정명을 입력하세요">
        </div>

        <div class="form-group">
          <label class="form-label">일정일 <span class="req">*</span></label>
          <input type="date" class="form-control" id="evtDate">
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">링크 주소 <span style="color:var(--gray-mid);font-size:12px">(선택)</span></label>
          <input type="url" class="form-control" id="evtLink" placeholder="https://...">
          <div class="form-hint">관련 게시물 또는 외부 페이지 URL</div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="App.closeModal('calModal')">취소</button>
        <button class="btn btn-primary" onclick="CalAdmin.save()">저장</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  /* ══════════════════════════════════════
     더미 데이터
     ══════════════════════════════════════ */
  const CAT_META = {
    'edu':    { label: '교육/강좌', cls: 'cat-edu' },
    'event':  { label: '협회행사', cls: 'cat-event' },
    'club':   { label: '동아리',   cls: 'cat-club' },
    'public': { label: '사공단',   cls: 'cat-public' },
    'etc':    { label: '기타',     cls: 'cat-etc' },
  };

  const CAT_KEYS  = ['edu', 'event', 'club', 'public', 'etc'];
  const AUTHORS   = ['관리자A', '관리자B', '관리자A', '관리자B', '관리자A'];
  const TITLES    = [
    '2026 숲해설가 기초과정 개강',
    '봄 정기 협회 총회',
    '동아리 3월 정기모임',
    '사회공헌단 봉사활동',
    '생태해설 심화 워크숍',
    '신입 회원 환영의 날',
    '동아리 야외 활동',
    '사공단 교육 프로그램 운영',
    '5월 가정의 달 행사',
    '숲 생태 탐방 특강',
    '협회 이사회 정기회의',
    '동아리 신규 회원 모집',
    '사공단 2분기 사업 보고',
    '여름 집중 교육과정',
    '창립기념일 행사',
    '생물 다양성 보전 세미나',
    '동아리 가을 등반',
    '사공단 하반기 봉사',
    '2026 연말 시상식',
    '겨울 심화 과정 모집',
    '신년 맞이 협회 신년회',
    '숲 치유 프로그램 시범 운영',
    '사공단 교육 결과 발표',
    '기타 지역 연계 행사',
    '협회 홈페이지 리뉴얼 설명회',
  ];
  const LINKS = [
    'https://foresto.or.kr/courses/1',
    null,
    null,
    'https://foresto.or.kr/notice/12',
    null,
  ];

  let nextId = 3000;
  const ALL_EVENTS = Array.from({ length: 25 }, (_, i) => {
    const year  = 2026;
    const month = String((i % 12) + 1).padStart(2, '0');
    const day   = String((i % 25) + 1).padStart(2, '0');
    const rMonth= String((i % 6) + 1).padStart(2, '0');
    const rDay  = String((i % 20) + 1).padStart(2, '0');
    const rHH   = String((i % 10) + 9).padStart(2, '0');
    const rMM   = String((i * 7) % 60).padStart(2, '0');
    const rSS   = String((i * 13) % 60).padStart(2, '0');
    return {
      id:       nextId++,
      cat:      CAT_KEYS[i % CAT_KEYS.length],
      title:    TITLES[i % TITLES.length],
      date:     `${year}-${month}-${day}`,
      link:     LINKS[i % LINKS.length],
      author:   AUTHORS[i % AUTHORS.length],
      regDate:  `${year}-${rMonth}-${rDay} ${rHH}:${rMM}:${rSS}`,
    };
  }).sort((a, b) => b.date.localeCompare(a.date)); /* 날짜 최신순 */

  /* ══════════════════════════════════════
     CalAdmin
     ══════════════════════════════════════ */
  const CalAdmin = {
    filtered:    [...ALL_EVENTS],
    currentPage: 1,
    pageSize:    10,
    editingId:   null,

    /* 날짜 범위 필터 로직
       - 미선택: 전체
       - 시작일만: 시작일 ~ 오늘
       - 종료일만: 종료일 이전 전체
       - 둘 다: 범위 내 */
    _dateInRange(dateStr, from, to) {
      if (!from && !to) return true;
      const d = new Date(dateStr);
      if (from && !to) {
        const today = new Date();
        today.setHours(23, 59, 59, 999);
        return d >= new Date(from) && d <= today;
      }
      if (!from && to) return d <= new Date(to);
      return d >= new Date(from) && d <= new Date(to);
    },

    search() {
      const from = document.getElementById('filterDateFrom').value;
      const to   = document.getElementById('filterDateTo').value;
      const cat  = document.querySelector('input[name="filterCat"]:checked')?.value || '';
      const kw   = document.getElementById('filterKeyword').value.trim().toLowerCase();

      this.filtered = ALL_EVENTS.filter(e => {
        if (!this._dateInRange(e.date, from, to)) return false;
        if (cat && e.cat !== cat) return false;
        if (kw && !e.title.toLowerCase().includes(kw)) return false;
        return true;
      });
      this.currentPage = 1;
      this.render();
    },

    setDatePreset(range) {
      const to = new Date(), from = new Date();
      if (range !== 'today') from.setDate(from.getDate() - range);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('filterDateFrom').value = fmt(from);
      document.getElementById('filterDateTo').value = fmt(to);
      this.search();
    },

    resetFilter() {
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value   = '';
      document.querySelector('input[name="filterCat"][value=""]').checked = true;
      document.getElementById('filterKeyword').value  = '';
      this.filtered    = [...ALL_EVENTS];
      this.currentPage = 1;
      this.render();
    },

    changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

    toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      this._syncBtns();
    },

    _syncBtns() {
      const any = document.querySelectorAll('.row-chk:checked').length > 0;
      document.getElementById('btnDeleteSelected').disabled = !any;
    },

    _selectedIds() {
      return [...document.querySelectorAll('.row-chk:checked')].map(cb => Number(cb.dataset.id));
    },

    deleteSelected() {
      const ids = this._selectedIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}건의 일정을 삭제하시겠습니까?`)) return;
      ids.forEach(id => {
        const idx = ALL_EVENTS.findIndex(e => e.id === id);
        if (idx > -1) ALL_EVENTS.splice(idx, 1);
      });
      this.search();
      App.toast(`${ids.length}건의 일정이 삭제되었습니다.`, 'error');
    },

    openModal(id = null) {
      this.editingId = id;
      document.getElementById('calModalTitle').textContent = id ? '일정 수정' : '일정 등록';

      if (id) {
        const e = ALL_EVENTS.find(x => x.id === id);
        if (!e) return;
        document.getElementById('evtCat').value   = e.cat;
        document.getElementById('evtTitle').value = e.title;
        document.getElementById('evtDate').value  = e.date;
        document.getElementById('evtLink').value  = e.link || '';
      } else {
        document.getElementById('evtCat').value   = '';
        document.getElementById('evtTitle').value = '';
        document.getElementById('evtDate').value  = '';
        document.getElementById('evtLink').value  = '';
      }
      App.openModal('calModal');
    },

    save() {
      const cat   = document.getElementById('evtCat').value.trim();
      const title = document.getElementById('evtTitle').value.trim();
      const date  = document.getElementById('evtDate').value;
      const link  = document.getElementById('evtLink').value.trim() || null;

      if (!cat)   { App.toast('카테고리를 선택해주세요.', 'error'); return; }
      if (!title) { App.toast('일정명을 입력해주세요.', 'error'); return; }
      if (!date)  { App.toast('일정일을 선택해주세요.', 'error'); return; }

      if (this.editingId) {
        const e = ALL_EVENTS.find(x => x.id === this.editingId);
        if (e) { e.cat = cat; e.title = title; e.date = date; e.link = link; }
        App.toast('일정이 수정되었습니다.', 'success');
      } else {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        ALL_EVENTS.unshift({
          id:      nextId++,
          cat, title, date, link,
          author:  '관리자A',
          regDate: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
        });
        App.toast('일정이 등록되었습니다.', 'success');
      }

      ALL_EVENTS.sort((a, b) => b.date.localeCompare(a.date));
      App.closeModal('calModal');
      this.search();
    },

    render() {
      const total = this.filtered.length;
      const start = (this.currentPage - 1) * this.pageSize;
      const slice = this.filtered.slice(start, start + this.pageSize);

      document.getElementById('calCount').textContent = total.toLocaleString();
      document.getElementById('chkAll').checked = false;
      document.getElementById('btnDeleteSelected').disabled = true;

      document.getElementById('calTableBody').innerHTML = slice.length
        ? slice.map((e, i) => {
            const cm = CAT_META[e.cat] || { label: e.cat, cls: 'cat-etc' };
            return `
            <tr>
              <td class="col-chk">
                <input type="checkbox" class="row-chk" data-id="${e.id}"
                  onchange="CalAdmin._syncBtns()">
              </td>
              <td>${total - start - i}</td>
              <td><span class="cat-badge ${cm.cls}">${cm.label}</span></td>
              <td style="text-align:center;font-weight:500;cursor:pointer"
                onclick="CalAdmin.openModal(${e.id})">${e.title}</td>
              <td class="cell-mono">${e.date}</td>
              <td class="link-cell">${e.link
                ? `<a href="${e.link}" target="_blank" onclick="event.stopPropagation()">링크</a>`
                : `<span style="color:#ccc">—</span>`
              }</td>
              <td>${e.author}</td>
              <td class="cell-mono">${e.regDate}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="8" style="padding:40px;text-align:center;color:#aabba4">검색 결과가 없습니다.</td></tr>`;

      App.renderPagination('calPagination', this.currentPage,
        Math.ceil(total / this.pageSize) || 1,
        p => { this.currentPage = p; this.render(); });
    },
  };

  AdminSidebar.mount('calendar');
  CalAdmin.render();
  </script>
</body>
</html>
