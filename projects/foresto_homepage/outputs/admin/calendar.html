<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">일정관리</h1>
        <button class="btn btn-primary btn-sm" onclick="CalAdmin.openCreateModal()">+ 일정 등록</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
        <!-- 캘린더 -->
        <div class="card" style="padding:0;overflow:hidden">
          <div class="cal-main-nav">
            <button onclick="CalAdmin.changeMonth(-1)">‹</button>
            <h2 id="calAdminTitle">2026년 3월</h2>
            <button onclick="CalAdmin.changeMonth(1)">›</button>
          </div>
          <div class="full-cal-grid" id="adminCalGrid"></div>
        </div>

        <!-- 사이드 -->
        <div>
          <div class="side-card">
            <div style="font-weight:700;color:var(--green-dark);margin-bottom:14px">카테고리 필터</div>
            <div id="adminCatFilter"></div>
          </div>
          <div class="side-card">
            <div style="font-weight:700;color:var(--green-dark);margin-bottom:14px" id="adminEvtDateTitle">이번 달 일정</div>
            <div id="adminEvtList"></div>
          </div>
        </div>
      </div>

      <!-- 전체 일정 목록 -->
      <div class="card" style="margin-top:20px">
        <div class="card-header">
          <span class="card-title">전체 일정 목록</span>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width:50px" class="center">번호</th>
                <th style="width:100px" class="center">날짜</th>
                <th>제목</th>
                <th style="width:90px" class="center">카테고리</th>
                <th style="width:70px" class="center">링크</th>
                <th style="width:110px" class="center">관리</th>
              </tr>
            </thead>
            <tbody id="adminEventTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 일정 등록 모달 — 카테고리(필수) + 제목(필수) + 날짜(필수) + 링크(선택) -->
  <div class="modal-overlay" id="calEventModal">
    <div class="modal" style="max-width:460px">
      <div class="modal-header">
        <h3 id="calEventModalTitle">일정 등록</h3>
        <button class="modal-close" onclick="App.closeModal('calEventModal')">×</button>
      </div>
      <div class="modal-body">

        <div class="form-group">
          <label class="form-label">날짜 <span class="req">*</span></label>
          <input type="date" class="form-control" id="evtDate">
        </div>

        <div class="form-group">
          <label class="form-label">카테고리 <span class="req">*</span></label>
          <select class="form-control" id="evtCat">
            <option value="">선택해주세요</option>
            <option value="edu">교육/강좌</option>
            <option value="activity">사회공헌 활동</option>
            <option value="meeting">협회 회의</option>
            <option value="club">동아리 모임</option>
            <option value="event">행사</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">제목 <span class="req">*</span></label>
          <input type="text" class="form-control" id="evtTitle" placeholder="일정 제목을 입력하세요">
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">관련 링크 <span style="color:var(--gray-mid);font-size:12px">(선택)</span></label>
          <input type="url" class="form-control" id="evtLink" placeholder="https://...">
          <div style="font-size:12px;color:var(--gray-mid);margin-top:4px">
            관련 게시물 또는 외부 페이지 URL을 입력하면 캘린더 클릭 시 이동합니다.
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="App.closeModal('calEventModal')">취소</button>
        <button class="btn btn-primary" onclick="CalAdmin.saveEvent()">저장</button>
      </div>
    </div>
  </div>

  <!-- 일정 상세 모달 -->
  <div class="modal-overlay" id="calDetailModal">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h3 id="calDetailTitle">일정 상세</h3>
        <button class="modal-close" onclick="App.closeModal('calDetailModal')">×</button>
      </div>
      <div class="modal-body" id="calDetailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" onclick="CalAdmin.deleteFromDetail()">삭제</button>
        <div style="flex:1"></div>
        <button class="btn btn-gray" onclick="App.closeModal('calDetailModal')">닫기</button>
        <button class="btn btn-primary" id="calDetailEditBtn">수정</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/admin-calendar.js"></script>
  <script>
    AdminSidebar.mount('calendar');
    CalAdmin.init();
  </script>
</body>
</html>
