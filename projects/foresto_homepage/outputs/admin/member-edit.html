<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 등록/수정 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
    .edit-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .edit-grid.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .edit-grid .span2 { grid-column: span 2; }
    .form-group { margin: 0; display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--gray-dark); }
    .form-label .req { color: var(--danger); margin-left: 2px; }
    .card { margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--gray-light); }
    .card-title { font-size: 14px; font-weight: 700; color: var(--green-dark); }
    .card-body { padding: 20px; }
    .badge-admin-only { display: inline-block; font-size: 11px; background: #fff3e0; color: #e65100; border-radius: 3px; padding: 1px 6px; font-weight: 500; }
    .badge-new-only { display: inline-block; font-size: 11px; background: #e3f2fd; color: #1565c0; border-radius: 3px; padding: 1px 6px; font-weight: 500; }
    .radio-inline { display: flex; gap: 16px; margin-top: 4px; }
    .radio-inline label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
    .radio-inline input[type="radio"] { accent-color: var(--green-dark); }
    .affil-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .affil-table th { font-size: 12px; font-weight: 600; color: var(--gray-dark); padding: 8px 10px; background: #f8faf7; border: 1px solid var(--gray-light); text-align: center; }
    .affil-table td { padding: 6px 8px; border: 1px solid var(--gray-light); }
    .affil-table td select, .affil-table td input { height: 32px; font-size: 12px; }
    .userid-wrap { display: flex; gap: 8px; align-items: center; }
    .check-ok { color: #16a34a; font-size: 12px; font-weight: 600; }
    .check-ng { color: var(--danger); font-size: 12px; font-weight: 600; }
    .pw-wrap { position: relative; }
    .form-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 20px 0; border-top: 1px solid var(--gray-light); margin-top: 8px; }
    select.form-control { padding-top: 7px; padding-bottom: 7px; }
    .affil-table select.form-control { padding-top: 5px; padding-bottom: 5px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">회원 수정 — 김숲해</h1>
      </div>

      <!-- 관리 설정 -->
      <div class="card" data-sb-anno="1:관리 설정 카드 (회원구분·회원상태)">
        <div class="card-header">
          <span class="card-title">관리 설정</span>
          <span class="badge-admin-only">관리자 전용</span>
        </div>
        <div class="card-body">
          <div class="edit-grid col2">
            <div class="form-group">
              <label class="form-label">회원 구분 <span class="req">*</span></label>
              <select class="form-control" id="fGrade" style="height:36px">
                <option value="member">일반회원</option>
                <option value="fullMember" selected>정회원</option>
                <option value="admin">관리자</option>
              </select>
              <div style="font-size:11px;color:var(--gray-mid);margin-top:3px">기본값: 일반회원</div>
            </div>
            <div class="form-group">
              <label class="form-label">회원 상태 <span class="req">*</span></label>
              <div class="radio-inline" style="margin-top:8px">
                <label><input type="radio" name="fStatus" value="active" checked> 정상</label>
                <label><input type="radio" name="fStatus" value="blocked"> 차단</label>
              </div>
              <div style="font-size:11px;color:var(--danger);margin-top:3px">* 차단 시 로그인 불가</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 아이디/비밀번호 (등록 시에만 노출 — 수정 모드에서는 숨김) -->
      <!-- 등록 모드: id="cardUserId" 표시, 수정 모드: display:none -->
      <div class="card" id="cardUserId" style="display:none" data-sb-anno="2:아이디·비밀번호 설정 카드 (등록 시에만 노출)">
        <div class="card-header">
          <span class="card-title">아이디 / 비밀번호 설정</span>
          <span class="badge-new-only">등록 시에만 설정</span>
        </div>
        <div class="card-body">
          <div class="edit-grid col2">
            <div class="form-group">
              <label class="form-label">아이디 <span class="req">*</span></label>
              <div class="userid-wrap">
                <input type="text" class="form-control" id="fUserId" placeholder="영문 소문자, 숫자 4~20자" style="height:36px;flex:1" oninput="resetIdCheck()">
                <button class="btn btn-outline btn-sm" onclick="checkUserId()">중복 확인</button>
              </div>
              <div id="userIdMsg" style="margin-top:4px;font-size:12px"></div>
              <div style="font-size:11px;color:var(--gray-mid);margin-top:3px">아이디는 등록 후 변경 불가합니다.</div>
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 <span class="req">*</span></label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="fPw" placeholder="영문 + 숫자 + 특수문자 8자 이상" style="height:36px" oninput="checkPwMatch()">
              </div>
              <label class="form-label" style="margin-top:10px">비밀번호 확인 <span class="req">*</span></label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="fPwConfirm" placeholder="비밀번호 재입력" style="height:36px" oninput="checkPwMatch()">
              </div>
              <div id="pwMsg" style="margin-top:5px;font-size:12px"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 기본 정보 -->
      <div class="card" data-sb-anno="3:기본 정보 카드 (이름·성별·생년월일·휴대폰)">
        <div class="card-header">
          <span class="card-title">기본 정보</span>
          <span style="font-size:12px;color:var(--gray-mid);margin-left:4px">관리자 등록 시 직접 입력</span>
        </div>
        <div class="card-body">
          <div class="edit-grid col4">
            <div class="form-group">
              <label class="form-label">이름 <span class="req">*</span></label>
              <input type="text" class="form-control" id="fName" value="김숲해" style="height:36px">
            </div>
            <div class="form-group">
              <label class="form-label">성별</label>
              <div class="radio-inline" style="margin-top:8px">
                <label><input type="radio" name="fGender" value="m"> 남성</label>
                <label><input type="radio" name="fGender" value="f" checked> 여성</label>
              </div>
            </div>
            <div class="form-group span2">
              <label class="form-label">생년월일</label>
              <div style="display:flex;gap:6px;align-items:center">
                <select class="form-control" id="fBirthY" style="width:90px;height:36px;font-size:13px"></select>
                <select class="form-control" id="fBirthM" style="width:72px;height:36px;font-size:13px"></select>
                <select class="form-control" id="fBirthD" style="width:72px;height:36px;font-size:13px"></select>
              </div>
            </div>
            <div class="form-group span2">
              <label class="form-label">휴대폰 번호</label>
              <input type="tel" class="form-control" id="fPhone" value="010-1234-5678" style="height:36px;max-width:220px">
            </div>
          </div>
        </div>
      </div>

      <!-- 연락처·기타 정보 -->
      <div class="card" data-sb-anno="4:연락처·기타 정보 카드 (이메일·주소·직업·마케팅동의)">
        <div class="card-header"><span class="card-title">연락처 · 기타 정보</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:18px">
          <div class="form-group" style="max-width:360px">
            <label class="form-label">이메일 <span class="req">*</span></label>
            <input type="email" class="form-control" id="fEmail" value="forest001@foresto.or.kr" style="height:36px">
            <div style="font-size:11px;color:var(--gray-mid);margin-top:3px">임시 비밀번호 발송에 사용됩니다.</div>
          </div>
          <div class="form-group">
            <label class="form-label">주소</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" class="form-control" id="fZip" value="03152" placeholder="우편번호" style="width:110px;height:36px;font-size:13px;flex-shrink:0">
              <button type="button" class="btn btn-outline btn-sm" onclick="alert('우편번호 검색 — 실제 구현 시 Kakao 주소 API 연동 예정')">우편번호 찾기</button>
              <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;white-space:nowrap">
                <input type="checkbox" id="fOverseas" onchange="toggleOverseas(this.checked)"> 해외 거주
              </label>
            </div>
            <input type="text" class="form-control" id="fAddr1" value="서울특별시 종로구 삼청로 00" style="margin-top:6px;max-width:480px;background:var(--gray-light)" disabled>
            <input type="text" class="form-control" id="fAddr2" value="101호" placeholder="상세 주소" style="margin-top:6px;max-width:480px;height:36px">
          </div>
          <div class="form-group">
            <label class="form-label">직업</label>
            <select class="form-control" id="fJob" style="max-width:200px;height:36px;font-size:13px">
              <option value="">선택 안 함</option>
              <option>직장인</option>
              <option>자영업자</option>
              <option selected>공무원·교원</option>
              <option>전문직</option>
              <option>학생</option>
              <option>주부</option>
              <option>은퇴·퇴직</option>
              <option>기타</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">마케팅 수신 동의</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;margin-top:4px">
              <input type="checkbox" id="fMarketing" checked> 동의함
            </label>
          </div>
        </div>
      </div>

      <!-- 활동 정보 (소속) -->
      <div class="card" data-sb-anno="5:활동 정보 카드 — 소속 관리 테이블">
        <div class="card-header"><span class="card-title">활동 정보 (소속)</span></div>
        <div class="card-body">
          <div id="affilList">
            <!-- PHP 연동 시 서버에서 소속 목록 렌더링 -->
            <table class="affil-table">
              <thead>
                <tr>
                  <th style="width:160px">소속 유형</th>
                  <th>소속명</th>
                  <th style="width:150px">가입일</th>
                  <th style="width:48px">관리</th>
                </tr>
              </thead>
              <tbody>
                <tr id="affil-row-1">
                  <td>
                    <select class="form-control" id="affilType-1" onchange="onAffilTypeChange(1)" style="width:100%;height:32px;font-size:12px">
                      <option selected>동아리</option>
                      <option>사회공헌사업단</option>
                    </select>
                  </td>
                  <td>
                    <select class="form-control" id="affilName-1" style="width:100%;height:32px;font-size:12px">
                      <option selected>초록숲 동아리</option>
                      <option>봄내음 동아리</option>
                      <option>산들바람 동아리</option>
                    </select>
                  </td>
                  <td><input type="date" class="form-control" id="affilDate-1" value="2023-06-01" style="height:32px;font-size:12px"></td>
                  <td style="text-align:center"><button type="button" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--danger)" onclick="removeAffil(1)">✕</button></td>
                </tr>
                <!-- PHP: foreach affiliations as affil -->
              </tbody>
            </table>
          </div>
          <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="addAffil()">+ 소속 추가</button>
          <div style="font-size:11px;color:var(--gray-mid);margin-top:6px">
            * 동아리: 콘텐츠관리 &gt; 동아리소개 게시판 목록 연동 | 사회공헌사업단: 사공단소개 게시판 목록 연동
          </div>
        </div>
      </div>

      <!-- 관리자 메모 -->
      <div class="card" data-sb-anno="6:관리자 메모 카드 (회원 미노출)">
        <div class="card-header">
          <span class="card-title">관리자 메모</span>
          <span class="badge-admin-only">회원 미노출</span>
        </div>
        <div class="card-body">
          <textarea class="form-control" id="fMemo" rows="4" placeholder="내부 메모 (회원에게 노출되지 않습니다)" style="font-size:13px;resize:vertical">정회원 전환 요청 확인 완료</textarea>
        </div>
      </div>

      <div class="form-footer" data-sb-anno="7:하단 액션 바 (취소·저장)">
        <button class="btn btn-gray" onclick="history.back()">취소</button>
        <button class="btn btn-primary" onclick="save()">저장</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('members');

    /* 등록/수정 모드 판단 */
    const isEdit = !!App.getParam('id');
    if (!isEdit) {
      document.getElementById('pageTitle').textContent = '회원 등록';
      const cardUid = document.getElementById('cardUserId');
      if (cardUid) cardUid.style.display = '';
    }

    /* 소속 유형별 목록 — 실제 구현 시 콘텐츠관리 게시판 API 연동 */
    const AFFIL_DATA = {
      '동아리':        ['초록숲 동아리','봄내음 동아리','산들바람 동아리','생태탐험대'],
      '사회공헌사업단': ['서울 사공단','경기 사공단','부산 사공단'],
    };

    let affilSeq = 1;

    function addAffil() {
      affilSeq++;
      const tbody = document.querySelector('#affilList tbody');
      if (!tbody) return;
      const tr = document.createElement('tr');
      tr.id = `affil-row-${affilSeq}`;
      tr.innerHTML = `
        <td><select class="form-control" id="affilType-${affilSeq}" onchange="onAffilTypeChange(${affilSeq})" style="width:100%;height:32px;font-size:12px">
          <option>동아리</option><option>사회공헌사업단</option>
        </select></td>
        <td><select class="form-control" id="affilName-${affilSeq}" style="width:100%;height:32px;font-size:12px">
          ${AFFIL_DATA['동아리'].map(n => `<option>${n}</option>`).join('')}
        </select></td>
        <td><input type="date" class="form-control" id="affilDate-${affilSeq}" style="height:32px;font-size:12px"></td>
        <td style="text-align:center"><button type="button" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--danger)" onclick="removeAffil(${affilSeq})">✕</button></td>`;
      tbody.appendChild(tr);
    }

    function removeAffil(id) {
      const row = document.getElementById(`affil-row-${id}`);
      if (row) row.remove();
    }

    function onAffilTypeChange(id) {
      const typeEl = document.getElementById(`affilType-${id}`);
      const nameEl = document.getElementById(`affilName-${id}`);
      if (!typeEl || !nameEl) return;
      const names = AFFIL_DATA[typeEl.value] || [];
      nameEl.innerHTML = names.map(n => `<option>${n}</option>`).join('');
    }

    function checkPwMatch() {
      const pw  = document.getElementById('fPw')?.value || '';
      const pw2 = document.getElementById('fPwConfirm')?.value || '';
      const msg = document.getElementById('pwMsg');
      if (!msg || !pw2) return;
      msg.textContent = pw === pw2 ? '비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.';
      msg.style.color = pw === pw2 ? '#16a34a' : 'var(--danger)';
    }

    let idChecked = false;
    function resetIdCheck() { idChecked = false; const msg = document.getElementById('userIdMsg'); if (msg) msg.textContent = ''; }
    function checkUserId() {
      const userId = document.getElementById('fUserId')?.value.trim() || '';
      const msg = document.getElementById('userIdMsg');
      if (!userId) { alert('아이디를 입력해주세요.'); return; }
      /* TODO: 서버 중복 확인 API 연동 */
      idChecked = true;
      if (msg) { msg.textContent = '사용 가능한 아이디입니다.'; msg.className = 'check-ok'; }
    }

    function toggleOverseas(checked) {
      ['fZip','fAddr2'].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = checked; });
      const a1 = document.getElementById('fAddr1');
      if (a1) a1.style.opacity = checked ? '0.4' : '1';
    }

    function save() {
      const name  = document.getElementById('fName')?.value.trim();
      const email = document.getElementById('fEmail')?.value.trim();
      if (!name)  { alert('이름을 입력해주세요.'); return; }
      if (!email) { alert('이메일을 입력해주세요.'); return; }
      if (!isEdit) {
        const userId = document.getElementById('fUserId')?.value.trim();
        if (!userId)      { alert('아이디를 입력해주세요.'); return; }
        if (!idChecked)   { alert('아이디 중복 확인을 해주세요.'); return; }
        const pw  = document.getElementById('fPw')?.value || '';
        const pw2 = document.getElementById('fPwConfirm')?.value || '';
        if (!pw || pw.length < 8) { alert('비밀번호는 8자 이상 입력해주세요.'); return; }
        if (pw !== pw2)  { alert('비밀번호가 일치하지 않습니다.'); return; }
      }
      /* TODO: POST /admin/api/members (등록) | PUT /admin/api/members/{id} (수정) */
      alert(isEdit ? `${name}님의 정보가 수정되었습니다.` : `${name}님이 등록되었습니다.`);
      setTimeout(() => location.href = 'members.html', 1500);
    }

    /* 생년월일 옵션 생성 */
    (function initBirth() {
      const yEl = document.getElementById('fBirthY');
      const mEl = document.getElementById('fBirthM');
      const dEl = document.getElementById('fBirthD');
      if (yEl) { yEl.innerHTML = '<option value="">년</option>'; for (let y = 2015; y >= 1930; y--) yEl.innerHTML += `<option value="${y}"${y===1985?' selected':''}>${y}년</option>`; }
      if (mEl) { mEl.innerHTML = '<option value="">월</option>'; for (let m = 1; m <= 12; m++) mEl.innerHTML += `<option value="${m}"${m===4?' selected':''}>${m}월</option>`; }
      if (dEl) { dEl.innerHTML = '<option value="">일</option>'; for (let d = 1; d <= 31; d++) dEl.innerHTML += `<option value="${d}"${d===12?' selected':''}>${d}일</option>`; }
    })();
  </script>
</body>
</html>
