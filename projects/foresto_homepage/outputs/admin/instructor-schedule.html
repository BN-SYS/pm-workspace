<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강사 활동 일정관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .period-cell { font-variant-numeric: tabular-nums; color: #111; white-space: nowrap; }
    .admin-table tbody tr { cursor: pointer; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">강사 활동 일정관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="location.href='instructor-schedule-edit.html'">+ 일정 등록</button>
        </div>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 활동일자 -->
          <div class="filter-row">
            <span class="filter-label">활동일자</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn">오늘</button>
                <button class="date-preset-btn">7일</button>
                <button class="date-preset-btn">30일</button>
                <button class="date-preset-btn">3개월</button>
                <button class="date-preset-btn">6개월</button>
              </div>
            </div>
          </div>

          <!-- 행 2: 상태 -->
          <div class="filter-row">
            <span class="filter-label">접수상태</span>
            <div class="filter-content">
              <div class="chip-group" id="statusChips">
                <label class="chip"><input type="radio" name="filterStatus" value="" checked><span>전체</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="ready"><span>준비중</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="open"><span>접수중</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="closed"><span>마감</span></label>
              </div>
            </div>
          </div>

          <!-- 행 3: 검색어 -->
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="일정명 검색">
                </div>
              </div>
            </div>
          </div>

        </div>
        <div class="filter-footer">
          <button class="btn btn-gray btn-sm" onclick="location.reload()">초기화</button>
          <button class="btn btn-primary btn-sm">검색</button>
        </div>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong>3</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:5%">No</th>
              <th>활동명</th>
              <th style="width:10%">활동일자</th>
              <th style="width:20%">접수 기간</th>
              <th style="width:7%">정원</th>
              <th style="width:8%">신청인원</th>
              <th style="width:8%">접수상태</th>
              <th style="width:8%">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="text-align:center">3</td>
              <td style="font-weight:500;cursor:pointer" onclick="location.href='instructor-schedule-edit.html?id=7001'">2026 봄 생태해설 숲 활동</td>
              <td class="period-cell" style="text-align:center">2026-04-15</td>
              <td class="period-cell" style="text-align:center">2026-03-01 ~ 2026-04-10</td>
              <td style="text-align:center">20</td>
              <td style="text-align:center;font-size:13px">12/20</td>
              <td style="text-align:center"><span class="badge badge-danger">마감</span></td>
              <td style="text-align:center">
                <button class="btn btn-outline btn-xs" style="font-size:11px;padding:3px 8px"
                  onclick="event.stopPropagation();location.href='apply-instructor.html?scheduleId=7001'">신청자</button>
                <button class="btn btn-gray btn-xs" style="font-size:11px;padding:3px 8px;margin-left:4px"
                  onclick="event.stopPropagation();location.href='instructor-schedule-edit.html?id=7001'">수정</button>
              </td>
            </tr>
            <tr>
              <td style="text-align:center">2</td>
              <td style="font-weight:500;cursor:pointer" onclick="location.href='instructor-schedule-edit.html?id=7002'">어린이 숲체험 해설 봉사</td>
              <td class="period-cell" style="text-align:center">2026-05-10</td>
              <td class="period-cell" style="text-align:center">2026-04-01 ~ 2026-05-05</td>
              <td style="text-align:center">15</td>
              <td style="text-align:center;font-size:13px">8/15</td>
              <td style="text-align:center"><span class="badge badge-green">접수중</span></td>
              <td style="text-align:center">
                <button class="btn btn-outline btn-xs" style="font-size:11px;padding:3px 8px"
                  onclick="event.stopPropagation();location.href='apply-instructor.html?scheduleId=7002'">신청자</button>
                <button class="btn btn-gray btn-xs" style="font-size:11px;padding:3px 8px;margin-left:4px"
                  onclick="event.stopPropagation();location.href='instructor-schedule-edit.html?id=7002'">수정</button>
              </td>
            </tr>
            <tr>
              <td style="text-align:center">1</td>
              <td style="font-weight:500;cursor:pointer" onclick="location.href='instructor-schedule-edit.html?id=7003'">하반기 도시숲 해설 프로그램</td>
              <td class="period-cell" style="text-align:center">2026-09-20</td>
              <td class="period-cell" style="text-align:center">2026-07-01 ~ 2026-09-10</td>
              <td style="text-align:center">25</td>
              <td style="text-align:center;font-size:13px">0/25</td>
              <td style="text-align:center"><span class="badge badge-gray">준비중</span></td>
              <td style="text-align:center">
                <button class="btn btn-outline btn-xs" style="font-size:11px;padding:3px 8px"
                  onclick="event.stopPropagation();location.href='apply-instructor.html?scheduleId=7003'">신청자</button>
                <button class="btn btn-gray btn-xs" style="font-size:11px;padding:3px 8px;margin-left:4px"
                  onclick="event.stopPropagation();location.href='instructor-schedule-edit.html?id=7003'">수정</button>
              </td>
            </tr>
            <!-- 데이터 없을 때: <tr><td colspan="8" class="td-empty">등록된 일정이 없습니다.</td></tr> -->
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button disabled aria-label="이전">&laquo;</button>
        <button class="active" aria-current="page">1</button>
        <button disabled aria-label="다음">&raquo;</button>
      </div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('instructor-schedule');

  const InstrSchedule = {
    reset() { location.reload(); },
  };
  </script>
</body>
</html>
