<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강좌관리 | 관리자 | 한국숲해설가협회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/pages/admin.css">
</head>

<body class="admin-body">
    <div class="admin-layout">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-head">
                <span class="adm-sb-title">MENU</span>
                <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
            </div>
            <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <h1 class="admin-page-title">강좌관리</h1>
                <button class="btn btn-primary btn-sm" onclick="location.href='course-edit.html'">+ 강좌 개설</button>
            </div>

            <!-- 탭 -->
            <div class="tabs" style="margin-bottom:20px">
                <button class="tab-btn active" onclick="CourseAdmin.switchTab('list',this)">강좌 목록</button>
                <button class="tab-btn" onclick="CourseAdmin.switchTab('apply',this)">신청자 관리</button>
                <button class="tab-btn" onclick="CourseAdmin.switchTab('complete',this)">수료 처리</button>
            </div>

            <!-- 강좌 목록 탭 -->
            <div id="tab-list">
                <div class="admin-filter-bar">
                    <div class="search-field">
                        <label>구분</label>
                        <select class="form-control" id="filterType">
                            <option value="">전체</option>
                            <option value="전문과정">전문과정</option>
                            <option value="시민아카데미">시민아카데미</option>
                            <option value="직무교육">직무교육</option>
                        </select>
                    </div>
                    <div class="search-field">
                        <label>상태</label>
                        <select class="form-control" id="filterStatus">
                            <option value="">전체</option>
                            <option value="open">접수중</option>
                            <option value="ready">접수예정</option>
                            <option value="closed">접수마감</option>
                            <option value="done">수강완료</option>
                        </select>
                    </div>
                    <div class="search-field">
                        <label>강좌명</label>
                        <input type="text" class="form-control" id="filterKeyword" placeholder="강좌명 검색">
                    </div>
                    <button class="btn btn-primary search-btn" onclick="CourseAdmin.search()">검색</button>
                    <button class="btn btn-gray search-btn" onclick="CourseAdmin.resetFilter()">초기화</button>
                </div>

                <div class="list-top">
                    <div class="list-count">총 <strong id="courseCount">0</strong>건</div>
                    <div style="display:flex;gap:8px;align-items:center">
                        <select class="form-control" style="height:34px;width:auto;font-size:13px"
                            onchange="CourseAdmin.changePageSize(+this.value)">
                            <option value="10">10개씩</option>
                            <option value="20">20개씩</option>
                            <option value="50">50개씩</option>
                        </select>
                        <button class="btn btn-gray btn-sm" onclick="CourseAdmin.exportExcel()">엑셀 다운</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width:60px" class="center">번호</th>
                                <th style="width:90px" class="center">구분</th>
                                <th>강좌명</th>
                                <th style="width:110px" class="center">교육일자</th>
                                <th style="width:80px" class="center">신청인원</th>
                                <th style="width:80px" class="center">정원</th>
                                <th style="width:90px" class="center">상태</th>
                                <th style="width:120px" class="center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="coursePagination"></div>
            </div>

            <!-- 신청자 관리 탭 -->
            <div id="tab-apply" style="display:none">
                <div class="admin-filter-bar">
                    <div class="search-field">
                        <label>강좌 선택</label>
                        <select class="form-control" id="applyCourseFilter" style="min-width:200px">
                            <option value="">전체 강좌</option>
                        </select>
                    </div>
                    <div class="search-field">
                        <label>상태</label>
                        <select class="form-control" id="applyStatusFilter">
                            <option value="">전체</option>
                            <option value="pending">검토중</option>
                            <option value="approved">승인</option>
                            <option value="rejected">반려</option>
                            <option value="cancel">취소</option>
                        </select>
                    </div>
                    <div class="search-field">
                        <label>신청자</label>
                        <input type="text" class="form-control" id="applyKeyword" placeholder="이름/이메일 검색">
                    </div>
                    <button class="btn btn-primary search-btn" onclick="CourseAdmin.searchApply()">검색</button>
                </div>

                <div class="list-top">
                    <div class="list-count">총 <strong id="applyCount">0</strong>건</div>
                    <div style="display:flex;gap:8px">
                        <button class="btn btn-gray btn-sm" onclick="CourseAdmin.bulkApprove()">선택 승인</button>
                        <button class="btn btn-danger btn-sm" onclick="CourseAdmin.bulkReject()">선택 반려</button>
                        <button class="btn btn-gray btn-sm" onclick="CourseAdmin.exportApplyExcel()">엑셀 다운</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width:40px" class="center"><input type="checkbox" id="checkAll"
                                        onclick="CourseAdmin.toggleAllCheck(this)"></th>
                                <th style="width:50px" class="center">번호</th>
                                <th>강좌명</th>
                                <th style="width:80px" class="center">신청자</th>
                                <th style="width:120px" class="center">연락처</th>
                                <th style="width:160px" class="center">이메일</th>
                                <th style="width:100px" class="center">신청일</th>
                                <th style="width:90px" class="center">상태</th>
                                <th style="width:120px" class="center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="applyTableBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="applyPagination"></div>
            </div>

            <!-- 수료 처리 탭 -->
            <div id="tab-complete" style="display:none">
                <div class="alert alert-info">수료 처리 후 해당 회원의 마이페이지에서 수료증 발급이 가능합니다.</div>
                <div class="admin-filter-bar">
                    <div class="search-field">
                        <label>강좌 선택</label>
                        <select class="form-control" id="completeCourseFilter" style="min-width:200px">
                            <option value="">강좌 선택</option>
                        </select>
                    </div>
                    <button class="btn btn-primary search-btn" onclick="CourseAdmin.loadCompleteList()">조회</button>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width:40px" class="center"><input type="checkbox" id="completeCheckAll"
                                        onclick="CourseAdmin.toggleCompleteCheck(this)"></th>
                                <th style="width:50px" class="center">번호</th>
                                <th style="width:100px" class="center">신청자</th>
                                <th style="width:130px" class="center">연락처</th>
                                <th style="width:90px" class="center">출석률</th>
                                <th style="width:90px" class="center">수료여부</th>
                                <th style="width:120px" class="center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="completeTableBody">
                            <tr>
                                <td colspan="7" style="text-align:center;padding:32px;color:var(--gray-mid)">강좌를 선택하여
                                    조회하세요.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
                    <button class="btn btn-primary" onclick="CourseAdmin.bulkComplete()">선택 수료 처리</button>
                    <button class="btn btn-gray" onclick="CourseAdmin.exportCompleteExcel()">수료자 명단 다운</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 강좌 개설/수정 모달 -->
    <div class="modal-overlay" id="courseModal">
        <div class="modal" style="max-width:680px">
            <div class="modal-header">
                <h3 id="courseModalTitle">강좌 개설</h3>
                <button class="modal-close" onclick="App.closeModal('courseModal')">×</button>
            </div>
            <div class="modal-body">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div class="form-group">
                        <label class="form-label">구분 <span class="req">*</span></label>
                        <select class="form-control" id="modalCourseType">
                            <option value="">선택</option>
                            <option value="전문과정">전문과정</option>
                            <option value="시민아카데미">시민아카데미</option>
                            <option value="직무교육">직무교육</option>
                            <option value="역량강화">역량강화</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">상태 <span class="req">*</span></label>
                        <select class="form-control" id="modalCourseStatus">
                            <option value="ready">접수예정</option>
                            <option value="open">접수중</option>
                            <option value="closed">접수마감</option>
                            <option value="done">수강완료</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">강좌명 <span class="req">*</span></label>
                    <input type="text" class="form-control" id="modalCourseTitle" placeholder="강좌명을 입력하세요">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
                    <div class="form-group">
                        <label class="form-label">교육 시작일 <span class="req">*</span></label>
                        <input type="date" class="form-control" id="modalCourseFrom">
                    </div>
                    <div class="form-group">
                        <label class="form-label">교육 종료일 <span class="req">*</span></label>
                        <input type="date" class="form-control" id="modalCourseTo">
                    </div>
                    <div class="form-group">
                        <label class="form-label">총 교육시간 <span class="req">*</span></label>
                        <input type="number" class="form-control" id="modalCourseHours" placeholder="시간" min="1">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div class="form-group">
                        <label class="form-label">접수 시작일</label>
                        <input type="date" class="form-control" id="modalApplyFrom">
                    </div>
                    <div class="form-group">
                        <label class="form-label">접수 마감일</label>
                        <input type="date" class="form-control" id="modalApplyTo">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div class="form-group">
                        <label class="form-label">정원</label>
                        <input type="number" class="form-control" id="modalCourseCapacity" placeholder="명" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">수강료</label>
                        <input type="text" class="form-control" id="modalCourseFee" placeholder="무료 or 금액">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">교육 장소</label>
                    <input type="text" class="form-control" id="modalCourseLocation" placeholder="교육 장소를 입력하세요">
                </div>
                <div class="form-group">
                    <label class="form-label">강좌 안내 (신청 시 표시)</label>
                    <textarea class="form-control" id="modalCourseGuide" rows="4"
                        placeholder="수강생에게 표시될 안내 내용을 입력하세요."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-gray" onclick="App.closeModal('courseModal')">취소</button>
                <button class="btn btn-primary" onclick="CourseAdmin.saveCourse()">저장</button>
            </div>
        </div>
    </div>

    <!-- 신청자 상세 모달 -->
    <div class="modal-overlay" id="applyDetailModal">
        <div class="modal" style="max-width:480px">
            <div class="modal-header">
                <h3>신청자 상세</h3>
                <button class="modal-close" onclick="App.closeModal('applyDetailModal')">×</button>
            </div>
            <div class="modal-body" id="applyDetailBody"></div>
            <div class="modal-footer">
                <button class="btn btn-danger btn-sm" onclick="CourseAdmin.rejectApply()">반려</button>
                <button class="btn btn-primary" onclick="CourseAdmin.approveApply()">승인</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/pages/admin.js"></script>
    <script src="../assets/js/pages/admin-courses.js"></script>
    <script>
        AdminSidebar.mount('course-basic');
        CourseAdmin.init();
    </script>
</body>

</html>
