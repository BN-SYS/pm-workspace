<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강좌관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .admin-topbar-left { display: flex; align-items: stretch; flex: 1; min-width: 0; }
    .topbar-tab-divider { width: 1px; background: #e3eadd; margin: 10px 16px; flex-shrink: 0; }
    .admin-topbar.has-tabs { border-bottom: 2px solid #e3eadd; margin-bottom: 16px; align-items: stretch; padding-bottom: 0; }
    .admin-topbar.has-tabs .admin-topbar-actions { display: flex; align-items: center; }
    .admin-topbar.has-tabs .admin-page-title { display: flex; align-items: center; padding-bottom: 2px; }
    .academy-tab-bar { display: flex; gap: 0; align-items: stretch; }
    .academy-tab { min-width: 96px; padding: 0 8px; font-size: 14px; font-weight: 500; color: #7a8e74; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
    .academy-tab:hover { color: #4a7c59; }
    .academy-tab.active { color: #2e5c2e; font-weight: 700; border-bottom-color: #2e5c2e; }
    .period-cell { font-variant-numeric: tabular-nums; color: #111; white-space: nowrap; }
    .admin-table tbody tr { cursor: pointer; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar" id="adminTopbarCourses">
        <div class="admin-topbar-left">
          <h1 class="admin-page-title" id="pageTitle">강좌관리</h1>
          <div id="academyTabBar" style="display:none;align-items:stretch">
            <div class="topbar-tab-divider"></div>
            <div class="academy-tab-bar" id="academyTabs"></div>
          </div>
        </div>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="goCreate()">+ 강좌 등록</button>
        </div>
      </div>

      <div class="filter-card" data-sb-anno="1:검색·필터 영역">
        <div class="filter-body">
          <div class="filter-row">
            <span class="filter-label">교육시작일</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn">오늘</button>
                <button class="date-preset-btn">7일</button>
                <button class="date-preset-btn">30일</button>
                <button class="date-preset-btn">3개월</button>
                <button class="date-preset-btn">6개월</button>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">상태</span>
            <div class="filter-content">
              <div class="chip-group">
                <label class="chip"><input type="radio" name="filterStatus" value="" checked><span>전체</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="준비중"><span>준비중</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="접수중"><span>접수중</span></label>
                <label class="chip"><input type="radio" name="filterStatus" value="접수마감"><span>접수마감</span></label>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">기수</span>
            <div class="filter-content">
              <select id="filterCohort" class="form-control" style="width:130px;height:34px;font-size:13px">
                <option value="">전체</option>
                <option>53기</option>
                <option>54기</option>
                <option>55기</option>
              </select>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">과정명</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="과정명을 입력하세요">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="alert('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.')">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm">초기화</button>
          <button class="btn btn-primary btn-sm">검색</button>
        </div>
      </div>

      <div class="list-top" data-sb-anno="2:목록 상단">
        <div class="list-count">총 <strong>3</strong>건</div>
        <select class="form-control" style="width:130px;height:36px;font-size:13px">
          <option>10개씩 보기</option>
          <option>30개씩 보기</option>
          <option>50개씩 보기</option>
        </select>
      </div>

      <div class="table-wrap" data-sb-anno="3:목록 테이블">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:3%" class="col-chk"><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)"></th>
              <th style="width:4%">No</th>
              <th style="width:7%" class="center">기수</th>
              <th style="text-align:center">과정명</th>
              <th style="width:9%">시작일</th>
              <th style="width:20%">접수기간</th>
              <th style="width:8%">상태</th>
              <th style="width:9%">등록일</th>
            </tr>
          </thead>
          <tbody id="tableBody"><!-- JS render --></tbody>
        </table>
      </div>

      <div class="pagination" data-sb-anno="4:페이지네이션">
        <button disabled aria-label="이전">&laquo;</button>
        <button class="active" aria-current="page">1</button>
        <button disabled aria-label="다음">&raquo;</button>
      </div>

      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDeleteSelected" disabled onclick="deleteSelected()">선택 삭제</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    const SAMPLE_DATA = [
      { id: 1001, no: 3, cohort: '55기', title: '제55기 숲해설가 전문가과정', startDate: '2026-04-01', period: '2026-03-01 09:00 ~ 2026-03-25 18:00', status: '접수중', statusBadge: 'badge-green', regDate: '2026-02-10 14:23:05' },
      { id: 1002, no: 2, cohort: '—', title: '봄 숲 이야기 — 시민아카데미', startDate: '2026-04-15', period: '2026-03-10 09:00 ~ 2026-04-10 18:00', status: '접수중', statusBadge: 'badge-green', regDate: '2026-02-20 09:41:18' },
      { id: 1003, no: 1, cohort: '—', title: '숲해설 심화 — 생태 스토리텔링', startDate: '2026-05-10', period: '2026-04-01 09:00 ~ 2026-04-30 18:00', status: '준비중', statusBadge: 'badge-gray', regDate: '2026-03-05 11:00:44' },
    ];

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="td-empty">등록된 강좌가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(d => `<tr onclick="location.href='course-detail.html?id=${d.id}'">
        <td class="col-chk" onclick="event.stopPropagation()"><input type="checkbox" class="row-chk" data-id="${d.id}" onchange="syncDeleteBtn()"></td>
        <td class="td-muted">${d.no}</td>
        <td class="center" style="font-size:13px">${d.cohort}</td>
        <td style="font-weight:500;text-align:center">${d.title}</td>
        <td class="cell-datetime">${d.startDate}</td>
        <td class="period-cell">${d.period}</td>
        <td><span class="badge ${d.statusBadge}">${d.status}</span></td>
        <td class="td-muted cell-datetime">${d.regDate}</td>
      </tr>`).join('');
    }

    renderTable(SAMPLE_DATA);

    /* URL 파라미터 기반 타입/탭 처리 */
    const COURSE_CONFIG = {
      basic:   { key: 'course-basic',   label: '기초과정 관리' },
      qualify: { key: 'course-qualify', label: '자격취득과정 관리' },
      enhance: { key: 'course-enhance', label: '역량강화 관리' },
      academy: { key: 'course-academy', label: '회원아카데미 관리' },
    };
    const ACADEMY_TABS = [
      { key: 'lecture', label: '특강' },
      { key: 'course',  label: '강좌' },
      { key: 'mentor',  label: '멘토링숲학교' },
    ];

    const params = new URLSearchParams(location.search);
    const type   = params.get('type') || 'basic';
    const config = COURSE_CONFIG[type] || COURSE_CONFIG.basic;
    const activeTab = type === 'academy' ? (params.get('tab') || 'lecture') : null;

    document.title = config.label + ' | 관리자 | 한국숲해설가협회';
    const pageTitle = document.getElementById('pageTitle');
    if (pageTitle) pageTitle.textContent = config.label;
    AdminSidebar.mount(config.key);

    if (type === 'academy') {
      const tabBar = document.getElementById('academyTabBar');
      if (tabBar) tabBar.style.display = 'flex';
      const topbar = document.getElementById('adminTopbarCourses');
      if (topbar) topbar.classList.add('has-tabs');
      const academyTabs = document.getElementById('academyTabs');
      if (academyTabs) {
        academyTabs.innerHTML = ACADEMY_TABS.map(t =>
          `<button class="academy-tab ${t.key === activeTab ? 'active' : ''}"
            onclick="location.href='courses.html?type=academy&tab=${t.key}'">${t.label}</button>`
        ).join('');
      }
    }

    function goCreate() {
      const q = new URLSearchParams(location.search);
      const qs = q.toString();
      location.href = `course-edit.html${qs ? '?' + qs : ''}`;
    }

    function toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      syncDeleteBtn();
    }

    function syncDeleteBtn() {
      const btn = document.getElementById('btnDeleteSelected');
      if (btn) btn.disabled = document.querySelectorAll('.row-chk:checked').length === 0;
    }

    function deleteSelected() {
      const count = document.querySelectorAll('.row-chk:checked').length;
      if (!count) return;
      alert(`${count}건이 삭제되었습니다.`);
    }
  </script>
</body>
</html>
