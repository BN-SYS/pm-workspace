<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="">
  <title>강좌관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .admin-topbar-left { display:flex; align-items:stretch; flex:1; min-width:0; }
    .topbar-tab-divider { width:1px; background:#e3eadd; margin:10px 16px; flex-shrink:0; }
    .admin-topbar.has-tabs { border-bottom:2px solid #e3eadd; margin-bottom:16px; align-items:stretch; padding-bottom:0; }
    .admin-topbar.has-tabs .admin-topbar-actions { display:flex; align-items:center; }
    .admin-topbar.has-tabs .admin-page-title { display:flex; align-items:center; padding-bottom:2px; }
    .academy-tab-bar { display:flex; gap:0; align-items:stretch; }
    .academy-tab { min-width:96px; padding:0 8px; font-size:14px; font-weight:500; color:#7a8e74; cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; font-family:'Noto Sans KR',sans-serif; white-space:nowrap; display:flex; align-items:center; justify-content:center; }
    .academy-tab:hover { color:#4a7c59; }
    .academy-tab.active { color:#2e5c2e; font-weight:700; border-bottom-color:#2e5c2e; }
    .period-cell { font-variant-numeric:tabular-nums; color:#111; white-space:nowrap; }
    .admin-table tbody tr { cursor:pointer; }
  </style>
</head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-head">
      <span class="adm-sb-title">MENU</span>
      <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
    </div>
    <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar" id="adminTopbarCourses">
      <div class="admin-topbar-left">
        <h1 class="admin-page-title" id="pageTitle">강좌관리</h1>
        <div id="academyTabBarWrap" style="display:none;align-items:stretch">
          <div class="topbar-tab-divider"></div>
          <div class="academy-tab-bar" id="academyTabs"></div>
        </div>
      </div>
      <div class="admin-topbar-actions">
        <button class="btn-refresh" onclick="CourseList.load()" title="새로고침">
          <img src="../assets/icons/refresh.png" alt="새로고침">
        </button>
        <button class="btn btn-primary btn-sm" id="btnCreate" onclick="CourseList.goCreate()">+ 강좌 등록</button>
      </div>
    </div>

    <!-- 검색 필터 -->
    <div class="filter-card">
      <div class="filter-body">
        <div class="filter-row">
          <span class="filter-label">교육시작일</span>
          <div class="filter-content">
            <div class="date-pair">
              <input type="date" id="filterDateFrom">
              <span class="date-sep">—</span>
              <input type="date" id="filterDateTo">
            </div>
            <div class="date-preset-group">
              <button class="date-preset-btn" onclick="setDatePreset('today')">오늘</button>
              <button class="date-preset-btn" onclick="setDatePreset(7)">7일</button>
              <button class="date-preset-btn" onclick="setDatePreset(30)">30일</button>
              <button class="date-preset-btn" onclick="setDatePreset(90)">3개월</button>
              <button class="date-preset-btn" onclick="setDatePreset(180)">6개월</button>
            </div>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-label">상태</span>
          <div class="filter-content">
            <div class="chip-group">
              <label class="chip"><input type="radio" name="filterStatus" value="" checked><span>전체</span></label>
              <label class="chip"><input type="radio" name="filterStatus" value="준비중"><span>준비중</span></label>
              <label class="chip"><input type="radio" name="filterStatus" value="접수중"><span>접수중</span></label>
              <label class="chip"><input type="radio" name="filterStatus" value="접수마감"><span>접수마감</span></label>
            </div>
          </div>
        </div>
        <div class="filter-row" id="filterRowCohort">
          <span class="filter-label">기수</span>
          <div class="filter-content">
            <select id="filterCohort" class="form-control"
              style="width:130px;height:34px;font-size:13px">
              <option value="">전체</option>
              <option>53기</option><option>54기</option><option>55기</option>
            </select>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-label">과정명</span>
          <div class="filter-content">
            <div class="kw-wrap">
              <div class="kw-input-wrap">
                <input type="text" id="filterKeyword" placeholder="과정명을 입력하세요"
                  onkeydown="if(event.key==='Enter') CourseList.search()">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="filter-footer">
        <button class="btn btn-outline btn-sm"
          onclick="AdminHttp.downloadExcel(ADMIN_API.courseExcel, CourseList.getParams())">
          엑셀 다운로드
        </button>
        <button class="btn btn-gray btn-sm" onclick="CourseList.reset()">초기화</button>
        <button class="btn btn-primary btn-sm" onclick="CourseList.search()">검색</button>
      </div>
    </div>

    <!-- 목록 상단 -->
    <div class="list-top">
      <div class="list-count" id="listCount">총 <strong>0</strong>건</div>
      <select class="form-control" style="width:130px;height:36px;font-size:13px"
        onchange="CourseList.changePageSize(this.value)">
        <option value="10">10개씩 보기</option>
        <option value="30">30개씩 보기</option>
        <option value="50">50개씩 보기</option>
      </select>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th style="width:3%" class="col-chk">
              <input type="checkbox" id="chkAll"
                onchange="CourseList.toggleAll(this.checked)">
            </th>
            <th style="width:4%">No</th>
            <th style="width:7%" class="center">기수</th>
            <th style="text-align:center">과정명</th>
            <th style="width:9%">시작일</th>
            <th style="width:20%">접수기간</th>
            <th style="width:8%">상태</th>
            <th style="width:9%">등록일</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>

    <div class="table-bottom-bar">
      <button class="btn btn-danger btn-danger-filled btn-sm"
        id="btnDelete" disabled onclick="CourseList.deleteSelected()">선택 삭제</button>
    </div>
  </main>
</div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/components/header.js"></script>
<script src="../assets/js/pages/admin.js"></script>
<script>
'use strict';

/* ──────────────────────────────────────────
   과정 유형별 설정
────────────────────────────────────────── */
const COURSE_CONFIG = {
  basic:      { navKey: 'course-basic',       label: '기초과정 관리',    itemLabel: '강좌', isInstructor: false },
  qualify:    { navKey: 'course-qualify',     label: '자격취득과정 관리', itemLabel: '강좌', isInstructor: false },
  enhance:    { navKey: 'course-enhance',     label: '역량강화 관리',    itemLabel: '강좌', isInstructor: false },
  academy:    { navKey: 'course-academy',     label: '회원아카데미 관리', itemLabel: '강좌', isInstructor: false },
  instructor: { navKey: 'instructor-schedule', label: '강사신청 일정 관리',   itemLabel: '일정', isInstructor: true  },
};

const ACADEMY_TABS = [
  { key: 'lecture', label: '특강' },
  { key: 'course',  label: '강좌' },
  { key: 'mentor',  label: '멘토링숲학교' },
];

const params    = new URLSearchParams(location.search);
const BTYPE     = params.get('type') || 'basic';
const ACTIVE_TAB = BTYPE === 'academy' ? (params.get('tab') || 'lecture') : null;
const CONFIG    = COURSE_CONFIG[BTYPE] || COURSE_CONFIG.basic;

/* ──────────────────────────────────────────
   샘플 데이터
   [개발자] AdminHttp.get(ADMIN_API.courses, params) 응답으로 교체
────────────────────────────────────────── */
const SAMPLE_DATA = {
  total: 8,
  items: [
    { id: 1001, no: 8, cohort: '53기', title: '제53기 숲해설가 기초과정',       startDate: '2025-09-01', period: '2025-08-01 09:00 ~ 2025-08-25 18:00', statusLabel: '접수마감', statusBadge: 'badge-gray',  regDate: '2025-07-01 10:00:00' },
    { id: 1002, no: 7, cohort: '54기', title: '제54기 숲해설가 양성과정',       startDate: '2025-12-01', period: '2025-11-01 09:00 ~ 2025-11-25 18:00', statusLabel: '접수마감', statusBadge: 'badge-gray',  regDate: '2025-10-10 09:00:00' },
    { id: 1003, no: 6, cohort: '—',    title: '겨울 숲 생태 특강',              startDate: '2026-01-15', period: '2025-12-15 09:00 ~ 2026-01-10 18:00', statusLabel: '접수마감', statusBadge: 'badge-gray',  regDate: '2025-12-01 14:00:00' },
    { id: 1004, no: 5, cohort: '55기', title: '제55기 숲해설가 전문가과정',     startDate: '2026-04-01', period: '2026-03-01 09:00 ~ 2026-03-25 18:00', statusLabel: '접수중',   statusBadge: 'badge-green', regDate: '2026-02-10 14:23:05' },
    { id: 1005, no: 4, cohort: '—',    title: '봄 숲 이야기 — 시민아카데미',    startDate: '2026-04-15', period: '2026-03-10 09:00 ~ 2026-04-10 18:00', statusLabel: '접수중',   statusBadge: 'badge-green', regDate: '2026-02-20 09:41:18' },
    { id: 1006, no: 3, cohort: '—',    title: '숲해설 심화 — 생태 스토리텔링',  startDate: '2026-05-10', period: '2026-04-01 09:00 ~ 2026-04-30 18:00', statusLabel: '준비중',   statusBadge: 'badge-gray',  regDate: '2026-03-05 11:00:44' },
    { id: 1007, no: 2, cohort: '—',    title: '여름 숲캠프 리더 양성과정',      startDate: '2026-07-01', period: '2026-05-15 09:00 ~ 2026-06-15 18:00', statusLabel: '준비중',   statusBadge: 'badge-gray',  regDate: '2026-03-20 16:30:00' },
    { id: 1008, no: 1, cohort: '55기', title: '제55기 역량강화 보수교육',       startDate: '2026-08-01', period: '2026-06-01 09:00 ~ 2026-07-15 18:00', statusLabel: '준비중',   statusBadge: 'badge-gray',  regDate: '2026-04-01 09:00:00' },
  ],
};

/* ──────────────────────────────────────────
   CourseList 컨트롤러
────────────────────────────────────────── */
const CourseList = {
  currentPage: 1,
  pageSize:    10,

  getParams() {
    return {
      type:      BTYPE,
      tab:       ACTIVE_TAB || '',
      date_from: document.getElementById('filterDateFrom').value,
      date_to:   document.getElementById('filterDateTo').value,
      status:    document.querySelector('input[name="filterStatus"]:checked')?.value || '',
      cohort:    document.getElementById('filterCohort').value,
      kw:        document.getElementById('filterKeyword').value.trim(),
      page:      this.currentPage,
      size:      this.pageSize,
    };
  },

  search() { this.currentPage = 1; this.load(); },

  async load() {
    AdminUI.showLoading('tableBody', 8);
    try {
      /*
       * [개발자 연동]
       * const data = await AdminHttp.get(ADMIN_API.courses, this.getParams());
       * this.render(data.items, data.total);
       */
      await new Promise(r => setTimeout(r, 200));
      const p = this.getParams();
      let items = SAMPLE_DATA.items.filter(d => {
        if (p.date_from && d.startDate < p.date_from) return false;
        if (p.date_to   && d.startDate > p.date_to)   return false;
        if (p.status && d.statusLabel !== p.status) return false;
        if (p.cohort && d.cohort !== p.cohort) return false;
        if (p.kw && !d.title.toLowerCase().includes(p.kw.toLowerCase())) return false;
        return true;
      });
      const total = items.length;
      const start = (this.currentPage - 1) * this.pageSize;
      this.render(items.slice(start, start + this.pageSize), total);
    } catch (e) {
      AdminUI.showError('tableBody', e.message, 8);
    }
  },

  render(items, total) {
    AdminUI.updateCount('listCount', total);
    const totalPages = Math.ceil(total / this.pageSize) || 1;
    AdminUI.renderPagination('pagination', this.currentPage, totalPages, p => {
      this.currentPage = p; this.load();
    });

    const tbody = document.getElementById('tableBody');
    if (!items.length) {
      AdminUI.showEmpty('tableBody', `등록된 ${CONFIG.itemLabel}가 없습니다.`, 8); return;
    }
    tbody.innerHTML = items.map(d => `
      <tr onclick="location.href='course-detail.html?id=${d.id}&type=${BTYPE}${ACTIVE_TAB ? '&tab=' + ACTIVE_TAB : ''}'">
        <td class="col-chk" onclick="event.stopPropagation()">
          <input type="checkbox" class="row-chk" data-id="${d.id}"
            onchange="CourseList.syncDeleteBtn()">
        </td>
        <td class="td-muted">${d.no}</td>
        <td class="center" style="font-size:13px">${d.cohort}</td>
        <td style="font-weight:500;text-align:center">${d.title}</td>
        <td class="cell-datetime">${d.startDate}</td>
        <td class="period-cell">${d.period}</td>
        <td><span class="badge ${d.statusBadge}">${d.statusLabel}</span></td>
        <td class="td-muted cell-datetime">${d.regDate}</td>
      </tr>`).join('');
  },

  toggleAll(checked) {
    document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
    this.syncDeleteBtn();
  },

  syncDeleteBtn() {
    const any = document.querySelectorAll('.row-chk:checked').length > 0;
    document.getElementById('btnDelete').disabled = !any;
  },

  async deleteSelected() {
    const ids = [...document.querySelectorAll('.row-chk:checked')].map(cb => cb.dataset.id);
    if (!ids.length) return;
    if (!confirm(`선택한 ${ids.length}건을 삭제하시겠습니까?`)) return;
    try {
      /*
       * [개발자 연동]
       * await AdminHttp.post(ADMIN_API.courseDelete, { ids });
       */
      App.toast(`${ids.length}건이 삭제되었습니다.`, 'success');
      this.load();
    } catch (e) {
      App.toast(e.message, 'error');
    }
  },

  changePageSize(size) {
    this.pageSize = parseInt(size); this.currentPage = 1; this.load();
  },

  reset() {
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value   = '';
    document.querySelector('input[name="filterStatus"][value=""]').checked = true;
    document.getElementById('filterCohort').value  = '';
    document.getElementById('filterKeyword').value = '';
    this.currentPage = 1;
    this.load();
  },

  goCreate() {
    const q = new URLSearchParams();
    q.set('type', BTYPE);
    if (ACTIVE_TAB) q.set('tab', ACTIVE_TAB);
    location.href = `course-edit.html?${q.toString()}`;
  },
};

/* ── 페이지 초기화 */
(function init() {
  document.title = `${CONFIG.label} | 관리자 | 한국숲해설가협회`;
  document.getElementById('pageTitle').textContent = CONFIG.label;
  document.getElementById('btnCreate').textContent = `+ ${CONFIG.itemLabel} 등록`;

  /* 강사신청 */

  if (BTYPE === 'academy') {
    document.getElementById('academyTabBarWrap').style.display = 'flex';
    document.getElementById('adminTopbarCourses').classList.add('has-tabs');
    document.getElementById('academyTabs').innerHTML = ACADEMY_TABS.map(t =>
      `<button class="academy-tab ${t.key === ACTIVE_TAB ? 'active' : ''}"
        onclick="location.href='courses.html?type=academy&tab=${t.key}'">${t.label}</button>`
    ).join('');
  }

  AdminSidebar.mount(CONFIG.navKey);
  CourseList.load();
})();
</script>
</body>
</html>
