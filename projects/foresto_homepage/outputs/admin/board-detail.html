<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .detail-card {
      background: #fff;
      border: 1px solid #e3eadd;
      border-radius: 10px;
      overflow: hidden;
    }
    .detail-header {
      padding: 20px 28px;
      border-bottom: 1px solid #e8efe3;
      background: #f8faf6;
    }
    .detail-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a2718;
      margin: 0 0 10px;
      line-height: 1.5;
    }
    .detail-meta {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #7a8e74;
    }
    .detail-meta span strong { color: #444; font-weight: 500; }

    /* 썸네일 안내 */
    .thumb-notice {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #e3f2fd;
      border-bottom: 1px solid #bbdefb;
      font-size: 13px;
      color: #1565c0;
    }
    .thumb-notice img {
      width: 14px; height: 14px;
      filter: invert(22%) sepia(95%) saturate(1500%) hue-rotate(201deg) brightness(90%);
    }
    .thumb-preview {
      width: 80px; height: 56px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #90caf9;
      margin-left: auto;
    }

    /* 본문 */
    .detail-body {
      padding: 28px;
      min-height: 300px;
      font-size: 15px;
      line-height: 1.8;
      color: #2a3a26;
    }
    .detail-body img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; }

    /* 첨부파일 */
    .attach-area {
      padding: 14px 28px;
      border-top: 1px solid #f0f4ee;
      background: #f8faf6;
    }
    .attach-label {
      font-size: 12px; font-weight: 700; color: #7a8e74;
      margin-bottom: 8px; letter-spacing: .04em;
    }
    .file-list { display: flex; flex-direction: column; gap: 4px; }
    .file-item {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; color: #2a5a8a;
      text-decoration: none;
    }
    .file-item:hover { text-decoration: underline; }
    .file-size { color: #aabba4; font-size: 12px; }

    /* 하단 버튼 */
    .detail-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      border-top: 1px solid #e8efe3;
    }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">게시글 상세</h1>
      </div>

      <div class="detail-card" id="detailCard" data-sb-anno="1:게시글 상세 카드">
        <div class="detail-header" data-sb-anno="2:게시글 헤더 (제목·작성자·등록일·조회수)">
          <h2 class="detail-title">2026년 상반기 협회 공지사항</h2>
          <div class="detail-meta">
            <span>작성자: <strong>관리자A</strong></span>
            <span>등록일: <strong>2026-03-15</strong></span>
            <span>조회수: <strong>142</strong></span>
          </div>
        </div>
        <div class="detail-body" data-sb-anno="3:게시글 본문 영역">
          <p>안녕하세요, 한국숲해설가협회입니다.</p>
          <p>이번 게시글은 <strong>관리자가 등록한 내용</strong>입니다. 실제 서비스에서는 스마트에디터2를 통해 작성된 HTML 본문이 표시됩니다.</p>
          <p>본문에는 이미지, 표, 링크 등 다양한 콘텐츠가 포함될 수 있습니다.</p>
          <p>회원 여러분의 많은 관심과 참여를 부탁드립니다. 감사합니다.</p>
        </div>
        <div class="attach-area" data-sb-anno="4:첨부파일 영역">
          <div class="attach-label">첨부파일 (2)</div>
          <div class="file-list">
            <a class="file-item" href="#" onclick="App.toast('파일 다운로드 — 실제 구현 시 연동됩니다.','info');return false;">
              첨부파일_안내문.pdf <span class="file-size">340KB</span>
            </a>
            <a class="file-item" href="#" onclick="App.toast('파일 다운로드 — 실제 구현 시 연동됩니다.','info');return false;">
              동의서_양식.hwp <span class="file-size">128KB</span>
            </a>
          </div>
        </div>
        <div class="detail-footer" data-sb-anno="5:하단 액션 바 (삭제·목록·수정)">
          <button class="btn btn-danger btn-sm"
            onclick="deletePost()">삭제</button>
          <div style="display:flex;gap:8px">
            <button class="btn btn-gray btn-sm"
              onclick="location.href='board.html?type='+BTYPE">목록</button>
            <button class="btn btn-primary btn-sm"
              onclick="location.href='board-edit.html?type='+BTYPE+'&id=5001'">수정</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  const BOARD_CONFIG = {
    notice:        { title: '공지사항', navKey: 'board-notice'       },
    newsletter:    { title: '협회지',   navKey: 'board-newsletter'   },
    press:         { title: '언론보도', navKey: 'board-press'        },
    gallery:       { title: '갤러리',   navKey: 'board-gallery'      },
    'forest-work': { title: '숲일터',   navKey: 'board-forest-work'  },
    region:        { title: '전국지역협회', navKey: 'board-region'   },
    intro:         { title: '사공단소개',   navKey: 'board-intro'    },
    club:          { title: '동아리소개',   navKey: 'board-club'     },
  };

  const BTYPE   = new URLSearchParams(location.search).get('type') || 'notice';
  const BCONFIG = BOARD_CONFIG[BTYPE] || BOARD_CONFIG.notice;

  /* 페이지 타이틀 설정 */
  const pageTitle = document.getElementById('pageTitle');
  if (pageTitle) pageTitle.textContent = BCONFIG.title + ' 상세';
  document.title = BCONFIG.title + ' 상세 | 관리자 | 한국숲해설가협회';

  AdminSidebar.mount(BCONFIG.navKey);

  function deletePost() {
    if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
    App.toast('게시글이 삭제되었습니다. (실제 구현 시 서버 API와 연동됩니다.)', 'error');
    setTimeout(() => { location.href = 'board.html?type=' + BTYPE; }, 800);
  }
  </script>
</body>
</html>
