<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* 제목 링크 */
    .post-title-link { color:#111; text-decoration:none; font-weight:500; }
    .post-title-link:hover { color:#05803e; text-decoration:underline; }
    /* 고정 배지 */
    .pin-badge {
      display:inline-flex; align-items:center;
      font-size:11px; color:#b45309; background:#fef3c7;
      border:1px solid #fcd34d; border-radius:4px; padding:1px 6px;
      vertical-align:middle; font-weight:700;
    }
    /* 고정행 강조 */
    tr.row-pinned { background:#fffbeb; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">게시판관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../../../../common_assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" id="btnCreate">+ 등록</button>
        </div>
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">
          <div class="filter-row">
            <span class="filter-label">키워드</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="제목을 입력하세요"
                    onkeydown="if(event.key==='Enter') BoardAdmin.search()">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-footer">
          <button class="btn btn-gray btn-sm" onclick="BoardAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="BoardAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="boardCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          onchange="BoardAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table" style="table-layout:fixed;width:100%">
          <colgroup>
            <col style="width:34px">
            <col style="width:52px">
            <col>
            <col style="width:8%">
            <col style="width:9%">
            <col style="width:6%">
          </colgroup>
          <thead>
            <tr>
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="BoardAdmin.toggleAll(this.checked)">
              </th>
              <th>No</th>
              <th style="text-align:center">제목</th>
              <th>작성자</th>
              <th>등록일</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody id="boardTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="boardPagination"></div>

      <!-- ⑤ 하단 버튼 -->
      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDeleteSelected"
          onclick="BoardAdmin.deleteSelected()" disabled>선택 삭제</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  /* ══════════════════════════════════════
     게시판 설정
     ══════════════════════════════════════ */
  const BOARD_CONFIG = {
    notice:       { title: '공지사항 관리',  navKey: 'board-notice',       hasThumb: false },
    newsletter:   { title: '협회지 관리',   navKey: 'board-newsletter',   hasThumb: false },
    press:        { title: '언론보도 관리', navKey: 'board-press',        hasThumb: false },
    gallery:      { title: '갤러리 관리',   navKey: 'board-gallery',      hasThumb: true  },
    'forest-work':{ title: '숲일터 관리',   navKey: 'board-forest-work',  hasThumb: false },
    region:  { title: '전국지역협회 관리', navKey: 'board-region',   hasThumb: true  },
    intro:   { title: '사공단소개 관리',   navKey: 'board-intro',    hasThumb: true  },
    club:    { title: '동아리소개 관리',   navKey: 'board-club',     hasThumb: true  },
  };

  const params  = new URLSearchParams(location.search);
  const BTYPE   = params.get('type') || 'notice';
  const BCONFIG = BOARD_CONFIG[BTYPE] || BOARD_CONFIG.notice;

  /* ── 더미 데이터 */
  const AUTHORS = ['관리자A', '관리자B'];
  const NOTICE_TITLES = [
    '2026년 상반기 협회 공지사항', '회원증 갱신 안내', '사무국 이전 안내',
    '개인정보처리방침 개정 안내', '홈페이지 점검 안내', '2026 정기총회 결과 공지',
    '회비 납부 안내', '교육과정 일정 변경 안내', '협회 채용 공고', '기타 안내사항',
  ];
  const REGION_TITLES = [
    '서울특별시 지역협회', '경기도 지역협회', '인천광역시 지역협회',
    '강원도 지역협회', '충청북도 지역협회', '충청남도 지역협회',
    '전라북도 지역협회', '전라남도 지역협회', '경상북도 지역협회', '경상남도 지역협회',
  ];
  const INTRO_TITLES = [
    '사공단 활동 소개 — 1분기', '사공단 봉사 현장 리포트', '2026 사공단 교육 운영 현황',
    '사공단 신규 멤버 모집', '사공단 지역 활동 사례', '사공단 협력기관 소개',
    '사공단 성과 보고서', '사공단 연간 목표 발표', '사공단 우수 사례 공유', '사공단 하반기 계획',
  ];
  const CLUB_TITLES = [
    '숲나들이 동아리 소개', '생태탐구반 활동 소개', '나무이야기 동아리',
    '새소리 탐조 동아리', '버섯 연구 소모임', '약초 동아리 소개',
    '도시숲 가꾸기 모임', '꽃 이야기 동아리', '숲 사진 동아리', '걷기 명상 동아리',
  ];
  const GALLERY_TITLES = [
    '2026 봄 숲해설 현장', '신규 회원 오리엔테이션', '제55기 교육 수료식',
    '정기총회 행사 스케치', '여름 숲캠프 활동', '협회 창립기념 행사',
    '강사 역량강화 교육', '전국지역협회 워크숍', '생태환경 탐방 프로그램', '가을 숲해설 현장',
  ];
  const NEWSLETTER_TITLES = [
    '소식지 2026년 상반기호', '소식지 2025년 하반기호', '소식지 2025년 상반기호',
    '소식지 2024년 하반기호', '소식지 2024년 상반기호', '소식지 2023년 하반기호',
    '소식지 2023년 상반기호', '소식지 2022년 하반기호', '소식지 2022년 상반기호', '소식지 2021년 하반기호',
  ];
  const PRESS_TITLES = [
    '한국숲해설가협회, 산림 생태 교육 확대 나서', '숲해설가 자격증 취득자 3만 명 돌파',
    '도심 속 숲 교육, 어린이 정서 발달에 효과', '한국숲해설가협회, 사회공헌 우수기관 선정',
    '전문 숲해설가 양성 프로그램 인기몰이', '자연과 함께하는 치유 숲 프로그램 주목',
    '숲 교육, 청소년 스트레스 완화에 효과', '협회, 전국 산림 교육 우수기관 시상', '도시 숲 확대 운동 주목', '숲해설 프로그램 수요 급증',
  ];
  const FOREST_WORK_TITLES = [
    '2026 상반기 숲일터 활동 모집 공고', '전국 국립공원 숲해설 파견 안내',
    '서울 도시숲 해설 활동 참가자 모집', '경기도 생태환경 해설 인력 모집',
    '어린이 숲체험 해설 봉사 모집', '지자체 숲해설 파견 인력 모집',
    '2026 숲일터 하반기 활동 공고', '숲일터 신규 참여자 모집', '국립산림과학원 협력 해설사 모집', '숲일터 정기 활동 일정 안내',
  ];
  const TITLE_MAP = { notice: NOTICE_TITLES, newsletter: NEWSLETTER_TITLES, press: PRESS_TITLES, gallery: GALLERY_TITLES, 'forest-work': FOREST_WORK_TITLES, region: REGION_TITLES, intro: INTRO_TITLES, club: CLUB_TITLES };

  let nextId = 5000;
  const ALL_POSTS = Object.keys(BOARD_CONFIG).flatMap(type => {
    const titles = TITLE_MAP[type];
    return titles.map((title, i) => {
      const mm  = String((i % 11) + 1).padStart(2, '0');
      const dd  = String((i % 25) + 1).padStart(2, '0');
      const hh  = String((i % 10) + 9).padStart(2, '0');
      const mi  = String((i * 7) % 60).padStart(2, '0');
      const ss  = String((i * 13) % 60).padStart(2, '0');
      const id = nextId++;
      return {
        id,
        type,
        title,
        author:  AUTHORS[i % AUTHORS.length],
        regDate: `2026-${mm}-${dd} ${hh}:${mi}:${ss}`,
        views:   Math.floor(Math.random() * 300) + 10,
        hasThumb: BOARD_CONFIG[type].hasThumb,
        thumb:   BOARD_CONFIG[type].hasThumb ? `https://picsum.photos/seed/${id}/270/180` : null,
        pinned:  i < 2, /* 모든 게시판 첫 2건 고정 더미 */
      };
    }).sort((a, b) => (b.pinned - a.pinned) || b.regDate.localeCompare(a.regDate));
  });

  /* ══════════════════════════════════════
     BoardAdmin
     ══════════════════════════════════════ */
  const BoardAdmin = {
    filtered:    ALL_POSTS.filter(p => p.type === BTYPE),
    currentPage: 1,
    pageSize:    10,

    search() {
      const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
      this.filtered = ALL_POSTS.filter(p =>
        p.type === BTYPE && (!kw || p.title.toLowerCase().includes(kw))
      );
      this.currentPage = 1;
      this.render();
    },

    resetFilter() {
      document.getElementById('filterKeyword').value = '';
      this.filtered    = ALL_POSTS.filter(p => p.type === BTYPE);
      this.currentPage = 1;
      this.render();
    },

    changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

    toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      this._syncBtns();
    },

    _syncBtns() {
      const any = document.querySelectorAll('.row-chk:checked').length > 0;
      document.getElementById('btnDeleteSelected').disabled = !any;
    },

    _selectedIds() {
      return [...document.querySelectorAll('.row-chk:checked')].map(cb => Number(cb.dataset.id));
    },

    deleteSelected() {
      const ids = this._selectedIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}건을 삭제하시겠습니까?`)) return;
      ids.forEach(id => {
        const idx = ALL_POSTS.findIndex(p => p.id === id);
        if (idx > -1) ALL_POSTS.splice(idx, 1);
      });
      this.search();
      App.toast(`${ids.length}건이 삭제되었습니다.`, 'error');
    },

    goCreate() { location.href = `board-edit.html?type=${BTYPE}`; },

_rowHtml(p, noCell, pinStyle = true) {
      return `
        <tr class="${(pinStyle && p.pinned) ? 'row-pinned' : ''}">
          <td class="col-chk">
            <input type="checkbox" class="row-chk" data-id="${p.id}"
              onchange="BoardAdmin._syncBtns()">
          </td>
          <td>${noCell}</td>
          <td style="text-align:center">
            <a class="post-title-link"
              href="board-detail.html?type=${BTYPE}&id=${p.id}">${p.title}</a>
          </td>
          ${BCONFIG.hasThumb ? `<td style="padding:8px 24px;"><img src="${p.thumb}" alt="" style="width:270px;height:180px;object-fit:cover;border-radius:4px;display:block;"></td>` : ''}
          <td>${p.author}</td>
          <td class="cell-mono">${p.regDate}</td>
          <td class="cell-mono">${p.views.toLocaleString()}</td>
        </tr>`;
    },

    render() {
      document.getElementById('chkAll').checked = false;
      document.getElementById('btnDeleteSelected').disabled = true;

      /* 고정글: 필터 결과 중 pinned=true, 항상 상단 고정 (비페이지네이션) */
      const pinnedPosts = this.filtered.filter(p => p.pinned);

      /* 번호 목록: 고정글 제외 후 날짜 내림차순 페이지네이션 */
      const byDate = this.filtered.filter(p => !p.pinned).sort((a, b) => b.regDate.localeCompare(a.regDate));
      const total  = byDate.length;
      const start  = (this.currentPage - 1) * this.pageSize;
      const slice  = byDate.slice(start, start + this.pageSize);

      document.getElementById('boardCount').textContent = this.filtered.length.toLocaleString();

      const pinnedHtml = pinnedPosts.map(p =>
        this._rowHtml(p, '<span class="pin-badge">고정</span>')
      ).join('');

      const listHtml = slice.length
        ? slice.map((p, i) => this._rowHtml(p, total - start - i, false)).join('')
        : `<tr><td colspan="6" style="padding:40px;text-align:center;color:#aabba4">검색 결과가 없습니다.</td></tr>`;

      document.getElementById('boardTableBody').innerHTML = pinnedHtml + listHtml;

      App.renderPagination('boardPagination', this.currentPage,
        Math.ceil(total / this.pageSize) || 1,
        p => { this.currentPage = p; this.render(); });
    },
  };

  /* 페이지 초기화 */
  document.getElementById('pageTitle').textContent   = BCONFIG.title;
  document.title = BCONFIG.title + ' | 관리자 | 한국숲해설가협회';
  document.getElementById('btnCreate').onclick        = () => BoardAdmin.goCreate();

  AdminSidebar.mount(BCONFIG.navKey);

  /* hasThumb 게시판 — 썸네일 컬럼 동적 삽입 */
  if (BCONFIG.hasThumb) {
    const cg = document.querySelector('.admin-table colgroup');
    const thumbCol = document.createElement('col');
    thumbCol.style.width = '318px'; /* 270 + 좌우 패딩 24*2 */
    cg.insertBefore(thumbCol, cg.children[3]); /* 제목 뒤, 작성자 앞 */

    const tr = document.querySelector('.admin-table thead tr');
    const thumbTh = document.createElement('th');
    thumbTh.textContent = '썸네일';
    tr.insertBefore(thumbTh, tr.children[3]);
  }

  BoardAdmin.render();
  </script>
</body>
</html>
