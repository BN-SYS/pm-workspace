<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="">
  <title>게시판관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .post-title-link {
      color: #111;
      text-decoration: none;
      font-weight: 500;
    }

    .post-title-link:hover {
      color: #05803e;
      text-decoration: underline;
    }

    .pin-badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 4px;
      padding: 1px 6px;
      vertical-align: middle;
      font-weight: 700;
    }

    tr.row-pinned {
      background: #fffbeb;
    }

    .col-thumb {
      width: 80px;
      text-align: center;
      vertical-align: middle;
    }

    .thumb-none {
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>

<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">게시판관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="BoardList.load()" title="새로고침">
            <img src="../assets/icons/refresh.png" alt="새로고침">
          </button>
          <button class="btn btn-primary btn-sm" id="btnCreate">+ 등록</button>
        </div>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">
          <div class="filter-row">
            <span class="filter-label">키워드</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="제목을 입력하세요"
                    onkeydown="if(event.key==='Enter') BoardList.search()">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-footer">
          <button class="btn btn-gray btn-sm" onclick="BoardList.reset()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="BoardList.search()">검색</button>
        </div>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <div class="list-count" id="listCount">총 <strong>0</strong>건</div>
        <select class="form-control" style="width:130px;height:36px;font-size:13px"
          onchange="BoardList.changePageSize(this.value)">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
        <table class="admin-table" style="table-layout:fixed;width:100%">
          <colgroup>
            <col style="width:34px">
            <col style="width:52px">
            <col class="col-thumb" id="thumbCol">
            <col>
            <col style="width:8%">
            <col style="width:9%">
            <col style="width:6%">
          </colgroup>
          <thead>
            <tr>
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="BoardList.toggleAll(this.checked)">
              </th>
              <th>No</th>
              <th class="col-thumb" id="thumbTh">썸네일</th>
              <th style="text-align:center">제목</th>
              <th>작성자</th>
              <th>등록일</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>

      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDelete" disabled
          onclick="BoardList.deleteSelected()">선택 삭제</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    'use strict';

    const BOARD_CONFIG = {
      notice: { title: '공지사항 관리', navKey: 'board-notice', thumb: false },
      newsletter: { title: '협회지 관리', navKey: 'board-newsletter', thumb: true },
      press: { title: '언론보도 관리', navKey: 'board-press', thumb: false },
      gallery: { title: '갤러리 관리', navKey: 'board-gallery', thumb: false },
      'forest-work': { title: '숲일터 관리', navKey: 'board-forest-work', thumb: false },
      region: { title: '전국지역협회 관리', navKey: 'board-region', thumb: true },
      intro: { title: '사공단소개 관리', navKey: 'board-intro', thumb: true },
      club: { title: '동아리소개 관리', navKey: 'board-club', thumb: true },
    };

    const BTYPE = new URLSearchParams(location.search).get('type') || 'notice';
    const BCONFIG = BOARD_CONFIG[BTYPE] || BOARD_CONFIG.notice;

    /* ──────────────────────────────────────────
       샘플 데이터
       [개발자] AdminHttp.get(ADMIN_API.board, { type: BTYPE, ...params }) 응답으로 교체
    ────────────────────────────────────────── */
    const SAMPLE_DATA = {
      total: 8,
      items: [
        { id: 5001, no: '고정', pinned: true,  thumb: false, title: '2026년 상반기 협회 공지사항',        author: '관리자A', regDate: '2026-03-15', views: 142 },
        { id: 5002, no: '고정', pinned: true,  thumb: false, title: '개인정보처리방침 개정 안내',          author: '관리자A', regDate: '2026-03-20', views: 98 },
        { id: 5003, no: 6,     pinned: false, thumb: false, title: '회원증 갱신 안내',                    author: '관리자B', regDate: '2026-03-10', views: 87 },
        { id: 5004, no: 5,     pinned: false, thumb: true,  title: '사무국 이전 안내',                    author: '관리자A', regDate: '2026-02-28', views: 65 },
        { id: 5005, no: 4,     pinned: false, thumb: false, title: '2026년도 정기총회 결과 보고',         author: '관리자A', regDate: '2026-02-15', views: 210 },
        { id: 5006, no: 3,     pinned: false, thumb: true,  title: '숲해설가 우수 활동 사례 공유',        author: '관리자B', regDate: '2026-02-01', views: 55 },
        { id: 5007, no: 2,     pinned: false, thumb: false, title: '겨울 숲캠프 참가자 모집 공고',        author: '관리자A', regDate: '2026-01-20', views: 120 },
        { id: 5008, no: 1,     pinned: false, thumb: false, title: '2025년 하반기 회원 활동 결산 보고서', author: '관리자B', regDate: '2026-01-05', views: 45 },
      ],
    };

    const BoardList = {
      currentPage: 1,
      pageSize: 10,

      getParams() {
        return {
          type: BTYPE,
          kw: document.getElementById('filterKeyword').value.trim(),
          page: this.currentPage,
          size: this.pageSize,
        };
      },

      search() { this.currentPage = 1; this.load(); },

      async load() {
        AdminUI.showLoading('tableBody', 7);
        try {
          /*
           * [개발자 연동]
           * const data = await AdminHttp.get(ADMIN_API.board, this.getParams());
           * this.render(data.items, data.total);
           */
          await new Promise(r => setTimeout(r, 200));
          const p = this.getParams();
          let items = SAMPLE_DATA.items.filter(d => {
            if (p.kw && !d.title.toLowerCase().includes(p.kw.toLowerCase())) return false;
            return true;
          });
          const total = items.length;
          const start = (this.currentPage - 1) * this.pageSize;
          this.render(items.slice(start, start + this.pageSize), total);
        } catch (e) {
          AdminUI.showError('tableBody', e.message, 7);
        }
      },

      render(items, total) {
        AdminUI.updateCount('listCount', total);
        const totalPages = Math.ceil(total / this.pageSize) || 1;
        AdminUI.renderPagination('pagination', this.currentPage, totalPages, p => {
          this.currentPage = p; this.load();
        });

        const tbody = document.getElementById('tableBody');
        if (!items.length) {
          AdminUI.showEmpty('tableBody', '등록된 게시글이 없습니다.', 7); return;
        }
        tbody.innerHTML = items.map(d => `
      <tr class="${d.pinned ? 'row-pinned' : ''}">
        <td class="col-chk">
          <input type="checkbox" class="row-chk" data-id="${d.id}"
            onchange="BoardList.syncDeleteBtn()">
        </td>
        <td>${d.pinned ? '<span class="pin-badge">고정</span>' : d.no}</td>
        <td class="col-thumb">
          ${BCONFIG.thumb
            ? (d.thumb
              ? '<span style="display:inline-block;width:64px;height:48px;border-radius:5px;background:#d4e8d0"></span>'
              : '<span class="thumb-none">-</span>')
            : '<span class="thumb-none">-</span>'}
        </td>
        <td style="text-align:center">
          <a class="post-title-link"
            href="board-detail.html?type=${BTYPE}&id=${d.id}">${d.title}</a>
        </td>
        <td>${d.author}</td>
        <td class="cell-mono">${d.regDate}</td>
        <td class="cell-mono">${d.views}</td>
      </tr>`).join('');
      },

      toggleAll(checked) {
        document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
        this.syncDeleteBtn();
      },

      syncDeleteBtn() {
        const any = document.querySelectorAll('.row-chk:checked').length > 0;
        document.getElementById('btnDelete').disabled = !any;
      },

      async deleteSelected() {
        const ids = [...document.querySelectorAll('.row-chk:checked')].map(cb => cb.dataset.id);
        if (!ids.length) return;
        if (!confirm(`선택한 ${ids.length}건을 삭제하시겠습니까?`)) return;
        try {
          /*
           * [개발자 연동]
           * await AdminHttp.post(ADMIN_API.board + '/bulk-delete', { type: BTYPE, ids });
           */
          App.toast(`${ids.length}건이 삭제되었습니다.`, 'success');
          this.load();
        } catch (e) {
          App.toast(e.message, 'error');
        }
      },

      changePageSize(size) {
        this.pageSize = parseInt(size); this.currentPage = 1; this.load();
      },

      reset() {
        document.getElementById('filterKeyword').value = '';
        this.currentPage = 1;
        this.load();
      },
    };

    /* 페이지 초기화 */
    (function init() {
      document.title = `${BCONFIG.title} | 관리자 | 한국숲해설가협회`;
      document.getElementById('pageTitle').textContent = BCONFIG.title;
      document.getElementById('btnCreate').onclick = () =>
        location.href = `board-edit.html?type=${BTYPE}`;

      /* 썸네일 컬럼 숨김 */
      if (!BCONFIG.thumb) {
        document.getElementById('thumbCol').style.display = 'none';
        document.getElementById('thumbTh').style.display = 'none';
        /* tbody td도 CSS로 숨김 */
        const style = document.createElement('style');
        style.textContent = '.col-thumb { display: none !important; }';
        document.head.appendChild(style);
      }

      AdminSidebar.mount(BCONFIG.navKey);
      BoardList.load();
    })();
  </script>
</body>

</html>
