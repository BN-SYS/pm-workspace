<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* 제목 링크 */
    .post-title-link { color:#111; text-decoration:none; font-weight:500; }
    .post-title-link:hover { color:#05803e; text-decoration:underline; }
    /* 고정 배지 */
    .pin-badge {
      display:inline-flex; align-items:center;
      font-size:11px; color:#b45309; background:#fef3c7;
      border:1px solid #fcd34d; border-radius:4px; padding:1px 6px;
      vertical-align:middle; font-weight:700;
    }
    /* 고정행 강조 */
    tr.row-pinned { background:#fffbeb; }

    /* 썸네일 컬럼 — 협회지/전국지역협회/사공단소개/동아리소개 전용 */
    .col-thumb { width:80px; text-align:center; vertical-align:middle; }
    .thumb-img {
      display: inline-block;
      width: 64px; height: 48px;
      border-radius: 5px;
      background: #d4e8d0;   /* PHP 연동 시 <img> 태그로 교체 */
      object-fit: cover;
      vertical-align: middle;
    }
    .thumb-img.has-img {
      background: none;
      width: 64px; height: 48px;
      border: 1px solid #e3eadd;
    }
    .thumb-none { font-size:11px; color:#bbb; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">게시판관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" id="btnCreate">+ 등록</button>
        </div>
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">
          <div class="filter-row">
            <span class="filter-label">키워드</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="제목을 입력하세요">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-footer">
          <button class="btn btn-gray btn-sm" onclick="location.reload()">초기화</button>
          <button class="btn btn-primary btn-sm">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong>3</strong>건</div>
        <select class="form-control" id="pageSizeSelect"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table" style="table-layout:fixed;width:100%">
          <colgroup>
            <col style="width:34px">
            <col style="width:52px">
            <col class="col-thumb"><!-- 썸네일 컬럼: newsletter/region/intro/club만 노출 -->
            <col>
            <col style="width:8%">
            <col style="width:9%">
            <col style="width:6%">
          </colgroup>
          <thead>
            <tr>
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="BoardAdmin.toggleAll(this.checked)">
              </th>
              <th>No</th>
              <th class="col-thumb">썸네일</th>
              <th style="text-align:center">제목</th>
              <th>작성자</th>
              <th>등록일</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody>
            <!-- 고정글 -->
            <tr class="row-pinned">
              <td class="col-chk"><input type="checkbox" class="row-chk" data-id="5001" onchange="BoardAdmin._syncBtns()"></td>
              <td><span class="pin-badge">고정</span></td>
              <td class="col-thumb">
                <!-- PHP: 에디터 첫 번째 이미지 경로를 src에 삽입. 없으면 thumb-none 노출 -->
                <span class="thumb-img"></span>
              </td>
              <td style="text-align:center"><a class="post-title-link" href="board-detail.html?type=notice&id=5001">2026년 상반기 협회 공지사항</a></td>
              <td>관리자A</td>
              <td class="cell-mono">2026-03-15</td>
              <td class="cell-mono">142</td>
            </tr>
            <!-- 일반글 -->
            <tr>
              <td class="col-chk"><input type="checkbox" class="row-chk" data-id="5002" onchange="BoardAdmin._syncBtns()"></td>
              <td>3</td>
              <td class="col-thumb">
                <span class="thumb-img"></span>
              </td>
              <td style="text-align:center"><a class="post-title-link" href="board-detail.html?type=notice&id=5002">회원증 갱신 안내</a></td>
              <td>관리자B</td>
              <td class="cell-mono">2026-03-10</td>
              <td class="cell-mono">87</td>
            </tr>
            <tr>
              <td class="col-chk"><input type="checkbox" class="row-chk" data-id="5003" onchange="BoardAdmin._syncBtns()"></td>
              <td>2</td>
              <td class="col-thumb">
                <span class="thumb-none">-</span><!-- 이미지 없는 경우 -->
              </td>
              <td style="text-align:center"><a class="post-title-link" href="board-detail.html?type=notice&id=5003">사무국 이전 안내</a></td>
              <td>관리자A</td>
              <td class="cell-mono">2026-02-28</td>
              <td class="cell-mono">65</td>
            </tr>
            <tr>
              <td class="col-chk"><input type="checkbox" class="row-chk" data-id="5004" onchange="BoardAdmin._syncBtns()"></td>
              <td>1</td>
              <td class="col-thumb">
                <span class="thumb-img"></span>
              </td>
              <td style="text-align:center"><a class="post-title-link" href="board-detail.html?type=notice&id=5004">개인정보처리방침 개정 안내</a></td>
              <td>관리자A</td>
              <td class="cell-mono">2026-02-15</td>
              <td class="cell-mono">53</td>
            </tr>
            <!-- 데이터 없을 때: <tr><td colspan="7" class="td-empty">등록된 게시글이 없습니다.</td></tr> -->
          </tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="boardPagination"></div>

      <!-- ⑤ 하단 버튼 -->
      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDeleteSelected"
          onclick="BoardAdmin.deleteSelected()" disabled>선택 삭제</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  const BOARD_CONFIG = {
    notice:       { title: '공지사항 관리',     navKey: 'board-notice',       thumb: false },
    newsletter:   { title: '협회지 관리',        navKey: 'board-newsletter',   thumb: true  },
    press:        { title: '언론보도 관리',      navKey: 'board-press',        thumb: false },
    gallery:      { title: '갤러리 관리',        navKey: 'board-gallery',      thumb: false },
    'forest-work':{ title: '숲일터 관리',        navKey: 'board-forest-work',  thumb: false },
    region:       { title: '전국지역협회 관리',  navKey: 'board-region',       thumb: true  },
    intro:        { title: '사공단소개 관리',    navKey: 'board-intro',        thumb: true  },
    club:         { title: '동아리소개 관리',    navKey: 'board-club',         thumb: true  },
  };

  const BTYPE   = new URLSearchParams(location.search).get('type') || 'notice';
  const BCONFIG = BOARD_CONFIG[BTYPE] || BOARD_CONFIG.notice;

  /* 페이지 타이틀 설정 */
  const pageTitle = document.getElementById('pageTitle');
  if (pageTitle) pageTitle.textContent = BCONFIG.title;
  document.title = BCONFIG.title + ' | 관리자 | 한국숲해설가협회';

  const btnCreate = document.getElementById('btnCreate');
  if (btnCreate) btnCreate.onclick = () => { location.href = 'board-edit.html?type=' + BTYPE; };

  /* 썸네일 컬럼: 해당 게시판 타입이 아니면 숨김 */
  if (!BCONFIG.thumb) {
    document.querySelectorAll('.col-thumb').forEach(el => { el.style.display = 'none'; });
  }

  AdminSidebar.mount(BCONFIG.navKey);

  const BoardAdmin = {
    _syncBtns() {
      const any = document.querySelectorAll('.row-chk:checked').length > 0;
      const btn = document.getElementById('btnDeleteSelected');
      if (btn) btn.disabled = !any;
    },

    toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      this._syncBtns();
    },

    deleteSelected() {
      const ids = [...document.querySelectorAll('.row-chk:checked')];
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}건을 삭제하시겠습니까?`)) return;
      App.toast(`${ids.length}건이 삭제되었습니다. (실제 구현 시 서버 API와 연동됩니다.)`, 'error');
    },

    resetFilter() { location.reload(); },
  };
  </script>
</body>
</html>
