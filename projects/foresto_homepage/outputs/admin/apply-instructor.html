<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강사신청자 관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* 검색 필드 셀렉트 */
    .kw-select {
      height: 34px; padding: 0 28px 0 8px;
      border: 1px solid #d5e0ce; border-radius: 6px;
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26; background: #fafcf9;
      background-image: url('../../../../common_assets/icons/chevron-down.png');
      background-repeat: no-repeat; background-position: right 8px center; background-size: 11px 11px;
      appearance: none; -webkit-appearance: none; outline: none; cursor: pointer;
    }
    .applicant-row:hover td { background: #f2f7f0; cursor: pointer; }
    /* 일정 선택 배너 */
    .schedule-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; margin-bottom: 16px;
      background: #f0f8f0; border: 1px solid #c8e0c8; border-radius: 8px;
      font-size: 13px;
    }
    .schedule-banner strong { color: #2e5c2e; font-size: 14px; }
    .schedule-banner .banner-meta { color: #5a7a5a; }
    .schedule-banner .btn-clear { margin-left: auto; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">강사신청자 관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../../../../common_assets/icons/refresh.png" alt="새로고침"></button>
        </div>
      </div>

      <!-- 선택된 일정 배너 (일정 목록에서 "신청자" 버튼 클릭 시 표시) -->
      <div class="schedule-banner" id="scheduleBanner" style="display:none">
        <div>
          <strong id="bannerTitle"></strong>
          <span class="banner-meta" id="bannerMeta"></span>
        </div>
        <button class="btn btn-gray btn-xs btn-clear" onclick="InstructorApply.clearScheduleFilter()">전체 보기</button>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 일정 선택 -->
          <div class="filter-row">
            <span class="filter-label">활동 일정</span>
            <div class="filter-content">
              <select id="filterSchedule" style="height:34px;padding:0 10px;border:1px solid #d5e0ce;border-radius:6px;font-size:13px;font-family:'Noto Sans KR',sans-serif;min-width:300px;max-width:100%">
                <option value="">전체 일정</option>
              </select>
            </div>
          </div>

          <!-- 행 2: 신청일 -->
          <div class="filter-row">
            <span class="filter-label">신청일</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn" onclick="InstructorApply.setDatePreset('today')">오늘</button>
                <button class="date-preset-btn" onclick="InstructorApply.setDatePreset(7)">7일</button>
                <button class="date-preset-btn" onclick="InstructorApply.setDatePreset(30)">30일</button>
                <button class="date-preset-btn" onclick="InstructorApply.setDatePreset(90)">3개월</button>
                <button class="date-preset-btn" onclick="InstructorApply.setDatePreset(180)">6개월</button>
              </div>
            </div>
          </div>

          <!-- 행 3: 거주지역 / 회원구분 -->
          <div class="filter-row">
            <div class="filter-half">
              <span class="filter-label">거주지역</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterRegion" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterRegion" value="서울"><span>서울</span></label>
                  <label class="chip"><input type="radio" name="filterRegion" value="경기"><span>경기</span></label>
                  <label class="chip"><input type="radio" name="filterRegion" value="인천"><span>인천</span></label>
                  <label class="chip"><input type="radio" name="filterRegion" value="부산"><span>부산</span></label>
                  <label class="chip"><input type="radio" name="filterRegion" value="기타"><span>기타</span></label>
                </div>
              </div>
            </div>
            <div class="filter-half">
              <span class="filter-label">회원구분</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterMemberType" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterMemberType" value="member"><span>회원</span></label>
                  <label class="chip"><input type="radio" name="filterMemberType" value="guest"><span>비회원</span></label>
                </div>
              </div>
            </div>
          </div>

          <!-- 행 4: 검색어 -->
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select id="filterSearchType" class="kw-select">
                  <option value="all">전체</option>
                  <option value="name">이름</option>
                  <option value="email">이메일</option>
                  <option value="phone">연락처</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                    onkeydown="if(event.key==='Enter') InstructorApply.search()">
                </div>
              </div>
            </div>
          </div>

        </div>
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="InstructorApply.exportExcel()">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm" onclick="InstructorApply.reset()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="InstructorApply.search()">검색</button>
        </div>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="applyCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect" onchange="InstructorApply.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
          <option value="100">100개씩 보기</option>
        </select>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:4%">No</th>
              <th style="width:11%">접수번호</th>
              <th style="width:18%">활동 일정</th>
              <th style="width:7%">이름</th>
              <th style="width:7%">회원구분</th>
              <th style="width:7%">거주지역</th>
              <th style="width:11%">연락처</th>
              <th>이메일</th>
              <th style="width:11%">신청일</th>
              <th style="width:11%">관리자 메모</th>
            </tr>
          </thead>
          <tbody id="applyTableBody"></tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="pagination" id="applyPagination"></div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script src="../assets/js/pages/education.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('apply-instructor');

  /* ── 강사신청 일정 목록 (필터 셀렉트 채우기) */
  const INSTR_SCHEDULES_ADMIN = (window.ALL_COURSES_RAW || [])
    .filter(c => c.type === '강사활동')
    .sort((a, b) => b.date.localeCompare(a.date));

  const scheduleSelect = document.getElementById('filterSchedule');
  INSTR_SCHEDULES_ADMIN.forEach(c => {
    const opt = document.createElement('option');
    opt.value = String(c.id);
    opt.textContent = `${c.title.replace('[강사활동] ', '')} (${c.date.slice(0,10)})`;
    scheduleSelect.appendChild(opt);
  });

  /* ── 더미 신청자 데이터 (일정별) */
  const NAMES_I   = ['이초록','박나무','김하늘','최바람','정숲','윤생태','강자연','조청산','신이슬','한나비',
                     '문솔잎','류햇살','백물결','안구름','송봄비','임꽃길','권들판','오숲속','황모래','노파도'];
  const REGIONS_I = ['서울','경기','인천','부산','경기','서울','서울','인천','기타','경기'];

  const ALL_DATA_I = Array.from({ length: 60 }, (_, i) => {
    const scheduleIdx = i % INSTR_SCHEDULES_ADMIN.length;
    const sc = INSTR_SCHEDULES_ADMIN[scheduleIdx];
    const mm  = String(((i % 3) + 1)).padStart(2, '0');
    const dd  = String(((i % 25) + 1)).padStart(2, '0');
    const hh  = String(((i * 2) % 10) + 9).padStart(2, '0');
    const min = String((i * 11) % 60).padStart(2, '0');
    const ss  = String((i * 17) % 60).padStart(2, '0');
    const isMember = i % 3 !== 0;
    return {
      id:         5000 + i,
      applyNo:    `INS-2026-${String(i + 1).padStart(5, '0')}`,
      scheduleId: sc.id,
      scheduleTitle: sc.title,
      name:       NAMES_I[i % NAMES_I.length],
      isMember,
      userId:     isMember ? `ins${5001 + i}` : null,
      email:      `inst${5000 + i}@example.com`,
      phone:      `010-${String(3000 + i).padStart(4, '0')}-${String(7000 + i).padStart(4, '0')}`,
      region:     REGIONS_I[i % REGIONS_I.length],
      applyDate:  `2026-${mm}-${dd}`,
      applyDatetime: `2026-${mm}-${dd} ${hh}:${min}:${ss}`,
      adminMemo:  ['','서류 검토 완료','','활동지역 재확인 필요','','','이력서 요청함','','','연락처 변경 안내','',''][i % 12],
    };
  });

  const InstructorApply = {
    _data:     ALL_DATA_I,
    _filtered: [...ALL_DATA_I],
    _page:     1,
    _pageSize: 10,

    clearScheduleFilter() {
      document.getElementById('filterSchedule').value = '';
      document.getElementById('scheduleBanner').style.display = 'none';
      this.search();
    },

    search() {
      const scheduleId  = document.getElementById('filterSchedule')?.value || '';
      const dateFrom    = document.getElementById('filterDateFrom')?.value || '';
      const dateTo      = document.getElementById('filterDateTo')?.value   || '';
      const region      = document.querySelector('input[name="filterRegion"]:checked')?.value     || '';
      const memberType  = document.querySelector('input[name="filterMemberType"]:checked')?.value || '';
      const kwType      = document.getElementById('filterSearchType')?.value || 'all';
      const keyword     = (document.getElementById('filterKeyword')?.value || '').trim().toLowerCase();

      /* 일정 배너 업데이트 */
      const banner = document.getElementById('scheduleBanner');
      if (scheduleId) {
        const sc = INSTR_SCHEDULES_ADMIN.find(c => String(c.id) === scheduleId);
        if (sc && banner) {
          banner.style.display = 'flex';
          document.getElementById('bannerTitle').textContent = sc.title;
          document.getElementById('bannerMeta').textContent  = ` — 활동일 ${sc.date.slice(0,10)} | 접수기간 ${sc.from} ~ ${sc.to}`;
        }
      } else {
        if (banner) banner.style.display = 'none';
      }

      this._filtered = this._data.filter(d => {
        if (scheduleId && String(d.scheduleId) !== scheduleId) return false;
        if (dateFrom && d.applyDate < dateFrom) return false;
        if (dateTo   && d.applyDate > dateTo)   return false;
        if (region   && d.region !== region)    return false;
        if (memberType === 'member' && !d.isMember) return false;
        if (memberType === 'guest'  &&  d.isMember) return false;
        if (keyword) {
          const m = { name: d.name, email: d.email, phone: d.phone, userId: d.userId || '' };
          if (kwType !== 'all') return (m[kwType] || '').toLowerCase().includes(keyword);
          return Object.values(m).some(v => v.toLowerCase().includes(keyword));
        }
        return true;
      });
      this._page = 1;
      this.render();
    },

    setDatePreset(range) {
      const to = new Date(), from = new Date();
      if (range !== 'today') from.setDate(from.getDate() - range);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('filterDateFrom').value = fmt(from);
      document.getElementById('filterDateTo').value   = fmt(to);
      this.search();
    },

    reset() {
      document.getElementById('filterSchedule').value  = '';
      document.getElementById('filterDateFrom').value  = '';
      document.getElementById('filterDateTo').value    = '';
      document.getElementById('filterKeyword').value   = '';
      document.getElementById('filterSearchType').value = 'all';
      document.querySelector('input[name="filterRegion"][value=""]').checked     = true;
      document.querySelector('input[name="filterMemberType"][value=""]').checked = true;
      const banner = document.getElementById('scheduleBanner');
      if (banner) banner.style.display = 'none';
      this._filtered = [...this._data];
      this._page = 1;
      this.render();
    },

    changePageSize(size) { this._pageSize = size; this._page = 1; this.render(); },

    render() {
      const total = this._filtered.length;
      const start = (this._page - 1) * this._pageSize;
      const slice = this._filtered.slice(start, start + this._pageSize);

      const countEl = document.getElementById('applyCount');
      if (countEl) countEl.textContent = total.toLocaleString();

      const tbody = document.getElementById('applyTableBody');
      if (!tbody) return;

      if (!slice.length) {
        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#8a9e84">검색 결과가 없습니다.</td></tr>`;
        App.renderPagination('applyPagination', 1, 1, () => {});
        return;
      }

      tbody.innerHTML = slice.map((d, i) => {
        const seq = total - start - i;
        const memo = d.adminMemo || '';
        const memoCell = memo
          ? `<span style="font-size:12px;color:#5a7a5a">${memo.length > 10 ? memo.slice(0, 10) + '…' : memo}</span>`
          : `<span style="color:#ccc;font-size:12px">—</span>`;
        const nameCell = d.isMember
          ? `${d.name}<span style="color:#5a7a5a;font-size:12px">(${d.userId})</span>`
          : d.name;
        const memberBadge = d.isMember
          ? `<span class="badge badge-green">회원</span>`
          : `<span class="badge badge-gray">비회원</span>`;
        const scheduleLabel = d.scheduleTitle.replace('[강사활동] ', '');
        return `<tr class="applicant-row" onclick="location.href='apply-instructor-detail.html?id=${d.id}'">
          <td style="text-align:center">${seq}</td>
          <td style="text-align:center;font-size:12px;font-weight:600;color:#2e5c2e">${d.applyNo}</td>
          <td style="font-size:12px;color:#4a7c59">${scheduleLabel}</td>
          <td style="font-weight:600">${nameCell}</td>
          <td style="text-align:center">${memberBadge}</td>
          <td style="text-align:center;font-size:13px">${d.region}</td>
          <td style="text-align:center;font-size:13px" class="cell-datetime">${d.phone}</td>
          <td style="font-size:13px">${d.email}</td>
          <td style="text-align:center;font-size:13px" class="cell-datetime">${d.applyDatetime}</td>
          <td style="text-align:center">${memoCell}</td>
        </tr>`;
      }).join('');

      App.renderPagination(
        'applyPagination', this._page,
        Math.ceil(total / this._pageSize) || 1,
        p => { this._page = p; this.render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
      );
    },

    // TODO: AJAX — window.location.href = ADMIN_API.applyInstructor + '/export?' + new URLSearchParams(currentFilter);
    exportExcel() { App.toast('강사신청 목록 엑셀 다운로드를 시작합니다.', 'info'); },
  };

  /* URL에서 일정 필터 자동 적용 (instructor-schedule.html "신청자" 버튼 클릭 시) */
  const presetScheduleId = App.getParam('scheduleId');
  if (presetScheduleId) {
    const sel = document.getElementById('filterSchedule');
    if (sel) sel.value = presetScheduleId;
  }

  InstructorApply.search();
  </script>
</body>
</html>
