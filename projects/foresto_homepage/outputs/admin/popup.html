<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팝업 관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* 상태 배지 */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap;
    }
    .status-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .status-active    { background: #e8f5e9; color: #2e7d32; }
    .status-active::before    { background: #43a047; }
    .status-scheduled { background: #e3f2fd; color: #1565c0; }
    .status-scheduled::before { background: #1e88e5; }
    .status-ended     { background: #f5f5f5; color: #757575; }
    .status-ended::before     { background: #9e9e9e; }

    /* 순서 버튼 */
    .order-btn {
      background: none; border: 1px solid #d5e0ce; border-radius: 4px;
      width: 26px; height: 22px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; transition: background .12s;
    }
    .order-btn:hover { background: #e8f0e0; }
    .order-btn img { width: 12px; height: 12px; filter: invert(25%) sepia(10%) saturate(800%) hue-rotate(80deg); }
    .order-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* 기간 */
    .period-range { font-size: 12px; line-height: 1.7; color: #3a4836; }
    .period-range small { display: block; color: #8a9e84; font-size: 11px; }

    /* 팝업 미리보기 오버레이 */
    .preview-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 9000;
      align-items: center; justify-content: center;
    }
    .preview-modal-overlay.open { display: flex; }

    /* 팝업 mock */
    .popup-mock {
      background: #fff; border: 1px solid #ccc;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      overflow: hidden; display: flex; flex-direction: column;
      min-width: 240px; min-height: 160px;
      max-width: 90vw; max-height: 85vh;
    }
    .popup-mock-body {
      flex: 1; overflow-y: auto; padding: 16px;
      font-size: 14px; line-height: 1.7; color: #222;
    }
    .popup-mock-body img { max-width: 100%; height: auto; display: block; margin-bottom: 8px; }
    .popup-mock-body.is-linked { cursor: pointer; }
    .popup-mock-body.is-linked:hover { background: #fafff8; }
    .pmb-link-hint { display: block; margin-top: 10px; font-size: 11px; color: #aabba4; text-align: right; }
    .popup-mock-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-top: 1px solid #e0e0e0;
      background: #f8f8f8; flex-shrink: 0;
    }
    .popup-mock-nosh { font-size: 12px; color: #555; display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .popup-mock-nosh input { cursor: pointer; }
    .popup-mock-close {
      font-size: 12px; padding: 4px 14px;
      border: 1px solid #bbb; border-radius: 3px;
      background: #fff; cursor: pointer; color: #333;
    }
    .popup-mock-close:hover { background: #f0f0f0; }
    .preview-close-btn {
      position: absolute; top: 12px; right: 16px;
      font-size: 22px; color: #fff; cursor: pointer; line-height: 1; z-index: 9001;
    }

    /* 필터 탭 */
    .filter-tab {
      font-size: 12px; padding: 4px 14px;
      border: 1px solid #d5e0ce; border-radius: 20px;
      background: #fff; color: #6a7e64; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .filter-tab:hover { background: #f0f7e8; }
    .filter-tab.active { background: #3e6c1e; color: #fff; border-color: #3e6c1e; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">팝업 관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="location.href='popup-edit.html'">+ 등록</button>
        </div>
      </div>

      <!-- 상태 필터 -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:12px;color:#6a7e64;font-weight:700;">상태</span>
        <div style="display:flex;gap:4px;" id="statusFilterBtns">
          <button class="btn btn-sm filter-tab active" data-status="" onclick="PopupAdmin.setFilter('')">전체</button>
          <button class="btn btn-sm filter-tab" data-status="active_scheduled" onclick="PopupAdmin.setFilter('active_scheduled')">노출중+예약</button>
          <button class="btn btn-sm filter-tab" data-status="active"    onclick="PopupAdmin.setFilter('active')">노출중</button>
          <button class="btn btn-sm filter-tab" data-status="scheduled" onclick="PopupAdmin.setFilter('scheduled')">예약</button>
          <button class="btn btn-sm filter-tab" data-status="ended"     onclick="PopupAdmin.setFilter('ended')">종료</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="admin-table" id="popupTable">
          <colgroup>
            <col style="width:56px"> <!-- 순서 -->
            <col style="width:44px"> <!-- No -->
            <col style="width:220px"><!-- 팝업 제목 -->
            <col style="width:190px"><!-- 노출 기간 -->
            <col style="width:100px"><!-- 크기 -->
            <col style="width:100px"><!-- PC 위치 -->
            <col style="width:76px"> <!-- 상태 -->
            <col style="width:174px"><!-- 관리 -->
          </colgroup>
          <thead>
            <tr>
              <th>순서</th>
              <th>No</th>
              <th class="left">팝업 제목 <span style="font-size:10px;color:#8a9e84;font-weight:400;">(관리자용)</span></th>
              <th>노출 기간</th>
              <th>크기 (W×H)</th>
              <th>PC 위치</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="popupTableBody"></tbody>
        </table>
      </div>

      <div id="paginationWrap" style="margin-top:16px;"></div>
    </main>
  </div>

  <!-- 미리보기 오버레이 -->
  <div class="preview-modal-overlay" id="previewOverlay" onclick="PopupAdmin.closePreview(event)">
    <span class="preview-close-btn" onclick="PopupAdmin.closePreview()">×</span>
    <div class="popup-mock" id="previewMock">
      <div class="popup-mock-body" id="previewBody"></div>
      <div class="popup-mock-foot">
        <label class="popup-mock-nosh">
          <input type="checkbox"> 오늘 하루 닫기
        </label>
        <button class="popup-mock-close" onclick="PopupAdmin.closePreview()">닫기</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  const POPUPS = [
    {
      id: 1, order: 1,
      adminTitle: '2026 교육과정 모집 팝업',
      startAt: '2026-03-01 00:00:00', endAt: '2026-04-30 23:59:59',
      width: 400, height: 360, posLeft: 80, posTop: 120,
      imgUrl: 'https://picsum.photos/seed/popup1/400/200',
      content: '<p><strong>2026년 55기 전문가과정 모집</strong></p><p>접수: 2026.03.01 ~ 03.20<br>교육: 2026.04.01 ~ 06.30</p>',
      linkUrl: '/education/course-list.html',
    },
    {
      id: 2, order: 2,
      adminTitle: '봄 특별 행사 안내',
      startAt: '2026-04-01 09:00:00', endAt: '2026-04-15 18:00:00',
      width: 360, height: 300, posLeft: 60, posTop: 100,
      imgUrl: '',
      content: '<p>봄 맞이 <span style="color:#508829;font-weight:700;">숲해설 체험 행사</span>에 여러분을 초대합니다.</p>',
      linkUrl: '',
    },
    {
      id: 3, order: 3,
      adminTitle: '협회 창립기념일 공지',
      startAt: '2025-11-01 00:00:00', endAt: '2025-11-30 23:59:59',
      width: 400, height: 280, posLeft: 120, posTop: 80,
      imgUrl: '',
      content: '<p>협회 창립 20주년을 함께 기념해주세요.</p>',
      linkUrl: '/about',
    },
  ];

  const PopupAdmin = {
    currentPage: 1,
    pageSize: 10,
    filterStatus: '', /* '' = 전체 */

    getStatus(p) {
      const now = new Date(), start = new Date(p.startAt), end = new Date(p.endAt);
      if (now < start) return 'scheduled';
      if (now > end)   return 'ended';
      return 'active';
    },
    statusLabel(s) { return { active: '노출중', scheduled: '예약', ended: '종료' }[s]; },
    statusClass(s) { return { active: 'status-active', scheduled: 'status-scheduled', ended: 'status-ended' }[s]; },

    /* 필터 적용된 목록 */
    getFiltered() {
      if (!this.filterStatus) return POPUPS;
      if (this.filterStatus === 'active_scheduled')
        return POPUPS.filter(p => this.getStatus(p) !== 'ended');
      return POPUPS.filter(p => this.getStatus(p) === this.filterStatus);
    },

    /* 순서 설정 대상: 노출중 + 예약 (종료 제외) */
    getOrderableItems() {
      return POPUPS.filter(p => this.getStatus(p) !== 'ended');
    },

    setFilter(status) {
      this.filterStatus = status;
      this.currentPage  = 1;
      /* 탭 active 클래스 갱신 */
      document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
      });
      this.render();
    },

    render() {
      const source = this.getFiltered();
      const total  = source.length;
      const start  = (this.currentPage - 1) * this.pageSize;
      const slice  = source.slice(start, start + this.pageSize);
      const tbody  = document.getElementById('popupTableBody');
      const orderableItems = this.getOrderableItems();

      if (!slice.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:48px;color:#8a9e84;">해당하는 팝업이 없습니다.</td></tr>`;
        App.renderPagination('paginationWrap', 0, 1, this.pageSize, () => {});
        return;
      }

      tbody.innerHTML = slice.map((p, i) => {
        const st       = this.getStatus(p);
        const no       = total - start - i;
        const isOrderable = st !== 'ended';
        const fullIdx     = POPUPS.indexOf(p);
        const ordIdx      = orderableItems.indexOf(p);
        const isFirst     = ordIdx === 0;
        const isLast      = ordIdx === orderableItems.length - 1;

        /* 순서 버튼: 노출중 + 예약만 표시, 종료는 — */
        const orderCell = isOrderable ? `
          <div style="display:flex;gap:3px;justify-content:center;">
            <button class="order-btn" title="위로"
              onclick="PopupAdmin.moveUpActive(${fullIdx})" ${isFirst ? 'disabled' : ''}>
              <img src="../assets/icons/arrow-sm-up.png" alt="위로">
            </button>
            <button class="order-btn" title="아래로"
              onclick="PopupAdmin.moveDownActive(${fullIdx})" ${isLast ? 'disabled' : ''}>
              <img src="../assets/icons/arrow-sm-down.png" alt="아래로">
            </button>
          </div>` : `<span style="color:#d0d8cc;">—</span>`;

        return `
          <tr>
            <td>${orderCell}</td>
            <td>${no}</td>
            <td class="td-left" style="font-weight:500;">${p.adminTitle}</td>
            <td style="white-space:nowrap;">
              ${p.startAt.slice(0,16)} ~ ${p.endAt.slice(0,16)}
            </td>
            <td>${p.width} × ${p.height} px</td>
            <td>L:${p.posLeft} / T:${p.posTop}</td>
            <td><span class="status-badge ${this.statusClass(st)}">${this.statusLabel(st)}</span></td>
            <td>
              <div style="display:flex;gap:4px;justify-content:center;white-space:nowrap;">
                <button class="btn btn-sm" style="padding:4px 10px;border:1px solid #c8dfa6;background:#f8faf6;color:#3a5a2e;"
                  onclick="PopupAdmin.preview(${p.id})">미리보기</button>
                <button class="btn btn-outline btn-sm" style="padding:4px 10px;"
                  onclick="location.href='popup-edit.html?id=${p.id}'">수정</button>
                <button class="btn btn-danger btn-sm" style="padding:4px 10px;"
                  onclick="PopupAdmin.deletePopup(${p.id})">삭제</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      App.renderPagination('paginationWrap', total, this.currentPage, this.pageSize, (pg) => {
        this.currentPage = pg; this.render();
      });
    },

    /* 노출중·예약 항목끼리 순서 변경 (종료 건 건너뜀) */
    moveUpActive(fullIdx) {
      for (let i = fullIdx - 1; i >= 0; i--) {
        if (this.getStatus(POPUPS[i]) !== 'ended') {
          [POPUPS[i], POPUPS[fullIdx]] = [POPUPS[fullIdx], POPUPS[i]];
          break;
        }
      }
      this.render();
    },

    moveDownActive(fullIdx) {
      for (let i = fullIdx + 1; i < POPUPS.length; i++) {
        if (this.getStatus(POPUPS[i]) !== 'ended') {
          [POPUPS[fullIdx], POPUPS[i]] = [POPUPS[i], POPUPS[fullIdx]];
          break;
        }
      }
      this.render();
    },

    deletePopup(id) {
      if (!confirm('이 팝업을 삭제하시겠습니까?')) return;
      const idx = POPUPS.findIndex(p => p.id === id);
      if (idx > -1) POPUPS.splice(idx, 1);
      this.render();
      App.toast('팝업이 삭제되었습니다.', 'error');
    },

    preview(id) {
      const p = POPUPS.find(x => x.id === id);
      if (!p) return;
      const mock = document.getElementById('previewMock');
      mock.style.width  = p.width  + 'px';
      mock.style.height = p.height + 'px';

      let bodyHtml = '';
      if (p.imgUrl) bodyHtml += `<img src="${p.imgUrl}" alt="">`;
      bodyHtml += p.content;
      const previewBody = document.getElementById('previewBody');
      if (p.linkUrl) {
        previewBody.classList.add('is-linked');
        bodyHtml += `<p style="margin-top:10px;font-size:12px;color:#8a9e84;text-align:right;">클릭 시 이동 →</p>`;
      } else {
        previewBody.classList.remove('is-linked');
      }
      previewBody.innerHTML = bodyHtml;
      document.getElementById('previewOverlay').classList.add('open');
    },

    closePreview(e) {
      if (e && document.getElementById('previewMock').contains(e.target)) return;
      document.getElementById('previewOverlay').classList.remove('open');
    },
  };

  AdminSidebar.mount('site-popup');
  PopupAdmin.render();
  </script>
</body>
</html>
