<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="">
  <title>정회원신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .form-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .form-card-head { padding:14px 20px; border-bottom:1px solid #e3eadd; background:#f8faf6; font-size:13px; font-weight:700; color:#2e5c2e; letter-spacing:.03em; }
    .form-row { display:flex; align-items:stretch; min-height:52px; border-bottom:1px solid #f0f4ee; }
    .form-row:last-child { border-bottom:none; }
    .form-label { width:140px; min-width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; padding:0 12px; text-align:center; }
    .form-content { flex:1; display:flex; align-items:center; padding:12px 16px; gap:10px; flex-wrap:wrap; }
    .form-half { flex:1; display:flex; align-items:center; padding:12px 16px; gap:8px; }
    .form-half + .form-half { border-left:1px solid #f0f4ee; }
    .detail-val { font-size:14px; color:#111; line-height:1.6; }
    .detail-val.mono { font-variant-numeric:tabular-nums; }
    .detail-val.long { line-height:1.8; white-space:pre-line; }
    .detail-val.muted { color:#9aaa94; }
    .account-masked { letter-spacing:1px; color:#555; }
    .account-toggle { font-size:12px; color:var(--green-main); cursor:pointer; text-decoration:underline; margin-left:8px; }
    .detail-bottom-bar { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--gray-light); padding:16px 0 24px; margin-top:4px; }
    .btn-group-right { display:flex; gap:8px; }
    .memo-textarea { width:100%; min-height:100px; padding:12px 14px; border:1px solid #d5e0ce; border-radius:8px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; resize:vertical; box-sizing:border-box; line-height:1.7; }
    .memo-textarea:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .memo-textarea::placeholder { color:#aabba4; }
    .memo-footer { display:flex; justify-content:flex-end; padding:12px 16px 14px; border-top:1px solid #f0f4ee; gap:8px; }
  </style>
</head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-head">
      <span class="adm-sb-title">MENU</span>
      <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
    </div>
    <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">정회원신청 상세</h1>
      <div class="admin-topbar-actions">
        <button class="btn-refresh" onclick="RegularDetail.load()" title="새로고침">
          <img src="../assets/icons/refresh.png" alt="새로고침">
        </button>
      </div>
    </div>

    <div class="admin-content">

      <!-- 기본 정보 -->
      <div class="form-card">
        <div class="form-card-head">기본 정보</div>
        <div class="form-row">
          <div class="form-label">접수번호</div>
          <div class="form-half">
            <span class="detail-val mono" id="dAppNo" style="font-weight:700;color:#2e5c2e">—</span>
          </div>
          <div class="form-label">회원구분</div>
          <div class="form-half" id="dMemberTypeWrap">—</div>
        </div>
        <div class="form-row">
          <div class="form-label">이름</div>
          <div class="form-half">
            <span class="detail-val" id="dName" style="font-weight:600">—</span>
          </div>
          <div class="form-label">생년월일</div>
          <div class="form-half">
            <span class="detail-val mono" id="dBirth">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">연락처</div>
          <div class="form-half">
            <span class="detail-val mono" id="dPhone">—</span>
          </div>
          <div class="form-label">이메일</div>
          <div class="form-half">
            <span class="detail-val" id="dEmail">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">주소</div>
          <div class="form-content">
            <span class="detail-val" id="dAddr">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">신청일시</div>
          <div class="form-content">
            <span class="detail-val mono" id="dApplyDate">—</span>
          </div>
        </div>
      </div>

      <!-- 월 회비 자동이체 계좌 -->
      <div class="form-card">
        <div class="form-card-head">월 회비 자동이체 계좌 정보</div>
        <div class="form-row">
          <div class="form-label">은행명</div>
          <div class="form-half">
            <span class="detail-val" id="dBankName">—</span>
          </div>
          <div class="form-label">예금주</div>
          <div class="form-half">
            <span class="detail-val" id="dAccountHolder">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">계좌번호</div>
          <div class="form-content">
            <span class="detail-val mono account-masked" id="dAccountNo">—</span>
            <span class="account-toggle" id="accountToggleBtn"
              onclick="RegularDetail.toggleAccount()">확인</span>
          </div>
        </div>
      </div>

      <!-- 활동 정보 -->
      <div class="form-card">
        <div class="form-card-head">활동 정보</div>
        <div class="form-row">
          <div class="form-label">현재 활동 여부</div>
          <div class="form-content">
            <span class="detail-val" id="dActStatus">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">소속 기관</div>
          <div class="form-content">
            <span class="detail-val" id="dOrg">—</span>
          </div>
        </div>
      </div>

      <!-- 가입 정보 -->
      <div class="form-card">
        <div class="form-card-head">가입 정보</div>
        <div class="form-row">
          <div class="form-label">가입 경로</div>
          <div class="form-content">
            <span class="detail-val" id="dJoinPath">—</span>
          </div>
        </div>
        <div class="form-row" style="align-items:flex-start">
          <div class="form-label" style="padding-top:14px">가입 동기</div>
          <div class="form-content" style="align-items:flex-start;padding-top:14px;padding-bottom:14px">
            <span class="detail-val long" id="dJoinMotivation">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">개인정보 동의</div>
          <div class="form-content" id="dPrivacyWrap">—</div>
        </div>
      </div>

      <!-- 관리자 메모 -->
      <div class="form-card">
        <div class="form-card-head">관리자 메모</div>
        <div style="padding:16px">
          <textarea class="memo-textarea" id="adminMemo"
            placeholder="관리자 메모를 입력하세요. (신청자에게 표시되지 않습니다)"></textarea>
        </div>
        <div class="memo-footer">
          <button class="btn btn-gray btn-sm" onclick="RegularDetail.clearMemo()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="RegularDetail.saveMemo()">메모 저장</button>
        </div>
      </div>

      <!-- 하단 버튼 -->
      <div class="detail-bottom-bar">
        <div></div>
        <div class="btn-group-right">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/components/header.js"></script>
<script src="../assets/js/pages/admin.js"></script>
<script>
'use strict';

const _id = App.getParam('id');

/* ──────────────────────────────────────────
   샘플 데이터
   [개발자] AdminHttp.get(ADMIN_API.url('applyRegular', _id)) 응답으로 교체
────────────────────────────────────────── */
const SAMPLE_DETAIL = {
  id: 3001,
  appNo: 'REG-2026-00001',
  memberType: '회원', memberBadge: 'badge-green', userId: 'reg3001',
  name: '김숲해설', birth: '1985-01-05',
  phone: '010-1000-2000', email: 'user3001@example.com',
  addr: '서울 도봉구 방학동 123-45',
  applyDate: '2026-01-05 09:00:00',
  bankName: '국민은행', accountHolder: '김숲해설',
  accountNoMasked: '012***-**-***234', accountNoFull: '012345-78-901234',
  actStatus: '활동 중', org: '',
  joinPath: '홈페이지',
  joinMotivation: '협회 활동을 통해 더 많은 분들과 숲의 소중함을 나누고 싶어 정회원에 지원합니다.',
  privacyAgreed: true,
  memo: '',
};

const RegularDetail = {
  data:          null,
  acctVisible:   false,

  async load() {
    try {
      /*
       * [개발자 연동]
       * this.data = await AdminHttp.get(ADMIN_API.url('applyRegular', _id));
       */
      this.data = SAMPLE_DETAIL;
      this.render(this.data);
    } catch (e) {
      App.toast(e.message, 'error');
    }
  },

  render(d) {
    document.getElementById('dAppNo').textContent    = d.appNo;
    document.getElementById('dMemberTypeWrap').innerHTML =
      `<span class="badge ${d.memberBadge}" style="font-size:12px">${d.memberType}</span>
       <span style="font-size:13px;color:#5a7a5a;margin-left:6px">(${d.userId || ''})</span>`;
    document.getElementById('dName').textContent     = d.name;
    document.getElementById('dBirth').textContent    = d.birth;
    document.getElementById('dPhone').textContent    = d.phone;
    document.getElementById('dEmail').textContent    = d.email;
    document.getElementById('dAddr').textContent     = d.addr || '—';
    document.getElementById('dApplyDate').textContent = d.applyDate;
    document.getElementById('dBankName').textContent  = d.bankName;
    document.getElementById('dAccountHolder').textContent = d.accountHolder;
    document.getElementById('dAccountNo').textContent = d.accountNoMasked;
    document.getElementById('dActStatus').textContent = d.actStatus;
    document.getElementById('dOrg').textContent       = d.org || '—';
    document.getElementById('dJoinPath').textContent  = d.joinPath;
    document.getElementById('dJoinMotivation').textContent = d.joinMotivation;
    document.getElementById('dPrivacyWrap').innerHTML = d.privacyAgreed
      ? '<span class="badge badge-green" style="font-size:12px">동의함</span><span style="font-size:12px;color:var(--gray-mid);margin-left:4px">수집·이용 동의 완료</span>'
      : '<span class="detail-val muted">미동의</span>';
    document.getElementById('adminMemo').value = d.memo || '';
  },

  toggleAccount() {
    if (!this.data) return;
    this.acctVisible = !this.acctVisible;
    document.getElementById('dAccountNo').textContent =
      this.acctVisible ? this.data.accountNoFull : this.data.accountNoMasked;
    document.getElementById('accountToggleBtn').textContent =
      this.acctVisible ? '숨기기' : '확인';
  },

  clearMemo() {
    document.getElementById('adminMemo').value = '';
  },

  /* 메모 저장
     [개발자] AdminHttp.post(ADMIN_API.url('applyRegular', _id, 'memo'), { memo }) 로 교체 */
  async saveMemo() {
    const memo = document.getElementById('adminMemo').value;
    try {
      /*
       * [개발자 연동]
       * await AdminHttp.post(ADMIN_API.url('applyRegular', _id, 'memo'), { memo });
       */
      App.toast('관리자 메모가 저장되었습니다.', 'success');
    } catch (e) {
      App.toast(e.message, 'error');
    }
  },
};

AdminSidebar.mount('apply-regular');
RegularDetail.load();
</script>
</body>
</html>
