<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정회원신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .form-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .form-card-head { padding:14px 20px; border-bottom:1px solid #e3eadd; background:#f8faf6; font-size:13px; font-weight:700; color:#2e5c2e; letter-spacing:.03em; }
    .form-row { display:flex; align-items:stretch; min-height:52px; border-bottom:1px solid #f0f4ee; }
    .form-row:last-child { border-bottom:none; }
    .form-label { width:140px; min-width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; padding:0 12px; text-align:center; }
    .form-content { flex:1; display:flex; align-items:center; padding:12px 16px; gap:10px; flex-wrap:wrap; }
    .form-half { flex:1; display:flex; align-items:center; padding:12px 16px; gap:8px; }
    .form-half + .form-half { border-left:1px solid #f0f4ee; }
    .detail-val { font-size:14px; color:#111; line-height:1.6; }
    .detail-val.mono { font-variant-numeric:tabular-nums; }
    .detail-val.long { line-height:1.8; white-space:pre-line; }
    .detail-val.muted { color:#9aaa94; }
    .detail-bottom-bar { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--gray-light); padding:16px 0 24px; margin-top:4px; }
    .btn-group-right { display:flex; gap:8px; }
    /* 관리자 메모 */
    .memo-textarea { width:100%; min-height:100px; padding:12px 14px; border:1px solid #d5e0ce; border-radius:8px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; resize:vertical; box-sizing:border-box; line-height:1.7; }
    .memo-textarea:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .memo-textarea::placeholder { color:#aabba4; }
    .memo-footer { display:flex; justify-content:flex-end; padding:12px 16px 14px; border-top:1px solid #f0f4ee; gap:8px; }
    /* 계좌 마스킹 */
    .account-masked { letter-spacing:1px; color:#555; }
    .account-toggle { font-size:12px; color:var(--green-main); cursor:pointer; text-decoration:underline; margin-left:8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">정회원신청 상세</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
        </div>
      </div>

      <div class="admin-content" id="detailContent">
        <!-- JS 렌더링 -->
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('apply-regular');

  /* ── 더미 데이터 (사용자 폼 필드 기준) */
  const NAMES_R     = ['김숲해설','이초록','박자연','최나무','정바람','윤하늘','강숲속','조생태','신나뭇잎','한자연',
                       '문청산','류이슬','백솔밭','안햇살','송나비','임물결','권하늘','오구름','황봄비','노꽃길'];
  const ADDRESSES_R = [
    { zip:'01234', addr1:'서울특별시 도봉구 방학로 123', addr2:'101동 405호' },
    { zip:'13561', addr1:'경기도 성남시 분당구 정자일로 456', addr2:'' },
    { zip:'03921', addr1:'서울특별시 마포구 상암동 890', addr2:'302호' },
    { zip:'21565', addr1:'인천광역시 남동구 구월동 234-56', addr2:'' },
    { zip:'10351', addr1:'경기도 고양시 일산동구 마두동 78-9', addr2:'빌라 2층' },
    { zip:'48058', addr1:'부산광역시 해운대구 해운대해변로 264', addr2:'' },
    { zip:'06234', addr1:'서울특별시 강남구 역삼동 567-8', addr2:'203호' },
    { zip:'42182', addr1:'대구광역시 수성구 범어동 321', addr2:'' },
    { zip:'16489', addr1:'경기도 수원시 영통구 매탄동 98-1', addr2:'가동 301호' },
    { zip:'05505', addr1:'서울특별시 송파구 잠실동 204-3', addr2:'' },
  ];
  const ACT_STATUSES_R = ['활동 중','활동 예정','미활동','활동 중','활동 중','활동 예정','미활동','활동 중','활동 예정','활동 중'];
  const ORGS_R         = ['도봉구청 환경과','','분당자연학교','','일산숲사랑모임','','국립수목원 교육팀','','','수원시 환경재단'];
  const JOIN_PATHS_R   = [
    ['홈페이지'],
    ['지인 추천'],
    ['교육 과정'],
    ['기타'],
    ['홈페이지','지인 추천'],
    ['교육 과정','홈페이지'],
    ['홈페이지'],
    ['지인 추천','교육 과정'],
    ['홈페이지'],
    ['기타'],
  ];
  const JOIN_PATH_ETC  = ['', '', '', '유튜브 영상', '', '', '', '', '', '블로그 검색'];
  const BANKS_R        = ['국민은행','신한은행','우리은행','하나은행','농협은행','기업은행','카카오뱅크','토스뱅크','국민은행','신한은행'];
  const MOTIVES_R      = [
    '협회 활동을 통해 더 많은 분들과 숲의 소중함을 나누고 싶어 정회원에 지원합니다.',
    '지역 숲해설 네트워크를 넓히고 전문성을 강화하고자 정회원 전환을 신청합니다.',
    '환경교육 분야에서 오랫동안 활동해왔으며, 협회와 함께 성장하고 싶습니다.',
    '숲 생태 교육에 대한 열정으로 준회원 활동을 해왔고, 이제 더 깊이 참여하고 싶습니다.',
  ];

  const ALL_DATA_R = Array.from({ length: 24 }, (_, i) => {
    const mm  = String(((i % 3) + 1)).padStart(2, '0');
    const dd  = String(((i % 20) + 1)).padStart(2, '0');
    const hh  = String(((i * 3) % 12) + 9).padStart(2, '0');
    const min = String((i * 7) % 60).padStart(2, '0');
    const ss  = String((i * 13) % 60).padStart(2, '0');
    const name        = NAMES_R[i % NAMES_R.length];
    const paths       = JOIN_PATHS_R[i % JOIN_PATHS_R.length];
    const pathEtc     = paths.includes('기타') ? JOIN_PATH_ETC[i % JOIN_PATH_ETC.length] : '';
    const isMember    = i % 3 !== 0;
    return {
      id:             3000 + i,
      applyNo:        `REG-2026-${String(i + 1).padStart(5, '0')}`,
      name,
      isMember,
      userId:         isMember ? `reg${3001 + i}` : null,
      birth:          `${1975 + (i % 20)}-${mm}-${dd}`,
      phone:          `010-${String(1000 + i).padStart(4, '0')}-${String(2000 + i).padStart(4, '0')}`,
      email:          `user${3000 + i}@example.com`,
      address:        ADDRESSES_R[i % ADDRESSES_R.length],
      bank:           BANKS_R[i % BANKS_R.length],
      accountHolder:  name,
      accountNo:      `${String(100 + i).padStart(3, '0')}${String(456 + i).padStart(3, '0')}-${String(78 + i).padStart(2, '0')}-${String(901234 + i).padStart(6, '0')}`,
      actStatus:      ACT_STATUSES_R[i % ACT_STATUSES_R.length],
      org:            ORGS_R[i % ORGS_R.length],
      joinPath:       paths,
      joinPathEtc:    pathEtc,
      motivation:     MOTIVES_R[i % MOTIVES_R.length],
      agreePrivacy:   true,
      applyDatetime:  `2026-${mm}-${dd} ${hh}:${min}:${ss}`,
      adminMemo:      ['','','추가 서류 요청 필요','','전화 확인 완료','','','담당자 재연락 예정','','검토 중','',''][i % 12],
    };
  });

  /* ── 계좌번호 마스킹 토글 */
  let _acctVisible = false;
  function toggleAccount(fullNo) {
    _acctVisible = !_acctVisible;
    const el  = document.getElementById('accountNoVal');
    const btn = document.getElementById('accountToggleBtn');
    if (!el || !btn) return;
    if (_acctVisible) {
      el.textContent  = fullNo;
      btn.textContent = '숨기기';
    } else {
      el.textContent  = maskAccount(fullNo);
      btn.textContent = '확인';
    }
  }
  function maskAccount(no) {
    if (!no) return '—';
    return no.replace(/\d(?=\d{4})/g, '*');
  }

  function renderDetail(d) {
    _acctVisible = false;
    const memberLabel = d.isMember
      ? `<span class="badge badge-green" style="font-size:12px">회원</span><span style="font-size:13px;color:#5a7a5a;margin-left:6px">(${d.userId})</span>`
      : `<span class="badge badge-gray" style="font-size:12px">비회원</span>`;
    const addrStr = d.address.addr2
      ? `[${d.address.zip}] ${d.address.addr1}, ${d.address.addr2}`
      : `[${d.address.zip}] ${d.address.addr1}`;
    const joinPathStr = d.joinPath.map(p =>
      (p === '기타' && d.joinPathEtc) ? `기타(${d.joinPathEtc})` : p
    ).join(', ');

    document.getElementById('detailContent').innerHTML = `

      <!-- 카드1: 기본 정보 -->
      <div class="form-card">
        <div class="form-card-head">기본 정보</div>
        <div class="form-row">
          <div class="form-label">접수번호</div>
          <div class="form-half">
            <span class="detail-val mono" style="font-weight:700;color:#2e5c2e">${d.applyNo}</span>
          </div>
          <div class="form-label">회원구분</div>
          <div class="form-half">${memberLabel}</div>
        </div>
        <div class="form-row">
          <div class="form-label">이름</div>
          <div class="form-half">
            <span class="detail-val" style="font-weight:600">${d.name}</span>
          </div>
          <div class="form-label">생년월일</div>
          <div class="form-half">
            <span class="detail-val mono">${d.birth}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">연락처</div>
          <div class="form-half">
            <span class="detail-val mono">${d.phone}</span>
          </div>
          <div class="form-label">이메일</div>
          <div class="form-half">
            <span class="detail-val">${d.email || '—'}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">주소</div>
          <div class="form-content">
            <span class="detail-val">${addrStr}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">신청일시</div>
          <div class="form-content">
            <span class="detail-val mono">${d.applyDatetime}</span>
          </div>
        </div>
      </div>

      <!-- 카드2: 자동이체 계좌 정보 -->
      <div class="form-card">
        <div class="form-card-head">월 회비 자동이체 계좌 정보</div>
        <div class="form-row">
          <div class="form-label">은행명</div>
          <div class="form-half">
            <span class="detail-val">${d.bank}</span>
          </div>
          <div class="form-label">예금주</div>
          <div class="form-half">
            <span class="detail-val">${d.accountHolder}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">계좌번호</div>
          <div class="form-content">
            <span class="detail-val mono account-masked" id="accountNoVal">${maskAccount(d.accountNo)}</span>
            <span class="account-toggle" id="accountToggleBtn"
              onclick="toggleAccount('${d.accountNo}')">확인</span>
          </div>
        </div>
      </div>

      <!-- 카드3: 활동 정보 -->
      <div class="form-card">
        <div class="form-card-head">활동 정보</div>
        <div class="form-row">
          <div class="form-label">현재 활동 여부</div>
          <div class="form-content">
            <span class="detail-val">${d.actStatus}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">소속 기관</div>
          <div class="form-content">
            <span class="detail-val ${d.org ? '' : 'muted'}">${d.org || '—'}</span>
          </div>
        </div>
      </div>

      <!-- 카드4: 가입 정보 -->
      <div class="form-card">
        <div class="form-card-head">가입 정보</div>
        <div class="form-row">
          <div class="form-label">가입 경로</div>
          <div class="form-content">
            <span class="detail-val">${joinPathStr || '—'}</span>
          </div>
        </div>
        <div class="form-row" style="align-items:flex-start">
          <div class="form-label" style="padding-top:14px">가입 동기</div>
          <div class="form-content" style="align-items:flex-start;padding-top:14px;padding-bottom:14px">
            <span class="detail-val long">${d.motivation || '—'}</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">개인정보 동의</div>
          <div class="form-content">
            <span class="badge badge-green" style="font-size:12px">동의함</span>
            <span style="font-size:12px;color:var(--gray-mid);margin-left:4px">수집·이용 동의 완료</span>
          </div>
        </div>
      </div>

      <!-- 카드5: 관리자 메모 -->
      <div class="form-card">
        <div class="form-card-head">관리자 메모</div>
        <div style="padding:16px">
          <textarea class="memo-textarea" id="adminMemo"
            placeholder="관리자 메모를 입력하세요. (신청자에게 표시되지 않습니다)">${d.adminMemo || ''}</textarea>
        </div>
        <div class="memo-footer">
          <button class="btn btn-gray btn-sm" onclick="clearMemo()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="saveMemo(${d.id})">메모 저장</button>
        </div>
      </div>

      <div class="detail-bottom-bar">
        <div></div>
        <div class="btn-group-right">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
        </div>
      </div>`;
  }

  function saveMemo(id) {
    /* TODO: AJAX — fetch(ADMIN_API.applyStatusSave, { method:'POST', body:JSON.stringify({ id, memo }) }) */
    App.toast('관리자 메모가 저장되었습니다.', 'success');
  }
  function clearMemo() {
    const el = document.getElementById('adminMemo');
    if (el) el.value = '';
  }

  (function init() {
    const id = Number(new URLSearchParams(location.search).get('id'));
    const d  = ALL_DATA_R.find(x => x.id === id);
    if (!d) {
      document.getElementById('detailContent').innerHTML =
        `<div style="padding:60px;text-align:center;color:#aabba4">신청 정보를 찾을 수 없습니다. (id: ${id || '미지정'})</div>`;
      return;
    }
    renderDetail(d);
  })();
  </script>
</body>
</html>
