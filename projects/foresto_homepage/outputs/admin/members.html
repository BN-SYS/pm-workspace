<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    /* ════════════════════════════════════════
       필터 카드 — flex 기반 라벨+콘텐츠 구조
       ════════════════════════════════════════ */
    .filter-card {
      background: #fff;
      border: 1px solid #e3eadd;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .filter-body {
      display: flex;
      flex-direction: column;
    }

    /* 각 행 */
    .filter-row {
      display: flex;
      align-items: center;
      min-height: 46px;
      border-bottom: 1px solid #f0f4ee;
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    /* 라벨 셀 */
    .filter-label {
      width: 84px;
      min-width: 84px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #7a8e74;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      background: #f8faf6;
      border-right: 1px solid #e8efe3;
    }

    /* 콘텐츠 셀 */
    .filter-content {
      flex: 1;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    /* 등급+상태 행 — 정확히 50/50 */
    .filter-half {
      flex: 1;
      display: flex;
      align-items: center;
      align-self: stretch;
      min-width: 0;
      overflow: hidden;
    }

    .filter-half + .filter-half {
      border-left: 1px solid #e8efe3;
    }

    /* 날짜 인풋 그룹 */
    .date-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .date-pair input[type="date"] {
      width: 140px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      cursor: pointer;
    }

    .date-pair input[type="date"]:focus {
      border-color: #508829;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(80, 136, 41, 0.08);
    }

    .date-sep {
      color: #aabba4;
      font-size: 13px;
      font-weight: 500;
      padding: 0 2px;
    }

    /* 칩 스타일 라디오 그룹 */
    .chip-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .chip { cursor: pointer; }

    .chip input[type="radio"] { display: none; }

    .chip span {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      border: 1px solid #d5e0ce;
      background: #fafcf9;
      color: #6a7e64;
      transition: all 0.15s ease;
      white-space: nowrap;
      cursor: pointer;
    }

    .chip input[type="radio"]:checked + span {
      background: #1a2718;
      color: #fff;
      border-color: #1a2718;
      font-weight: 600;
    }

    .chip:hover span { border-color: #508829; color: #508829; }
    .chip input[type="radio"]:checked + span:hover { color: #fff; }

    /* 검색어 행 — select + input 가로 꽉 채움 */
    .kw-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    .kw-wrap select {
      flex-shrink: 0;
      width: 116px;
      height: 34px;
      padding: 0 8px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      cursor: pointer;
    }

    .kw-wrap select:focus {
      border-color: #508829;
      box-shadow: 0 0 0 3px rgba(80, 136, 41, 0.08);
    }

    .kw-input-wrap {
      position: relative;
      flex: 1;
    }

    .kw-input-wrap input {
      width: 100%;
      height: 34px;
      padding: 0 38px 0 12px;
      border: 1px solid #d5e0ce;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #2a3a26;
      background: #fafcf9;
      outline: none;
      box-sizing: border-box;
    }

    .kw-input-wrap input:focus {
      border-color: #508829;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(80, 136, 41, 0.08);
    }

    .kw-input-wrap input::placeholder { color: #aabba4; }

    .kw-search-ico {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #aabba4;
      font-size: 14px;
      pointer-events: none;
    }

    /* 필터 하단 액션바 */
    .filter-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px;
      background: #f8faf6;
      border-top: 1px solid #e8efe3;
    }

    /* ════════════════════════════════════════
       테이블 하단 버튼 영역
       ════════════════════════════════════════ */
    .table-bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    /* ════════════════════════════════════════
       테이블 — admin.css 전역 기준 적용
       ════════════════════════════════════════ */
    .admin-table th.col-chk,
    .admin-table td.col-chk {
      width: 3%;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }

    .admin-table .cell-datetime {
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .badge-blocked { background: #fee2e2; color: #b91c1c; }
  </style>
</head>

<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">회원관리</h1>
      </div>

      <!-- ① 검색 필터 -->
      <div class="filter-card">
        <div class="filter-body">

          <!-- 행 1: 가입기간 -->
          <div class="filter-row">
            <span class="filter-label">가입기간</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
            </div>
          </div>

          <!-- 행 2: 등급 + 상태 (정확히 50/50) -->
          <div class="filter-row">
            <div class="filter-half">
              <span class="filter-label">등급</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterGrade" value=""><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="member"><span>일반회원</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="fullMember"><span>정회원</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="admin"><span>관리자</span></label>
                </div>
              </div>
            </div>
            <div class="filter-half">
              <span class="filter-label">상태</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterStatus" value=""><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterStatus" value="active"><span>정상</span></label>
                  <label class="chip"><input type="radio" name="filterStatus" value="blocked"><span>차단</span></label>
                </div>
              </div>
            </div>
          </div>

          <!-- 행 4: 검색어 (입력창 우측 끝까지 채움) -->
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select id="filterKeywordType">
                  <option value="">전체 필드</option>
                  <option value="userId">아이디</option>
                  <option value="name">이름</option>
                  <option value="phone">연락처</option>
                  <option value="email">이메일</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요"
                    onkeydown="if(event.key==='Enter') MemberAdmin.search()">
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- 액션 푸터 -->
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="MemberAdmin.exportExcel()">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm" onclick="MemberAdmin.resetFilter()">초기화</button>
          <button class="btn btn-primary btn-sm" onclick="MemberAdmin.search()">검색</button>
        </div>
      </div>

      <!-- ② 목록 상단 -->
      <div class="list-top">
        <div class="list-count">총 <strong id="memberCount">0</strong>건</div>
        <select class="form-control" id="pageSizeSelect" onchange="MemberAdmin.changePageSize(+this.value)"
          style="width:130px;height:36px;font-size:13px">
          <option value="10">10개씩 보기</option>
          <option value="30">30개씩 보기</option>
          <option value="50">50개씩 보기</option>
          <option value="100">100개씩 보기</option>
        </select>
      </div>

      <!-- ③ 테이블 -->
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <!-- col-chk: 3% (CSS에서 정의) -->
              <th class="col-chk">
                <input type="checkbox" id="chkAll" onchange="MemberAdmin.toggleAll(this.checked)" title="전체 선택/해제">
              </th>
              <!-- 이름 width 미지정으로 나머지 흡수 -->
              <th style="width:4%">번호</th>
              <th style="width:8%">구분</th>
              <th style="width:10%">아이디</th>
              <th>이름</th>
              <th style="width:5%">성별</th>
              <th style="width:8%">생년월일</th>
              <th style="width:12%">연락처</th>
              <th style="width:15%">이메일</th>
              <th style="width:15%">가입일시</th>
              <th style="width:6%">상태</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
      </div>

      <!-- ④ 페이지네이션 -->
      <div class="pagination" id="memberPagination"></div>

      <!-- ⑤ 하단 버튼 -->
      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-sm" onclick="MemberAdmin.deleteSelected()" id="btnDeleteSelected" disabled>
          선택 삭제
        </button>
        <button class="btn btn-primary btn-sm" onclick="location.href='member-edit.html'">
          + 회원 등록
        </button>
      </div>

    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    AdminSidebar.mount('members');
    /* 라디오 초기값 */
    document.querySelector('input[name="filterGrade"][value=""]').checked = true;
    document.querySelector('input[name="filterStatus"][value=""]').checked = true;

    /* ── 샘플 데이터 */
    const NAMES = ['김숲해', '이정회', '박초록', '최나무', '정바람', '한생태', '윤들판', '임해설', '조산림', '강자연'];
    const GRADES = [
      { key: 'fullMember', label: '정회원' },
      { key: 'member', label: '일반회원' },
      { key: 'member', label: '일반회원' },
      { key: 'fullMember', label: '정회원' },
      { key: 'member', label: '일반회원' },
    ];

    const ALL_MEMBERS = Array.from({ length: 50 }, (_, i) => {
      const g = GRADES[i % 5];
      const mm = String((i % 9) + 1).padStart(2, '0');
      const dd = String((i % 20) + 1).padStart(2, '0');
      const hh = String((i * 3) % 24).padStart(2, '0');
      const mi = String((i * 7) % 60).padStart(2, '0');
      const ss = String((i * 11) % 60).padStart(2, '0');
      return {
        id: 50 - i,
        userId: `forest${String(50 - i).padStart(3, '0')}`,
        name: NAMES[i % 10],
        gender: i % 2 === 0 ? '남' : '여',
        birth: `${1970 + (i % 30)}-${String((i % 12) + 1).padStart(2, '0')}-${String((i % 28) + 1).padStart(2, '0')}`,
        phone: `010-${String(1000 + i).padStart(4, '0')}-${String(5000 + i).padStart(4, '0')}`,
        email: `user${50 - i}@foresto.or.kr`,
        grade: g.key,
        gradeLabel: g.label,
        joinDate: `2026-${mm}-${dd}`,                       /* 날짜 필터용 (date 비교) */
        joinDatetime: `2026-${mm}-${dd} ${hh}:${mi}:${ss}`,   /* 표시용 (초 포함) */
        status: i % 7 === 0 ? 'blocked' : 'active',
      };
    });

    const GRADE_BADGE = { fullMember: 'badge-green', member: 'badge-blue', admin: 'badge-red' };
    const GRADE_LABEL = { fullMember: '정회원', member: '일반회원', admin: '관리자' };

    const MemberAdmin = {
      filtered: [...ALL_MEMBERS],
      currentPage: 1,
      pageSize: 10,

      _dateInRange(dateStr, from, to) {
        if (!from && !to) return true;
        const d = new Date(dateStr);
        if (from && !to) return d >= new Date(from);
        if (!from && to) return d <= new Date(to);
        return d >= new Date(from) && d <= new Date(to);
      },

      search() {
        const from = document.getElementById('filterDateFrom').value;
        const to = document.getElementById('filterDateTo').value;
        const grade = document.querySelector('input[name="filterGrade"]:checked')?.value || '';
        const status = document.querySelector('input[name="filterStatus"]:checked')?.value || '';
        const kwType = document.getElementById('filterKeywordType').value;
        const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();

        this.filtered = ALL_MEMBERS.filter(m => {
          if (!this._dateInRange(m.joinDate, from, to)) return false;
          if (grade && m.grade !== grade) return false;
          if (status && m.status !== status) return false;
          if (kw) {
            if (!kwType) {
              const hay = (m.userId + m.name + m.phone + m.email).toLowerCase();
              if (!hay.includes(kw)) return false;
            } else {
              if (!String(m[kwType] || '').toLowerCase().includes(kw)) return false;
            }
          }
          return true;
        });
        this.currentPage = 1;
        this.render();
      },

      resetFilter() {
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        document.querySelector('input[name="filterGrade"][value=""]').checked = true;
        document.querySelector('input[name="filterStatus"][value=""]').checked = true;
        document.getElementById('filterKeywordType').value = '';
        document.getElementById('filterKeyword').value = '';
        this.filtered = [...ALL_MEMBERS];
        this.currentPage = 1;
        this.render();
      },

      changePageSize(size) { this.pageSize = size; this.currentPage = 1; this.render(); },

      toggleAll(checked) {
        document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
        this._syncDeleteBtn();
      },

      _syncDeleteBtn() {
        const any = document.querySelectorAll('.row-chk:checked').length > 0;
        document.getElementById('btnDeleteSelected').disabled = !any;
        document.getElementById('chkAll').indeterminate = false;
      },

      deleteSelected() {
        const checked = [...document.querySelectorAll('.row-chk:checked')];
        if (!checked.length) return;
        const ids = checked.map(cb => Number(cb.dataset.id));
        if (!confirm(`선택한 ${ids.length}명의 회원을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
        ids.forEach(id => {
          const idx = ALL_MEMBERS.findIndex(m => m.id === id);
          if (idx > -1) ALL_MEMBERS.splice(idx, 1);
        });
        this.filtered = this.filtered.filter(m => !ids.includes(m.id));
        this.render();
        App.toast(`${ids.length}명이 삭제되었습니다.`, 'success');
      },

      exportExcel() {
        App.toast('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.', 'info');
      },

      render() {
        const total = this.filtered.length;
        const start = (this.currentPage - 1) * this.pageSize;
        const slice = this.filtered.slice(start, start + this.pageSize);

        document.getElementById('memberCount').textContent = total.toLocaleString();
        document.getElementById('chkAll').checked = false;
        document.getElementById('btnDeleteSelected').disabled = true;

        document.getElementById('memberTableBody').innerHTML = slice.map((m, i) => `
          <tr onclick="location.href='member-detail.html?id=${m.id}'" title="${m.name} 상세보기">
            <td class="col-chk" onclick="event.stopPropagation()">
              <input type="checkbox" class="row-chk" data-id="${m.id}"
                onchange="MemberAdmin._syncDeleteBtn()">
            </td>
            <td class="col-no">${start + i + 1}</td>
            <td class="center">
              <span class="badge ${GRADE_BADGE[m.grade] || 'badge-gray'}">
                ${GRADE_LABEL[m.grade] || m.grade}
              </span>
            </td>
            <td>${m.userId}</td>
            <td><strong>${m.name}</strong></td>
            <td class="center td-muted">${m.gender}</td>
            <td class="center td-muted">${m.birth}</td>
            <td class="center td-muted">${m.phone}</td>
            <td class="td-muted">${m.email}</td>
            <td class="center cell-datetime">${m.joinDatetime}</td>
            <td class="center">
              <span class="badge ${m.status === 'active' ? 'badge-green' : 'badge-blocked'}">
                ${m.status === 'active' ? '정상' : '차단'}
              </span>
            </td>
          </tr>`).join('');

        App.renderPagination('memberPagination', this.currentPage,
          Math.ceil(total / this.pageSize) || 1,
          p => { this.currentPage = p; this.render(); });
      },
    };

    MemberAdmin.render();
  </script>
</body>

</html>
