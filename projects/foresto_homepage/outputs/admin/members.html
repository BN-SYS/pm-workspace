<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원관리 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .admin-table th.col-chk,
    .admin-table td.col-chk {
      width: 3%;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }
    .admin-table tbody tr { cursor: pointer; }
  </style>
</head>

<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">회원관리</h1>
        <div class="admin-topbar-actions">
          <button class="btn-refresh" onclick="location.reload()" title="새로고침"><img src="../assets/icons/refresh.png" alt="새로고침"></button>
          <button class="btn btn-primary btn-sm" onclick="location.href='member-edit.html'">+ 회원 등록</button>
        </div>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-card" data-sb-anno="1:검색·필터 영역">
        <div class="filter-body">
          <div class="filter-row">
            <span class="filter-label">가입기간</span>
            <div class="filter-content">
              <div class="date-pair">
                <input type="date" id="filterDateFrom">
                <span class="date-sep">—</span>
                <input type="date" id="filterDateTo">
              </div>
              <div class="date-preset-group">
                <button class="date-preset-btn">오늘</button>
                <button class="date-preset-btn">7일</button>
                <button class="date-preset-btn">30일</button>
                <button class="date-preset-btn">3개월</button>
                <button class="date-preset-btn">6개월</button>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <div class="filter-half">
              <span class="filter-label">등급</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterGrade" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="member"><span>일반회원</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="fullMember"><span>정회원</span></label>
                  <label class="chip"><input type="radio" name="filterGrade" value="admin"><span>관리자</span></label>
                </div>
              </div>
            </div>
            <div class="filter-half">
              <span class="filter-label">상태</span>
              <div class="filter-content">
                <div class="chip-group">
                  <label class="chip"><input type="radio" name="filterStatus" value="" checked><span>전체</span></label>
                  <label class="chip"><input type="radio" name="filterStatus" value="active"><span>정상</span></label>
                  <label class="chip"><input type="radio" name="filterStatus" value="blocked"><span>차단</span></label>
                </div>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">검색어</span>
            <div class="filter-content">
              <div class="kw-wrap">
                <select id="filterKeywordType">
                  <option value="">전체 필드</option>
                  <option value="userId">아이디</option>
                  <option value="name">이름</option>
                  <option value="phone">연락처</option>
                </select>
                <div class="kw-input-wrap">
                  <input type="text" id="filterKeyword" placeholder="검색어를 입력하세요">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-footer">
          <button class="btn btn-outline btn-sm" onclick="alert('엑셀 다운로드 — 실제 구현 시 서버 API와 연동됩니다.')">엑셀 다운로드</button>
          <button class="btn btn-gray btn-sm">초기화</button>
          <button class="btn btn-primary btn-sm">검색</button>
        </div>
      </div>

      <!-- 목록 상단 -->
      <div class="list-top" data-sb-anno="2:목록 상단">
        <div class="list-count">총 <strong>3</strong>건</div>
        <select class="form-control" style="width:130px;height:36px;font-size:13px">
          <option>10개씩 보기</option>
          <option>30개씩 보기</option>
          <option>50개씩 보기</option>
          <option>100개씩 보기</option>
        </select>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap" data-sb-anno="3:목록 테이블">
        <table class="admin-table">
          <thead>
            <tr>
              <th class="col-chk"><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)" title="전체 선택/해제"></th>
              <th style="width:4%">번호</th>
              <th style="width:8%">구분</th>
              <th style="width:10%">아이디</th>
              <th>이름</th>
              <th style="width:5%">성별</th>
              <th style="width:8%">생년월일</th>
              <th style="width:12%">연락처</th>
              <th style="width:15%">이메일</th>
              <th style="width:15%">가입일시</th>
              <th style="width:6%">상태</th>
            </tr>
          </thead>
          <tbody id="tableBody"><!-- JS render --></tbody>
        </table>
      </div>

      <div class="pagination" data-sb-anno="4:페이지네이션">
        <button disabled aria-label="이전">&laquo;</button>
        <button class="active" aria-current="page">1</button>
        <button disabled aria-label="다음">&raquo;</button>
      </div>

      <div class="table-bottom-bar">
        <button class="btn btn-danger btn-danger-filled btn-sm" id="btnDeleteSelected" disabled onclick="deleteSelected()">선택 삭제</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
    const SAMPLE_DATA = [
      { id: 1, no: 3, grade: '정회원', gradeBadge: 'badge-green', userId: 'forest001', name: '김숲해', gender: '여', dob: '1985-04-12', phone: '010-1234-5678', email: 'forest001@foresto.or.kr', joinDate: '2026-03-15 09:23:41', status: '정상', statusBadge: 'badge-green' },
      { id: 2, no: 2, grade: '일반회원', gradeBadge: 'badge-blue', userId: 'forest002', name: '이정회', gender: '남', dob: '1991-08-27', phone: '010-2345-6789', email: 'forest002@foresto.or.kr', joinDate: '2026-03-20 14:05:17', status: '정상', statusBadge: 'badge-green' },
      { id: 3, no: 1, grade: '일반회원', gradeBadge: 'badge-blue', userId: 'forest003', name: '박초록', gender: '여', dob: '1978-12-03', phone: '010-3456-7890', email: 'forest003@foresto.or.kr', joinDate: '2026-04-01 11:48:33', status: '차단', statusBadge: 'badge-blocked' },
    ];

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="td-empty">조회된 회원이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(d => `<tr onclick="location.href='member-detail.html?id=${d.id}'">
        <td class="col-chk" onclick="event.stopPropagation()"><input type="checkbox" class="row-chk" data-id="${d.id}" onchange="syncDeleteBtn()"></td>
        <td class="col-no">${d.no}</td>
        <td class="center"><span class="badge ${d.gradeBadge}">${d.grade}</span></td>
        <td>${d.userId}</td>
        <td><strong>${d.name}</strong></td>
        <td class="center td-muted">${d.gender}</td>
        <td class="center td-muted">${d.dob}</td>
        <td class="center td-muted">${d.phone}</td>
        <td class="td-muted">${d.email}</td>
        <td class="center cell-datetime">${d.joinDate}</td>
        <td class="center"><span class="badge ${d.statusBadge}">${d.status}</span></td>
      </tr>`).join('');
    }

    renderTable(SAMPLE_DATA);

    AdminSidebar.mount('members');

    function toggleAll(checked) {
      document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
      syncDeleteBtn();
    }

    function syncDeleteBtn() {
      const any = document.querySelectorAll('.row-chk:checked').length > 0;
      const btn = document.getElementById('btnDeleteSelected');
      if (btn) btn.disabled = !any;
    }

    function deleteSelected() {
      const checked = document.querySelectorAll('.row-chk:checked').length;
      if (!checked) return;
      alert(`${checked}명이 삭제되었습니다.`);
    }
  </script>
</body>

</html>
