<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>숲해설신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .form-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .form-card-head { padding:14px 20px; border-bottom:1px solid #e3eadd; background:#f8faf6; font-size:13px; font-weight:700; color:#2e5c2e; letter-spacing:.03em; }
    .form-row { display:flex; align-items:stretch; min-height:52px; border-bottom:1px solid #f0f4ee; }
    .form-row:last-child { border-bottom:none; }
    .form-label { width:140px; min-width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; padding:0 12px; text-align:center; }
    .form-content { flex:1; display:flex; align-items:center; padding:12px 16px; gap:10px; flex-wrap:wrap; }
    .form-half { flex:1; display:flex; align-items:center; padding:12px 16px; gap:8px; }
    .form-half + .form-half { border-left:1px solid #f0f4ee; }
    .detail-val { font-size:14px; color:#111; line-height:1.6; }
    .detail-val.mono { font-variant-numeric:tabular-nums; }
    .detail-val.long { line-height:1.8; }
    .detail-val.muted { color:#7a8e74; font-size:13px; }
    .visit-date-val { font-size:15px; font-weight:700; color:#2e5c2e; font-variant-numeric:tabular-nums; }
    .detail-bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:4px 0 8px; }
    .btn-group-right { display:flex; gap:8px; }
    .file-list { display:flex; flex-direction:column; gap:6px; flex:1; min-width:0; }
    .file-item { display:flex; align-items:center; gap:10px; padding:7px 12px; background:#f8faf6; border:1px solid #e3eadd; border-radius:6px; }
    .file-name-link { font-size:13px; color:#05803e; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
    .file-name-link:hover { color:#20281A; }
    .file-size { font-size:11px; color:#9aaa94; white-space:nowrap; }
    .memo-textarea { width:100%; min-height:120px; padding:12px 14px; border:1px solid #d5e0ce; border-radius:8px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; resize:vertical; box-sizing:border-box; line-height:1.7; }
    .memo-textarea:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .memo-textarea::placeholder { color:#aabba4; }
    .memo-footer { display:flex; justify-content:flex-end; padding:12px 16px 14px; border-top:1px solid #f0f4ee; gap:8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">숲해설신청 상세</h1>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-sm" onclick="history.back()">목록</button>
        </div>
      </div>

      <div class="admin-content" id="detailContent">

        <!-- 카드1: 신청 기관 정보 -->
        <div class="form-card">
          <div class="form-card-head">신청 기관 정보</div>
          <div class="form-row">
            <div class="form-label">접수번호</div>
            <div class="form-content">
              <span class="detail-val mono" style="font-weight:700;color:#2e5c2e">FST-2026-00001</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">기관명</div>
            <div class="form-content">
              <span class="detail-val" style="font-weight:600;font-size:15px">도봉초등학교</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">담당자명</div>
            <div class="form-half">
              <span class="detail-val">김민수</span>
            </div>
            <div class="form-label">연락처</div>
            <div class="form-half">
              <span class="detail-val mono">02-1000-3000</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">이메일</div>
            <div class="form-half">
              <span class="detail-val">contact5001@example.com</span>
            </div>
            <div class="form-label">신청일시</div>
            <div class="form-half">
              <span class="detail-val mono">2026-01-10 09:00:00</span>
            </div>
          </div>
        </div>

        <!-- 카드2: 신청 내용 -->
        <div class="form-card">
          <div class="form-card-head">신청 내용</div>
          <div class="form-row">
            <div class="form-label">방문 희망일</div>
            <div class="form-content">
              <span class="visit-date-val">2026-03-15</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">참가 대상 및 인원</div>
            <div class="form-content">
              <span class="detail-val">초등 3학년 30명</span>
            </div>
          </div>
          <div class="form-row" style="align-items:flex-start">
            <div class="form-label" style="padding-top:16px">신청 내용</div>
            <div class="form-content" style="align-items:flex-start;padding-top:16px;padding-bottom:16px">
              <span class="detail-val long">봄 숲 생태 탐방 프로그램을 희망합니다. 나무 이름 알기, 새소리 듣기 활동 포함 부탁드립니다.</span>
            </div>
          </div>
          <div class="form-row" style="align-items:flex-start">
            <div class="form-label" style="padding-top:14px">첨부파일</div>
            <div class="form-content" style="align-items:flex-start;padding-top:12px;padding-bottom:12px">
              <div class="file-list">
                <div class="file-item">
                  <span class="file-name-link" onclick="App.toast('PHP 연동 후 파일을 다운로드할 수 있습니다.', 'info')">숲해설신청공문_도봉초등학교.pdf</span>
                  <span class="file-size">271 KB</span>
                </div>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">개인정보 동의</div>
            <div class="form-content">
              <span class="detail-val">동의함</span>
            </div>
          </div>
        </div>

        <!-- 카드3: 관리자 메모 -->
        <div class="form-card">
          <div class="form-card-head">관리자 메모</div>
          <div style="padding:16px">
            <textarea class="memo-textarea" id="adminMemo" placeholder="관리자 메모를 입력하세요. (신청자에게 표시되지 않습니다)"></textarea>
          </div>
          <div class="memo-footer">
            <button class="btn btn-gray btn-sm" onclick="clearMemo()">초기화</button>
            <button class="btn btn-primary btn-sm" onclick="saveMemo()">메모 저장</button>
          </div>
        </div>

        <div class="detail-bottom-bar">
          <div></div>
          <div class="btn-group-right">
            <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';
  AdminSidebar.mount('apply-forest');

  function saveMemo() { App.toast('관리자 메모가 저장되었습니다.', 'success'); }
  function clearMemo() { const el = document.getElementById('adminMemo'); if (el) el.value = ''; }
  </script>
</body>
</html>
