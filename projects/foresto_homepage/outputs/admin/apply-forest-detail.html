<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>숲해설신청 상세 | 관리자 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/admin.css">
  <style>
    .form-card { background:#fff; border:1px solid #e3eadd; border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .form-card-head { padding:14px 20px; border-bottom:1px solid #e3eadd; background:#f8faf6; font-size:13px; font-weight:700; color:#2e5c2e; letter-spacing:.03em; }
    .form-row { display:flex; align-items:stretch; min-height:52px; border-bottom:1px solid #f0f4ee; }
    .form-row:last-child { border-bottom:none; }
    .form-label { width:140px; min-width:140px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#7a8e74; letter-spacing:.04em; white-space:nowrap; background:#f8faf6; border-right:1px solid #e8efe3; padding:0 12px; text-align:center; }
    .form-content { flex:1; display:flex; align-items:center; padding:12px 16px; gap:10px; flex-wrap:wrap; }
    .form-half { flex:1; display:flex; align-items:center; padding:12px 16px; gap:8px; }
    .form-half + .form-half { border-left:1px solid #f0f4ee; }
    .detail-val { font-size:14px; color:#111; line-height:1.6; }
    .detail-val.mono { font-variant-numeric:tabular-nums; }
    .detail-val.long { line-height:1.8; }
    .detail-val.muted { color:#7a8e74; font-size:13px; }
    .visit-date-val { font-size:15px; font-weight:700; color:#2e5c2e; font-variant-numeric:tabular-nums; }
    .tag-list { display:flex; flex-wrap:wrap; gap:6px; }
    .tag { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; background:#eaf3e2; color:#2e5c2e; border:1px solid #c8e0b8; }
    .detail-bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:4px 0 8px; }
    .btn-group-right { display:flex; gap:8px; }
    .memo-textarea { width:100%; min-height:120px; padding:12px 14px; border:1px solid #d5e0ce; border-radius:8px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:#2a3a26; background:#fafcf9; outline:none; resize:vertical; box-sizing:border-box; line-height:1.7; }
    .memo-textarea:focus { border-color:#508829; background:#fff; box-shadow:0 0 0 3px rgba(80,136,41,.08); }
    .memo-textarea::placeholder { color:#aabba4; }
    .memo-footer { display:flex; justify-content:flex-end; padding:12px 16px 14px; border-top:1px solid #f0f4ee; gap:8px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-head">
        <span class="adm-sb-title">MENU</span>
        <button class="sidebar-toggle" onclick="AdminLayout.toggleSidebar()" aria-label="사이드바 토글">☰</button>
      </div>
      <nav class="admin-nav" id="adminNavMount" aria-label="관리자 메뉴"></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">숲해설신청 상세</h1>
      </div>

      <div class="admin-content" id="detailContent">

        <!-- 카드 1: 접수 정보 -->
        <div class="form-card">
          <div class="form-card-head">접수 정보</div>
          <div class="form-row">
            <div class="form-label">접수번호</div>
            <div class="form-half">
              <span class="detail-val mono" id="dAppNo" style="font-weight:700;color:#2e5c2e">—</span>
            </div>
            <div class="form-label">신청일시</div>
            <div class="form-half">
              <span class="detail-val mono" id="dApplyDate">—</span>
            </div>
          </div>
        </div>

        <!-- 카드 2: 신청 기관 정보 -->
        <div class="form-card">
          <div class="form-card-head">신청 기관 정보</div>
          <div class="form-row">
            <div class="form-label">기관명</div>
            <div class="form-content">
              <span class="detail-val" id="dOrgName" style="font-weight:600;font-size:15px">—</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">담당자명</div>
            <div class="form-half">
              <span class="detail-val" id="dContact">—</span>
            </div>
            <div class="form-label">연락처</div>
            <div class="form-half">
              <span class="detail-val mono" id="dPhone">—</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">이메일</div>
            <div class="form-content">
              <span class="detail-val" id="dEmail">—</span>
            </div>
          </div>
        </div>

        <!-- 카드 3: 프로그램 신청 내용 -->
        <div class="form-card">
          <div class="form-card-head">프로그램 신청 내용</div>
          <div class="form-row">
            <div class="form-label">희망 프로그램</div>
            <div class="form-content">
              <div class="tag-list" id="dPrograms"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">대상</div>
            <div class="form-half">
              <div class="tag-list" id="dTargets"></div>
            </div>
            <div class="form-label">예상 인원</div>
            <div class="form-half">
              <span class="detail-val mono" id="dHeadcount" style="font-weight:600">—</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">희망 날짜</div>
            <div class="form-half">
              <span class="visit-date-val" id="dVisitDate">—</span>
            </div>
            <div class="form-label">희망 시간대</div>
            <div class="form-half">
              <span class="detail-val" id="dTimeSlot">—</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">진행 장소</div>
            <div class="form-content">
              <div class="tag-list" id="dPlaces"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">프로그램 목적</div>
            <div class="form-content">
              <div class="tag-list" id="dPurposes"></div>
            </div>
          </div>
          <div class="form-row" style="align-items:flex-start">
            <div class="form-label" style="padding-top:16px">추가 요청사항</div>
            <div class="form-content" style="align-items:flex-start;padding-top:16px;padding-bottom:16px">
              <span class="detail-val long" id="dRequest">—</span>
            </div>
          </div>
        </div>

        <!-- 카드 4: 관리자 메모 -->
        <div class="form-card">
          <div class="form-card-head">관리자 메모</div>
          <div style="padding:16px">
            <textarea class="memo-textarea" id="adminMemo"
              placeholder="관리자 메모를 입력하세요. (신청자에게 표시되지 않습니다)"></textarea>
          </div>
          <div class="memo-footer">
            <button class="btn btn-gray btn-sm" onclick="ForestDetail.clearMemo()">초기화</button>
            <button class="btn btn-primary btn-sm" onclick="ForestDetail.saveMemo()">메모 저장</button>
          </div>
        </div>

        <div class="detail-bottom-bar">
          <div></div>
          <div class="btn-group-right">
            <button class="btn btn-gray btn-sm" onclick="history.back()">목록으로</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/admin.js"></script>
  <script>
  'use strict';

  const _id = App.getParam('id');

  /* ──────────────────────────────────────────
     샘플 데이터
     [개발자] AdminHttp.get(ADMIN_API.url('applyForest', _id)) 응답으로 교체
  ────────────────────────────────────────── */
  const SAMPLE_DETAIL = {
    appNo:     'FST-2026-00001',
    applyDate: '2026-01-10 09:00:00',
    orgName:   '도봉초등학교',
    contact:   '김민수',
    phone:     '02-1000-3000',
    email:     'contact5001@example.com',
    programs:  ['숲해설', '체험형 프로그램'],
    targets:   ['초등학생'],
    headcount: '30명',
    visitDate: '2026-03-15',
    timeSlot:  '오전',
    places:    ['학교'],
    purposes:  ['교육', '체험'],
    request:   '봄 숲 생태 탐방 프로그램을 희망합니다. 나무 이름 알기, 새소리 듣기 활동 포함 부탁드립니다.',
    memo:      '',
  };

  /* 태그 배열 → HTML */
  function renderTags(arr) {
    if (!arr?.length) return '<span class="detail-val muted">-</span>';
    return arr.map(t => `<span class="tag">${t}</span>`).join('');
  }

  const ForestDetail = {
    data: null,

    async load() {
      try {
        /*
         * [개발자 연동]
         * this.data = await AdminHttp.get(ADMIN_API.url('applyForest', _id));
         * this.render(this.data);
         */
        this.data = SAMPLE_DETAIL;
        this.render(this.data);
      } catch (e) {
        App.toast(e.message, 'error');
      }
    },

    render(d) {
      document.getElementById('dAppNo').textContent     = d.appNo;
      document.getElementById('dApplyDate').textContent = d.applyDate;
      document.getElementById('dOrgName').textContent   = d.orgName;
      document.getElementById('dContact').textContent   = d.contact;
      document.getElementById('dPhone').textContent     = d.phone;
      document.getElementById('dEmail').textContent     = d.email || '-';
      document.getElementById('dHeadcount').textContent = d.headcount;
      document.getElementById('dVisitDate').textContent = d.visitDate;
      document.getElementById('dTimeSlot').textContent  = d.timeSlot || '-';
      document.getElementById('dRequest').textContent   = d.request  || '없음';
      document.getElementById('adminMemo').value        = d.memo     || '';

      document.getElementById('dPrograms').innerHTML = renderTags(d.programs);
      document.getElementById('dTargets').innerHTML  = renderTags(d.targets);
      document.getElementById('dPlaces').innerHTML   = renderTags(d.places);
      document.getElementById('dPurposes').innerHTML = renderTags(d.purposes);
    },

    async saveMemo() {
      const memo = document.getElementById('adminMemo').value;
      try {
        /*
         * [개발자 연동]
         * await AdminHttp.post(ADMIN_API.url('applyForest', _id, 'memo'), { memo });
         */
        App.toast('관리자 메모가 저장되었습니다.', 'success');
      } catch (e) {
        App.toast(e.message, 'error');
      }
    },

    clearMemo() {
      const el = document.getElementById('adminMemo');
      if (el) el.value = '';
    },
  };

  AdminSidebar.mount('apply-forest');
  ForestDetail.load();
  </script>
</body>
</html>
