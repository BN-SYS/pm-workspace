<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사공단 일지 작성 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
  <style>
    .write-form-wrap { max-width: 760px; }
    .write-title-input {
      width: 100%; font-size: var(--text-lg); padding: 10px 14px;
      border: 1px solid var(--gray-light); border-radius: 6px;
      font-family: inherit; box-sizing: border-box; margin-bottom: 16px;
    }
    .write-title-input:focus { outline: none; border-color: var(--green-dark); }
    .editor-area {
      width: 100%; min-height: 320px; padding: 14px;
      border: 1px solid var(--gray-light); border-radius: 6px;
      font-size: var(--text-md); font-family: inherit;
      resize: vertical; line-height: 1.8; box-sizing: border-box;
    }
    .editor-area:focus { outline: none; border-color: var(--green-dark); }
    .write-meta-row {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .write-meta-row label { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .write-meta-row input[type="date"],
    .write-meta-row input[type="text"] {
      padding: 8px 12px; border: 1px solid var(--gray-light);
      border-radius: 6px; font-size: 14px; font-family: inherit;
    }
    .file-hint {
      font-size: 12px; color: var(--gray-mid); margin-top: 4px;
    }
    .write-action { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
  </style>
</head>
<body data-page="sagongdan-log-write">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>사공단 일지 작성</h1>
      <p>정회원 전용 | 봉사활동 일지를 작성해 주세요.</p>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
      <div class="content-wrap">

        <div class="alert alert-info" style="margin-bottom:20px">
          파일 업로드 용량: 파일당 최대 <strong>10MB</strong> &nbsp;|&nbsp; 허용 형식: JPG, PNG, PDF, HWP, DOCX
        </div>

        <div class="write-form-wrap">

          <div class="write-meta-row">
            <label>활동일 <span class="req" style="color:var(--green-dark)">*</span></label>
            <input type="date" id="actDate">
          </div>

          <input type="text" class="write-title-input" id="writeTitle" placeholder="제목을 입력하세요">

          <textarea class="editor-area" id="writeContent"
                    placeholder="봉사활동 내용, 장소, 참여 인원 등을 자유롭게 기록해 주세요."></textarea>

          <div class="write-meta-row" style="margin-top:16px">
            <label>파일 첨부</label>
            <input type="file" id="writeFile" accept=".jpg,.jpeg,.png,.pdf,.hwp,.hwpx,.docx">
          </div>
          <p class="file-hint">* 파일당 최대 10MB, 허용 형식: JPG, PNG, PDF, HWP, DOCX</p>

          <div class="write-action">
            <a href="sagongdan-log.html" class="btn btn-gray">취소</a>
            <button class="btn btn-primary" onclick="LogWrite.submit()">등록하기</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script>
    if (!App.user.isLoggedIn) {
      location.href = '../auth/login.html';
    }
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML  = LNB.breadcrumb('../', 'member/sagongdan-log.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'member/sagongdan-log.html');

    const LogWrite = {
      submit() {
        const title   = document.getElementById('writeTitle').value.trim();
        const content = document.getElementById('writeContent').value.trim();
        const actDate = document.getElementById('actDate').value;
        const file    = document.getElementById('writeFile').files[0];

        if (!actDate) { App.toast('활동일을 선택해 주세요.', 'warning'); return; }
        if (!title)   { App.toast('제목을 입력해 주세요.', 'warning'); return; }
        if (!content) { App.toast('내용을 입력해 주세요.', 'warning'); return; }

        if (file && file.size > 10 * 1024 * 1024) {
          App.toast('파일 크기가 10MB를 초과합니다.', 'warning'); return;
        }

        App.toast('일지가 등록되었습니다.');
        setTimeout(() => { location.href = 'sagongdan-log.html'; }, 1200);
      },
    };
  </script>
</body>
</html>
