<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원아카데미 특강 상세 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/education.css">
  <link rel="stylesheet" href="../assets/css/pages/member.css">
</head>

<body data-page="competency-detail">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>회원아카데미</h1>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
      <div class="content-wrap">
        <div id="competencyDetail">
          <div style="text-align:center;padding:48px;color:var(--gray-mid)">불러오는 중...</div>
        </div>
      </div>
    </main>
  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/education.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML  = LNB.breadcrumb('../', 'member/competency.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'member/competency.html');

    /* 상세 페이지 단독 진입 시 _ctrl 초기화 */
    if (!window._ctrl) {
      const _pool = ALL_COURSES_RAW.filter(c => c.type === '역량강화' || c.type === '직무교육');
      window._ctrl = new CourseListController('역량강화', '', '', '', 'competency-detail.html');
      window._ctrl.courses  = _pool;
      window._ctrl.filtered = [..._pool];
    }
    /* renderDetail() 은 member.js DOMContentLoaded initMap 에서 자동 호출됨 */
  </script>
</body>

</html>
