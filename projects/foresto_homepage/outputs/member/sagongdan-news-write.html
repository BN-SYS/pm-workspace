<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사공단 소식 등록 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
  <link rel="stylesheet" href="../assets/css/pages/write.css">
</head>
<body data-page="sagongdan-news-write">
  <div id="hdr"></div>
  <div class="page-header">
    <div class="container">
      <h1>사회공헌사업단</h1>
    </div>
  </div>
  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
      <div class="content-wrap">
        <div class="write-wrap">

          <div class="write-row">
            <label class="write-label">팀 <span class="write-req">*</span></label>
            <div class="write-input-cell">
              <select class="write-select" id="writeTeam">
                <option value="">팀을 선택하세요</option>
              </select>
            </div>
          </div>

          <div class="write-row">
            <label class="write-label">제목 <span class="write-req">*</span></label>
            <div class="write-input-cell">
              <input type="text" class="write-input" id="writeTitle"
                     placeholder="제목을 입력하세요" maxlength="100">
            </div>
          </div>

          <div class="write-section">
            <div class="write-section-label">내용 <span class="write-req">*</span></div>
            <div class="write-section-body">
              <div class="se2-wrap">
                <div class="se2-toolbar">
                  <button type="button" class="se2-btn se2-btn-bold"      title="굵게">B</button>
                  <button type="button" class="se2-btn se2-btn-italic"    title="기울임">I</button>
                  <button type="button" class="se2-btn se2-btn-underline" title="밑줄">U</button>
                  <span class="se2-sep"></span>
                  <select class="se2-select" title="글꼴 크기">
                    <option>크기</option><option>소</option><option>중</option><option>대</option>
                  </select>
                  <span class="se2-sep"></span>
                  <button type="button" class="se2-btn" title="왼쪽 정렬">≡</button>
                  <button type="button" class="se2-btn" title="가운데 정렬">☰</button>
                  <span class="se2-sep"></span>
                  <button type="button" class="se2-btn" title="이미지 삽입">🖼</button>
                  <button type="button" class="se2-btn" title="링크 삽입">🔗</button>
                </div>
                <textarea class="se2-body" id="writeContent" placeholder="내용을 입력하세요."></textarea>
                <div class="se2-footer">SmartEditor2 — 실제 구현 시 서버 연동 적용 예정</div>
              </div>
            </div>
          </div>

          <div class="write-section">
            <div class="write-section-label">
              파일 첨부 <span class="write-optional">선택 · 최대 3개 · 파일당 10MB · JPG·PNG·PDF·HWP·DOCX</span>
            </div>
            <div class="write-section-body">
              <div class="write-file-area" id="fileArea">
                <div class="write-file-row" id="fileRow0">
                  <input type="file" class="write-file-input" id="file0"
                         accept=".jpg,.jpeg,.png,.pdf,.hwp,.hwpx,.docx"
                         onchange="WriteCtrl.onFileChange(0)">
                  <label for="file0" class="write-file-label">파일 선택</label>
                  <span class="write-file-name" id="fileName0">선택된 파일 없음</span>
                  <button type="button" class="write-file-clear"
                          onclick="WriteCtrl.clearFile(0)" style="display:none">✕</button>
                </div>
              </div>
              <button type="button" class="btn btn-gray btn-sm"
                      id="fileAddBtn" onclick="WriteCtrl.addFile()">+ 파일 추가</button>
            </div>
          </div>

        </div>
        <div class="write-actions">
          <a href="sagongdan.html?tab=news" class="btn btn-gray">취소</a>
          <button type="button" class="btn btn-primary" onclick="WriteCtrl.submit()">등록하기</button>
        </div>
      </div>
    </main>
  </div>
  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/member.js"></script>
  <script>
    if (!App.user.isLoggedIn) location.href = '../auth/login.html';
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML  = LNB.breadcrumb('../', 'member/sagongdan.html?tab=news');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'member/sagongdan.html?tab=news');

    SAGONGDAN_DATA.forEach(t => {
      const o = document.createElement('option');
      o.value = t.name; o.textContent = t.name;
      document.getElementById('writeTeam').appendChild(o);
    });

    const WriteCtrl = {
      _count: 1, _max: 3,
      _makeRow(i, removable) {
        const row = document.createElement('div');
        row.className = 'write-file-row'; row.id = `fileRow${i}`;
        row.innerHTML = `
          <input type="file" class="write-file-input" id="file${i}"
                 accept=".jpg,.jpeg,.png,.pdf,.hwp,.hwpx,.docx"
                 onchange="WriteCtrl.onFileChange(${i})">
          <label for="file${i}" class="write-file-label">파일 선택</label>
          <span class="write-file-name" id="fileName${i}">선택된 파일 없음</span>
          <button type="button" class="write-file-clear"
                  onclick="WriteCtrl.clearFile(${i})" style="display:none">✕</button>
          ${removable ? `<button type="button" class="write-file-remove"
                  onclick="WriteCtrl.removeFile(${i})">삭제</button>` : ''}`;
        return row;
      },
      onFileChange(i) {
        const f = document.getElementById(`file${i}`);
        if (!f.files[0]) return;
        if (f.files[0].size > 10 * 1024 * 1024) {
          App.toast('파일 크기가 10MB를 초과합니다.', 'warning'); f.value = ''; return;
        }
        const n = document.getElementById(`fileName${i}`);
        n.textContent = f.files[0].name; n.classList.add('has-file');
        document.querySelector(`#fileRow${i} .write-file-clear`).style.display = '';
      },
      clearFile(i) {
        document.getElementById(`file${i}`).value = '';
        const n = document.getElementById(`fileName${i}`);
        n.textContent = '선택된 파일 없음'; n.classList.remove('has-file');
        document.querySelector(`#fileRow${i} .write-file-clear`).style.display = 'none';
      },
      addFile() {
        if (this._count >= this._max) {
          App.toast('파일은 최대 3개까지 첨부할 수 있습니다.', 'warning'); return;
        }
        document.getElementById('fileArea').appendChild(this._makeRow(this._count++, true));
        if (this._count >= this._max) document.getElementById('fileAddBtn').style.display = 'none';
      },
      removeFile(i) {
        document.getElementById(`fileRow${i}`)?.remove();
        this._count--;
        document.getElementById('fileAddBtn').style.display = '';
      },
      submit() {
        const team    = document.getElementById('writeTeam').value;
        const title   = document.getElementById('writeTitle').value.trim();
        const content = document.getElementById('writeContent').value.trim();
        if (!team)    { App.toast('팀을 선택해 주세요.', 'warning');   return; }
        if (!title)   { App.toast('제목을 입력해 주세요.', 'warning'); return; }
        if (!content) { App.toast('내용을 입력해 주세요.', 'warning'); return; }
        App.toast('소식이 등록되었습니다.');
        setTimeout(() => location.href = 'sagongdan.html?tab=news', 1200);
      },
    };
  </script>
</body>
</html>
