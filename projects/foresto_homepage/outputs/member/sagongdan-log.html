<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사공단 일지 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="sagongdan-log">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>사회공헌사업단</h1>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">

    <div class="content-wrap">
    <div id="logListWrap">


      <div class="alert alert-warning" style="margin-bottom:24px">
        파일 업로드 용량: 파일당 최대 <strong>10MB</strong> &nbsp;|&nbsp; 허용 형식: JPG, PNG, PDF, HWP, DOCX
      </div>

      <div class="list-top">
        <span class="list-count">Total <strong id="logCount">0</strong>건</span>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
          <div class="list-search">
            <input type="text" class="list-search-input" id="logKeyword" placeholder="검색어를 입력하세요"
              onkeydown="if(event.key==='Enter') SagongdanLogCtrl.search()">
            <button class="list-search-btn" onclick="SagongdanLogCtrl.search()">검색</button>
          </div>
          <div id="logWriteArea"></div>
        </div>
      </div>

      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:60px">번호</th>
              <th>제목</th>
              <th style="width:90px">작성자</th>
              <th style="width:90px">활동일</th>
              <th style="width:50px">첨부</th>
              <th style="width:110px">작성일</th>
            </tr>
          </thead>
          <tbody id="logTableBody"></tbody>
        </table>
      </div>

      <div id="logPagination" class="pagination"></div>
    </div><!-- /#logListWrap -->

    <!-- 상세 영역: ?id 파라미터 있을 때 노출 -->
    <div id="logDetailWrap" style="display:none">
      <div id="logDetail"></div>
    </div>

    </div>
    </main>
  </div>


  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'member/sagongdan-log.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'member/sagongdan-log.html');
    Footer.initFamilyOutsideClick && Footer.initFamilyOutsideClick();

    const SagongdanLogCtrl = {
      data: [
        { id: 1, title: '2025년 11월 서울숲 봉사 활동 일지',    author: '홍*동', actDate: '2025-11-10', file: true,  date: '2025-11-12',
          content: '<p>2025년 11월 10일, 서울숲에서 사공단 봉사 활동이 진행되었습니다.</p><p>지역 복지관 어르신 20명과 함께 숲 산책 및 자연물 공예 프로그램을 운영하였습니다.</p>' },
        { id: 2, title: '2025년 10월 북한산 탐방로 정비 일지',   author: '이*영', actDate: '2025-10-22', file: true,  date: '2025-10-24',
          content: '<p>북한산 탐방로 정비 봉사 활동을 실시하였습니다.</p><p>탐방로 낙엽 정리, 안내판 점검, 쉼터 환경 정비 등의 활동을 수행하였습니다.</p>' },
        { id: 3, title: '2025년 9월 어린이 숲 체험 봉사 일지',   author: '김*수', actDate: '2025-09-14', file: false, date: '2025-09-16',
          content: '<p>저소득 아동 대상 숲 체험 봉사 활동을 진행하였습니다.</p><p>곤충 관찰, 나무 이름 알기, 나뭇잎 탁본 만들기 등 다양한 프로그램으로 구성되었습니다.</p>' },
      ],
      filtered: [],

      init() {
        /* ?id 파라미터 있으면 상세 렌더링 */
        const id = new URLSearchParams(location.search).get('id');
        if (id) { this.renderDetail(id); return; }
        this.filtered = [...this.data];
        this.render();
        if (App.user.isLoggedIn) {
          document.getElementById('logWriteArea').innerHTML =
            '<a href="sagongdan-log-write.html" class="btn btn-primary btn-sm">일지 작성</a>';
        }
      },

      renderDetail(id) {
        const item = this.data.find(d => String(d.id) === String(id));
        document.getElementById('logListWrap').style.display = 'none';
        document.getElementById('logDetailWrap').style.display = '';
        if (!item) {
          document.getElementById('logDetail').innerHTML =
            '<div style="text-align:center;padding:48px;color:var(--gray-mid)">게시물을 찾을 수 없습니다.</div>';
          return;
        }
        const idx  = this.data.findIndex(d => d.id === item.id);
        const next = this.data[idx - 1];
        const prev = this.data[idx + 1];
        const navHtml = (next || prev) ? `
          <div class="cd-nav">
            ${next ? `<div class="cd-nav-item" onclick="location.href='?id=${next.id}'">
              <span class="cd-nav-label">다음글</span>
              <span class="cd-nav-title">${next.title}</span></div>` : ''}
            ${prev ? `<div class="cd-nav-item" onclick="location.href='?id=${prev.id}'">
              <span class="cd-nav-label">이전글</span>
              <span class="cd-nav-title">${prev.title}</span></div>` : ''}
          </div>` : '';
        const canMod = App.canModify(item);
        document.getElementById('logDetail').innerHTML = `
          <div class="cd-wrap">
            <div class="cd-head">
              <div class="cd-head-left"><h2 class="cd-title">${item.title}</h2></div>
              <span class="cd-date">${item.date}</span>
            </div>
            <div class="cd-meta">
              <span>작성자 <strong>${item.author}</strong></span>
              <span style="margin-left:16px;color:var(--gray-mid)">활동일 ${item.actDate}</span>
            </div>
            <hr class="cd-divider">
            ${item.file ? `<div class="cd-attach">
              <a href="#" class="cd-attach-item"
                 onclick="App.toast('첨부파일 다운로드 — 실제 구현 시 서버 연동 예정','info');return false;">
                <svg class="cd-attach-icon" viewBox="0 0 24 24" fill="none" width="15" height="15">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>활동일지_${item.actDate}.pdf</span>
              </a>
            </div>` : ''}
            <div class="cd-body"><div class="cd-content">${item.content}</div></div>
            ${navHtml}
            <div class="cd-actions">
              <button class="btn btn-primary btn-sm cd-btn-list"
                      onclick="location.href='sagongdan-log.html'">목록</button>
              ${canMod ? `<div class="cd-actions-right">
                <button class="btn btn-danger btn-sm"
                        onclick="App.deletePost(${item.id}, SagongdanLogCtrl.data, 'sagongdan-log.html')">삭제</button>
              </div>` : ''}
            </div>
          </div>`;
      },

      search() {
        const kw = document.getElementById('logKeyword').value.trim().toLowerCase();
        this.filtered = kw ? this.data.filter(d => d.title.toLowerCase().includes(kw)) : [...this.data];
        this.render();
      },
      render() {
        document.getElementById('logCount').textContent = this.filtered.length;
        const tbody = document.getElementById('logTableBody');
        if (!this.filtered.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-mid)">등록된 일지가 없습니다.</td></tr>';
          return;
        }
        tbody.innerHTML = this.filtered.map((d, i) => `
          <tr>
            <td style="text-align:center">${this.filtered.length - i}</td>
            <td><a href="?id=${d.id}">${d.title}</a></td>
            <td style="text-align:center">${d.author}</td>
            <td style="text-align:center">${d.actDate}</td>
            <td style="text-align:center">${d.file ? '📎' : '-'}</td>
            <td style="text-align:center">${d.date}</td>
          </tr>`).join('');
      },
    };

    SagongdanLogCtrl.init();
  </script>
</body>

</html>
