<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사공단 소식 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/list-common.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="sagongdan-news">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>사공단 소식</h1>
      <p>정회원 전용 | 사회공헌사업단 활동 소식</p>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">

    <div class="content-wrap">
    <div id="newsListWrap">

      <div class="alert alert-info" style="margin-bottom:24px">
        사공단 소식은 <strong>정회원 전용</strong> 게시판입니다.
      </div>

      <div class="list-top">
        <span class="list-count">Total <strong id="newsCount">0</strong>건</span>
        <div class="list-search">
          <input type="text" class="list-search-input" id="newsKeyword" placeholder="검색어를 입력하세요"
            onkeydown="if(event.key==='Enter') SagongdanNewsCtrl.search()">
          <button class="list-search-btn" onclick="SagongdanNewsCtrl.search()">검색</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th style="width:80px">번호</th>
              <th>제목</th>
              <th style="width:90px">작성자</th>
              <th style="width:110px">작성일</th>
            </tr>
          </thead>
          <tbody id="newsTableBody"></tbody>
        </table>
      </div>

      <div id="newsPagination" class="pagination"></div>
    </div><!-- /#newsListWrap -->

    <!-- 상세 영역: ?id 파라미터 있을 때 노출 -->
    <div id="newsDetailWrap" style="display:none">
      <div id="newsDetail"></div>
    </div>

    </div>
    </main>
  </div>


  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('회원활동', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'member/sagongdan-news.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'member/sagongdan-news.html');
    Footer.initFamilyOutsideClick && Footer.initFamilyOutsideClick();

    const SagongdanNewsCtrl = {
      data: [
        { id: 1, title: '[소식] 서울 도심 숲 봉사활동 진행',  author: '사무국', date: '2025-11-15', content: '<p>2025년 11월, 사회공헌사업단은 서울 도심 속 작은 숲을 찾아 봉사 활동을 진행했습니다.</p><p>이번 활동에는 정회원 15명이 참여하여 지역 아동 센터 어린이들과 함께 숲 탐방 프로그램을 운영하였습니다.</p>' },
        { id: 2, title: '[소식] 경기도 탄소중립 숲 조성 참여', author: '사무국', date: '2025-10-03', content: '<p>한국숲해설가협회 사공단이 경기도 탄소중립 숲 조성 사업에 참여하였습니다.</p><p>조성 현장에서 생태 교육과 함께 나무 식재 활동을 진행했습니다.</p>' },
        { id: 3, title: '[소식] 2025 하반기 사공단 워크숍',    author: '사무국', date: '2025-09-10', content: '<p>사회공헌사업단 하반기 워크숍이 진행되었습니다.</p><p>활동 방향 공유, 우수 사례 발표, 팀별 프로그램 기획 등 알찬 내용으로 구성되었습니다.</p>' },
      ],
      filtered: [],

      init() {
        /* ?id 파라미터 있으면 상세 렌더링 */
        const id = new URLSearchParams(location.search).get('id');
        if (id) { this.renderDetail(id); return; }
        this.filtered = [...this.data];
        this.render();
      },

      renderDetail(id) {
        const item = this.data.find(d => String(d.id) === String(id));
        document.getElementById('newsListWrap').style.display = 'none';
        document.getElementById('newsDetailWrap').style.display = '';
        const idx  = this.data.findIndex(d => d.id === item?.id);
        const next = item && this.data[idx - 1];
        const prev = item && this.data[idx + 1];
        if (!item) {
          document.getElementById('newsDetail').innerHTML =
            '<div style="text-align:center;padding:48px;color:var(--gray-mid)">게시물을 찾을 수 없습니다.</div>';
          return;
        }
        const navHtml = (next || prev) ? `
          <div class="cd-nav">
            ${next ? `<div class="cd-nav-item" onclick="location.href='?id=${next.id}'">
              <span class="cd-nav-label">다음글</span>
              <span class="cd-nav-title">${next.title}</span></div>` : ''}
            ${prev ? `<div class="cd-nav-item" onclick="location.href='?id=${prev.id}'">
              <span class="cd-nav-label">이전글</span>
              <span class="cd-nav-title">${prev.title}</span></div>` : ''}
          </div>` : '';
        const canMod = App.canModify(item);
        document.getElementById('newsDetail').innerHTML = `
          <div class="cd-wrap">
            <div class="cd-head">
              <div class="cd-head-left"><h2 class="cd-title">${item.title}</h2></div>
              <span class="cd-date">${item.date}</span>
            </div>
            <div class="cd-meta"><span>작성자 <strong>${item.author}</strong></span></div>
            <hr class="cd-divider">
            <div class="cd-body"><div class="cd-content">${item.content}</div></div>
            ${navHtml}
            <div class="cd-actions">
              <button class="btn btn-primary btn-sm cd-btn-list"
                      onclick="location.href='sagongdan-news.html'">목록</button>
              ${canMod ? `<div class="cd-actions-right">
                <button class="btn btn-danger btn-sm"
                        onclick="App.deletePost(${item.id}, SagongdanNewsCtrl.data, 'sagongdan-news.html')">삭제</button>
              </div>` : ''}
            </div>
          </div>`;
      },

      search() {
        const kw = document.getElementById('newsKeyword').value.trim().toLowerCase();
        this.filtered = kw ? this.data.filter(d => d.title.toLowerCase().includes(kw)) : [...this.data];
        this.render();
      },
      render() {
        document.getElementById('newsCount').textContent = this.filtered.length;
        const tbody = document.getElementById('newsTableBody');
        if (!this.filtered.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--gray-mid)">등록된 소식이 없습니다.</td></tr>';
          return;
        }
        tbody.innerHTML = this.filtered.map((d, i) => `
          <tr>
            <td style="text-align:center">${this.filtered.length - i}</td>
            <td><a href="?id=${d.id}">${d.title}</a></td>
            <td style="text-align:center">${d.author}</td>
            <td style="text-align:center">${d.date}</td>
          </tr>`).join('');
      },
    };

    SagongdanNewsCtrl.init();
  </script>
</body>

</html>
