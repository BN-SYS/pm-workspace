<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>협회 일정 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="calendar">

  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>협회 일정</h1>
      <p>협회의 교육·행사·모임 일정을 한눈에 확인하세요</p>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
  <div class="content-wrap">

    <!-- 월 이동 네비게이션 -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="cal-main-nav">
        <button onclick="CalendarCtrl.changeMonth(-1)">&#8249;</button>
        <h2 id="calMonthTitle">2026년 3월</h2>
        <button onclick="CalendarCtrl.changeMonth(1)">&#8250;</button>
      </div>
      <div class="full-cal-grid" id="fullCalGrid"></div>
    </div>

  </div>
    </main>
  </div>


  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'community/calendar.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'community/calendar.html');
    CalendarCtrl.init();
  </script>
