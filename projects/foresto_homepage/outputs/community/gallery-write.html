<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>갤러리 등록 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
  <link rel="stylesheet" href="../assets/css/pages/write.css">
</head>
<body data-page="gallery-write">
  <div id="hdr"></div>
  <div class="page-header">
    <div class="container">
      <h1>갤러리</h1>
    </div>
  </div>
  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
      <div class="content-wrap">
        <div class="write-wrap">

          <!-- 제목 -->
          <div class="write-row">
            <label class="write-label">제목 <span class="write-req">*</span></label>
            <div class="write-input-cell">
              <input type="text" class="write-input" id="writeTitle"
                     placeholder="제목을 입력하세요" maxlength="100">
            </div>
          </div>

          <!-- 내용 (에디터에 이미지 삽입 → 첫 번째 이미지가 썸네일) -->
          <div class="write-section">
            <div class="write-section-label">
              내용 <span class="write-req">*</span>
              <span class="write-optional">에디터에 삽입된 첫 번째 이미지가 목록 썸네일로 표시됩니다. 이미지가 없으면 기본 이미지가 노출됩니다.</span>
            </div>
            <div class="write-section-body">
              <div class="se2-wrap">
                <div class="se2-toolbar">
                  <button type="button" class="se2-btn se2-btn-bold"      title="굵게">B</button>
                  <button type="button" class="se2-btn se2-btn-italic"    title="기울임">I</button>
                  <button type="button" class="se2-btn se2-btn-underline" title="밑줄">U</button>
                  <span class="se2-sep"></span>
                  <select class="se2-select" title="글꼴 크기">
                    <option>크기</option><option>소</option><option>중</option><option>대</option>
                  </select>
                  <span class="se2-sep"></span>
                  <button type="button" class="se2-btn" title="왼쪽 정렬">≡</button>
                  <button type="button" class="se2-btn" title="가운데 정렬">☰</button>
                  <span class="se2-sep"></span>
                  <button type="button" class="se2-btn" title="이미지 삽입">🖼</button>
                  <button type="button" class="se2-btn" title="링크 삽입">🔗</button>
                </div>
                <textarea class="se2-body" id="writeContent"
                  placeholder="내용을 입력하고 이미지를 삽입하세요.&#10;에디터에 삽입된 첫 번째 이미지가 목록 썸네일로 자동 사용됩니다."></textarea>
                <div class="se2-footer">SmartEditor2 — 실제 구현 시 서버 연동 적용 예정</div>
              </div>
            </div>
          </div>

        </div>
        <div class="write-actions">
          <a href="gallery.html" class="btn btn-gray">취소</a>
          <button type="button" class="btn btn-primary" onclick="GalleryWrite.submit()">등록하기</button>
        </div>
      </div>
    </main>
  </div>
  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community.js"></script>
  <script>
    if (!App.user.isLoggedIn) location.href = '../auth/login.html';

    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML  = LNB.breadcrumb('../', 'community/gallery.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'community/gallery.html');

    const GalleryWrite = {
      submit() {
        const title   = document.getElementById('writeTitle')?.value.trim();
        const content = document.getElementById('writeContent')?.value.trim();
        if (!title)   { App.toast('제목을 입력해주세요.', 'warning');   return; }
        if (!content) { App.toast('내용을 입력해주세요.', 'warning');   return; }
        /* TODO: 실제 구현 시 서버 전송 — 첫 번째 <img src> 추출해 imgUrl로 저장, 없으면 기본 이미지 경로 저장 */
        App.toast('갤러리에 등록되었습니다.');
        setTimeout(() => location.href = 'gallery.html', 1200);
      },
    };
  </script>
</body>
</html>
