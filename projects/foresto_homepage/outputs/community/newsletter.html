<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>협회지 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/community.css">
</head>

<body data-page="newsletter">

  <div id="hdr"></div>

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="container">
      <h1>소식</h1>
    </div>
  </div>

  <!-- 서브 내비 -->

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">

    <div class="content-wrap">

      <!-- 목록 상단 -->
      <div class="list-top">
        <span class="list-count">Total <strong id="nlCount">0</strong>건</span>
        <div class="list-search">
          <input type="text" class="list-search-input" id="nlSearchInput" placeholder="검색어를 입력하세요"
            onkeydown="if(event.key==='Enter') NewsletterCtrl.search()">
          <button class="list-search-btn" onclick="NewsletterCtrl.search()">검색</button>
        </div>
      </div>

      <!-- 갤러리형 카드 목록 -->
      <div class="gallery-grid" id="nlGrid"></div>
      <div class="pagination" id="nlPagination"></div>

    </div>
    </main>
  </div>


  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/community-media.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('커뮤니티', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'community/newsletter.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'community/newsletter.html');
  </script>
</body>

</html>
