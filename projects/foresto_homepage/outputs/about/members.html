<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직도·임원진 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/about.css">
</head>
<body>
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>조직 안내</h1>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
  <div class="content-wrap">

    <!-- 조직도 -->
    <h2 class="section-heading">조직도</h2>
    <div class="org-chart">
      <!-- 총회 -->
      <div class="org-box type-top">총 회</div>
      <div class="org-vline"></div>

      <!-- 이사회 -->
      <div class="org-box type-mid">이 사 회</div>
      <div class="org-vline"></div>

      <!-- 상임대표 -->
      <div class="org-box type-mid">상임대표</div>
      <div class="org-vline"></div>

      <!-- 2단 분기: 사무처장 + 감사 -->
      <div class="org-fork org-fork--2col">
        <div class="org-fork-item org-fork-item--wide">
          <div class="org-vline"></div>
          <div class="org-box type-sub">사무처장</div>
        </div>
        <div class="org-fork-item org-fork-item--wide">
          <div class="org-vline"></div>
          <div class="org-box type-gray">감 사</div>
        </div>
      </div>

      <div class="org-vline"></div>

      <!-- 4개 부서 -->
      <div class="org-fork org-fork--4col">
        <div class="org-fork-item org-fork-item--std">
          <div class="org-vline"></div>
          <div class="org-box type-sub org-box--dept">교육부</div>
        </div>
        <div class="org-fork-item org-fork-item--std">
          <div class="org-vline"></div>
          <div class="org-box type-sub org-box--dept">사회공헌부</div>
        </div>
        <div class="org-fork-item org-fork-item--std">
          <div class="org-vline"></div>
          <div class="org-box type-sub org-box--dept">회원관리부</div>
        </div>
        <div class="org-fork-item org-fork-item--std">
          <div class="org-vline"></div>
          <div class="org-box type-sub org-box--dept">홍보출판부</div>
        </div>
      </div>
    </div>

    <!-- 임원진 -->
    <h2 class="section-heading section-heading--mt">임원진</h2>
    <table class="member-table">
      <tbody>
        <tr>
          <td class="role-cell">상임대표</td>
          <td>
            <span class="name-item">○○○</span>
          </td>
        </tr>
        <tr>
          <td class="role-cell">부대표</td>
          <td class="name-row--lg">
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
          </td>
        </tr>
        <tr>
          <td class="role-cell">이사</td>
          <td>
            <span class="name-item">○○○ <span class="name-sub">(교육부)</span></span>
            <span class="name-item">○○○ <span class="name-sub">(사회공헌부)</span></span>
            <span class="name-item">○○○ <span class="name-sub">(회원관리부)</span></span>
            <span class="name-item">○○○ <span class="name-sub">(홍보출판부)</span></span>
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
          </td>
        </tr>
        <tr>
          <td class="role-cell">감사</td>
          <td class="name-row--lg">
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
          </td>
        </tr>
        <tr>
          <td class="role-cell">사무처장</td>
          <td>
            <span class="name-item">○○○</span>
          </td>
        </tr>
        <tr>
          <td class="role-cell">간사</td>
          <td class="name-row--lg">
            <span class="name-item">○○○</span>
            <span class="name-item">○○○</span>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="alert alert-info alert--top-gap">
      ℹ임원진 정보는 정기총회 결과에 따라 변경될 수 있습니다. 최신 정보는 협회 사무국으로 문의하시기 바랍니다.
    </div>

  </div>
    </main>
  </div>


  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('협회소개', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'about/members.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'about/members.html');
  </script>
</body>
</html>
