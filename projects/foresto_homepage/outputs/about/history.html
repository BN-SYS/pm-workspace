<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연혁 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/about.css">
</head>
<body data-page="history">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>협회 소개</h1>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">

    <div class="content-wrap">
      <!-- JS 렌더링 대상 — HistoryCtrl.init() 이 채움 -->
      <div class="history-wrap" id="historyTimeline"></div>
    </div>
    </main>
  </div>


  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/about.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('협회소개', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'about/history.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'about/history.html');
  </script>
</body>
</html>
