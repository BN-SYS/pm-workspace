<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수료증 | 한국숲해설가협회</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/pages/mypage.css">
  <style>
    /* ── 기본 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      font-family: 'Noto Serif KR', 'Noto Sans KR', serif;
      overflow-x: hidden; /* 스케일 시 가로 스크롤 방지 */
    }

    /* ── 인쇄 버튼 바 */
    .print-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      width: 780px;
      max-width: calc(100vw - 32px);
      justify-content: flex-end;
    }

    .print-bar button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: var(--font-size-base);
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      font-weight: 700;
    }

    .btn-print {
      background: #2d5a27;
      color: #fff;
    }

    .btn-close {
      background: #888;
      color: #fff;
    }

    .btn-print:hover {
      background: #1e3d1b;
    }

    /* ── 수료증 용지 */
    .cert-paper {
      width: 780px;
      min-height: 1100px;
      background: #fff;
      position: relative;
      padding: 52px 60px 48px;
      display: flex;
      flex-direction: column;

      /* 이중 테두리 */
      border: 4px solid #2d5a27;
      outline: 2px solid #2d5a27;
      outline-offset: -10px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
    }

    /* ── 워터마크 */
    .cert-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      background-image: var(--wm-url);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      pointer-events: none;
      z-index: 0;
    }

    .cert-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── 증서번호 */
    .cert-no {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }

    /* ── 제목 */
    .cert-title {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 24px;
      color: var(--green-800);
      text-align: center;
      margin: 20px;
      line-height: 1;
    }

    .cert-divider {
      border: none;
      margin: 22px 0 28px;
    }

    /* ── 필드 테이블 */
    .cert-fields {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      margin-left: 240px;
    }

    .cert-fields tr td {
      padding: 9px 0;
      font-size: 14px;
      vertical-align: middle;
      font-family: 'Noto Serif KR', serif;
    }

    .cert-fields .f-label {
      color: #4b4b4b;
      width: 130px;
      white-space: nowrap;
      letter-spacing: 4px;
    }

    .cert-fields .f-colon {
      width: 20px;
      color: #666;
      text-align: center;
    }

    .cert-fields .f-value {
      color: #1a1a1a;
      font-size: 16px;
      font-weight: 700;
    }

    .cert-fields .f-info {
      font-size: 14px;
      color: #646464;
      padding-left: 2px;
    }

    /* ── 본문 */
    .cert-body {
      text-align: center;
      margin: 70px 0 40px;
      line-height: 2.2;
      font-size: 24px;
      color: #1a1a1a;
      font-family: 'Noto Serif KR', serif;
    }

    /* ── 하단 (날짜 + 이미지) */
    .cert-footer {
      margin-top: auto;
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── 발급일 */
    .cert-date {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      font-family: 'Noto Serif KR', serif;
      color: #333333;
      letter-spacing: 2px;
    }

    /* ── 하단 이미지 (직인 or 합성 이미지) */
    #stampImg {
      width: 520px;
      max-width: 90%;
      height: auto;
      display: block;
    }

    /* ══════════════════════════════════
       인쇄 전용 스타일
    ══════════════════════════════════ */
    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background: #fff;
        width: 100%;
        height: 100%;
      }

      .print-bar {
        display: none !important;
      }

      /* position:fixed + inset:0 → 여백 설정(기본/없음) 무관하게 A4 전체 채움 */
      .cert-paper {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        min-height: unset !important;
        margin: 0 !important;
        padding: 14mm 18mm 12mm !important;
        box-shadow: none !important;
        border: 4px solid #2d5a27 !important;
        outline: 2px solid #2d5a27 !important;
        outline-offset: -10px !important;
      }
    }
  </style>
</head>

<body>

  <!-- 인쇄 버튼 바 -->
  <div class="print-bar" id="printBar">
    <button class="btn-close" onclick="window.close()">닫기</button>
    <button class="btn-print" onclick="window.print()">PDF 저장 / 인쇄</button>
  </div>

  <!-- 수료증 본체 -->
  <div class="cert-paper" id="certPaper">
    <!-- 워터마크 -->
    <div class="cert-watermark" id="wmDiv"></div>

    <div class="cert-content">
      <!-- 증서번호 -->
      <div class="cert-no" id="certNo"></div>

      <!-- 제목 -->
      <div class="cert-title">수 료 증</div>
      <hr class="cert-divider">

      <!-- 필드 -->
      <table class="cert-fields">
        <tbody>
          <!-- 성명 -->
          <tr>
            <td class="f-label">성&emsp;&emsp;&emsp;&emsp;명</td>
            <td class="f-colon">:</td>
            <td class="f-value" id="certName"></td>
          </tr>
          <!-- 교육과정 -->
          <tr>
            <td class="f-label" style="padding-top:14px;">교&ensp;육&ensp;과&ensp;정</td>
            <td class="f-colon" style="padding-top:14px;">:</td>
            <td class="f-value" style="padding-top:14px;" id="certCourse"></td>
          </tr>
          <!-- 교육기간 -->
          <tr>
            <td class="f-label">교&ensp;육&ensp;기&ensp;간</td>
            <td class="f-colon">:</td>
            <td class="f-value" id="certPeriod">2026년 3월 1일 ~ 2026년 6월 30일</td>
          </tr>
          <tr>
            <td></td>
            <td></td>
            <td class="f-info" id="certInfo">(총 40시간)</td>
          </tr>
        </tbody>
      </table>

      <!-- 본문 -->
      <div class="cert-body" id="certBody">
        위 사람은 사단법인 한국숲해설가협회에서<br>
        실시한 <strong id="certCourseBold"></strong> 강좌를<br>
        이수하였으므로 이 증서를 드립니다.
      </div>

      <!-- 하단: 날짜 + 직인 (날짜가 직인 바로 위) -->
      <div class="cert-footer">
        <div class="cert-date" id="certDate"></div>
        <img id="stampImg" src="../assets/image/pdf/stamp.png" alt="직인">
      </div>
    </div><!-- /cert-content -->
  </div><!-- /cert-paper -->

  <script>
    /* ─────────────────────────────────────────
       URL 파라미터 파싱 → 수료증 채우기
    ───────────────────────────────────────── */
    function getParam(key) {
      return new URLSearchParams(window.location.search).get(key) || '';
    }

    function fill() {
      const certNo = getParam('certNo') || '2026-001';
      const name = getParam('name') || '홍길동';
      const course = getParam('course') || '숲해설가 전문가과정';
      const period = getParam('period') || '';
      const hours = getParam('hours') || '';
      const date = getParam('date') || '';

      // 증서 번호
      document.getElementById('certNo').textContent = `제  ${certNo}  호`;

      // 성명 — 두 글자 이상이면 글자 사이 공백 삽입
      const nameSpaced = name.length >= 2 ? name.split('').join('\u00A0\u00A0') : name;
      document.getElementById('certName').innerHTML = nameSpaced;

      // 교육과정
      document.getElementById('certCourse').textContent = course;
      document.getElementById('certCourseBold').textContent = course;

      // 교육기간
      if (period) document.getElementById('certPeriod').textContent = period;

      // 이수시간
      if (hours) document.getElementById('certInfo').textContent = `(총 ${hours}시간)`;

      // 발급일 (수료일 기준)
      if (date) {
        const [y, m, d] = date.split('-');
        document.getElementById('certDate').textContent =
          `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
      }

      // 본문 과정명 동적
      document.getElementById('certBody').innerHTML =
        `위 사람은 사단법인 한국숲해설가협회에서<br>` +
        `실시한 <strong>${course}</strong> 강좌를<br>` +
        `이수하였으므로 이 증서를 드립니다.`;

      // 워터마크 이미지
      const wmDiv = document.getElementById('wmDiv');
      wmDiv.style.backgroundImage = "url('../assets/image/pdf/watermark.png')";

      // 페이지 제목 (인쇄 시 파일명)
      document.title = `수료증_${name}_${course}`;
    }

    fill();

    /* ─────────────────────────────────────────
       반응형 스케일 — 화면 폭에 맞춰 비율 유지 축소
    ───────────────────────────────────────── */
    const CERT_W = 780;  // 수료증 기준 너비 (px)
    const BODY_PAD = 32; // body padding-left + right (16px × 2)

    function fitCert() {
      const paper = document.getElementById('certPaper');
      if (!paper) return;

      const vw = document.documentElement.clientWidth;
      const avail = vw - BODY_PAD;
      const scale = Math.min(1, avail / CERT_W);

      if (scale < 1) {
        paper.style.transform = `scale(${scale})`;
        paper.style.transformOrigin = 'top center';
        // transform은 레이아웃 공간을 유지하므로 여분 높이를 음수 마진으로 상쇄
        const naturalH = paper.offsetHeight;
        paper.style.marginBottom = `${naturalH * (scale - 1)}px`; // 음수
      } else {
        paper.style.transform = '';
        paper.style.transformOrigin = '';
        paper.style.marginBottom = '';
      }
    }

    window.addEventListener('resize', fitCert);
    fitCert(); // 초기 실행
  </script>
</body>

</html>
