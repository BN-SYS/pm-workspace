<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디·비밀번호 찾기 | 한국숲해설가협회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/pages/auth.css">
</head>

<body class="auth-page">
    <div id="hdr"></div>

    <div class="auth-bg">
        <div class="auth-card" style="max-width:480px;padding:0;overflow:hidden">

            <!-- 탭 -->
            <div class="find-tabs">
                <button class="find-tab-btn active" id="tabId" onclick="FindCtrl.switchTab('id')">
                    아이디 찾기
                </button>
                <button class="find-tab-btn" id="tabPw" onclick="FindCtrl.switchTab('pw')">
                    비밀번호 찾기
                </button>
            </div>

            <div class="find-body">

                <!-- ══ 아이디 찾기 ══ -->
                <div class="find-panel active" id="panelId">

                    <!-- 입력 폼 -->
                    <div id="idForms">
                        <p style="font-size:14px;color:var(--gray-mid);margin-bottom:20px;line-height:1.7">
                            가입 시 등록한 이름과 이메일을 입력하면 해당 이메일로 아이디를 보내드립니다.
                        </p>
                        <div style="margin-bottom:14px">
                            <label class="auth-label">이름</label>
                            <input type="text" class="auth-input" id="idName" placeholder="홍길동">
                            <div class="auth-error-msg" id="idNameErr"></div>
                        </div>
                        <div style="margin-bottom:20px">
                            <label class="auth-label">가입 시 등록한 이메일</label>
                            <input type="email" class="auth-input" id="idEmailAddr"
                                placeholder="example@email.com">
                            <div class="auth-error-msg" id="idEmailErr"></div>
                        </div>
                        <div class="auth-error-msg" id="idFormErr" style="margin-bottom:10px"></div>
                        <button class="auth-btn auth-btn-primary" onclick="FindCtrl.findId()">
                            아이디 찾기
                        </button>
                    </div>

                    <!-- 발송 완료 -->
                    <div id="idDone" style="display:none;padding:8px 0">
                        <div style="font-size:17px;font-weight:800;color:var(--green-dark);margin-bottom:8px">
                            이메일을 발송했습니다
                        </div>
                        <div id="idDoneDesc"
                            style="font-size:14px;color:var(--gray-mid);margin-bottom:20px;line-height:1.7">
                        </div>
                        <div style="display:flex;gap:8px">
                            <a href="login.html"
                                style="flex:1;display:flex;align-items:center;justify-content:center;height:44px;background:var(--green-dark);color:var(--white);border-radius:var(--radius);font-size:14px;font-weight:700;text-decoration:none">
                                로그인 하기
                            </a>
                            <button onclick="FindCtrl.switchTab('pw')"
                                style="flex:1;display:flex;align-items:center;justify-content:center;height:44px;border:1.5px solid var(--green-dark);background:var(--white);color:var(--green-dark);border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
                                비밀번호 찾기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ══ 비밀번호 찾기 ══ -->
                <div class="find-panel" id="panelPw">

                    <!-- 입력 폼 -->
                    <div id="pwForms">
                        <p style="font-size:14px;color:var(--gray-mid);margin-bottom:20px;line-height:1.7">
                            가입 정보를 입력하면 이메일로 인증번호를 보내드립니다.
                        </p>
                        <div style="margin-bottom:14px">
                            <label class="auth-label">이름</label>
                            <input type="text" class="auth-input" id="pwName" placeholder="홍길동">
                            <div class="auth-error-msg" id="pwNameErr"></div>
                        </div>
                        <div style="margin-bottom:14px">
                            <label class="auth-label">아이디</label>
                            <input type="text" class="auth-input" id="pwUserId"
                                placeholder="영문 소문자·숫자 조합 4~20자">
                            <div class="auth-error-msg" id="pwUserIdErr"></div>
                        </div>
                        <div style="margin-bottom:6px">
                            <label class="auth-label">가입 시 등록한 이메일</label>
                            <div class="form-row-btn">
                                <input type="email" class="auth-input" id="pwEmailAddr"
                                    placeholder="example@email.com">
                                <button class="btn btn-outline btn-sm" style="height:44px;white-space:nowrap"
                                    onclick="FindCtrl.sendCode()">
                                    인증번호 발송
                                </button>
                            </div>
                            <div class="auth-error-msg" id="pwEmailErr"></div>
                            <div class="auth-error-msg" id="pwFormErr"></div>
                            <div class="auth-success-msg" id="pwSendOk"></div>
                        </div>
                        <div style="margin-bottom:20px;display:none" id="pwEmailCodeWrap">
                            <label class="auth-label">인증번호</label>
                            <div class="form-row-btn">
                                <input type="text" class="auth-input" id="pwEmailCode"
                                    placeholder="인증번호 6자리" maxlength="6">
                                <span id="pwEmailTimer"
                                    style="font-size:13px;font-weight:700;color:var(--danger);min-width:44px;text-align:center;line-height:44px"></span>
                            </div>
                            <div class="auth-error-msg" id="pwCodeErr"></div>
                        </div>
                        <button class="auth-btn auth-btn-primary" style="margin-top:14px" onclick="FindCtrl.verifyPw()">
                            본인 확인
                        </button>
                    </div>

                    <!-- 비밀번호 재설정 폼 -->
                    <div class="reset-form" id="pwResetForm">
                        <div class="alert alert-success" style="margin-bottom:18px;font-size:13px">
                            인증 완료. 새 비밀번호를 설정해 주세요.
                        </div>
                        <div style="margin-bottom:14px">
                            <label class="auth-label">새 비밀번호</label>
                            <div style="position:relative">
                                <input type="password" class="auth-input" id="newPw"
                                    placeholder="8자 이상, 영문·숫자·특수문자 조합" style="padding-right:44px">
                                <img src="../assets/icons/eye.png" alt="보기"
                                    id="fPwEyeIco"
                                    style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;cursor:pointer;opacity:.5"
                                    onclick="FindCtrl.togglePw('newPw',this)">
                            </div>
                            <div style="margin-top:5px;font-size:12px;color:var(--gray-mid)">
                                8자 이상, 영문·숫자·특수문자를 포함해 주세요.
                            </div>
                            <div class="auth-error-msg" id="newPwErr"></div>
                        </div>
                        <div style="margin-bottom:22px">
                            <label class="auth-label">새 비밀번호 확인</label>
                            <div style="position:relative">
                                <input type="password" class="auth-input" id="newPwConfirm"
                                    placeholder="비밀번호를 다시 입력하세요" style="padding-right:44px">
                                <img src="../assets/icons/eye.png" alt="보기"
                                    id="fPwConfirmEyeIco"
                                    style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;cursor:pointer;opacity:.5"
                                    onclick="FindCtrl.togglePw('newPwConfirm',this)">
                            </div>
                            <div class="auth-error-msg" id="newPwConfirmErr"></div>
                        </div>
                        <button class="auth-btn auth-btn-primary" onclick="FindCtrl.resetPassword()">
                            비밀번호 재설정
                        </button>
                    </div>

                    <!-- 재설정 완료 -->
                    <div id="pwDone" style="display:none;padding:8px 0">
                        <div style="font-size:17px;font-weight:800;color:var(--green-dark);margin-bottom:8px">
                            비밀번호 재설정 완료
                        </div>
                        <div style="font-size:14px;color:var(--gray-mid);margin-bottom:20px;line-height:1.7">
                            새 비밀번호로 로그인해 주세요.
                        </div>
                        <a href="login.html"
                            style="display:flex;align-items:center;justify-content:center;height:44px;background:var(--green-dark);color:var(--white);border-radius:var(--radius);font-size:14px;font-weight:700;text-decoration:none">
                            로그인 하기
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray-mid)">
            <a href="login.html" style="color:var(--green-dark);font-weight:700;text-decoration:none">
                ← 로그인으로 돌아가기
            </a>
            <span style="margin:0 8px;color:var(--gray-light)">|</span>
            <a href="register.html" style="color:var(--green-dark);font-weight:700;text-decoration:none">
                회원가입
            </a>
        </div>
    </div>

    <div id="ftr"></div>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script>
        document.getElementById('hdr').innerHTML = Header.render('', '../');
        document.getElementById('ftr').innerHTML = Footer.render('../');

        // 테스트 계정 (프로토타입 전용)
        const TEST = { name: '홍길동', userId: 'forest01', email: 'test@forest.or.kr' };

        const FindCtrl = {
            _timers: {},
            _sent: false,
            _pwVerified: false,

            /* ── 인라인 에러/성공 헬퍼 */
            _err(id, msg) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = msg;
                el.classList.toggle('show', !!msg);
            },
            _ok(id, msg) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = msg;
                el.classList.toggle('show', !!msg);
            },
            _clearErrs(...ids) {
                ids.forEach(id => this._err(id, ''));
            },

            /* ── 탭 전환 */
            switchTab(tab) {
                ['Id', 'Pw'].forEach(t => {
                    document.getElementById(`panel${t}`)?.classList.toggle('active', t.toLowerCase() === tab);
                    document.getElementById(`tab${t}`)?.classList.toggle('active', t.toLowerCase() === tab);
                });
            },

            /* ── 아이디 찾기 */
            findId() {
                this._clearErrs('idNameErr', 'idEmailErr', 'idFormErr');
                const name = document.getElementById('idName')?.value.trim();
                const email = document.getElementById('idEmailAddr')?.value.trim();

                let valid = true;
                if (!name) { this._err('idNameErr', '이름을 입력해 주세요.'); valid = false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email || '')) {
                    this._err('idEmailErr', '이메일을 올바르게 입력해 주세요.'); valid = false;
                }
                if (!valid) return;

                if (name !== TEST.name || email !== TEST.email) {
                    this._err('idFormErr', '입력하신 정보와 일치하는 회원이 없습니다.'); return;
                }

                document.getElementById('idForms').style.display = 'none';
                document.getElementById('idDone').style.display = 'block';
                document.getElementById('idDoneDesc').textContent =
                    `${email}으로 아이디 정보를 발송했습니다. 메일함을 확인해 주세요.`;
            },

            /* ── 비밀번호 찾기: 인증번호 발송 */
            sendCode() {
                this._clearErrs('pwNameErr', 'pwUserIdErr', 'pwEmailErr', 'pwFormErr');
                this._ok('pwSendOk', '');
                const name = document.getElementById('pwName')?.value.trim();
                const userId = document.getElementById('pwUserId')?.value.trim();
                const email = document.getElementById('pwEmailAddr')?.value.trim();

                let valid = true;
                if (!name) { this._err('pwNameErr', '이름을 입력해 주세요.'); valid = false; }
                if (!userId) { this._err('pwUserIdErr', '아이디를 입력해 주세요.'); valid = false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email || '')) {
                    this._err('pwEmailErr', '이메일을 올바르게 입력해 주세요.'); valid = false;
                }
                if (!valid) return;

                if (name !== TEST.name || userId !== TEST.userId || email !== TEST.email) {
                    this._err('pwFormErr', '입력하신 정보와 일치하는 회원이 없습니다.'); return;
                }

                const wrap = document.getElementById('pwEmailCodeWrap');
                if (wrap) wrap.style.display = 'block';
                this._sent = true;
                this._ok('pwSendOk', `해당 이메일로 인증번호를 발송했습니다.`);
                this._startTimer();
            },

            /* ── 타이머 */
            _startTimer() {
                if (this._timers.pw) clearInterval(this._timers.pw);
                let remain = 180;
                const tick = () => {
                    const m = String(Math.floor(remain / 60));
                    const s = String(remain % 60).padStart(2, '0');
                    const el = document.getElementById('pwEmailTimer');
                    if (el) el.textContent = remain > 0 ? `${m}:${s}` : '만료';
                    if (remain <= 0) clearInterval(this._timers.pw);
                    remain--;
                };
                tick();
                this._timers.pw = setInterval(tick, 1000);
            },

            /* ── 비밀번호 찾기: 인증번호 확인 */
            verifyPw() {
                this._clearErrs('pwCodeErr');
                const code = document.getElementById('pwEmailCode')?.value.trim();
                if (!this._sent) { this._err('pwFormErr', '인증번호를 먼저 발송해 주세요.'); return; }
                if (!code) { this._err('pwCodeErr', '인증번호를 입력해 주세요.'); return; }
                if (code !== '123456') { this._err('pwCodeErr', '인증번호가 일치하지 않습니다.'); return; }

                this._pwVerified = true;
                if (this._timers.pw) clearInterval(this._timers.pw);
                document.getElementById('pwForms').style.display = 'none';
                document.getElementById('pwResetForm')?.classList.add('show');
            },

            /* ── 비밀번호 재설정 */
            resetPassword() {
                this._clearErrs('newPwErr', 'newPwConfirmErr');
                const pw = document.getElementById('newPw')?.value || '';
                const pwConf = document.getElementById('newPwConfirm')?.value || '';
                const pwValid = pw.length >= 8 && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);

                let valid = true;
                if (!pwValid) { this._err('newPwErr', '8자 이상 영문·숫자·특수문자 조합이어야 합니다.'); valid = false; }
                if (pw && pw !== pwConf) { this._err('newPwConfirmErr', '비밀번호가 일치하지 않습니다.'); valid = false; }
                if (!valid) return;

                document.getElementById('pwResetForm')?.classList.remove('show');
                document.getElementById('pwDone').style.display = 'block';
            },

            /* ── 비밀번호 표시 토글 */
            togglePw(id, icon) {
                const el = document.getElementById(id);
                if (!el) return;
                el.type = el.type === 'password' ? 'text' : 'password';
                icon.style.opacity = el.type === 'password' ? '0.5' : '1';
            },
        };
    </script>
</body>

</html>
