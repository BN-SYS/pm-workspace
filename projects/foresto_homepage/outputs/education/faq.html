<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자주 묻는 질문 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/education.css">
</head>

<body>
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>숲해설가 교육</h1>
      <p>자연과 사람을 잇는 전문 숲해설가를 소개합니다.</p>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
  <div class="content-wrap">
    <h2 class="section-heading"
      style="font-size:20px;font-weight:700;color:var(--gray-dark);padding-bottom:14px;border-bottom:1px solid var(--gray-light);margin-bottom:32px">
      자주 묻는 질문
    </h2>

    <div class="accordion-list" id="faqList"></div>

    <!-- 문의 안내 -->
    <div class="faq-contact">
      <div class="faq-contact-text">
        <h4>원하는 답변을 찾지 못하셨나요?</h4>
        <p>협회 사무국으로 직접 문의하시면 친절하게 안내해 드립니다.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="tel:020000000" class="btn btn-primary btn-sm">📞 02-000-0000</a>
        <a href="mailto:info@forest-guide.or.kr" class="btn btn-outline btn-sm">✉️ 이메일 문의</a>
      </div>
    </div>
  </div>
    </main>
  </div>


  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('숲해설가교육', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'education/faq.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'education/faq.html');

    const FAQ_DATA = [
      {
        cat: 'edu',
        q: '전문가과정은 1년에 몇 번 개설되나요?',
        a: '전문가과정은 연 2회 개설됩니다. 상반기(3~6월)와 하반기(9~11월)에 각 1기씩 진행되며, 정원이 제한되어 있으므로 모집 공고 후 빠르게 신청하시기 바랍니다. 정확한 일정은 공지사항 및 협회 일정을 참고해 주세요.'
      },
      {
        cat: 'edu',
        q: '전문가과정 수강에 필요한 사전 자격이 있나요?',
        a: '별도의 사전 자격은 없습니다. 만 18세 이상이면 누구나 지원 가능합니다. 다만 숲과 자연에 대한 관심과 교육 활동에 대한 의욕을 가지신 분이라면 더욱 풍성하게 과정을 이수하실 수 있습니다.'
      },
      {
        cat: 'edu',
        q: '교육은 주말에도 진행되나요?',
        a: '전문가과정은 주중 강의와 주말 현장실습을 병행하여 운영됩니다. 상세 시간표는 모집 공고 시 함께 안내되며, 개인 사정에 따라 수강 가능 여부를 사전에 확인하시는 것을 권장합니다.'
      },
      {
        cat: 'edu',
        q: '온라인으로도 수강할 수 있나요?',
        a: '이론 교육 일부는 온라인으로 수강 가능하나, 현장 실습 및 평가는 반드시 오프라인으로 참석하셔야 합니다. 온라인 강의 비중은 기수별로 달라질 수 있으니 모집 공고를 확인해 주세요.'
      },
      {
        cat: 'qual',
        q: '숲해설가 자격증은 국가 공인 자격인가요?',
        a: '네, 숲해설가 자격증은 「산림교육의 진흥에 관한 법률」 제6조에 의거한 국가 공인 자격입니다. 한국산림복지진흥원이 자격 시험을 시행하며, 산림청이 관할합니다.'
      },
      {
        cat: 'qual',
        q: '자격증 시험은 언제, 어디서 보나요?',
        a: '자격증 시험은 연 2회(상·하반기) 한국산림복지진흥원에서 주관합니다. 시험 일정과 접수 방법은 한국산림복지진흥원 홈페이지(www.fowi.or.kr)에서 확인하시기 바랍니다. 협회 교육 수료 후 응시 자격이 부여됩니다.'
      },
      {
        cat: 'qual',
        q: '자격증 취득 후 유효기간이 있나요?',
        a: '숲해설가 자격증은 유효기간 없이 평생 유효합니다. 단, 자격 유지를 위해 매년 일정 시간의 보수교육이 권장되며, 협회에서 이를 지원합니다.'
      },
      {
        cat: 'fee',
        q: '전문가과정 수강료는 얼마인가요?',
        a: '수강료는 기수별로 상이할 수 있으며, 모집 공고 시 명시됩니다. 일반적으로 협회 정회원의 경우 10~20% 할인 혜택이 제공됩니다. 수강료 외에 교재비·현장실습 교통비가 별도로 발생할 수 있습니다.'
      },
      {
        cat: 'fee',
        q: '신청 후 취소하면 환불이 되나요?',
        a: `환불 정책은 다음과 같습니다.\n• 교육 시작 7일 전까지: 전액 환불\n• 교육 시작 3~6일 전: 수강료의 50% 환불\n• 교육 시작 2일 전 이후: 환불 불가\n취소는 반드시 유선(02-000-0000) 또는 이메일로 연락하여 처리하시기 바랍니다.`
      },
      {
        cat: 'fee',
        q: '국민내일배움카드로 수강할 수 있나요?',
        a: '일부 과정은 국민내일배움카드(HRD-Net) 적용이 가능합니다. 해당 기수 모집 공고에서 고용보험 환급 여부를 확인하시거나, 사무국으로 문의하시기 바랍니다.'
      },
      {
        cat: 'act',
        q: '수료 후 바로 활동할 수 있나요?',
        a: '수료 후 자격증을 취득하시면 즉시 활동이 가능합니다. 협회를 통한 숲해설 활동 매칭, 사회공헌단 합류, 학교·기관 강사 파견 등 다양한 활동 기회를 안내해 드립니다.'
      },
      {
        cat: 'act',
        q: '숲해설가로 취업이 가능한가요?',
        a: '국립공원, 수목원, 자연휴양림, 산림치유원 등 공공기관과 환경 교육 기관, 산림복지 전문기업에서 숲해설가를 채용합니다. 협회는 회원들의 취업·활동 정보를 정기적으로 공유하고 있습니다.'
      },
      {
        cat: 'act',
        q: '자원봉사 활동으로도 참여할 수 있나요?',
        a: '협회 사회공헌단을 통해 학교, 복지기관, 공원 등 다양한 현장에서 자원봉사 숲해설 활동에 참여하실 수 있습니다. 협회 사무국으로 문의하시면 안내해 드립니다.'
      },
      {
        cat: 'member',
        q: '협회에 가입하면 어떤 혜택이 있나요?',
        a: '정회원으로 가입 시 수강료 할인, 각종 교육 및 행사 우선 참여, 동아리·사회공헌단 활동 참여, 회원 전용 자료실 이용, 협회 소식지 수신 등의 혜택을 받으실 수 있습니다.'
      },
      {
        cat: 'member',
        q: '정회원과 준회원의 차이는 무엇인가요?',
        a: '준회원은 숲해설 교육 과정 수강 중이거나 관심 있는 분들로 구성됩니다. 정회원은 협회 소정의 숲해설가 자격을 취득하고 연 회비를 납부한 분으로, 총회 의결권 및 임원 피선거권 등 완전한 회원 권리를 갖습니다.'
      },
    ];

    function renderFaq() {
      document.getElementById('faqList').innerHTML = FAQ_DATA.map((f, i) => `
        <div class="accordion-item" id="faq-${i}">
          <div class="accordion-head" onclick="toggleFaq('faq-${i}')">
            <div class="acc-q-mark">Q</div>
            <div class="acc-question">${f.q}</div>
            <div class="acc-arrow"></div>
          </div>
          <div class="accordion-body">
            <div class="acc-answer-inner">
              <div class="acc-a-mark">A</div>
              <div class="acc-answer-text">${f.a.replace(/\n/g, '<br>')}</div>
            </div>
          </div>
        </div>`).join('');
    }

    function toggleFaq(id) {
      document.getElementById(id)?.classList.toggle('open');
    }

    renderFaq();
  </script>
</body>

</html>
