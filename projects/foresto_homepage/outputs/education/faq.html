  <script>
    document.getElementById('hdr').innerHTML = Header.render('숲해설가교육', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'education/faq.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'education/faq.html');

    const FAQ_DATA = [
      {
        cat: 'act',
        q: '숲해설은 어디서 들을 수 있나요?',
        a: `▣ 무료 숲해설\n자원봉사로 운영되고 있는 숲해설은 다음과 같이 진행되고 있습니다.\n창   경   궁 :  매주 토요일과 일요일  오후 2시 ~ 3시30분\n서   울   숲 :  매주 일요일  오후 2시30분 ~ 4시\n월드컵공원 :  홀수 토요일 오전 10시 30분 ~ 12시\n                 짝수 토요일 오후 14시 30분 ~ 16시\n\n▣ 유료 숲해설\n대상, 장소별 맞춤형 숲해설을 희망하는 각 기관이나 학교 등은 협회로 문의 바랍니다.\n문의처 : 02-747-6518 (사)한국숲해설가협회`
      },
      {
        cat: 'org',
        q: '지방에도 한국숲해설가협회가 있나요?',
        a: `(사)한국숲해설가협회는 전국에 6개의 지역협회가 있습니다.\n거주지에서 가까운 협회로 문의하시길 바랍니다.\n\n* (사)강원산림교육전문가협회 : 033-673-0999 (양양)\n* (사)경상북도숲해설가협회 : 054-273-2739 (포항)\n* (사)숲해설가광주전남협회 : 062-223-3279 (광주)\n* (사)대전세종충남숲해설가협회 : 042-221-5412 (대전)\n* (사)충북숲해설가협회 : 043-255-2845 (청주)\n* (사)부산경남숲해설가협회 : 051-465-2022 (부산)`
      },
      {
        cat: 'edu',
        q: '기초과정이란 어떤 교육인가요?',
        a: `▣ 숲 아카데미는 숲에 대한 입문과정으로 숲을 아끼고 사랑하는 분이라면 누구라도 참여하실 수 있습니다.\n\n숲 아카데미를 통해 숲의 가치와 미덕을 배우고 더불어 사는 삶의 소중함을 배웁니다.\n\n숲생태, 산림과 환경, 숲생태학, 숲과곤충, 세밀화, 생태공예, 자연놀이, 생태인문학, 산림생태계, 커뮤니케이션 등 숲 관련 분야의 전문가들의 실질적이고 심층적인 이론 및 현장 강의를 통해 보다 다양하고 전문적인 지식과 소양을 쌓고자 함에 그 목적을 두고 있습니다.\n\n숲 아카데미는 사람과 자연, 사람과 사람이 만나서 소통하고 보다 다양한 정보를 나누는 어울림의 장입니다.`
      },
      {
        cat: 'edu',
        q: '숲해설가 전문과정은 교육이 어떻게 진행되나요?',
        a: `1. 교육기관 \n- (사)한국숲해설가협회 (제 숲해설-2012-03호)\n\n2. 교육기간 \n- 4개월\n\n3. 교육구분 (주 3회 수업)\n- 이론교육 및 현장교육 (상황에 따라 비대면 온라인 강의로 진행될 수 있음)\n① 매주 화요일, 목요일 오후 7시 ~ 10시까지 기본 2~3시간 교육으로 진행됨\n② 매주 토요일 오전 9시 ~ 16시까지 기본 5~6시간 교육으로 진행됨\n\n4. 교육장소\n- 이론교육 : 서울시 서초구 양재동 바우뫼로 158 유창빌딩4층 강의실(면적 65.9㎡)\n(3호선 양재역 11번 출구로 나와서 마을버스(8번, 18번, 18-1번)로 첫 번째 정류장에 하차 후 직진 횡단보도 건너서 우측으로 100M에 있음)\n(도보로는 3호선 양재역 11번 출구, 신분당선 9번 출구로 나와 직진 후(약 10분 정도 소요) 횡단보도 건너 우측으로 100M에 있음)\n- 현장교육 : 청계산, 우면산, 서울숲, 남산, 매헌시민의숲, 말죽거리공원 등 수도권 인근지역\n\n5. 교육내용\n- 산림교육론 / 12시간 이상\n- 기본소양 / 3시간 이상\n- 산림정책과 환경교육 / 2시간\n- 산림과 생태계 / 42시간 이상\n- 커뮤니케이션 / 20시간 이상\n- 안전교육 및 안전관리(응급처치 포함) / 15시간 이상\n- 교육프로그램 개발 / 27시간 이상\n- 선택과정 / 21시간 이상\n- 교육실습 / 30시간 이상\n- 기타 숲해설가로서 필요한 전문교육\n- 총 교육시간 : 188시간 (예정)\n\n6. 교육수료 조건\n- 교육기간 중 법정출석시간 (이론 140시간 이상/실습 30시간, 총 170시간 이상) 필수로 이수해야함\n- 공식 수업 이외에 모둠별 과제 수행 필수\n- 이론시험 평균 70점 이상 (과목별 50점 이상) / 시연평가 점수 70점 이상\n\n7. 자격증\n- 전문교육을 이수한 후 자격증 교부 기관인 한국산림복지진흥원에 교부 신청\n\n8. 교육대상\n- 숲과 자연을 사랑하고 봉사하는 마음으로 산림교육 및 산림문화 확산을 위해 안내하고 지도하는 숲해설가로 활동하고자 하는 분\n\n9. 교육인원\n- 40명\n\n10. 교육비\n- 일반 1,400,000 / 후원회원 1,350,000\n※ 후원회원은 1년 이상 자격을 유지하는 회원에 한함\n\n11. 접수방법\n- 참가신청서(첨부파일)를 다운로드 받으시고 신청서 작성 후 협회 메일(foresto123@hanmail.net)로 접수\n\n12. 선발기준\n- 협회의 내부 평가기준에 따른 교육 참가신청서 평가`
      },
    ];

    /* ── 답변 텍스트 포매터
     * ▣ · 숫자. · * 로 시작하는 줄 → 굵게 + 글자 크기 조금 크게
     * ※ 로 시작하는 줄  → 회색 작은 글씨
     * - 로 시작하는 줄  → 들여쓰기
     * 빈 줄             → 여백
     * 나머지            → 본문
     */
    function formatAnswer(text) {
      return text.split('\n').map(line => {
        const t = line.trim();
        if (t === '') return '<div style="height:8px"></div>';

        if (t.startsWith('▣') || /^\d+\./.test(t) || t.startsWith('*')) {
          return `<div style="font-size:var(--text-base);font-weight:700;color:var(--gray-dark);line-height:1.8;padding:4px 0">${t}</div>`;
        }

        if (t.startsWith('※')) {
          return `<div style="font-size:var(--text-sm);color:var(--gray-mid);line-height:1.7;padding:2px 0">${t}</div>`;
        }

        if (t.startsWith('-')) {
          return `<div style="font-size:var(--text-md);color:var(--gray-dark);line-height:1.8;padding:2px 0 2px 14px">${t}</div>`;
        }

        return `<div style="font-size:var(--text-md);color:var(--gray-dark);line-height:1.8;padding:2px 0">${t}</div>`;
      }).join('');
    }

    function renderFaq() {
      document.getElementById('faqList').innerHTML = FAQ_DATA.map((f, i) => `
        <div class="accordion-item" id="faq-${i}">
          <div class="accordion-head" onclick="toggleFaq('faq-${i}')">
            <div class="acc-q-mark">Q</div>
            <div class="acc-question">${f.q}</div>
            <div class="acc-arrow"></div>
          </div>
          <div class="accordion-body">
            <div class="acc-answer-inner">
              <div class="acc-a-mark">A</div>
              <div class="acc-answer-text">${formatAnswer(f.a)}</div>
            </div>
          </div>
        </div>`).join('');
    }

    function toggleFaq(id) {
      document.getElementById(id)?.classList.toggle('open');
    }

    renderFaq();
  </script>
