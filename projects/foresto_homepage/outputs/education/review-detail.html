        content: '<p>54기 과정은 제 인생의 전환점이었습니다. 단순히 나무 이름을 외우는 교육이 아니라 숲을 바라보는 관점 자체가 달라지는 경험을 했습니다. 현장 실습이 특히 인상적이었고 강사님들의 열정이 대단했습니다.</p><p>5개월의 긴 여정이었지만 한 번도 포기하고 싶다는 생각을 하지 않았습니다. 함께한 동기들과의 유대감도 특별했고, 지금도 종종 모임을 이어가고 있습니다. 숲해설가로서의 첫걸음을 협회와 함께 시작하게 되어 정말 다행입니다.</p>',

        author: '최성호', date: '2026-03-08'

        author: '정다은', date: '2025-09-20'

      {

        author: '윤재원', date: '2025-07-14'
      },
      {
        id: 8, courseTitle: '[전문과정] 54기 숲해설가 전문가과정',
        title: '아이들 눈높이에서 숲을 설명하는 법',
        content: '<p>초등학교 교사로서 아이들에게 자연을 가르쳐 주고 싶어 수강했습니다. 아동 대상 해설 기법을 따로 다루는 수업이 매우 유용했고, 실제 학교 숲 수업에 바로 적용할 수 있었습니다.</p><p>수료 후 학교 생태 텃밭 수업과 교내 숲 체험 활동을 새롭게 기획하여 운영 중입니다. 아이들이 나무 이름을 알아갈 때의 눈빛이 달라지는 것을 보면 정말 보람 있습니다.</p>',
        author: '강지현', date: '2026-01-22'
      },
      {
        id: 9, courseTitle: '[전문과정] 53기 숲해설가 전문가과정',
        title: '도시 숲에서 만나는 생물 다양성',
        content: '<p>도시 숲이라고 해서 볼 게 없을 것 같았는데, 전혀 달랐습니다. 공원 한 곳에도 수백 종의 생물이 살고 있다는 사실을 직접 확인하며 큰 감동을 받았습니다.</p><p>도시 생태계의 중요성을 새롭게 인식하게 된 것이 이 과정의 가장 큰 수확입니다. 앞으로 도시에서 활동하는 숲해설가로서 시민들에게 가까운 곳의 자연을 소개하고 싶습니다.</p>',
        author: '임소현', date: '2025-10-30'
      },
      {
        id: 10, courseTitle: '[전문과정] 52기 숲해설가 전문가과정',
        title: '퇴직 후 제2의 인생, 숲해설가로 시작',
        content: '<p>30년 직장 생활을 마치고 새로운 시작을 고민하던 중 협회를 알게 되었습니다. 52기 과정은 저에게 단순한 취미 그 이상의 의미였습니다. 지금은 국립공원에서 주말 해설 자원봉사를 하고 있습니다.</p><p>나이가 든 만큼 더 많은 경험과 이야기를 가지고 있다는 것이 해설 활동에 강점이 된다는 것을 깨달았습니다. 제2의 인생을 숲과 함께 시작하게 되어 정말 행복합니다.</p>',
        author: '오병철', date: '2025-08-15'
      },
      {
        id: 11, courseTitle: '[전문과정] 51기 숲해설가 전문가과정',
        title: '산림치유와 해설을 함께 배운 값진 경험',
        content: '<p>숲해설과 산림치유를 연계한 커리큘럼이 특히 인상적이었습니다. 단순히 지식을 전달하는 해설이 아니라, 방문객이 숲에서 실제로 치유받을 수 있도록 안내하는 법을 배웠습니다.</p><p>현대인들이 숲에서 필요한 것이 단순한 지식 습득이 아니라 정서적 회복이라는 것을 이 과정을 통해 깨달았습니다. 앞으로 치유적 관점을 갖춘 숲해설가로 활동하고 싶습니다.</p>',
        author: '노미경', date: '2025-06-11'
      },
      {
        id: 12, courseTitle: '[전문과정] 55기 숲해설가 전문가과정',
        title: '숲해설가로서 첫발을 내딛으며',
        content: '<p>자격증을 취득했다는 사실보다 이 과정에서 쌓은 지식과 경험이 훨씬 소중합니다. 앞으로 더 많은 사람들에게 숲의 아름다움을 전할 수 있도록 꾸준히 배우겠습니다.</p><p>55기 동기들과 함께 만든 소중한 추억, 강사님들께 배운 가르침, 현장에서 직접 느낀 생동감 — 이 모든 것이 제 해설 활동의 원동력이 될 것입니다. 감사합니다.</p>',
        author: '장수빈', date: '2026-03-18'

    (function () {
      const id = Number(new URLSearchParams(location.search).get('id'));
      const review = REVIEWS_DATA.find(r => r.id === id);
      const el = document.getElementById('reviewDetail');

      if (!review) {
        el.innerHTML = `<div style="text-align:center;padding:64px 24px;color:var(--gray-mid)">
          후기를 찾을 수 없습니다.<br><br>
          <button class="btn btn-gray" onclick="history.back()">이전 페이지로</button>
        </div>`;
        return;
      }

      const idx = REVIEWS_DATA.findIndex(r => r.id === id);
      const next = REVIEWS_DATA[idx - 1];
      const prev = REVIEWS_DATA[idx + 1];

      const navHtml = (next || prev) ? `
        <div class="cd-nav">
          ${next ? `<div class="cd-nav-item" onclick="location.href='review-detail.html?id=${next.id}'">
            <span class="cd-nav-label">다음글</span>
            <span class="cd-nav-title">${next.title}</span>
          </div>` : ''}
          ${prev ? `<div class="cd-nav-item" onclick="location.href='review-detail.html?id=${prev.id}'">
            <span class="cd-nav-label">이전글</span>
            <span class="cd-nav-title">${prev.title}</span>
          </div>` : ''}
        </div>` : '';

      /* 본인 글이면 수정 버튼 표시 */
      const editBtn = review.author === CURRENT_USER
        ? `<button class="btn btn-outline btn-sm"
               onclick="location.href='review-write.html?id=${review.id}&edit=1'">수정</button>`
        : '';

      el.innerHTML = `
        <div class="cd-wrap">
          <div class="cd-head" style="flex-direction:column;align-items:stretch;gap:6px;padding-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="review-badge">${review.courseTitle}</span>              
              <span class="cd-date">${review.date.replace(/-/g, '.')}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;">
              <h2 class="cd-title">${review.title}</h2>
              <span style="font-size:var(--text-sm);color:var(--gray-mid);">작성자 <strong style="color:var(--gray-dark);font-weight:600;">${review.author}</strong></span>
            </div>
          </div>
          <hr class="cd-divider">
          <div class="cd-body">
            <div class="cd-content">${review.content}</div>
          </div>
          ${navHtml}
          <div class="cd-actions">
            <button class="btn btn-primary btn-sm cd-btn-list"
                    onclick="location.href='reviews.html'">목록</button>
            <div class="cd-actions-right">
              ${editBtn}
            </div>
          </div>
        </div>`;
    })();
  </script>
