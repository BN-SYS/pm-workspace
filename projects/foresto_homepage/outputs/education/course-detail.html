<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강좌 상세 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/education.css">
</head>

<body data-page="course-detail">
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>자격취득 과정</h1>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
      <div class="content-wrap">
        <!-- JS(CourseDetailController)가 이 영역을 채움 -->
        <div id="courseDetail"></div>
      </div>
    </main>
  </div>

  <div id="ftr"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/education.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('교육과정', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');

    /* 강좌 타입에 따라 LNB 활성 경로 결정 */
    const _courseId = Number(new URLSearchParams(location.search).get('id'));
    const _course   = (typeof ALL_COURSES_RAW !== 'undefined')
      ? ALL_COURSES_RAW.find(c => c.id === _courseId) : null;
    const _lnbPathMap = {
      '전문과정':    'education/course-list.html',
      '시민아카데미': 'education/academy-apply.html',
      '직무교육':    'education/job-training-apply.html',
      '역량강화':    'education/job-training-apply.html',
    };
    const _lnbPath = (_course && _lnbPathMap[_course.type]) || 'education/course-list.html';

    document.getElementById('bc').innerHTML  = LNB.breadcrumb('../', _lnbPath);
    document.getElementById('lnb').innerHTML = LNB.render('../', _lnbPath);

    window._ctrl = new CourseDetailController();
    window._ctrl.init();
  </script>
</body>

</html>
