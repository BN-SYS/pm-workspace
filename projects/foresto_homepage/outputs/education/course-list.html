<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전문과정 신청 | 한국숲해설가협회</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/layout-lnb.css">
  <link rel="stylesheet" href="../assets/css/pages/education.css">
</head>

<body>
  <div id="hdr"></div>

  <div class="page-header">
    <div class="container">
      <h1>숲해설가 교육</h1>
      <p>자연과 사람을 잇는 전문 숲해설가를 소개합니다.</p>
    </div>
  </div>

  <div id="bc"></div>
  <div class="sub-layout">
    <div id="lnb"></div>
    <main class="sub-content">
  <div class="content-wrap">
    <!-- <div class="alert alert-warning">
      <strong>55기 전문가과정</strong> 모집 중입니다. 접수 마감: <strong>2026.03.20</strong> — 정원 마감 시 조기 종료될 수 있습니다.
    </div> -->

    <div class="list-top">
      <span class="list-count">Total <strong id="totalCount">0</strong>건</span>
      <div class="list-top-right">
        <div class="list-search">
          <select class="list-search-type" id="searchType" style="min-width:100px">
            <option value="">과정 구분</option>
            <option value="전문과정">전문과정</option>
            <option value="시민아카데미">시민아카데미</option>
            <option value="직무교육">직무교육</option>
            <option value="역량강화">역량강화</option>
          </select>
          <select class="list-search-type" id="searchStatus" style="min-width:90px; border-left: 1.5px solid var(--gray-light);">
            <option value="">접수 상태</option>
            <option value="open">접수중</option>
            <option value="ready">준비중</option>
            <option value="closed">접수마감</option>
          </select>
          <button class="list-search-btn" onclick="doSearch()">검색</button>
        </div>
        <select class="list-search-type" style="border: 1.5px solid var(--gray-light); border-radius: var(--radius); height:36px; padding: 0 10px;"
          onchange="window._ctrl && window._ctrl.changePageSize(+this.value)">
          <option value="10">10개씩</option>
          <option value="20">20개씩</option>
          <option value="50">50개씩</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <!-- <th style="width:90px">구분</th> -->
            <th class="td-title">강좌명</th>
            <th style="width:180px">교육일자</th>
            <th style="width:230px">교육기간</th>
            <th style="width:100px">상태</th>
          </tr>
        </thead>
        <tbody id="courseBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="coursePagination"></div>
  </div>
    </main>
  </div>


  <div id="ftr"></div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components/header.js"></script>
  <script src="../assets/js/pages/education.js"></script>
  <script>
    document.getElementById('hdr').innerHTML = Header.render('숲해설가교육', '../');
    document.getElementById('ftr').innerHTML = Footer.render('../');
    document.getElementById('bc').innerHTML = LNB.breadcrumb('../', 'education/course-list.html');
    document.getElementById('lnb').innerHTML = LNB.render('../', 'education/course-list.html');

    window._ctrl = new CourseListController('전문과정', 'courseBody', 'coursePagination');
    window._ctrl.render();

    function doSearch() {
      const type = document.getElementById('searchType').value;
      const status = document.getElementById('searchStatus').value;
      if (type) {
        window._ctrl.courses = ALL_COURSES_RAW.filter(c => c.type === type);
      } else {
        window._ctrl.courses = [...ALL_COURSES_RAW];
      }
      window._ctrl.filter(status, '', '');
    }
  </script>
</body>

</html>
